// ============================================================
// MMG V9.8C ENGINE - FULL TRANSLATION FROM PINE SCRIPT
// ============================================================
function calcEMABars(bars,period){
if(!bars||bars.length<2)return null;
var p=Math.min(period,bars.length),k=2/(p+1);
var ema=0; for(var i=0;i<p;i++)ema+=bars[i].c; ema/=p;
for(var i=p;i<bars.length;i++)ema=bars[i].c*k+ema*(1-k);
return ema;
}
function calcEMAArr(arr,period){
if(!arr||arr.length<2)return arr[arr.length-1]||0;
var p=Math.min(period,arr.length),k=2/(p+1);
var ema=0; for(var i=0;i<p;i++)ema+=arr[i]; ema/=p;
for(var i=p;i<arr.length;i++)ema=arr[i]*k+ema*(1-k);
return ema;
}
function calcVWAP(bars){
if(!bars||bars.length===0)return null;
var spv=0,sv=0;
for(var i=0;i<bars.length;i++){var hlc3=(bars[i].h+bars[i].l+bars[i].c)/3;spv+=hlc3*bars[i].v;sv+=bars[i].v;}
return sv>0?spv/sv:null;
}
function calcATR(bars,period){
period=period||14;
if(!bars||bars.length<2)return bars&&bars[0]?bars[0].h-bars[0].l:0;
var n=Math.min(period,bars.length-1),sum=0;
for(var i=0;i<n;i++){var prev=bars[i+1]?bars[i+1].c:bars[i].c;sum+=Math.max(bars[i].h-bars[i].l,Math.abs(bars[i].h-prev),Math.abs(bars[i].l-prev));}
return sum/n||(bars[0].h-bars[0].l)||bars[0].c*0.01;
}
function findPivotHigh(bars,pl){
pl=pl||5; var last=null;
for(var i=pl;i<bars.length-pl;i++){
var ok=true;
for(var j=i-pl;j<=i+pl;j++){if(j!==i&&bars[j].h>=bars[i].h){ok=false;break;}}
if(ok)last=bars[i].h;
}
return last;
}
function findPivotLow(bars,pl){
pl=pl||5; var last=null;
for(var i=pl;i<bars.length-pl;i++){
var ok=true;
for(var j=i-pl;j<=i+pl;j++){if(j!==i&&bars[j].l<=bars[i].l){ok=false;break;}}
if(ok)last=bars[i].l;
}
return last;
}
function findGapUp(bars){for(var i=1;i<bars.length;i++){if(bars[i].l>bars[i-1].h)return(bars[i].l+bars[i-1].h)/2;}return null;}
function findGapDown(bars){for(var i=1;i<bars.length;i++){if(bars[i].h<bars[i-1].l)return(bars[i].h+bars[i-1].l)/2;}return null;}
function getLevels(bars,pl){return{res:findPivotHigh(bars,pl),sup:findPivotLow(bars,pl),gapUp:findGapUp(bars),gapDn:findGapDown(bars)};}
function nearestAbove(lvls,price){var c=Object.values(lvls).filter(function(v){return v!==null&&v>price;});return c.length>0?Math.min.apply(null,c):null;}
function nearestBelow(lvls,price){var c=Object.values(lvls).filter(function(v){return v!==null&&v<price;});return c.length>0?Math.max.apply(null,c):null;}
function tfVote(up,dn,price){
if(up!==null&&dn===null)return 1;
if(up===null&&dn!==null)return -1;
if(up!==null&&dn!==null){var du=Math.abs(up-price),dd=Math.abs(price-dn);if(du<dd)return 1;if(dd<du)return -1;return 0;}
return 0;
}
function clusterLevels(raw,atr,cf){
cf=cf||0.25; var band=atr*cf,clusters=[];
for(var i=0;i<raw.length;i++){
var lvl=raw[i],merged=false;
for(var j=0;j<clusters.length;j++){if(Math.abs(lvl-clusters[j])<=band){clusters[j]=(clusters[j]+lvl)/2;merged=true;break;}}
if(!merged)clusters.push(lvl);
}
return clusters;
}

function runMMG(stock, bars15, bars60, bars240, barsD, barsNative, snap){
var EMA_LEN=21,ATR_LEN=14,PIVOT_LEN=5,CLUSTER_F=0.25,SPACING_F=0.25;
var NEAR_TARGET_ATR=0.40,VWAP_BAL_ATR=0.15,MIN_BREAK_ATR=0.10;
var RUN_S1=0.50,RUN_S2=1.00,RUN_STA=1.618;

var day=snap&&snap.day?snap.day:{};
var prevDay=snap&&snap.prevDay?snap.prevDay:{};
var close15=day.c||prevDay.c||(bars15.length>0?bars15[bars15.length-1].c:null);
if(!close15||close15<=0)return null;

var atr15=calcATR(bars15,ATR_LEN)||close15*0.01;
var ema15=calcEMABars(bars15,EMA_LEN)||close15;
var vwap15=calcVWAP(bars15)||close15;

var barsN=barsNative&&barsNative.length>=5?barsNative:bars15;
var emaN=calcEMABars(barsN,EMA_LEN)||close15;
var vwapN=calcVWAP(barsN)||close15;
var atrN=calcATR(barsN,ATR_LEN)||atr15;
var closeN=barsN.length>0?barsN[barsN.length-1].c:close15;

// Levels per TF
var l15=getLevels(bars15,PIVOT_LEN);
var l60=getLevels(bars60.length>=10?bars60:bars15,PIVOT_LEN);
var l240=getLevels(bars240.length>=5?bars240:bars15,PIVOT_LEN);
var lD=getLevels(barsD.length>=5?barsD:bars15,PIVOT_LEN);

var rawLevels=[l15.res,l15.sup,l15.gapUp,l15.gapDn,l60.res,l60.sup,l60.gapUp,l60.gapDn,
l240.res,l240.sup,l240.gapUp,l240.gapDn,lD.res,lD.sup,lD.gapUp,lD.gapDn]
.filter(function(v){return v!==null&&v>0;});
if(rawLevels.length===0)return null;

var clusters=clusterLevels(rawLevels,atr15,CLUSTER_F);
var highestL=Math.max.apply(null,clusters);
var lowestL=Math.min.apply(null,clusters);

// Per-TF nearest above/below
var up15=nearestAbove(l15,close15),dn15=nearestBelow(l15,close15);
var up60=nearestAbove(l60,close15),dn60=nearestBelow(l60,close15);
var up240=nearestAbove(l240,close15),dn240=nearestBelow(l240,close15);
var upD=nearestAbove(lD,close15),dnD=nearestBelow(lD,close15);

// Pressure score
var cntA=0,cntB=0,sumA=0,sumB=0;
for(var i=0;i<clusters.length;i++){
if(clusters[i]>close15){cntA++;sumA+=clusters[i]-close15;}
else if(clusters[i]<close15){cntB++;sumB+=close15-clusters[i];}
}
var tot=cntA+cntB;
var pressureScore=tot>0?(cntA-cntB)/tot:0;
var avgA=cntA>0?sumA/cntA:null,avgB=cntB>0?sumB/cntB:null;
var gravityScore=0;
if(avgA!==null&&avgB===null)gravityScore=1;
else if(avgA===null&&avgB!==null)gravityScore=-1;
else if(avgA!==null&&avgB!==null){if(avgA<avgB)gravityScore=1;else if(avgB<avgA)gravityScore=-1;}

var v15=tfVote(up15,dn15,close15),v60=tfVote(up60,dn60,close15);
var v240=tfVote(up240,dn240,close15),vD=tfVote(upD,dnD,close15);
var voteScore=(v15+v60+v240+vD)/4;

// Runway
var bullFlow=closeN>emaN&&closeN>vwapN;
var bearFlow=closeN<emaN&&closeN<vwapN;
var bullRunway=close15>highestL&&bullFlow;
var bearRunway=close15<lowestL&&bearFlow;

var dirScore=(pressureScore*0.50)+(gravityScore*0.30)+(voteScore*0.20);
if(bullRunway)dirScore=Math.max(dirScore,0.85);
if(bearRunway)dirScore=Math.min(dirScore,-0.85);

var dir=0;
if(dirScore>0.10)dir=1;else if(dirScore<-0.10)dir=-1;

// Forward/behind
var forward=[],behind=[];
for(var i=0;i<clusters.length;i++){
var lvl=clusters[i];
if(dir===1){if(lvl>close15)forward.push(lvl);else if(lvl<close15)behind.push(lvl);}
else if(dir===-1){if(lvl<close15)forward.push(lvl);else if(lvl>close15)behind.push(lvl);}
}
if(dir===1){forward.sort(function(a,b){return a-b;});behind.sort(function(a,b){return b-a;});}
else if(dir===-1){forward.sort(function(a,b){return b-a;});behind.sort(function(a,b){return a-b;});}

var minSpacing=atr15*SPACING_F;
var stop1=null,stop2=null,station=null,behindPrice=null;
if(behind.length>0)behindPrice=behind[0];
if(forward.length>0)stop1=forward[0];
if(forward.length>1&&stop1!==null){
for(var i=1;i<forward.length;i++){if(Math.abs(forward[i]-stop1)>minSpacing){stop2=forward[i];break;}}
}
if(forward.length>2){
var ref=stop2!==null?stop2:stop1;
if(ref!==null){
for(var i=1;i<forward.length;i++){
if(forward[i]===stop1||forward[i]===stop2)continue;
if(Math.abs(forward[i]-ref)>minSpacing){station=forward[i];break;}
}
}
}

if(bullRunway){
if(behindPrice===null)behindPrice=highestL;
if(stop1===null)stop1=close15+atr15*RUN_S1;
if(stop2===null)stop2=close15+atr15*RUN_S2;
if(station===null)station=close15+atr15*RUN_STA;
}
if(bearRunway){
if(behindPrice===null)behindPrice=lowestL;
if(stop1===null)stop1=close15-atr15*RUN_S1;
if(stop2===null)stop2=close15-atr15*RUN_S2;
if(station===null)station=close15-atr15*RUN_STA;
}
if(stop1===null)return null;

// Arrive Today
var sesH=Math.max.apply(null,barsN.map(function(b){return b.h;}));
var sesL=Math.min.apply(null,barsN.map(function(b){return b.l;}));
var arriveToday=null;
if(dir===1&&station!==null&&station>sesL)
arriveToday=Math.max(0,Math.min(100,((closeN-sesL)/(station-sesL))*100));
else if(dir===-1&&station!==null&&station<sesH)
arriveToday=Math.max(0,Math.min(100,((sesH-closeN)/(sesH-station))*100));

// Train modes
var vwapLongOK=closeN>vwapN,vwapShortOK=closeN<vwapN;
var nearVWAPBal=Math.abs(closeN-vwapN)<=atrN*VWAP_BAL_ATR;
var breakBuf=atrN*MIN_BREAK_ATR;
var prevClose=barsN.length>=2?barsN[barsN.length-2].c:closeN;

var nS1=stop1!==null&&Math.abs(closeN-stop1)<=atrN*NEAR_TARGET_ATR;
var nS2=stop2!==null&&Math.abs(closeN-stop2)<=atrN*NEAR_TARGET_ATR;
var nSta=station!==null&&Math.abs(closeN-station)<=atrN*NEAR_TARGET_ATR;
var nearTarget=nS1||nS2||nSta;

var brdLong=dir===1&&stop1!==null&&vwapLongOK&&closeN>stop1+breakBuf&&prevClose<=stop1;
var brdShort=dir===-1&&stop1!==null&&vwapShortOK&&closeN<stop1-breakBuf&&prevClose>=stop1;
var boarding=brdLong||brdShort;
var depLong=dir===1&&!boarding&&stop1!==null&&vwapLongOK&&closeN>stop1&&closeN>prevClose&&prevClose>stop1;
var depShort=dir===-1&&!boarding&&stop1!==null&&vwapShortOK&&closeN<stop1&&closeN<prevClose&&prevClose<stop1;
var depart=depLong||depShort;
var rolLong=dir===1&&!boarding&&!depart&&vwapLongOK&&closeN>emaN&&closeN>prevClose;
var rolShort=dir===-1&&!boarding&&!depart&&vwapShortOK&&closeN<emaN&&closeN<prevClose;
var rolling=rolLong||rolShort;
var slow=dir!==0&&nearTarget;
var rev33=dir===1?closeN<prevClose:closeN>prevClose;
var rev67=dir===1?closeN<emaN:closeN>emaN;
var rev99=behindPrice!==null&&(dir===1?closeN<behindPrice:closeN>behindPrice);

var mode=1;
if(rev99)mode=8;else if(rev67)mode=7;else if(rev33&&slow)mode=6;
else if(slow)mode=5;else if(rolling)mode=4;else if(depart)mode=3;
else if(boarding)mode=2;

var action=(mode===2||mode===3||mode===4)?“GET ON”:(mode>=6?“GET OFF”:“WAIT”);
if(action!==“GET ON”)return null; // scanner only shows GET ON

// Certainty
var engTemp=Math.min(Math.abs(dirScore)*100,100);
var flowOK=dir===1?vwapLongOK:vwapShortOK;
var modeTrust=mode===4?90:mode===3?75:mode===2?55:mode===5?45:mode===6?35:mode===7?20:mode===8?5:25;
var arrTrust=arriveToday!==null?arriveToday:50;
var flowTrust=flowOK?80:40;
var certainty=Math.max(0,Math.min(100,(engTemp*0.40)+(modeTrust*0.25)+(arrTrust*0.20)+(flowTrust*0.15)));
if(certainty<30)return null;

var modeNames=[“Waiting”,“BOARDING”,“DEPART”,“ROLLING”,“SLOW”,“Rev 33%”,“Rev 67%”,“Rev 99%”];
var vol=day.v||0;
var avgVol=vol;
if(barsD.length>=5){var n=Math.min(barsD.length,20),s=0;for(var i=0;i<n;i++)s+=barsD[i].v;avgVol=s/n;}

var hr=new Date().getHours()+new Date().getMinutes()/60;
var sp=Math.max(0.01,Math.min(1,(hr-9.5)/6.5));
var expectedNow=avgVol*sp;
var rv=expectedNow>0?vol/expectedNow:1.0;
if(rv<1.1)return null; // volume confirmation

var d2t=Math.abs((station||close15)-close15);
var d2tStr=d2t>=100?(dir===1?”+”:”-”)+”$”+d2t.toFixed(0):d2t>=10?(dir===1?”+”:”-”)+”$”+d2t.toFixed(1):(dir===1?”+”:”-”)+”$”+d2t.toFixed(2);
var chgPct=prevDay.c>0?(((closeN-prevDay.c)/prevDay.c)*100).toFixed(2):“0.00”;

return {
t:stock.t,n:stock.n,
bias:dir,direction:dir===1?“NORTH”:“SOUTH”,
price:closeN.toFixed(2),
stop1:stop1!==null?stop1.toFixed(2):null,
stop2:stop2!==null?stop2.toFixed(2):null,
station:station!==null?station.toFixed(2):null,
d2tStr:d2tStr,
hit:arriveToday!==null?Math.round(arriveToday):null,
rv:rv.toFixed(1),
mName:modeNames[mode-1]||“Waiting”,
action:action,
certainty:certainty.toFixed(1),
engTemp:engTemp.toFixed(1),
dirScore:dirScore.toFixed(3),
pressureScore:pressureScore.toFixed(3),
gravityScore:gravityScore.toFixed(3),
voteScore:voteScore.toFixed(3),
vwap:vwapN.toFixed(2),
ema:emaN.toFixed(2),
atr:atrN.toFixed(2),
changePct:chgPct,
bullRunway:bullRunway,
bearRunway:bearRunway,
clusters:clusters.length,
};
}

async function doScan(){
if(isScanning)return;
isScanning=true; results=[]; completed=[];
updateControls();
var pg=document.getElementById(“progressSection”);
var re=document.getElementById(“results”);
if(pg)pg.style.display=“block”;
if(re)re.innerHTML=””;

var stocks=UNIVS[universe];
var scored=[];

for(var i=0;i<stocks.length;i++){
var stock=stocks[i];
var pct=Math.round(((i+1)/stocks.length)*100);
var pf=document.getElementById(“progressFill”);
var ss=document.getElementById(“scanStatus”);
if(pf)pf.style.width=pct+”%”;
if(ss)ss.textContent=“MMG V9.8C: “+stock.t+” (”+i+1+”/”+stocks.length+”)”;
try{
var _results=await Promise.all([
fetchSnap(stock.t),
fetchBars(stock.t,15,“minute”,3,200),
fetchBars(stock.t,60,“minute”,10,100),
fetchBars(stock.t,240,“minute”,20,50),
fetchBars(stock.t,1,“day”,60,60),
fetchBars(stock.t,1,“minute”,1,390),
]);
var snap=_results[0],bars15=_results[1],bars60=_results[2],bars240=_results[3],barsD=_results[4],barsMin=_results[5];
await sleep(250);
var result=runMMG(stock,bars15,bars60,bars240,barsD,barsMin,snap);
if(result)scored.push(result);
}catch(e){}
}

scored.sort(function(a,b){return parseFloat(b.certainty)-parseFloat(a.certainty);});
results=scored.slice(0,20);
if(pg)pg.style.display=“none”;
isScanning=false;
updateControls();
renderScanner();
}

function startAutoScan(){
clearInterval(scanTimer);
doScan();
scanTimer=setInterval(function(){if(!isScanning)doScan();},5*60*1000);
}

function triggerScan(){if(!isScanning)doScan();}

function drawMiniChart(s){
var canvas=document.getElementById(“miniChart”);
if(!canvas)return;
var ctx=canvas.getContext(“2d”);
var W=canvas.width,H=canvas.height;
ctx.clearRect(0,0,W,H);

var today=new Date().toISOString().split(“T”)[0];
var from=new Date(Date.now()-2*86400000).toISOString().split(“T”)[0];

fetch(“https://api.polygon.io/v2/aggs/ticker/”+s.t+”/range/15/minute/”+from+”/”+today+”?adjusted=true&sort=asc&limit=60&apiKey=”+API_KEY)
.then(function(r){return r.json();})
.then(function(data){
var bars=data.results||[];
bars=bars.slice(-26);
if(bars.length<3)return;

```
  var closes=bars.map(function(b){return b.c;});

  function emaArr(arr,p){
    p=Math.min(p,arr.length);
    var k=2/(p+1),e=arr.slice(0,p).reduce(function(a,b){return a+b;},0)/p,out=[e];
    for(var i=p;i<arr.length;i++){e=arr[i]*k+e*(1-k);out.push(e);}
    while(out.length<arr.length)out.unshift(out[0]);
    return out;
  }
  function vwapArr(bars){
    var spv=0,sv=0;
    return bars.map(function(b){var hlc3=(b.h+b.l+b.c)/3;spv+=hlc3*b.v;sv+=b.v;return sv>0?spv/sv:b.c;});
  }

  var emaLine=emaArr(closes,21);
  var vwapLine=vwapArr(bars);
  var levels=[
    {p:parseFloat(s.stop1),c:"rgba(255,221,136,0.7)",lb:"S1"},
    {p:parseFloat(s.stop2),c:"rgba(255,170,68,0.7)",lb:"S2"},
    {p:parseFloat(s.station),c:s.bias===1?"rgba(0,255,136,0.8)":"rgba(255,68,102,0.8)",lb:"STA"},
  ];

  var allP=closes.concat(emaLine).concat(vwapLine).concat(levels.map(function(l){return l.p;})).filter(function(v){return v>0;});
  var minP=Math.min.apply(null,allP),maxP=Math.max.apply(null,allP);
  var pad=(maxP-minP)*0.12||1; minP-=pad; maxP+=pad;
  var toX=function(i){return(i/(bars.length-1))*W;};
  var toY=function(p){return H-((p-minP)/(maxP-minP))*H;};

  // Grid
  ctx.strokeStyle="rgba(255,255,255,0.05)";ctx.lineWidth=1;
  for(var g=0;g<4;g++){var y=(g/3)*H;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Levels
  ctx.setLineDash([4,3]);
  levels.forEach(function(lv){
    if(!lv.p||lv.p<=0)return;
    var y=toY(lv.p);if(y<0||y>H)return;
    ctx.strokeStyle=lv.c;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();

// ============================================================
// ACTIONS
// ============================================================
function selectRole(r){
if(r===“OBSERVER”){role=“OBSERVER”;saveRole(“OBSERVER”);page=“scanner”;startAutoScan();return;}
loginTarget=r;passError=””;render();
}
function cancelLogin(){loginTarget=null;passError=””;render();}
function submitPass(){
var f=document.getElementById(“passInput”);
var val=f?f.value:””;
if(val===ROLES[loginTarget].pass){role=loginTarget;saveRole(role);loginTarget=null;passError=””;page=“scanner”;startAutoScan();}
else{passError=“Incorrect password. Try again.”;render();}
}
function logout(){clearRole();role=null;loginTarget=null;passError=””;page=“login”;clearInterval(scanTimer);results=[];completed=[];selectedStock=null;render();}
function switchUniverse(u){universe=u;startAutoScan();}
function markTraded(t){completed.push(t);renderScanner();}
function openDash(ticker){
if(!canDash())return;
var s=results.find(function(r){return r.t===ticker;});
if(s){selectedStock=s;page=“dashboard”;renderDashboard();}
}
function goScanner(){page=“scanner”;renderScanner();}
function goDash(){if(canDash()&&selectedStock){page=“dashboard”;renderDashboard();}}
function updateControls(){
var btn=document.getElementById(“scanBtn”);
var badge=document.getElementById(“statusBadge”);
if(btn){btn.disabled=isScanning;btn.style.background=isScanning?”#1a1a3a”:”#00ff88”;btn.style.color=isScanning?”#aaa”:”#000”;}
if(badge){badge.textContent=isScanning?“⟳ SCANNING”:“● LIVE”;badge.style.color=isScanning?”#ffcc00”:”#00ff88”;}
}
var clockInt=null;
function startClock(){
clearInterval(clockInt);
clockInt=setInterval(function(){
var el=document.getElementById(“clockEl”)||document.getElementById(“dashClock”);
if(el)el.textContent=new Date().toLocaleTimeString();
},1000);
}

// ============================================================
// BOOT
// ============================================================
try {
role=loadRole();
if(role){page=“scanner”;startAutoScan();}
else render();
} catch(e) {
document.getElementById(“app”).innerHTML=’<div style="color:#ff4466;padding:20px;font-family:Courier New;font-size:13px">Error: ‘+e.message+’<br><br>Please refresh the page.</div>’;
}
