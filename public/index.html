// MMG V9.8C ENGINE
function calcEMA(bars,period){
if(!bars||bars.length<1)return 0;
var p=Math.min(period,bars.length),k=2/(p+1),e=0;
for(var i=0;i<p;i++)e+=bars[i].c;
e/=p;
for(var i=p;i<bars.length;i++)e=bars[i].c*k+e*(1-k);
return e;
}
function calcVWAP(bars){
if(!bars||bars.length===0)return 0;
var spv=0,sv=0;
for(var i=0;i<bars.length;i++){var h=(bars[i].h+bars[i].l+bars[i].c)/3;spv+=h*bars[i].v;sv+=bars[i].v;}
return sv>0?spv/sv:bars[bars.length-1].c;
}
function calcATR(bars,period){
if(!bars||bars.length<2)return bars&&bars[0]?(bars[0].h-bars[0].l):1;
var n=Math.min(period||14,bars.length-1),s=0;
for(var i=0;i<n;i++){var p=bars[i+1].c;s+=Math.max(bars[i].h-bars[i].l,Math.abs(bars[i].h-p),Math.abs(bars[i].l-p));}
return s/n||1;
}
function pivotHigh(bars,pl){
pl=pl||5;var last=null;
for(var i=pl;i<bars.length-pl;i++){
var ok=true;
for(var j=i-pl;j<=i+pl;j++){if(j!==i&&bars[j].h>=bars[i].h){ok=false;break;}}
if(ok)last=bars[i].h;
}
return last;
}
function pivotLow(bars,pl){
pl=pl||5;var last=null;
for(var i=pl;i<bars.length-pl;i++){
var ok=true;
for(var j=i-pl;j<=i+pl;j++){if(j!==i&&bars[j].l<=bars[i].l){ok=false;break;}}
if(ok)last=bars[i].l;
}
return last;
}
function gapUp(bars){for(var i=1;i<bars.length;i++){if(bars[i].l>bars[i-1].h)return(bars[i].l+bars[i-1].h)/2;}return null;}
function gapDn(bars){for(var i=1;i<bars.length;i++){if(bars[i].h<bars[i-1].l)return(bars[i].h+bars[i-1].l)/2;}return null;}
function getLevels(bars,pl){return{res:pivotHigh(bars,pl),sup:pivotLow(bars,pl),gu:gapUp(bars),gd:gapDn(bars)};}
function nearAbove(lv,p){var c=[];for(var k in lv){if(lv[k]!==null&&lv[k]>p)c.push(lv[k]);}return c.length?Math.min.apply(null,c):null;}
function nearBelow(lv,p){var c=[];for(var k in lv){if(lv[k]!==null&&lv[k]<p)c.push(lv[k]);}return c.length?Math.max.apply(null,c):null;}
function tfVote(u,d,p){if(u!==null&&d===null)return 1;if(u===null&&d!==null)return -1;if(u!==null&&d!==null){if(Math.abs(u-p)<Math.abs(p-d))return 1;if(Math.abs(p-d)<Math.abs(u-p))return -1;return 0;}return 0;}
function cluster(raw,atr){
var band=atr*0.25,cl=[];
for(var i=0;i<raw.length;i++){
var v=raw[i],m=false;
for(var j=0;j<cl.length;j++){if(Math.abs(v-cl[j])<=band){cl[j]=(cl[j]+v)/2;m=true;break;}}
if(!m)cl.push(v);
}
return cl;
}

function runMMG(stock,b15,b60,b240,bD,bN,snap){
var day=snap&&snap.day?snap.day:{};
var prev=snap&&snap.prevDay?snap.prevDay:{};
var close=day.c||prev.c||(b15.length>0?b15[b15.length-1].c:0);
if(!close||close<=0)return null;

var atr=calcATR(b15,14)||close*0.01;
var bn=bN&&bN.length>=5?bN:b15;
var emaN=calcEMA(bn,21)||close;
var vwapN=calcVWAP(bn)||close;
var atrN=calcATR(bn,14)||atr;
var closeN=bn.length>0?bn[bn.length-1].c:close;

var l15=getLevels(b15,5);
var l60=getLevels(b60.length>=10?b60:b15,5);
var l240=getLevels(b240.length>=5?b240:b15,5);
var lD=getLevels(bD.length>=5?bD:b15,5);

var raw=[];
var allLvls=[l15,l60,l240,lD];
for(var i=0;i<allLvls.length;i++){
var lv=allLvls[i];
if(lv.res!==null&&lv.res>0)raw.push(lv.res);
if(lv.sup!==null&&lv.sup>0)raw.push(lv.sup);
if(lv.gu!==null&&lv.gu>0)raw.push(lv.gu);
if(lv.gd!==null&&lv.gd>0)raw.push(lv.gd);
}
if(raw.length===0)return null;

var cl=cluster(raw,atr);
var hiL=Math.max.apply(null,cl);
var loL=Math.min.apply(null,cl);

var v15=tfVote(nearAbove(l15,close),nearBelow(l15,close),close);
var v60=tfVote(nearAbove(l60,close),nearBelow(l60,close),close);
var v240=tfVote(nearAbove(l240,close),nearBelow(l240,close),close);
var vD=tfVote(nearAbove(lD,close),nearBelow(lD,close),close);

var cntA=0,cntB=0,sumA=0,sumB=0;
for(var i=0;i<cl.length;i++){
if(cl[i]>close){cntA++;sumA+=cl[i]-close;}
else if(cl[i]<close){cntB++;sumB+=close-cl[i];}
}
var tot=cntA+cntB;
var pScore=tot>0?(cntA-cntB)/tot:0;
var avgA=cntA>0?sumA/cntA:null,avgB=cntB>0?sumB/cntB:null;
var gScore=0;
if(avgA!==null&&avgB===null)gScore=1;
else if(avgA===null&&avgB!==null)gScore=-1;
else if(avgA!==null&&avgB!==null){if(avgA<avgB)gScore=1;else if(avgB<avgA)gScore=-1;}
var vScore=(v15+v60+v240+vD)/4;

var bullFlow=closeN>emaN&&closeN>vwapN;
var bearFlow=closeN<emaN&&closeN<vwapN;
var bullRun=close>hiL&&bullFlow;
var bearRun=close<loL&&bearFlow;

var dir=(pScore*0.50)+(gScore*0.30)+(vScore*0.20);
if(bullRun)dir=Math.max(dir,0.85);
if(bearRun)dir=Math.min(dir,-0.85);
var bias=dir>0.10?1:dir<-0.10?-1:0;
if(bias===0)return null;

var fwd=[],beh=[];
for(var i=0;i<cl.length;i++){
if(bias===1){if(cl[i]>close)fwd.push(cl[i]);else if(cl[i]<close)beh.push(cl[i]);}
else{if(cl[i]<close)fwd.push(cl[i]);else if(cl[i]>close)beh.push(cl[i]);}
}
if(bias===1){fwd.sort(function(a,b){return a-b;});beh.sort(function(a,b){return b-a;});}
else{fwd.sort(function(a,b){return b-a;});beh.sort(function(a,b){return a-b;});}

var sp=atr*0.25,s1=null,s2=null,sta=null,bPrice=null;
if(beh.length>0)bPrice=beh[0];
if(fwd.length>0)s1=fwd[0];
if(fwd.length>1&&s1!==null){for(var i=1;i<fwd.length;i++){if(Math.abs(fwd[i]-s1)>sp){s2=fwd[i];break;}}}
if(fwd.length>2){
var ref=s2!==null?s2:s1;
if(ref!==null){for(var i=1;i<fwd.length;i++){if(fwd[i]===s1||fwd[i]===s2)continue;if(Math.abs(fwd[i]-ref)>sp){sta=fwd[i];break;}}}
}
if(bullRun){if(bPrice===null)bPrice=hiL;if(s1===null)s1=close+atr*0.5;if(s2===null)s2=close+atr*1.0;if(sta===null)sta=close+atr*1.618;}
if(bearRun){if(bPrice===null)bPrice=loL;if(s1===null)s1=close-atr*0.5;if(s2===null)s2=close-atr*1.0;if(sta===null)sta=close-atr*1.618;}
if(s1===null)return null;

var sesH=Math.max.apply(null,bn.map(function(b){return b.h;}));
var sesL=Math.min.apply(null,bn.map(function(b){return b.l;}));
var hit=null;
if(bias===1&&sta!==null&&sta>sesL)hit=Math.max(0,Math.min(100,((closeN-sesL)/(sta-sesL))*100));
else if(bias===-1&&sta!==null&&sta<sesH)hit=Math.max(0,Math.min(100,((sesH-closeN)/(sesH-sta))*100));

var vwapOK=bias===1?closeN>vwapN:closeN<vwapN;
var prevC=bn.length>=2?bn[bn.length-2].c:closeN;
var nTgt=(s1!==null&&Math.abs(closeN-s1)<=atrN*0.4)||(s2!==null&&Math.abs(closeN-s2)<=atrN*0.4)||(sta!==null&&Math.abs(closeN-sta)<=atrN*0.4);

var brdL=bias===1&&s1!==null&&vwapOK&&closeN>s1+atrN*0.1&&prevC<=s1;
var brdS=bias===-1&&s1!==null&&vwapOK&&closeN<s1-atrN*0.1&&prevC>=s1;
var boarding=brdL||brdS;
var depL=bias===1&&!boarding&&s1!==null&&vwapOK&&closeN>s1&&closeN>prevC&&prevC>s1;
var depS=bias===-1&&!boarding&&s1!==null&&vwapOK&&closeN<s1&&closeN<prevC&&prevC<s1;
var depart=depL||depS;
var rolL=bias===1&&!boarding&&!depart&&vwapOK&&closeN>emaN&&closeN>prevC;
var rolS=bias===-1&&!boarding&&!depart&&vwapOK&&closeN<emaN&&closeN<prevC;
var rolling=rolL||rolS;
var slow=bias!==0&&nTgt;
var rev33=bias===1?closeN<prevC:closeN>prevC;
var rev67=bias===1?closeN<emaN:closeN>emaN;
var rev99=bPrice!==null&&(bias===1?closeN<bPrice:closeN>bPrice);

var mode=1;
if(rev99)mode=8;else if(rev67)mode=7;else if(rev33&&slow)mode=6;
else if(slow)mode=5;else if(rolling)mode=4;else if(depart)mode=3;else if(boarding)mode=2;

var action=mode===2||mode===3||mode===4?“GET ON”:mode>=6?“GET OFF”:“WAIT”;
if(action!==“GET ON”)return null;

var engTemp=Math.min(Math.abs(dir)*100,100);
var modeTrust=mode===4?90:mode===3?75:mode===2?55:25;
var arrTrust=hit!==null?hit:50;
var flowTrust=vwapOK?80:40;
var cert=Math.max(0,Math.min(100,(engTemp*0.40)+(modeTrust*0.25)+(arrTrust*0.20)+(flowTrust*0.15)));
if(cert<30)return null;

var vol=day.v||0;
var avgVol=bD.length>=5?bD.slice(0,Math.min(20,bD.length)).reduce(function(s,b){return s+b.v;},0)/Math.min(20,bD.length):vol;
var now=new Date();
var hr=now.getHours()+now.getMinutes()/60;
var sp2=Math.max(0.01,Math.min(1,(hr-9.5)/6.5));
var expNow=avgVol*sp2;
var rv=expNow>0?vol/expNow:1.0;
if(rv<1.0)return null;

var modeNames=[“Waiting”,“BOARDING”,“DEPART”,“ROLLING”,“SLOW”,“Rev 33%”,“Rev 67%”,“Rev 99%”];
var d2t=Math.abs((sta||close)-close);
var d2tStr=d2t>=100?(bias===1?”+”:”-”)+”$”+d2t.toFixed(0):d2t>=10?(bias===1?”+”:”-”)+”$”+d2t.toFixed(1):(bias===1?”+”:”-”)+”$”+d2t.toFixed(2);

return {
t:stock.t,n:stock.n,bias:bias,
price:closeN.toFixed(2),
stop1:s1!==null?s1.toFixed(2):null,
stop2:s2!==null?s2.toFixed(2):null,
station:sta!==null?sta.toFixed(2):null,
d2tStr:d2tStr,
hit:hit!==null?Math.round(hit):null,
rv:rv.toFixed(1),
mName:modeNames[mode-1]||“Waiting”,
action:action,
cert:cert.toFixed(1),
engTemp:engTemp.toFixed(1),
vwap:vwapN.toFixed(2),
ema:emaN.toFixed(2),
atr:atrN.toFixed(2),
dirScore:dir.toFixed(3),
bullRun:bullRun,bearRun:bearRun
};
}

var d=await r.json();return d.ticker||null;
}
async function fetchBars(t,mult,ts,days,lim){
var to=new Date().toISOString().split(“T”)[0];
var from=new Date(Date.now()-days*86400000).toISOString().split(“T”)[0];
var r=await fetch(“https://api.polygon.io/v2/aggs/ticker/”+t+”/range/”+mult+”/”+ts+”/”+from+”/”+to+”?adjusted=true&sort=asc&limit=”+(lim||100)+”&apiKey=”+API_KEY);
var d=await r.json();return d.results||[];
}

async function doScan(){
if(isScanning)return;
isScanning=true;results=[];completed=[];
updateControls();
var pg=document.getElementById(“progressSection”);
var re=document.getElementById(“results”);
if(pg)pg.style.display=“block”;
if(re)re.innerHTML=””;
var stocks=UNIVS[universe];
var scored=[];
for(var i=0;i<stocks.length;i++){
var stock=stocks[i];
var pct=Math.round(((i+1)/stocks.length)*100);
var pf=document.getElementById(“progressFill”);
var ss=document.getElementById(“scanStatus”);
if(pf)pf.style.width=pct+”%”;
if(ss)ss.textContent=“MMG V9.8C: “+stock.t+” (”+i+1+”/”+stocks.length+”)”;
try{
var p1=fetchSnap(stock.t);
var p2=fetchBars(stock.t,15,“minute”,3,200);
var p3=fetchBars(stock.t,60,“minute”,10,100);
var p4=fetchBars(stock.t,240,“minute”,20,50);
var p5=fetchBars(stock.t,1,“day”,60,60);
var p6=fetchBars(stock.t,1,“minute”,1,390);
var all=await Promise.all([p1,p2,p3,p4,p5,p6]);
await sleep(250);
var snap=all[0],b15=all[1],b60=all[2],b240=all[3],bD=all[4],bN=all[5];

// ACTIONS
function selectRole(r){
if(r===“OBSERVER”){role=“OBSERVER”;saveRole(“OBSERVER”);page=“scanner”;renderScanner();startAutoScan();return;}
loginTarget=r;passError=””;renderPasswordScreen();
}
function cancelLogin(){loginTarget=null;passError=””;renderLoginPage();}
function submitPass(){
var f=document.getElementById(“passInput”);
var val=f?f.value:””;
if(val===ROLES[loginTarget].pass){role=loginTarget;saveRole(role);loginTarget=null;passError=””;page=“scanner”;renderScanner();startAutoScan();}
else{passError=“Incorrect password. Try again.”;renderPasswordScreen();}
}
function logout(){clearRole();role=null;loginTarget=null;passError=””;page=“login”;clearInterval(scanTimer);results=[];completed=[];selectedStock=null;renderLoginPage();}
function switchUniverse(u){universe=u;startAutoScan();}
function markTraded(t){completed.push(t);renderScanner();}
function openDash(ticker){
if(!canDash())return;
for(var i=0;i<results.length;i++){if(results[i].t===ticker){selectedStock=results[i];page=“dashboard”;renderDashboard();return;}}
}
function goScanner(){page=“scanner”;renderScanner();}
function goDash(){if(canDash()&&selectedStock){page=“dashboard”;renderDashboard();}}
function goManual(){page=“manual”;renderManual();}

// BOOT
role=loadRole();
if(role){page=“scanner”;renderScanner();startAutoScan();}
else{renderLoginPage();}
