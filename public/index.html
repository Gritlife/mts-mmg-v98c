async function fetchSnap(t){
var r=await fetch(“https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers/”+t+”?apiKey=”+API_KEY);
var d=await r.json();return d.ticker||null;
}
async function fetchBars(t,mult,ts,days,lim){
var to=new Date().toISOString().split(“T”)[0];
var from=new Date(Date.now()-days*86400000).toISOString().split(“T”)[0];
var r=await fetch(“https://api.polygon.io/v2/aggs/ticker/”+t+”/range/”+mult+”/”+ts+”/”+from+”/”+to+”?adjusted=true&sort=asc&limit=”+(lim||100)+”&apiKey=”+API_KEY);
var d=await r.json();return d.results||[];
}

async function doScan(){
if(isScanning)return;
isScanning=true;results=[];completed=[];
updateControls();
var pg=document.getElementById(“progressSection”);
var re=document.getElementById(“results”);
if(pg)pg.style.display=“block”;
if(re)re.innerHTML=””;
var stocks=UNIVS[universe];
var scored=[];
for(var i=0;i<stocks.length;i++){
var stock=stocks[i];
var pct=Math.round(((i+1)/stocks.length)*100);
var pf=document.getElementById(“progressFill”);
var ss=document.getElementById(“scanStatus”);
if(pf)pf.style.width=pct+”%”;
if(ss)ss.textContent=“Scanning “+stock.t+” (”+i+1+”/”+stocks.length+”)”;
try{
var snap=await fetchSnap(stock.t);
var daily=await fetchBars(stock.t,1,“day”,60,60);
await sleep(200);
if(!snap)continue;
var day=snap.day||{},prevDay=snap.prevDay||{};
var close=day.c||prevDay.c;
if(!close||close<=0)continue;
var vol=day.v||0;
var now=new Date();
var hr=now.getHours()+now.getMinutes()/60;
var sp=Math.max(0.01,Math.min(1,(hr-9.5)/6.5));
var avgVol=daily.length>=5?daily.slice(0,Math.min(20,daily.length)).reduce(function(s,b){return s+b.v;},0)/Math.min(20,daily.length):vol;
var expectedNow=avgVol*sp;
var rv=expectedNow>0?vol/expectedNow:1.0;
if(rv<1.1)continue;
var dCloses=daily.slice(0,20).map(function(b){return b.c;}).reverse();
var dEma=dCloses.length>=3?dCloses.reduce(function(s,v){return s+v;},0)/dCloses.length:close;
var dailyBull=close>dEma;
var bias=dailyBull?1:-1;
var atr=daily.length>=2?daily.slice(0,14).reduce(function(s,b){return s+(b.h-b.l);},0)/Math.min(14,daily.length):(close*0.015);
var stop1=bias===1?close+atr*0.5:close-atr*0.5;
var stop2=bias===1?close+atr*1.0:close-atr*1.0;
var station=bias===1?close+atr*1.618:close-atr*1.618;
var vwap=day.vw||((day.h+day.l+close)/3)||close;
var todayBars=daily.slice(0,1);
var sh=day.h||close,sl=day.l||close;
var hit=null;
if(bias===1&&station>sl)hit=Math.max(0,Math.min(100,((close-sl)/(station-sl))*100));
else if(bias===-1&&station<sh)hit=Math.max(0,Math.min(100,((sh-close)/(sh-station))*100));
var vwapOK=bias===1?close>vwap:close<vwap;
var modes=[“BOARDING”,“DEPART”,“ROLLING”,“SLOW”,“REVERSAL”,“WAITING”];
var seed=stock.t.split(””).reduce(function(a,c){return a+c.charCodeAt(0);},0)+Math.floor(Date.now()/300000);
var x=Math.sin(seed*9301)*10000;
var mr=(x-Math.floor(x));
var mw=[0.15,0.20,0.35,0.15,0.10,0.05];
var mi=0,acc=0;
for(var k=0;k<mw.length;k++){acc+=mw[k];if(mr<acc){mi=k;break;}}
var mName=modes[mi];
var action=(mName===“DEPART”||mName===“ROLLING”||mName===“BOARDING”)?“GET ON”:(mName===“REVERSAL”?“GET OFF”:“WAIT”);
if(action!==“GET ON”)continue;
var d2t=Math.abs(station-close);
var d2tStr=d2t>=100?(bias===1?”+”:”-”)+”$”+d2t.toFixed(0):d2t>=10?(bias===1?”+”:”-”)+”$”+d2t.toFixed(1):(bias===1?”+”:”-”)+”$”+d2t.toFixed(2);
var score=(Math.min(rv,5)/5*0.5)+(vwapOK?0.3:0.1)+((hit||0)/100*0.2);
scored.push({t:stock.t,n:stock.n,bias:bias,price:close.toFixed(2),stop1:stop1.toFixed(2),stop2:stop2.toFixed(2),station:station.toFixed(2),d2tStr:d2tStr,hit:hit!==null?Math.round(hit):null,rv:rv.toFixed(1),mName:mName,action:action,vwap:vwap.toFixed(2),atr:atr.toFixed(2),score:score});
}catch(e){}
}
scored.sort(function(a,b){return b.score-a.score;});
results=scored.slice(0,20);
if(pg)pg.style.display=“none”;
isScanning=false;
updateControls();
renderScanner();
}

function selectRole(r){
if(r===“OBSERVER”){role=“OBSERVER”;saveRole(“OBSERVER”);page=“scanner”;renderScanner();startAutoScan();return;}
loginTarget=r;passError=””;renderPasswordScreen();
}
function cancelLogin(){loginTarget=null;passError=””;renderLoginPage();}
function submitPass(){
var f=document.getElementById(“passInput”);
var val=f?f.value:””;
if(val===ROLES[loginTarget].pass){role=loginTarget;saveRole(role);loginTarget=null;passError=””;page=“scanner”;renderScanner();startAutoScan();}
else{passError=“Incorrect password. Try again.”;renderPasswordScreen();}
}
function logout(){clearRole();role=null;loginTarget=null;passError=””;page=“login”;clearInterval(scanTimer);results=[];completed=[];selectedStock=null;renderLoginPage();}
function switchUniverse(u){universe=u;startAutoScan();}
function markTraded(t){completed.push(t);renderScanner();}
function openDash(ticker){
if(!canDash())return;
var s=results.find(function(r){return r.t===ticker;});
if(s){selectedStock=s;page=“dashboard”;renderDashboard();}
}
function goScanner(){page=“scanner”;renderScanner();}
function goDash(){if(canDash()&&selectedStock){page=“dashboard”;renderDashboard();}}
function goManual(){page=“manual”;renderManual();}

// BOOT - render immediately
role=loadRole();
if(role){page=“scanner”;renderScanner();startAutoScan();}
else{renderLoginPage();}
</script>
