function scoreRiskAnswers(answers) {
  const vals = Object.values(answers);
  if (vals.length === 0) return { score: 0, tier: "conservative" };
  const total = vals.reduce((a, b) => a + b, 0);
  const avg = total / vals.length;
  let tier;
  if (avg < 0.75) tier = "conservative";
  else if (avg < 1.5) tier = "moderate";
  else if (avg < 2.25) tier = "aggressive";
  else tier = "vAggressive";
  return { score: avg, tier };
}

// ============================================================================
function _last(a) { return a[a.length - 1]; }
function _slice(a, n) { return a.slice(Math.max(0, a.length - n)); }

function sma(values, period) {
  if (!values || values.length < period) return null;
  const w = _slice(values, period);
  return w.reduce((a, b) => a + b, 0) / period;
}

// Population stdev — TradingView ta.stdev() divides by n, not n-1
function popStdev(values, period) {
  if (!values || values.length < period) return null;
  const w = _slice(values, period);
  const mean = w.reduce((a, b) => a + b, 0) / period;
  const sq = w.reduce((acc, v) => acc + (v - mean) * (v - mean), 0);
  return Math.sqrt(sq / period);
}

// EMA with SMA seed (Pine convention)
function emaSeries(values, period) {
  if (!values || values.length < period) return [];
  const out = [];
  const seed = values.slice(0, period).reduce((a, b) => a + b, 0) / period;
  out.push(seed);
  const k = 2 / (period + 1);
  let v = seed;
  for (let i = period; i < values.length; i++) {
    v = values[i] * k + v * (1 - k);
    out.push(v);
  }
  return out;
}
function ema(values, period) {
  const s = emaSeries(values, period);
  return s.length ? _last(s) : null;
}

// Wilder's RMA
function wilderRMA(values, period) {
  if (!values || values.length < period) return null;
  let rma = values.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < values.length; i++) {
    rma = (rma * (period - 1) + values[i]) / period;
  }
  return rma;
}

function rsi(closes, period = 14) {
  if (!closes || closes.length < period + 1) return null;
  const gains = [], losses = [];
  for (let i = 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    gains.push(d > 0 ? d : 0);
    losses.push(d < 0 ? -d : 0);
  }
  const ag = wilderRMA(gains, period);
  const al = wilderRMA(losses, period);
  if (ag === null || al === null) return null;
  if (al === 0) return 100;
  const rs = ag / al;
  return 100 - 100 / (1 + rs);
}

function roc(closes, period) {
  if (!closes || closes.length < period + 1) return null;
  const cur = _last(closes);
  const past = closes[closes.length - 1 - period];
  return (cur - past) / past * 100;
}

function macd(closes, fast = 12, slow = 26, signal = 9) {
  if (!closes || closes.length < slow + signal) return null;
  const fastS = emaSeries(closes, fast);
  const slowS = emaSeries(closes, slow);
  if (!slowS.length) return null;
  const offset = slow - fast;
  const macdLine = [];
  for (let i = 0; i < slowS.length; i++) {
    macdLine.push(fastS[i + offset] - slowS[i]);
  }
  if (macdLine.length < signal) return null;
  const sigS = emaSeries(macdLine, signal);
  if (!sigS.length) return null;
  const m = _last(macdLine);
  const s = _last(sigS);
  return { macd: m, signal: s, hist: m - s };
}

function bollingerBands(closes, period = 20, mult = 2) {
  const basis = sma(closes, period);
  const sd = popStdev(closes, period);
  if (basis === null || sd === null) return null;
  const upper = basis + mult * sd;
  const lower = basis - mult * sd;
  return { basis, upper, lower, width: (upper - lower) / basis };
}

// Parabolic SAR (step=0.02, max=0.20) — full bar-walk
function parabolicSAR(bars, step = 0.02, maxAF = 0.20) {
  if (!bars || bars.length < 2) return null;
  let isUp = bars[1].c >= bars[0].c;
  let af = step;
  let ep = isUp ? bars[0].h : bars[0].l;
  let sar = isUp ? bars[0].l : bars[0].h;
  for (let i = 1; i < bars.length; i++) {
    const b = bars[i];
    const prevSar = sar;
    sar = prevSar + af * (ep - prevSar);
    if (isUp) {
      // Clamp SAR to be below prior two lows
      sar = Math.min(sar, bars[i - 1].l, i >= 2 ? bars[i - 2].l : bars[i - 1].l);
      if (b.l < sar) {
        // Flip to down
        isUp = false;
        sar = ep;
        ep = b.l;
        af = step;
      } else {
        if (b.h > ep) { ep = b.h; af = Math.min(af + step, maxAF); }
      }
    } else {
      // Clamp SAR to be above prior two highs
      sar = Math.max(sar, bars[i - 1].h, i >= 2 ? bars[i - 2].h : bars[i - 1].h);
      if (b.h > sar) {
        // Flip to up
        isUp = true;
        sar = ep;
        ep = b.h;
        af = step;
      } else {
        if (b.l < ep) { ep = b.l; af = Math.min(af + step, maxAF); }
      }
    }
  }
  return sar;
}

// Wilder's ATR
function atrWilder(bars, period = 14) {
  if (!bars || bars.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < bars.length; i++) {
    const b = bars[i], p = bars[i - 1];
    trs.push(Math.max(b.h - b.l, Math.abs(b.h - p.c), Math.abs(b.l - p.c)));
  }
  return wilderRMA(trs, period);
}

// Session-anchored VWAP (resets each ET day at midnight; close enough for 15m bars)
function sessionVWAP(bars) {
  if (!bars || !bars.length) return null;
  // Group by ET date; VWAP of the latest session only
  const latest = _last(bars);
  const latestDay = new Date(latest.t).toLocaleDateString("en-US", { timeZone: "America/New_York" });
  let pv = 0, vv = 0;
  for (const b of bars) {
    const day = new Date(b.t).toLocaleDateString("en-US", { timeZone: "America/New_York" });
    if (day === latestDay) {
      const tp = (b.h + b.l + b.c) / 3;
      pv += tp * b.v;
      vv += b.v;
    }
  }
  return vv > 0 ? pv / vv : null;
}

// Master indicator computation — runs all atoms on a bars array
function computeIndicators(bars) {
  if (!bars || bars.length < 70) return null;
  const closes = bars.map(b => b.c);
  const vols = bars.map(b => b.v);
  const bb = bollingerBands(closes, 20, 2);
  if (!bb) return null;
  // bbWidth series: compute BB rolling, take width at each step (need 50 widths for bbWidthAvg)
  const widthSeries = [];
  for (let i = 20; i <= closes.length; i++) {
    const bbi = bollingerBands(closes.slice(0, i), 20, 2);
    if (bbi) widthSeries.push(bbi.width);
  }
  const bbWidthAvg = sma(widthSeries, 50);
  const mac = macd(closes, 12, 26, 9);
  const last = _last(bars);
  const volAvg = sma(vols, 20);
  return {
    timestamp: last.t,
    open: last.o, high: last.h, low: last.l, close: last.c, volume: last.v,
    ema15: ema(closes, 15),
    vwap: sessionVWAP(bars),
    bbBasis: bb.basis,
    bbUpper: bb.upper,
    bbLower: bb.lower,
    bbWidth: bb.width,
    bbWidthAvg: bbWidthAvg,
    sar: parabolicSAR(bars),
    atr14: atrWilder(bars, 14),
    rsi14: rsi(closes, 14),
    roc9: roc(closes, 9),
    macdHist: mac ? mac.hist : null,
    rvol: volAvg ? last.v / volAvg : null,
    barsLoaded: bars.length,
  };
}

async function buildAvgVolume20d(tickers, apiKey) {
  // Pull last ~30 calendar days of grouped daily, build 20-day avg per ticker
  const days = [];
  for (let i = 1; i <= 30; i++) {
    days.push(ymdDaysAgo(i));
  }
  const tickerSet = new Set(tickers);
  const volMap = {}; // sym -> [vols]
  let pulled = 0;
  for (const day of days) {
    try {
      const results = await fetchGroupedDaily(day, apiKey);
      for (const r of results) {
        if (tickerSet.has(r.T)) {
          if (!volMap[r.T]) volMap[r.T] = [];
          volMap[r.T].push(r.v);
        }
      }
      pulled++;
      if (pulled >= 22) break; // ~22 trading days = 20-day window with weekend slack
    } catch (e) {
      // Skip days that fail (weekends, holidays)
    }
    // Small delay to avoid burst
    await new Promise(r => setTimeout(r, 50));
  }
  const avg = {};
  for (const sym of Object.keys(volMap)) {
    const vols = volMap[sym].slice(0, 20);
    if (vols.length >= 5) {
      avg[sym] = vols.reduce((a, b) => a + b, 0) / vols.length;
    }
  }
  return { avg, builtAt: Date.now(), tickersFound: Object.keys(avg).length };
}

function calcPnL(position, currentPrice) {
  if (!position || position.side === "flat") return { pct: 0, dollars: 0 };
  const sign = position.side === "long" ? 1 : -1;
  const diff = (currentPrice - position.entryPrice) * sign;
  return { pct: (diff / position.entryPrice) * 100, dollars: diff * position.size };
}
function pnlR(position, currentPrice, atr) {
  if (!position || position.side === "flat") return 0;
  const sign = position.side === "long" ? 1 : -1;
  return ((currentPrice - position.entryPrice) * sign) / atr;
}

function computeScores({ mmgState, campaign, direction, rvol, position, atrDistance, atr, currentPrice }) {
  const rvolMult = Math.min(rvol / 1.5, 1.0);
  const stopMult = Math.max(0, 1 - atrDistance);
  const side = (position && position.side) || "flat";

  // Entry scores (only valid when flat)
  const b2o = side !== "flat" ? null : Math.min(95, Math.round(
    (mmgState === "B2O-signal" ? 82 : mmgState === "Expansion" && direction === "long" ? 64 : mmgState === "Midline" && direction === "long" ? 48 : mmgState === "Compression" ? 28 : 14)
    * rvolMult * (campaign === "Boarding" ? 1.18 : campaign === "Rolling" ? 1.05 : 0.85) * stopMult));
  const s2o = side !== "flat" ? null : Math.min(95, Math.round(
    (mmgState === "S2O-signal" ? 82 : mmgState === "Expansion" && direction === "short" ? 64 : mmgState === "Midline" && direction === "short" ? 48 : mmgState === "Compression" ? 28 : 14)
    * rvolMult * (campaign === "Boarding" ? 1.18 : campaign === "Rolling" ? 1.05 : 0.85) * stopMult));

  // Campaign progress (K-9.1 style)
  let campaignProgress = null;
  if (side === "long" && position && position.entryPrice && atr) {
    const target = position.entryPrice + 1.7 * atr;
    campaignProgress = (currentPrice - position.entryPrice) / (target - position.entryPrice);
  } else if (side === "short" && position && position.entryPrice && atr) {
    const target = position.entryPrice - 1.7 * atr;
    campaignProgress = (position.entryPrice - currentPrice) / (position.entryPrice - target);
  }
  const addInWindow = campaignProgress !== null && campaignProgress >= 0.45 && campaignProgress <= 0.55;
  const tpInWindow  = campaignProgress !== null && campaignProgress >= 0.70 && campaignProgress <= 0.80;

  // ADD score — K-9.1 single-shot, 45-55% window
  const inLong = side === "long", inShort = side === "short";
  const directionMatch = (inLong && direction === "long") || (inShort && direction === "short");
  const reconfirm = (inLong && mmgState === "B2O-signal") || (inShort && mmgState === "S2O-signal");
  let add = null;
  if (side !== "flat" && !position.addFired && addInWindow) {
    const base = directionMatch ? (reconfirm ? 82 : mmgState === "Expansion" ? 72 : mmgState === "Midline" ? 58 : 40) : 25;
    const campaignMult = campaign === "Rolling" ? 1.12 : campaign === "Boarding" ? 1.0 : 0.7;
    add = Math.min(95, Math.round(base * rvolMult * campaignMult));
  }

  // TP score — K-9.1 single-shot, 70-80% window
  let tp = null;
  if (side !== "flat" && !position.tpFired && tpInWindow) {
    const base = mmgState === "GetOff" ? 92 : mmgState === "Caution" ? 84 : campaign === "Station" ? 82 : campaign === "Departed" ? 72 : 68;
    tp = Math.min(95, base);
  }

  // Full exits
  const baseExit = mmgState === "GetOff" ? 90 : mmgState === "Caution" ? 68 : campaign === "Station" ? 58 : campaign === "Departed" ? 26 : 16;
  const s2c = inLong ? Math.min(95, baseExit) : null;
  const b2c = inShort ? Math.min(95, baseExit) : null;

  return { b2o, s2o, add, tp, s2c, b2c, campaignProgress };
}
function topAction(scores) {
  const entries = Object.entries(scores).filter(([k, v]) => k !== "campaignProgress" && v != null);
  if (entries.length === 0) return { code: "—", score: 0, tone: "neutral" };
  entries.sort((a, b) => b[1] - a[1]);
  const [code, score] = entries[0];
  const map = { b2o: "long", s2o: "short", add: "add", tp: "tp", s2c: "close", b2c: "close" };
  return { code: code.toUpperCase(), score, tone: map[code] };
}
function addLockReason(position, campaignProgress) {
  if (!position || position.side === "flat") return "no position";
  if (position.addFired) return "already added";
  if (campaignProgress == null) return "no target set";
  const pct = Math.round(campaignProgress * 100);
  if (campaignProgress < 0.45) return "wait · " + pct + "% to station";
  if (campaignProgress > 0.55) return "window missed (" + pct + "%)";
  return "weak setup";
}
function tpLockReason(position, campaignProgress) {
  if (!position || position.side === "flat") return "no position";
  if (position.tpFired) return "already taken";
  if (campaignProgress == null) return "no target set";
  const pct = Math.round(campaignProgress * 100);

}

// ============================================================================
// Watchlist — with custom ticker input
// ============================================================================
function WatchlistView({ watchlists, setWatchlists, universe, addCustomTicker, positions, onSelect }) {
  const [editing, setEditing] = useState(false);
  const [addingTo, setAddingTo] = useState(null);
  const [inputSym, setInputSym] = useState("");

  const getTickerData = (sym) => {
    const t = universe.find(u => u.sym === sym);
    if (!t) return null;
    const pos = positions[sym] || { side: "flat" };
    const scores = computeScores({ ...t, position: pos, atrDistance: 0.25, atr: t.atr, currentPrice: t.price });
    const top = topAction(scores);
    return { ...t, position: pos, top };
  };

  const moveItem = (listId, sym, dir) => {
    setWatchlists(lists => lists.map(l => {
      if (l.id !== listId) return l;
      const idx = l.symbols.indexOf(sym);
      if (idx < 0) return l;
      const next = idx + dir;
      if (next < 0 || next >= l.symbols.length) return l;
      const arr = [...l.symbols];
      [arr[idx], arr[next]] = [arr[next], arr[idx]];
      return { ...l, symbols: arr };
    }));
  };
  const removeItem = (listId, sym) => setWatchlists(lists => lists.map(l => l.id === listId ? { ...l, symbols: l.symbols.filter(s => s !== sym) } : l));
  const addItemToList = (listId, sym) => {
    sym = sym.toUpperCase().trim();
    if (!sym || !/^[A-Z]{1,5}$/.test(sym)) return false;
    if (!universe.find(t => t.sym === sym)) addCustomTicker(sym);
    setWatchlists(lists => lists.map(l => l.id === listId && !l.symbols.includes(sym) ? { ...l, symbols: [...l.symbols, sym] } : l));
    setInputSym("");
    return true;
  };
  const addList = () => {
    const name = prompt("Watchlist name?");
    if (!name) return;
    setWatchlists(lists => [...lists, { id: `wl-${Date.now()}`, name, symbols: [] }]);
  };

  return (
    <div className="flex flex-col gap-2.5">
      <div className="flex items-center justify-between">
        <div style={{ color: C.muted }} className="text-[10px] tracking-[0.2em]">{watchlists.length} LISTS</div>
        <div className="flex gap-2">
          <button onClick={() => setEditing(!editing)} style={{ color: editing ? C.text : C.muted }} className="text-xs font-mono flex items-center gap-1"><Edit2 size={12} /> {editing ? "DONE" : "EDIT"}</button>
          <button onClick={addList} style={{ color: C.text }} className="text-xs font-mono flex items-center gap-1 font-bold"><Plus size={14} /> LIST</button>
        </div>
      </div>
      {watchlists.map(list => (
        <div key={list.id} style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl overflow-hidden">
          <div style={{ backgroundColor: C.bg, borderBottomColor: C.border }} className="border-b px-3 py-1.5 flex items-center justify-between">
            <div style={{ color: C.text }} className="text-xs font-bold tracking-tight">{list.name}</div>
            <div className="flex items-center gap-2">
              <div style={{ color: C.dim }} className="text-[10px] font-mono">{list.symbols.length}</div>
              <button onClick={() => { setAddingTo(addingTo === list.id ? null : list.id); setInputSym(""); }} style={{ color: C.muted }} className="p-0.5"><Plus size={14} /></button>
            </div>
          </div>
          {addingTo === list.id && (
            <div style={{ backgroundColor: C.bg, borderBottomColor: C.border }} className="border-b p-2 space-y-1.5">
              <div className="flex items-center gap-2">
                <input
                  type="text"
                  value={inputSym}
                  onChange={(e) => setInputSym(e.target.value.toUpperCase())}
                  onKeyDown={(e) => e.key === "Enter" && addItemToList(list.id, inputSym)}
                  placeholder="TYPE SYMBOL (e.g. RIVN)"
                  maxLength={5}
                  style={{ backgroundColor: C.surface, borderColor: C.borderStrong, color: C.text }}
                  className="flex-1 border rounded px-2 py-1 text-xs font-mono tracking-wider focus:outline-none uppercase" />
                <button onClick={() => addItemToList(list.id, inputSym)} style={{ backgroundColor: C.text, color: C.bg }} className="px-3 py-1 rounded text-[10px] font-mono font-bold">ADD</button>
                <button onClick={() => setAddingTo(null)} style={{ color: C.muted }} className="p-1"><X size={14}/></button>
              </div>
              <div style={{ color: C.dim }} className="text-[9px] font-mono">QUICK ADD:</div>
              <div className="flex flex-wrap gap-1">
                {universe.filter(u => !list.symbols.includes(u.sym)).slice(0, 18).map(u => (
                  <button key={u.sym} onClick={() => addItemToList(list.id, u.sym)} style={{ backgroundColor: C.surface, borderColor: C.border, color: C.text }} className="px-1.5 py-0.5 border rounded text-[10px] font-mono">{u.sym}</button>
                ))}
              </div>
            </div>
          )}
          {list.symbols.map((sym, i) => {
            const t = getTickerData(sym);
            if (!t) return null;
            const color = toneColor(t.top.tone);
            const dim = t.top.score < 30;
            return (
              <div key={sym} style={{ borderBottomColor: C.border }} className="border-b last:border-b-0 flex items-center">
                <button onClick={() => !editing && onSelect(sym)} className="flex-1 flex items-center gap-2 px-3 py-2 text-left active:opacity-60">
                  <div style={{ backgroundColor: dim ? C.track : toneSoft(t.top.tone), borderColor: dim ? C.border : color, color: dim ? C.dim : color }} className="w-10 h-10 rounded-md border-2 flex flex-col items-center justify-center shrink-0">
                    <div className="text-xs font-mono font-bold leading-none">{t.top.score}</div>
                    <div className="text-[7px] font-mono tracking-wider mt-0.5">{t.top.code}</div>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-baseline gap-1.5">
                      <div style={{ color: C.text }} className="text-sm font-mono font-bold">{t.sym}</div>
                      {t.custom && <span style={{ color: C.dim }} className="text-[8px] font-mono">custom</span>}
                      {t.position.side !== "flat" && <div style={{ color: t.position.side === "long" ? C.long : C.short }} className="text-[9px] font-mono uppercase">{t.position.side}</div>}
                    </div>
                    <div style={{ color: C.muted }} className="text-[10px] truncate">{t.mmgState}</div>
                  </div>
                  <div className="text-right shrink-0">
                    <div style={{ color: C.text }} className="text-xs font-mono">${t.price.toFixed(2)}</div>
                    <div style={{ color: t.change >= 0 ? C.long : C.short }} className="text-[10px] font-mono">{t.change >= 0 ? "+" : ""}{t.change.toFixed(2)}%</div>
                  </div>
                </button>
                {editing && (
                  <div className="flex items-center gap-0 pr-2">
                    <button onClick={() => moveItem(list.id, sym, -1)} disabled={i === 0} style={{ color: i === 0 ? C.dim : C.muted }} className="p-1"><ChevronUp size={14} /></button>
                    <button onClick={() => moveItem(list.id, sym, 1)} disabled={i === list.symbols.length - 1} style={{ color: i === list.symbols.length - 1 ? C.dim : C.muted }} className="p-1"><ChevronDown size={14} /></button>
                    <button onClick={() => removeItem(list.id, sym)} style={{ color: C.short }} className="p-1"><Trash2 size={14} /></button>
                  </div>
                )}
              </div>
            );
          })}
          {list.symbols.length === 0 && <div style={{ color: C.dim }} className="text-center text-[11px] py-3">no tickers yet</div>}
        </div>
      ))}
    </div>
  );
}

// ============================================================================
// Ring, ActionCell, ConfirmModal
// ============================================================================
function Ring({ score, tone = "long", size = 56 }) {
  const r = (size - 6) / 2;
  const circ = 2 * Math.PI * r;
  const offset = score == null ? circ : circ - (score / 100) * circ;
  const stroke = score == null ? C.locked : toneColor(tone);
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} stroke={C.track} strokeWidth="3" fill="none" />
      <circle cx={size/2} cy={size/2} r={r} stroke={stroke} strokeWidth="3" fill="none"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset 400ms ease, stroke 200ms ease" }} />
    </svg>
  );
}
function ActionCell({ code, label, score, lockedReason, tone, onTap, compact = false }) {
  const locked = score == null;
  const ringSize = compact ? 40 : 56;
  return (
    <button onClick={() => !locked && onTap()} disabled={locked}
      style={{ backgroundColor: locked ? C.surfaceDisabled : C.surface, borderColor: locked ? C.border : C.borderStrong, cursor: locked ? "not-allowed" : "pointer" }}
      className={`relative ${compact ? "p-2" : "p-3"} rounded-2xl border-2 transition-all active:scale-[0.97] disabled:active:scale-100`}>
      <div className={`flex flex-col items-center ${compact ? "gap-1" : "gap-1.5"}`}>
        <div className="relative">
          <Ring score={score} tone={tone} size={ringSize} />
          <div className="absolute inset-0 flex items-center justify-center">
            {locked ? (
              <svg width={compact ? "12" : "16"} height={compact ? "12" : "16"} viewBox="0 0 24 24" fill="none" stroke={C.dim} strokeWidth="2.5">
                <rect x="5" y="11" width="14" height="10" rx="2" /><path d="M8 11V7a4 4 0 0 1 8 0v4" />
              </svg>
            ) : (
              <div style={{ color: C.text }} className={`${compact ? "text-sm" : "text-lg"} font-mono font-bold leading-none`}>{score}</div>
            )}
          </div>
        </div>
        <div style={{ color: locked ? C.dim : C.text }} className={`font-mono font-bold ${compact ? "text-xs" : "text-base"} leading-none`}>{code}</div>
        {!compact && <div style={{ color: locked ? C.dim : C.muted }} className="text-[10px] leading-tight text-center">{locked ? <em>{lockedReason}</em> : label}</div>}
      </div>
    </button>
  );
}
function ConfirmModal({ action, ticker, price, position, onConfirm, onCancel }) {
  const isEntry = action === "B2O" || action === "S2O";
  const isAdd = action === "ADD";
  const isTP = action === "TP";
  const isFullExit = action === "S2C" || action === "B2C";
  const accent = isAdd ? C.add : isTP ? C.tp : (action === "B2O" ? C.long : action === "S2O" ? C.short : C.close);
  let sizeChange, newSize, newAvg, realized;
  if (isEntry) { sizeChange = 100; newSize = 100; newAvg = price; }
  else if (isAdd) {
    sizeChange = 50; newSize = position.size + 50;
    newAvg = ((position.entryPrice * position.size) + (price * 50)) / newSize;
  } else if (isTP) {
    sizeChange = -Math.round(position.size / 2); newSize = position.size + sizeChange;
    newAvg = position.entryPrice;
    const sign = position.side === "long" ? 1 : -1;
    realized = (price - position.entryPrice) * sign * Math.abs(sizeChange);
  } else if (isFullExit) {
    sizeChange = -position.size; newSize = 0;
    const sign = position.side === "long" ? 1 : -1;
    realized = (price - position.entryPrice) * sign * position.size;
  }
  const verb = isEntry ? "Open" : isAdd ? "Add to" : isTP ? "Take profit on" : "Close";
  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 p-4">
      <div style={{ backgroundColor: C.surface, borderColor: C.borderStrong }} className="border-2 rounded-2xl w-full max-w-md p-5">
        <div style={{ color: C.muted }} className="text-[10px] tracking-[0.2em] mb-1">{verb.toUpperCase()} POSITION</div>
        <div className="flex items-baseline gap-3 mb-4">
          <div style={{ color: accent }} className="text-2xl font-mono font-bold">{action}</div>
          <div style={{ color: C.text }} className="text-lg font-mono">{ticker}</div>
          <div style={{ color: C.muted }} className="text-sm font-mono ml-auto">${price.toFixed(2)}</div>
        </div>
        <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-sm font-mono mb-4">
          <div className="flex justify-between"><span style={{ color: C.muted }}>Δ Size</span><span style={{ color: sizeChange > 0 ? C.long : C.short }}>{sizeChange > 0 ? "+" : ""}{sizeChange}sh</span></div>
          <div className="flex justify-between"><span style={{ color: C.muted }}>New Size</span><span style={{ color: C.text }}>{newSize}sh</span></div>
          {newAvg != null && <div className="flex justify-between"><span style={{ color: C.muted }}>{isAdd ? "New Avg" : "Avg"}</span><span style={{ color: C.text }}>${newAvg.toFixed(2)}</span></div>}
          {realized != null && <div className="flex justify-between"><span style={{ color: C.muted }}>Realized</span><span style={{ color: realized >= 0 ? C.long : C.short }}>{realized >= 0 ? "+" : ""}${realized.toFixed(0)}</span></div>}
        </div>
        <div style={{ color: C.muted, borderColor: C.border }} className="text-[10px] leading-relaxed mb-4 border-l-2 pl-3">
          You are the executing trader. MTS is decision support. By confirming, you accept all P&L and the possibility of total loss.
        </div>
        <div className="flex gap-2">
          <button onClick={onCancel} style={{ borderColor: C.borderStrong, color: C.muted }} className="flex-1 py-2.5 rounded-xl border-2 font-mono text-sm">CANCEL</button>
          <button onClick={onConfirm} style={{ backgroundColor: accent, color: "#FFF" }} className="flex-1 py-2.5 rounded-xl font-mono text-sm font-bold">CONFIRM</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// Scanner
// ============================================================================
function Scanner({ universe, positions, onSelect }) {
  const [filter, setFilter] = useState("all");
  const [sort, setSort] = useState("score");
  const enriched = useMemo(() => universe.map(t => {
    const pos = positions[t.sym] || { side: "flat" };
    const scores = computeScores({ ...t, position: pos, atrDistance: 0.25, atr: t.atr, currentPrice: t.price });
    const top = topAction(scores);
    return { ...t, position: pos, scores, top };
  }), [universe, positions]);
  const filtered = useMemo(() => enriched.filter(t => {
    if (filter === "long") return t.top.tone === "long" || (t.top.tone === "add" && t.position.side === "long");
    if (filter === "short") return t.top.tone === "short" || (t.top.tone === "add" && t.position.side === "short");
    if (filter === "high") return t.top.score >= 60;
    if (filter === "open") return t.position.side !== "flat";
    return true;
  }), [enriched, filter]);
  const sorted = useMemo(() => {
    const arr = [...filtered];
    if (sort === "score") arr.sort((a, b) => b.top.score - a.top.score);
    if (sort === "alpha") arr.sort((a, b) => a.sym.localeCompare(b.sym));
    if (sort === "chg") arr.sort((a, b) => b.change - a.change);
    return arr;
  }, [filtered, sort]);
  const chips = [{ key: "all", label: "All" }, { key: "long", label: "Long" }, { key: "short", label: "Short" }, { key: "high", label: "≥60" }, { key: "open", label: "Open" }];
  return (
    <div className="flex flex-col gap-2.5">
      <div className="flex items-baseline gap-2"><div style={{ color: C.muted }} className="text-xs font-mono">{sorted.length}/{universe.length} tickers</div></div>
      <div className="flex items-center gap-1.5 overflow-x-auto pb-0.5">
        {chips.map(c => (
          <button key={c.key} onClick={() => setFilter(c.key)}
            style={{ backgroundColor: filter === c.key ? C.text : C.surface, color: filter === c.key ? C.bg : C.muted, borderColor: filter === c.key ? C.text : C.border }}
            className="px-2.5 py-1 rounded-full border text-[11px] font-mono whitespace-nowrap">{c.label}</button>
        ))}
        <select value={sort} onChange={e => setSort(e.target.value)} style={{ borderColor: C.border, color: C.muted, backgroundColor: C.surface }} className="ml-auto border rounded-full px-2 py-1 text-[11px] font-mono">
          <option value="score">↓ Score</option><option value="alpha">A→Z</option><option value="chg">↓ % Chg</option>
        </select>
      </div>
      <div className="flex flex-col gap-1.5">
        {sorted.map(t => {
          const color = toneColor(t.top.tone), dim = t.top.score < 30;
          return (
            <button key={t.sym} onClick={() => onSelect(t.sym)} style={{ backgroundColor: C.surface, borderColor: C.border }} className="flex items-center gap-3 border rounded-xl p-2.5 text-left active:scale-[0.99] transition-transform">
              <div style={{ backgroundColor: dim ? C.track : toneSoft(t.top.tone), borderColor: dim ? C.border : color }} className="flex flex-col items-center justify-center w-12 h-12 rounded-lg border-2 shrink-0">
                <div style={{ color: dim ? C.dim : color }} className="text-base font-mono font-bold leading-none">{t.top.score}</div>
                <div style={{ color: dim ? C.dim : color }} className="text-[8px] font-mono tracking-wider mt-0.5">{t.top.code}</div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-baseline gap-1.5">
                  <div style={{ color: C.text }} className="text-base font-mono font-bold">{t.sym}</div>
                  {t.position.side !== "flat" && <div style={{ color: t.position.side === "long" ? C.long : C.short }} className="text-[9px] font-mono uppercase tracking-wider">• {t.position.side}</div>}
                </div>
                <div style={{ color: C.muted }} className="text-[11px] truncate">{t.mmgState} · {t.direction} · {t.rvol.toFixed(2)}x</div>
              </div>
              <div className="text-right shrink-0">
                <div style={{ color: C.text }} className="text-sm font-mono">${t.price.toFixed(2)}</div>
                <div style={{ color: t.change >= 0 ? C.long : C.short }} className="text-[11px] font-mono">{t.change >= 0 ? "+" : ""}{t.change.toFixed(2)}%</div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================================
// Active
// ============================================================================
function Active({ universe, positions, onSelect }) {
  const openTickers = useMemo(() => Object.keys(positions).filter(sym => positions[sym].side !== "flat"), [positions]);
  const enriched = useMemo(() => openTickers.map(sym => {
    const t = universe.find(u => u.sym === sym);
    if (!t) return null;
    const pos = positions[sym];
    const pnl = calcPnL(pos, t.price);
    const scores = computeScores({ ...t, position: pos, atrDistance: 0.25, atr: t.atr, currentPrice: t.price });
    const top = topAction(scores);
    const targetOffset = t.atr * 1.7;
    const target = pos.side === "long" ? pos.entryPrice + targetOffset : pos.entryPrice - targetOffset;
    return { ...t, position: pos, pnl, top, target };
  }).filter(Boolean), [openTickers, universe, positions]);
  const totalPnL = enriched.reduce((sum, t) => sum + t.pnl.dollars, 0);
  const winners = enriched.filter(t => t.pnl.dollars > 0).length;
  const losers = enriched.filter(t => t.pnl.dollars < 0).length;
  return (
    <div className="flex flex-col gap-2.5">
      <div className="flex items-baseline gap-2">
        <div style={{ color: C.muted }} className="text-xs font-mono">{enriched.length} open · {winners}W {losers}L</div>
        <div style={{ color: totalPnL >= 0 ? C.long : C.short }} className="text-sm font-mono font-bold">{totalPnL >= 0 ? "+" : ""}${totalPnL.toFixed(0)}</div>
      </div>
      <div className="flex flex-col gap-1.5">
        {enriched.map(t => {
          const color = toneColor(t.top.tone);
          const sideColor = t.position.side === "long" ? C.long : C.short;
          const pnlColor = t.pnl.dollars >= 0 ? C.long : C.short;
          return (
            <button key={t.sym} onClick={() => onSelect(t.sym)} style={{ backgroundColor: C.surface, borderColor: C.border }} className="flex flex-col gap-1.5 border rounded-xl p-2.5 text-left active:scale-[0.99] transition-transform">
              <div className="flex items-center gap-3">
                <div style={{ backgroundColor: toneSoft(t.top.tone), borderColor: color }} className="flex flex-col items-center justify-center w-12 h-12 rounded-lg border-2 shrink-0">
                  <div style={{ color }} className="text-base font-mono font-bold leading-none">{t.top.score}</div>
                  <div style={{ color }} className="text-[8px] font-mono tracking-wider mt-0.5">{t.top.code}</div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-baseline gap-1.5">
                    <div style={{ color: C.text }} className="text-base font-mono font-bold">{t.sym}</div>
                    <div style={{ color: sideColor }} className="text-[10px] font-mono uppercase tracking-wider">{t.position.side}</div>
                    <div style={{ color: C.muted }} className="text-[10px] font-mono ml-auto">{formatTime(t.position.entryTime)}</div>
                  </div>
                  <div style={{ color: pnlColor }} className="text-sm font-mono font-bold">{t.pnl.pct >= 0 ? "+" : ""}{t.pnl.pct.toFixed(2)}% · {t.pnl.dollars >= 0 ? "+" : ""}${t.pnl.dollars.toFixed(0)}</div>
                </div>
                <div className="text-right shrink-0">
                  <div style={{ color: C.text }} className="text-sm font-mono">${t.price.toFixed(2)}</div>
                  <div style={{ color: C.muted }} className="text-[10px] font-mono">{t.position.size}sh</div>
                </div>
              </div>
              <div className="flex items-center gap-2" style={{ paddingLeft: "60px" }}>
                <div style={{ color: C.muted }} className="text-[10px] font-mono">
                  <span style={{ color: C.dim }}>entry</span> ${t.position.entryPrice.toFixed(2)} · <span style={{ color: C.dim }}>tgt</span> ${t.target.toFixed(2)}
                </div>
                <div className="ml-auto flex gap-1">
                  <span style={{ backgroundColor: t.position.addFired ? "var(--add-soft)" : "transparent", borderColor: t.position.addFired ? C.add : C.border, color: t.position.addFired ? C.add : C.dim }} className="text-[9px] font-mono px-1.5 py-0.5 rounded border">ADD{t.position.addFired ? " ✓" : ""}</span>
                  <span style={{ backgroundColor: t.position.tpFired ? "var(--tp-soft)" : "transparent", borderColor: t.position.tpFired ? C.tp : C.border, color: t.position.tpFired ? C.tp : C.dim }} className="text-[9px] font-mono px-1.5 py-0.5 rounded border">TP{t.position.tpFired ? " ✓" : ""}</span>
                </div>
              </div>
            </button>
          );
        })}
        {enriched.length === 0 && <div style={{ color: C.dim }} className="text-center text-xs py-12">No active trades.<br /><span className="text-[10px]">Open a position from the Scanner.</span></div>}
      </div>
    </div>
  );
}

// Deck
// ============================================================================
function Deck({ ticker, universe, positions, setPositions, fills, setFills, onBack }) {
  const data = universe.find(t => t.sym === ticker);
  const [mmgState, setMmgState] = useState(data.mmgState);
  const [campaign, setCampaign] = useState(data.campaign);
  const [direction, setDirection] = useState(data.direction);
  const [rvol, setRvol] = useState(data.rvol);
  const [pendingAction, setPendingAction] = useState(null);
  const [showSim, setShowSim] = useState(false);
  const position = positions[ticker] || { side: "flat" };
  const atrDistance = 0.25;
  const pnl = calcPnL(position, data.price);
  const scores = useMemo(() => computeScores({ mmgState, campaign, direction, rvol, position, atrDistance, atr: data.atr, currentPrice: data.price }), [mmgState, campaign, direction, rvol, position, data.atr, data.price]);
  const stopOffset = data.atr * 1.0, targetOffset = data.atr * 1.7;
  const refPrice = position.side === "flat" ? data.price : position.entryPrice;
  const stop = position.side === "short" ? refPrice + stopOffset : refPrice - stopOffset;
  const target = position.side === "short" ? refPrice - targetOffset : refPrice + targetOffset;
  const handleConfirm = () => {
    const a = pendingAction, price = data.price;
    setPositions(p => {
      const cur = p[ticker] || { side: "flat" };
      let next = { ...cur };
      if (a === "B2O") next = { side: "long", entryPrice: price, size: 100, addFired: false, tpFired: false, entryTime: Date.now() };
      else if (a === "S2O") next = { side: "short", entryPrice: price, size: 100, addFired: false, tpFired: false, entryTime: Date.now() };
      else if (a === "ADD") {
        const newSize = cur.size + 50;
        const newAvg = ((cur.entryPrice * cur.size) + (price * 50)) / newSize;
        next = { ...cur, size: newSize, entryPrice: newAvg, addFired: true };
      } else if (a === "TP") {
        const sold = Math.round(cur.size / 2);
        next = { ...cur, size: cur.size - sold, tpFired: true };
      } else if (a === "S2C" || a === "B2C") next = { side: "flat" };
      return { ...p, [ticker]: next };
    });
    setFills(f => ({ ...f, [ticker]: { action: a, price, at: Date.now() } }));
    setPendingAction(null);
  };
  const posColor = position.side === "long" ? C.long : position.side === "short" ? C.short : C.muted;
  const pnlColor = pnl.dollars >= 0 ? C.long : C.short;
  return (
    <div className="flex flex-col gap-2">
      <div className="flex items-center gap-2">
        <button onClick={onBack} style={{ color: C.muted }} className="p-1 -ml-1"><ChevronLeft size={20} /></button>
        <div style={{ color: C.text }} className="text-xl font-mono font-bold">{ticker}</div>
        <div style={{ color: C.text }} className="text-xl font-mono">${data.price.toFixed(2)}</div>
        <div style={{ color: data.change >= 0 ? C.long : C.short }} className="text-sm font-mono">{data.change >= 0 ? "+" : ""}{data.change.toFixed(2)}%</div>
        <button onClick={() => setShowSim(!showSim)} style={{ color: C.dim }} className="p-1 ml-auto"><Settings size={14} /></button>
      </div>
      <div className="grid grid-cols-3 gap-2">
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-2.5 py-1.5">
          <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em]">WHERE</div>
          <div style={{ color: C.text }} className="text-sm font-medium leading-tight">{mmgState}</div>
          <div style={{ color: C.muted }} className="text-[10px]">{direction} bias</div>
        </div>
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-2.5 py-1.5">
          <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em]">WHEN</div>
          <div style={{ color: C.text }} className="text-sm font-medium leading-tight">{campaign}</div>
          <div style={{ color: C.muted }} className="text-[10px] font-mono">{rvol.toFixed(2)}x RVOL</div>
        </div>
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-2.5 py-1.5">
          <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em]">POSITION</div>
          <div style={{ color: posColor }} className="text-sm font-mono font-bold leading-tight uppercase">{position.side}</div>
          {position.side !== "flat" ? <div style={{ color: pnlColor }} className="text-[10px] font-mono">{pnl.pct >= 0 ? "+" : ""}{pnl.pct.toFixed(2)}% · {position.addFired ? "A✓" : "a"}·{position.tpFired ? "T✓" : "t"}</div> : <div style={{ color: C.dim }} className="text-[10px]">no fills</div>}
        </div>
      </div>
      <div className="grid grid-cols-2 gap-2">
        <ActionCell code="B2O" label="enter long" score={scores.b2o} lockedReason="in position" tone="long" onTap={() => setPendingAction("B2O")} />
        <ActionCell code="S2O" label="enter short" score={scores.s2o} lockedReason="in position" tone="short" onTap={() => setPendingAction("S2O")} />
      </div>
      <div className="grid grid-cols-2 gap-2">
        <ActionCell code="ADD" label="scale in · 50% mark" score={scores.add} lockedReason={addLockReason(position, scores.campaignProgress)} tone="add" onTap={() => setPendingAction("ADD")} />
        <ActionCell code="TP"  label="take profit · 75% mark" score={scores.tp} lockedReason={tpLockReason(position, scores.campaignProgress)} tone="tp" onTap={() => setPendingAction("TP")} />
      </div>
      <div className="grid grid-cols-2 gap-2">
        <ActionCell code="S2C" label="close long" score={scores.s2c} lockedReason="no long position" tone="close" onTap={() => setPendingAction("S2C")} />
        <ActionCell code="B2C" label="cover short" score={scores.b2c} lockedReason="no short position" tone="close" onTap={() => setPendingAction("B2C")} />
      </div>
      <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-3 py-2">
        <div className="grid grid-cols-6 gap-1 font-mono text-[10px]">
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">STOP</div><div style={{ color: C.short }}>${stop.toFixed(2)}</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">TGT</div><div style={{ color: C.long }}>${target.toFixed(2)}</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">R:R</div><div style={{ color: C.text }}>1:{(targetOffset / stopOffset).toFixed(1)}</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">SIZE</div><div style={{ color: C.text }}>{position.side !== "flat" ? position.size : 100}sh</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">{position.side !== "flat" ? "PnL" : "RISK"}</div><div style={{ color: position.side !== "flat" ? pnlColor : C.close }}>{position.side !== "flat" ? `${pnl.dollars >= 0 ? "+" : ""}$${pnl.dollars.toFixed(0)}` : `$${(stopOffset*100).toFixed(0)}`}</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">ATR</div><div style={{ color: C.text }}>${data.atr.toFixed(2)}</div></div>
        </div>
      </div>
      {showSim && (
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl p-3 space-y-2 text-xs">
          <div>
            <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em] mb-1">MMG STATE</div>
            <div className="flex flex-wrap gap-1">{MMG_STATES.map(s => (
              <button key={s} onClick={() => setMmgState(s)} style={{ backgroundColor: mmgState === s ? C.text : C.bg, color: mmgState === s ? C.bg : C.muted }} className="px-1.5 py-0.5 rounded font-mono text-[9px]">{s}</button>
            ))}</div>
          </div>
          <div>
            <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em] mb-1">CAMPAIGN</div>
            <div className="flex flex-wrap gap-1">{CAMPAIGN_STATES.map(s => (
              <button key={s} onClick={() => setCampaign(s)} style={{ backgroundColor: campaign === s ? C.text : C.bg, color: campaign === s ? C.bg : C.muted }} className="px-1.5 py-0.5 rounded font-mono text-[9px]">{s}</button>
            ))}</div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em] mb-1">BIAS</div>
              <div className="flex gap-1">{["long", "short", "neutral"].map(d => (
                <button key={d} onClick={() => setDirection(d)} style={{ backgroundColor: direction === d ? C.text : C.bg, color: direction === d ? C.bg : C.muted }} className="px-1.5 py-0.5 rounded font-mono text-[9px]">{d}</button>
              ))}</div>
            </div>
            <div>
              <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em] mb-1">RVOL · {rvol.toFixed(2)}x</div>
              <input type="range" min="0.3" max="3" step="0.1" value={rvol} onChange={(e) => setRvol(parseFloat(e.target.value))} className="w-full" />
            </div>
          </div>
        </div>
      )}
      {pendingAction && <ConfirmModal action={pendingAction} ticker={ticker} price={data.price} position={position.side !== "flat" ? position : null} onConfirm={handleConfirm} onCancel={() => setPendingAction(null)} />}
    </div>
  );
}

    { key: "scanner", icon: Search, label: "Scan" },

    { key: "watchlist", icon: Eye, label: "Watch" },
    { key: "library", icon: BookOpen, label: "Library" },
    { key: "account", icon: User, label: "Account" },
  ];
  return (
    <div style={{ backgroundColor: C.surface, borderTopColor: C.border }} className="fixed bottom-0 left-0 right-0 border-t z-40">
      <div className="max-w-md mx-auto grid grid-cols-5">
        {tabs.map(t => {
          const Icon = t.icon, active = view === t.key;

              </div>
              <div style={{ color: active ? C.text : C.muted }} className="text-[9px] font-mono tracking-wider">{t.label.toUpperCase()}</div>
            </button>
          );

    </div>
  );
}

// v.19 — RiskAssessmentWizard
// ============================================================================
function RiskAssessmentWizard({ onComplete, onCancel, existingProfile, allowCancel }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState(existingProfile ? existingProfile.answers : {});
  const totalSteps = RISK_QUESTIONS.length + 1;
  const isResult = step === RISK_QUESTIONS.length;
  const currentQ = !isResult ? RISK_QUESTIONS[step] : null;
  const currentAnswer = currentQ ? answers[currentQ.id] : null;
  const { score, tier } = scoreRiskAnswers(answers);
  const tierData = RISK_TIERS[tier];

  const choose = (idx) => {
    setAnswers({ ...answers, [currentQ.id]: idx });
    setTimeout(() => setStep(step + 1), 180);
  };
  const finish = () => {
    const profile = { tier, score, answers, completedAt: Date.now() };
    saveJSON(STORAGE.RISK, profile);
    onComplete(profile);
  };

  return (
    <div style={{ backgroundColor: C.bg, color: C.text }} className="fixed inset-0 z-50 flex flex-col">
      <div style={{ backgroundColor: C.surface, borderBottomColor: C.border }} className="border-b px-4 py-3">
        <div className="max-w-md mx-auto">
          <div className="flex items-center justify-between mb-2">
            {allowCancel ? <button onClick={onCancel} style={{ color: C.dim }} className="text-xs font-mono uppercase tracking-wider">Cancel</button> : <div className="w-12" />}
            <div style={{ color: C.dim }} className="text-xs font-mono">{isResult ? "Done" : `${step + 1} / ${RISK_QUESTIONS.length}`}</div>
          </div>
          <div style={{ backgroundColor: C.track }} className="h-1 rounded-full overflow-hidden">
            <div style={{ backgroundColor: C.long, width: `${((step + (isResult ? 1 : 0)) / totalSteps) * 100}%`, transition: "width 0.3s ease" }} className="h-full" />
          </div>
          <div style={{ color: C.muted }} className="text-[10px] tracking-[0.2em] mt-2 font-mono font-bold">RISK ASSESSMENT</div>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto px-4 py-6">
        <div className="max-w-md mx-auto">
          {!isResult && currentQ && (
            <div>
              <div style={{ color: C.dim }} className="text-[10px] tracking-[0.2em] mb-3 font-mono">QUESTION {step + 1}</div>
              <h2 style={{ color: C.text }} className="text-xl font-bold leading-snug mb-6">{currentQ.question}</h2>
              <div className="space-y-2">
                {currentQ.options.map((opt, idx) => {
                  const selected = currentAnswer === idx;
                  return (
                    <button key={idx} onClick={() => choose(idx)}
                      style={{ backgroundColor: selected ? "var(--long-soft)" : C.surface, borderColor: selected ? C.long : C.border, color: C.text }}
                      className="w-full text-left px-4 py-3.5 rounded-lg border-2 text-sm active:opacity-70">
                      <div className="flex items-center gap-3">
                        <div style={{ backgroundColor: selected ? C.long : "transparent", borderColor: selected ? C.long : C.border }} className="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0">
                          {selected && <Check size={12} color="#fff" />}
                        </div>
                        <span>{opt}</span>
                      </div>
                    </button>
                  );
                })}
              </div>
              {step > 0 && (
                <button onClick={() => setStep(step - 1)} style={{ color: C.dim }} className="mt-6 text-xs font-mono uppercase tracking-wider">
                  &larr; Back
                </button>
              )}
            </div>
          )}

          {isResult && (
            <div>
              <div style={{ color: C.dim }} className="text-[10px] tracking-[0.2em] mb-3 font-mono">YOUR PROFILE</div>
              <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl p-6 text-center mb-6">
                <div className="text-5xl mb-3">{tierData.icon}</div>
                <h2 style={{ color: C.text }} className="text-2xl font-bold mb-2">{tierData.name}</h2>
                <div style={{ color: C.dim }} className="text-xs font-mono mb-4">Score: {score.toFixed(2)} / 3.00</div>
                <p style={{ color: C.muted }} className="text-sm">{tierData.description}</p>
              </div>
              <div style={{ color: C.dim }} className="text-[10px] tracking-[0.2em] mb-2 font-mono">YOUR PARAMETERS</div>
              <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-lg overflow-hidden mb-6">
                <div style={{ borderColor: C.border }} className="flex justify-between px-4 py-3 border-b">
                  <span style={{ color: C.muted }} className="text-sm">Per-trade risk</span>
                  <span style={{ color: C.text }} className="text-sm font-mono font-bold">{tierData.risk.toFixed(2)}%</span>
                </div>
                <div style={{ borderColor: C.border }} className="flex justify-between px-4 py-3 border-b">
                  <span style={{ color: C.muted }} className="text-sm">R:R minimum</span>
                  <span style={{ color: C.text }} className="text-sm font-mono font-bold">{tierData.rrMin.toFixed(1)}R</span>
                </div>
                <div style={{ borderColor: C.border }} className="flex justify-between px-4 py-3 border-b">
                  <span style={{ color: C.muted }} className="text-sm">Max concurrent positions</span>
                  <span style={{ color: C.text }} className="text-sm font-mono font-bold">{tierData.maxPos}</span>
                </div>
                <div className="flex justify-between px-4 py-3">
                  <span style={{ color: C.muted }} className="text-sm">Daily stop loss</span>
                  <span style={{ color: C.short }} className="text-sm font-mono font-bold">{tierData.dailyStop.toFixed(1)}%</span>
                </div>
              </div>
              <p style={{ color: C.dim }} className="text-xs text-center mb-6">
                You can retake this assessment any time from Account &rarr; Risk Profile.
              </p>
              <button onClick={finish} style={{ backgroundColor: C.long, color: "#fff" }} className="w-full py-3.5 rounded-lg font-bold text-sm tracking-wide active:opacity-80">
                Continue to App
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

            Create Session
          </button>
          <div style={{ color: C.dim }} className="text-[10px] text-center px-4">
            Session execution pending the MMG JS engine port (v.20-v.22). Sessions save now; auto-trading runs once the engine is wired.
          </div>
        </div>
      </div>
    </div>
  );
}

function SessionListCard({ sessions, onCreate }) {
  return (
    <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl overflow-hidden">
      <div style={{ borderColor: C.border }} className="px-3 py-2.5 border-b flex items-center gap-2">
        <Calendar size={12} color={C.muted} />
        <div style={{ color: C.muted }} className="text-[9px] tracking-[0.2em] font-mono font-bold flex-1">TRADING SESSIONS</div>
        <div style={{ color: C.dim }} className="text-[10px] font-mono">{sessions.length}</div>
      </div>
      {sessions.length === 0 ? (
        <div className="px-3 py-2.5">
          <div style={{ color: C.dim }} className="text-[11px] mb-2">No sessions yet.</div>
          <button onClick={onCreate} style={{ backgroundColor: C.long, color: "#fff" }} className="w-full py-2 rounded font-bold text-xs">+ Create Session</button>
        </div>
      ) : (
        <div>
          {sessions.map((s) => {
            const tier = RISK_TIERS[s.riskProfile];
            return (
              <div key={s.id} style={{ borderColor: C.border }} className="px-3 py-2 border-b last:border-b-0">
                <div className="flex items-center gap-2 mb-0.5">
                  <div style={{ color: C.text }} className="text-xs font-bold flex-1">{s.name}</div>
                  <span style={{ backgroundColor: C.track, color: C.dim }} className="text-[8px] font-mono px-1.5 py-0.5 rounded uppercase">{s.status}</span>
                </div>
                <div style={{ color: C.dim }} className="text-[10px] font-mono">{s.startDate} &rarr; {s.endDate}</div>
                {tier && <div style={{ color: C.muted }} className="text-[10px] mt-0.5">{tier.icon} {tier.name} &middot; ${s.initialBalance.toLocaleString()}</div>}
              </div>
            );
          })}
          <div className="px-3 py-2">
            <button onClick={onCreate} style={{ backgroundColor: C.long, color: "#fff" }} className="w-full py-2 rounded font-bold text-xs">+ Create Session</button>
          </div>
        </div>
      )}
    </div>
  );
}

function MTSApp() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [view, setView] = useState("scanner");
  const [returnTo, setReturnTo] = useState("scanner");
  const [selected, setSelected] = useState(null);
  const [selectedArticle, setSelectedArticle] = useState(null);
  const [positions, setPositions] = useState(initialPositions);
  const [fills, setFills] = useState({});
  const [watchlists, setWatchlists] = useState(initialWatchlists);
  const [universe, setUniverse] = useState(UNIVERSE_SEED);
  const [darkMode, setDarkMode] = useState(false);
  // v.19 state
  const [riskProfile, setRiskProfile] = useState(() => loadJSON(STORAGE.RISK, null));
  const [polygonKey, setPolygonKey] = useState(() => loadJSON(STORAGE.KEY, ""));
  const [paperAccount, setPaperAccount] = useState(() => loadJSON(STORAGE.ACCT, { balance: 100000, startingBalance: 100000, openedAt: Date.now() }));
  const [sessions, setSessions] = useState(() => loadJSON(STORAGE.SESS, []));
  const [overlay, setOverlay] = useState(null);

  const completeRiskAssessment = (profile) => { setRiskProfile(profile); saveJSON(STORAGE.RISK, profile); setOverlay(null); };
  const cancelRiskAssessment = () => { if (riskProfile) setOverlay(null); };
  const updatePolygonKey = (k) => { setPolygonKey(k); saveJSON(STORAGE.KEY, k); };
  const resetPaperAccount = () => { const fresh = { balance: 100000, startingBalance: 100000, openedAt: Date.now() }; setPaperAccount(fresh); saveJSON(STORAGE.ACCT, fresh); };
  const createSession = (session) => { const next = [session, ...sessions]; setSessions(next); saveJSON(STORAGE.SESS, next); setOverlay(null); };

  useEffect(() => {
    if (loggedIn && !riskProfile && !overlay) setOverlay("risk-assessment");
  }, [loggedIn, riskProfile, overlay]);

  // v.20 — live data polling for TSLA
  const [liveData, setLiveData] = useState({});
  useEffect(() => {
    if (!polygonKey || !loggedIn) return;
    let cancelled = false;
    const pull = async () => {
      try {
        const to = ymdDaysAgo(0);
        const from = ymdDaysAgo(10);
        const bars = await fetchMassiveBars("TSLA", 15, "minute", from, to, polygonKey);
        if (cancelled) return;
        const ind = computeIndicators(bars);
        const status = ind ? "ok" : "warmup";
        setLiveData(prev => ({ ...prev, TSLA: { indicators: ind, bars, status, lastFetch: Date.now() } }));
        if (ind) {
          console.log("[v.20] TSLA " + new Date(ind.timestamp).toLocaleString("en-US", { timeZone: "America/New_York" }) +
            " | O=" + ind.open + " H=" + ind.high + " L=" + ind.low + " C=" + ind.close +
            "\n  EMA15=" + (ind.ema15 ? ind.ema15.toFixed(2) : "n/a") +
            "  VWAP=" + (ind.vwap ? ind.vwap.toFixed(2) : "n/a") +
            "  BB=" + ind.bbBasis.toFixed(2) + "/" + ind.bbUpper.toFixed(2) + "/" + ind.bbLower.toFixed(2) +
            "  bbWidth=" + ind.bbWidth.toFixed(4) + "  bbWidthAvg=" + (ind.bbWidthAvg ? ind.bbWidthAvg.toFixed(4) : "n/a") +
            "  SAR=" + (ind.sar ? ind.sar.toFixed(2) : "n/a") +
            "\n  ATR14=" + (ind.atr14 ? ind.atr14.toFixed(4) : "n/a") +
            "  RSI14=" + (ind.rsi14 ? ind.rsi14.toFixed(2) : "n/a") +
            "  ROC9=" + (ind.roc9 ? ind.roc9.toFixed(4) : "n/a") +
            "  macdHist=" + (ind.macdHist ? ind.macdHist.toFixed(4) : "n/a") +
            "  rvol=" + (ind.rvol ? ind.rvol.toFixed(4) : "n/a") +
            "  bars=" + ind.barsLoaded);
        }
      } catch (e) {
        if (cancelled) return;
        console.error("[v.20] Massive fetch error:", e.message);
        setLiveData(prev => ({ ...prev, TSLA: { ...(prev.TSLA || {}), status: "error", error: e.message, lastFetch: Date.now() } }));
      }
    };
    pull();
    const iv = setInterval(pull, 60000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [polygonKey, loggedIn]);

  // Enrich universe with TSLA live close + volume
  const enrichedUniverse = useMemo(() => {
    const tsla = liveData.TSLA && liveData.TSLA.indicators;
    if (!tsla) return universe;
    return universe.map(t => {
      if (t.sym !== "TSLA") return t;
      const prevClose = liveData.TSLA.bars && liveData.TSLA.bars.length > 1 
        ? liveData.TSLA.bars[liveData.TSLA.bars.length - 2].c 
        : tsla.close;
      const change = tsla.close - prevClose;
      return {
        ...t,
        price: tsla.close,
        change: change,
        changePct: (change / prevClose) * 100,
        volume: tsla.volume,
        atr: tsla.atr14 || t.atr,
        rvol: tsla.rvol || t.rvol,
        _live: tsla,
      };
    });
  }, [universe, liveData]);

  // v.21 — Live Heartbeat polling for 6 ETF proxies
  const [liveHeartbeat, setLiveHeartbeat] = useState({});
  useEffect(() => {
    if (!polygonKey || !loggedIn) return;
    let cancelled = false;
    const pull = async () => {
      try {
        const syms = Object.values(HEARTBEAT_LIVE).map(h => h.sym);
        const snaps = await fetchSnapshot(syms, polygonKey);
        if (cancelled) return;
        const map = {};
        for (const key of Object.keys(HEARTBEAT_LIVE)) {
          const def = HEARTBEAT_LIVE[key];
          const s = snaps.find(x => x.ticker === def.sym);
          if (s && s.day && s.day.c) {
            map[key] = {
              label: def.label, type: "price",
              value: s.day.c < 100 ? s.day.c.toFixed(2) : s.day.c.toFixed(0),
              change: s.todaysChangePerc != null ? s.todaysChangePerc : 0,
              live: true,
            };
          }
        }
        setLiveHeartbeat(map);
      } catch (e) {
        if (!cancelled) console.error("[v.21] Heartbeat error:", e.message);
      }
    };
    pull();
    const iv = setInterval(pull, 60000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [polygonKey, loggedIn]);

  // v.21 — Top-20 RVOL scanner
  const [topRVOL, setTopRVOL] = useState([]);
  const [scannerStatus, setScannerStatus] = useState({ status: "idle", lastFetch: null, avgVolDate: null, tickersFound: 0 });

  useEffect(() => {
    if (!polygonKey || !loggedIn) return;
    let cancelled = false;

    // Ensure 20-day avg vol cache is fresh (rebuilds if missing or >24h old)
    const ensureAvgVolume = async () => {
      const cached = loadJSON(STORAGE_AVGVOL, null);
      const stale = !cached || (Date.now() - cached.builtAt) > 24 * 3600 * 1000;
      if (!stale) {
        setScannerStatus(s => ({ ...s, avgVolDate: new Date(cached.builtAt).toLocaleDateString(), tickersFound: cached.tickersFound }));
        return cached.avg;
      }
      setScannerStatus(s => ({ ...s, status: "building" }));
      console.log("[v.21] Building 20-day avg volume cache (one-time, ~30s)...");
      const built = await buildAvgVolume20d(SP500, polygonKey);
      if (cancelled) return null;
      saveJSON(STORAGE_AVGVOL, built);
      setScannerStatus(s => ({ ...s, avgVolDate: new Date(built.builtAt).toLocaleDateString(), tickersFound: built.tickersFound }));
      console.log(`[v.21] avg-vol cache built for ${built.tickersFound} tickers`);
      return built.avg;
    };

    const pullScanner = async () => {
      try {
        const avg = await ensureAvgVolume();
        if (cancelled || !avg) return;
        const snaps = await fetchSnapshot(SP500, polygonKey);
        if (cancelled) return;
        const ranked = [];
        for (const s of snaps) {
          if (!s.day || !s.day.v) continue;
          const avgV = avg[s.ticker];
          if (!avgV || avgV < 100000) continue; // skip illiquid
          const rvol = s.day.v / avgV;
          ranked.push({
            sym: s.ticker,
            price: s.day.c,
            change: s.todaysChange || 0,
            changePct: s.todaysChangePerc || 0,
            volume: s.day.v,
            avgVol: avgV,
            rvol: rvol,
            high: s.day.h, low: s.day.l, open: s.day.o,
          });
        }
        ranked.sort((a, b) => b.rvol - a.rvol);
        setTopRVOL(ranked.slice(0, 20));
        setScannerStatus(s => ({ ...s, status: "ok", lastFetch: Date.now() }));
      } catch (e) {
        if (cancelled) return;
        console.error("[v.21] Scanner error:", e.message);
        setScannerStatus(s => ({ ...s, status: "error", error: e.message }));
      }
    };

    pullScanner();
    const iv = setInterval(pullScanner, 60000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [polygonKey, loggedIn]);

  // Build the Scanner's universe from top-20 RVOL, enriching with mock MMG fields
  // until v.22 ports the engine. Heartbeat tickers get the same treatment for the
  // <Deck/> path. Falls back to existing enrichedUniverse if no live scanner data.
  const liveScanner = useMemo(() => {
    if (!topRVOL || topRVOL.length === 0) return null;
    return topRVOL.map(r => ({
      sym: r.sym,
      name: r.sym,
      sector: "—",
      price: r.price,
      change: r.change,
      changePct: r.changePct,
      volume: r.volume,
      avgVol: r.avgVol,
      rvol: r.rvol,
      atr: 0,
      atrDistance: 0,
      mmgState: "Departed",      // placeholder until v.22 engine ports
      campaign: "—",
      direction: "Neutral",
      _liveRow: true,
    }));
  }, [topRVOL]);

  // Final universe presented to Scanner/Active/etc: top-20 RVOL if available, else mock.
  const universeForUI = liveScanner || enrichedUniverse;

  useEffect(() => {
    document.body.classList.toggle("dark", darkMode);
  }, [darkMode]);

  const activeCount = Object.values(positions).filter(p => p.side !== "flat").length;
  const addCustomTicker = (sym) => {
    setUniverse(u => {
      if (u.find(t => t.sym === sym)) return u;
      return [...u, generateMockTicker(sym)];
    });
  };
  const handleSelect = (sym, from) => { setSelected(sym); setReturnTo(from); setView("deck"); };
  const handleSelectArticle = (id) => { setSelectedArticle(id); setView("library-article"); };

  if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)} />;
  const showMacro = view !== "library-article";
  const showTabs = view !== "deck" && view !== "library-article";
  const article = LIBRARY_ARTICLES.find(a => a.id === selectedArticle);

  return (
    <div style={{ backgroundColor: C.bg, color: C.text }} className="min-h-screen font-sans">
      {showMacro && <MarketHeartbeat account={ACCOUNT_DATA} liveHeartbeat={liveHeartbeat} />}
      <div className={`max-w-md mx-auto px-3 py-3 ${showTabs ? "pb-20" : "pb-4"}`}>
        {view === "scanner" && <Scanner universe={universeForUI} positions={positions} onSelect={(sym) => handleSelect(sym, "scanner")} />}
        {view === "active" && <Active universe={enrichedUniverse} positions={positions} onSelect={(sym) => handleSelect(sym, "active")} />}
        {view === "watchlist" && <WatchlistView watchlists={watchlists} setWatchlists={setWatchlists} universe={enrichedUniverse} addCustomTicker={addCustomTicker} positions={positions} onSelect={(sym) => handleSelect(sym, "watchlist")} />}
        {view === "library" && <Library articles={LIBRARY_ARTICLES} onSelect={handleSelectArticle} />}
        {view === "library-article" && article && <LibraryArticleDetail article={article} onBack={() => setView("library")} />}
        {view === "account" && <AccountSummary 
          account={ACCOUNT_DATA} positions={positions} universe={enrichedUniverse}
          darkMode={darkMode} setDarkMode={setDarkMode}
          onLogout={() => setLoggedIn(false)} onSelect={(sym) => handleSelect(sym, "account")}
          riskProfile={riskProfile} onRetakeRisk={() => setOverlay("risk-assessment")}
          polygonKey={polygonKey} onSetPolygonKey={updatePolygonKey}
          paperAccount={paperAccount} onResetAccount={resetPaperAccount}
          sessions={sessions} onNewSession={() => setOverlay("session-create")}
          liveData={liveData}
          scannerStatus={scannerStatus} topRVOL={topRVOL}
        />}
        {view === "deck" && <Deck ticker={selected} universe={enrichedUniverse} positions={positions} setPositions={setPositions} fills={fills} setFills={setFills} onBack={() => setView(returnTo)} />}
      </div>
      {showTabs && <BottomTabBar view={view} setView={setView} activeCount={activeCount} />}
      {overlay === "risk-assessment" && (
        <RiskAssessmentWizard
          onComplete={completeRiskAssessment}
          onCancel={cancelRiskAssessment}
          existingProfile={riskProfile}
          allowCancel={!!riskProfile}
        />
      )}
      {overlay === "session-create" && (
        <SessionCreateForm
          riskProfile={riskProfile}
          onCancel={() => setOverlay(null)}
          onCreate={createSession}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MTSApp />);
</script>
</body>
</html>
