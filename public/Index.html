// ============================================================
// POLYGON API - REAL TIME

async function fetchSnapshot(ticker) {
  var url = "https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers/" + ticker + "?apiKey=" + apiKey;
  var resp = await fetch(url);
  var data = await resp.json();
  if (data.ticker) return data.ticker;
  return null;
}

async function fetchAggregates(ticker) {
  var to = new Date();
  var from = new Date();
  from.setDate(from.getDate() - 30);
  var fromStr = from.toISOString().split("T")[0];
  var toStr = to.toISOString().split("T")[0];
  var url = "https://api.polygon.io/v2/aggs/ticker/" + ticker + "/range/1/day/" + fromStr + "/" + toStr + "?adjusted=true&sort=desc&limit=22&apiKey=" + apiKey;
  var resp = await fetch(url);
  var data = await resp.json();
  return (data.results && data.results.length > 0) ? data.results : [];
}

// ============================================================
// SCORING ENGINE
// ============================================================
function scoreStock(stock, snap, aggBars) {
  if (!snap) return null;

  var day = snap.day || {};
  var prevDay = snap.prevDay || {};
  var lastTrade = snap.lastTrade || {};

  var close = day.c || lastTrade.p || prevDay.c;
  var open  = day.o || prevDay.c;
  var high  = day.h || close;
  var low   = day.l || close;
  var vol   = day.v || 0;
  var vwap  = day.vw || ((high + low + close) / 3);

  if (!close || close <= 0) return null;

  // Average volume from historical bars
  var avgVol = vol;
  if (aggBars.length >= 5) {
    var sum = 0, count = Math.min(aggBars.length, 20);
    for (var i = 0; i < count; i++) sum += aggBars[i].v;
    avgVol = sum / count;
  }
  var relVol = avgVol > 0 ? vol / avgVol : 1.0;

  // ATR from historical bars
  var atr = high - low;
  if (aggBars.length >= 2) {
    var atrSum = 0, atrCount = Math.min(aggBars.length - 1, 14);
    for (var j = 0; j < atrCount; j++) atrSum += (aggBars[j].h - aggBars[j].l);
    atr = atrSum / atrCount;
  }

  // Day change
  var prevClose = prevDay.c || open;
  var changePct = prevClose > 0 ? ((close - prevClose) / prevClose) * 100 : 0;

  // Direction signals
  var bull = 0, bear = 0;
  if (close > vwap) bull++; else bear++;
  if (close > open) bull++; else bear++;
  if (changePct > 0.1) bull++; else if (changePct < -0.1) bear++;
  if (close > (high + low) / 2) bull++; else bear++;
  if (relVol > 1.5) { if (bull > bear) bull++; else bear++; }

  var dir = bull > bear ? 1 : bear > bull ? -1 : 0;
  if (dir === 0) return null;

  // Only show volume confirmed setups
  if (relVol < 1.2) return null;

  var candleStr = Math.min(Math.abs(close - open) / (atr > 0 ? atr : 1), 1.0);
  var instScore = (Math.min(relVol, 5) / 5 * 0.5) + (candleStr * 0.3) + (Math.min(Math.abs(changePct), 5) / 5 * 0.2);
  var signalAlign = Math.max(bull, bear) / (bull + bear);
  var volConfirm = Math.min(relVol / 2, 1.0);
  var certainty = Math.min((signalAlign * 50) + (volConfirm * 30) + (candleStr * 20), 99);

  var station = dir === 1 ? close + atr * 1.618 : close - atr * 1.618;
  var pctMove = ((station - close) / close * 100);

  return {
    t: stock.t, n: stock.n,
    price: close.toFixed(2),
    dir: dir,
    direction: dir === 1 ? "LONG" : "SHORT",
    changePct: changePct.toFixed(2),
    relVol: relVol.toFixed(2),
    vol: fmtVol(vol),
    instScore: instScore.toFixed(2),
    certainty: certainty.toFixed(1),
    station: station.toFixed(2),
    atr: atr.toFixed(2),
    pctMove: pctMove.toFixed(1),
    vwap: vwap.toFixed(2),
  };
}

function fmtVol(v) {
  if (v >= 1e9) return (v/1e9).toFixed(1)+"B";
  if (v >= 1e6) return (v/1e6).toFixed(1)+"M";
  if (v >= 1e3) return (v/1e3).toFixed(0)+"K";
  return String(v);
}

// ============================================================
// SCAN ORCHESTRATOR
// ============================================================
async function doScan() {
  if (isScanning) return;
  isScanning = true;
  results = [];
  updateControls();
  showError("");

  var stocks = UNIVDATA[universe];
  var scored = [];

  document.getElementById("progressWrap").style.display = "block";
  document.getElementById("results").innerHTML = "";

  for (var i = 0; i < stocks.length; i++) {
    var stock = stocks[i];
    try {
      var pct = Math.round(((i+1)/stocks.length)*100);
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("scanStatus").textContent = "Scanning " + stock.t + " (" + (i+1) + "/" + stocks.length + ")";

      var snap = await fetchSnapshot(stock.t);
      await sleep(150);
      var aggs = await fetchAggregates(stock.t);
      await sleep(150);

      var result = scoreStock(stock, snap, aggs);
      if (result) scored.push(result);
    } catch(e) {}
  }

  scored.sort(function(a,b) {
    var id = parseFloat(b.instScore) - parseFloat(a.instScore);
    return Math.abs(id) > 0.05 ? id : parseFloat(b.certainty) - parseFloat(a.certainty);
  });

  results = scored.slice(0, 10);
  completedIds = [];
  lastScan = new Date();
  isScanning = false;
  document.getElementById("progressWrap").style.display = "none";

  if (results.length === 0) showError("No institutional setups found. Try refreshing or check your API key.");
  renderResults();
  updateControls();
}

function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

function startAutoScan() {
  clearInterval(scanTimer);
  doScan();
  scanTimer = setInterval(function(){ if(!isScanning) doScan(); }, 5 * 60 * 1000);

function triggerScan() { if (!isScanning) doScan(); }

  document.getElementById("tabEq").style.cssText  = isEq  ? "background:#00ccff;color:#000;border:none;flex:1;padding:12px 6px;border-radius:8px;font-family:'Courier New',monospace;font-weight:bold;font-size:11px;cursor:pointer;letter-spacing:1px" : "background:#1a1a3a;color:#bbbbdd;border:1px solid #333366;flex:1;padding:12px 6px;border-radius:8px;font-family:'Courier New',monospace;font-weight:bold;font-size:11px;cursor:pointer;letter-spacing:1px";
  document.getElementById("tabOpt").style.cssText = !isEq ? "background:#00ff88;color:#000;border:none;flex:1;padding:12px 6px;border-radius:8px;font-family:'Courier New',monospace;font-weight:bold;font-size:11px;cursor:pointer;letter-spacing:1px" : "background:#1a1a3a;color:#bbbbdd;border:1px solid #333366;flex:1;padding:12px 6px;border-radius:8px;font-family:'Courier New',monospace;font-weight:bold;font-size:11px;cursor:pointer;letter-spacing:1px";
  document.getElementById("appTitle").textContent = "⬡ " + (isEq ? "EQUITY" : "OPTIONS") + " SCANNER";
  document.getElementById("appTitle").style.color = isEq ? "#00ccff" : "#00ff88";
  document.getElementById("refreshBtn").style.background = isEq ? "#00ccff" : "#00ff88";
  results = []; completedIds = [];
  if (!isEq) {
    document.getElementById("results").innerHTML = '<div class="empty-state" style="color:#ccccdd">OPTIONS SCANNER<br><br>Coming soon with real Greeks.<br>Switch to EQUITY for live data.</div>';
    document.getElementById("infoBar").textContent = "";
  } else if (apiKey) startAutoScan();
}

function switchUniverse(u) {
  universe = u;
  var ids = ["uSP","uDW","uRU"], keys = ["SP500","DOW30","RUT2K"];
  ids.forEach(function(id, i) {
    var active = keys[i] === u;
    document.getElementById(id).style.background = active ? "#00ccff" : "#1a1a3a";
    document.getElementById(id).style.color = active ? "#000" : "#bbbbdd";
    document.getElementById(id).style.border = active ? "none" : "1px solid #333366";
  });
  results = []; completedIds = [];
  if (apiKey) startAutoScan();
}

function markTraded(t) { completedIds.push(t); renderResults(); }

function showError(msg) {
  var el = document.getElementById("errorBar");
  if (msg) { el.textContent = msg; el.style.display = "block"; }
  else el.style.display = "none";
}

// ============================================================
// RENDER
// ============================================================
function certColor(v) { var n=parseFloat(v); return n>=75?"#00ff88":n>=55?"#ffcc00":"#ff8844"; }
function instColor(v) { var n=parseFloat(v); return n>=0.7?"#00ff88":n>=0.5?"#ffcc00":"#ff8844"; }
function volColor(v)  { var n=parseFloat(v); return n>=2.0?"#00ff88":n>=1.5?"#ffcc00":"#ffffff"; }

function updateControls() {
  var btn = document.getElementById("refreshBtn");
  var badge = document.getElementById("statusBadge");
  if (!btn) return;
  var accent = scanner==="EQUITY" ? "#00ccff" : "#00ff88";
  btn.style.background = isScanning ? "#1a1a3a" : accent;
  btn.style.color = isScanning ? "#bbbbcc" : "#000";
  btn.textContent = isScanning ? "⟳ SCANNING..." : "⟳ REFRESH";
  btn.disabled = isScanning;
  if (badge) { badge.textContent = isScanning ? "⟳ SCANNING" : "● LIVE"; badge.style.color = isScanning ? "#ffcc00" : accent; }
}

function renderResults() {
  var visible = results.filter(function(r){ return completedIds.indexOf(r.t)===-1; });
  var ib = document.getElementById("infoBar");
  var re = document.getElementById("results");
  var uLabel = universe==="SP500"?"S&P 500 TOP 80":universe==="DOW30"?"DOW 30":"RUSSELL 2K";
  if (ib && lastScan) ib.textContent = uLabel + " · " + visible.length + " SETUPS · " + lastScan.toLocaleTimeString();
  if (!re) return;
  if (visible.length === 0 && !isScanning) {
    re.innerHTML = '<div class="empty-state" style="color:#ccccdd">NO INSTITUTIONAL SETUPS CONFIRMED<br><br>Volume 20%+ above average required.<br>Hit REFRESH to rescan.</div>';
    return;
  }
  if (isScanning) return;

  var html = "";
  visible.forEach(function(item, idx) {
    var isLong = item.direction === "LONG";
    var dc = isLong ? "#00ff88" : "#ff4466";
    var db = isLong ? "rgba(0,255,136,0.15)" : "rgba(255,68,102,0.15)";
    var cc = certColor(item.certainty);
    var ic = instColor(item.instScore);
    var vc = volColor(item.relVol);
    var chgC = parseFloat(item.changePct)>=0 ? "#00ff88" : "#ff4466";
    var chgS = parseFloat(item.changePct)>=0 ? "+" : "";

    html += '<div class="card" style="border-left:5px solid '+dc+'">'
      +'<div><span class="inst-badge">◈ INSTITUTION ENTRY</span><span class="data-badge">⚡ LIVE</span></div>'
      +'<div class="card-header">'
        +'<div class="card-rank">'+(idx+1)+'</div>'
        +'<div><div class="card-ticker">'+item.t+'</div><div class="card-name">'+item.n+'</div></div>'
        +'<div class="dir-badge" style="color:'+dc+';border-color:'+dc+';background:'+db+'">'+item.direction+'</div>'
      +'</div>'
      +'<div class="metrics-row">'
        +'<div class="metric-box"><div class="metric-label">ENTRY</div><div class="metric-value" style="color:#fff">$'+item.price+'</div></div>'
        +'<div class="metric-box"><div class="metric-label">TARGET</div><div class="metric-value" style="color:'+dc+'">$'+parseFloat(item.station).toFixed(2)+'</div></div>'
        +'<div class="metric-box"><div class="metric-label">MOVE</div><div class="metric-value" style="color:'+dc+'">'+(isLong?"+":"")+item.pctMove+'%</div></div>'
      +'</div>'
      +'<div class="sub-row">'
        +'<div class="sub-box"><div class="sub-label">DAY CHG</div><div class="sub-value" style="color:'+chgC+'">'+chgS+item.changePct+'%</div></div>'
        +'<div class="sub-box"><div class="sub-label">VWAP</div><div class="sub-value" style="color:#88ddff">$'+item.vwap+'</div></div>'
        +'<div class="sub-box"><div class="sub-label">ATR</div><div class="sub-value" style="color:#ffcc88">$'+item.atr+'</div></div>'
        +'<div class="sub-box"><div class="sub-label">VOLUME</div><div class="sub-value" style="color:#fff">'+item.vol+'</div></div>'
      +'</div>'
      +'<div class="sub-row">'
        +'<div class="sub-box"><div class="sub-label">CERTAINTY</div><div class="sub-value" style="color:'+cc+'">'+item.certainty+'%</div></div>'
        +'<div class="sub-box"><div class="sub-label">INST SCORE</div><div class="sub-value" style="color:'+ic+'">'+item.instScore+'</div></div>'
        +'<div class="sub-box"><div class="sub-label">REL VOL</div><div class="sub-value" style="color:'+vc+'">'+item.relVol+'x</div></div>'
        +'<div class="sub-box"><div class="sub-label">STATUS</div><div class="sub-value" style="color:#00ff88">READY</div></div>'
      +'</div>'
      +'<button class="btn-outline" onclick="markTraded(\''+item.t+'\')">✓ MARK TRADED — REMOVE</button>'
    +'</div>';
  });
  re.innerHTML = html;
}

// ============================================================
// BOOT
// ============================================================
apiKey = loadKey();
if (apiKey) {
  document.getElementById("apiSection").style.display = "none";
  document.getElementById("controlsRow").style.display = "flex";
  startAutoScan();
}
startClock();
</script>

</body>
</html>
