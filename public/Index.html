    .info{font-size:11px;color:#bbbbcc;text-align:center;margin-bottom:12px;}

nology"}];

var UNIVS={SP500:SP500,DOW30:DOW30,RUT2K:RUT2K};

// ============================================================
// MMG V9.8C ENGINE - TRANSLATED FROM PINE SCRIPT
// ============================================================
function calcEMA(bars,period){
  if(!bars||bars.length<2)return null;
  var p=Math.min(period,bars.length);
  var k=2/(p+1);
  var ema=0; for(var i=0;i<p;i++)ema+=bars[i].c; ema/=p;
  for(var i=p;i<bars.length;i++)ema=bars[i].c*k+ema*(1-k);
  return ema;
}

function calcVWAP(bars){
  if(!bars||bars.length===0)return null;
  var spv=0,sv=0;
  for(var b of bars){var hlc3=(b.h+b.l+b.c)/3;spv+=hlc3*b.v;sv+=b.v;}
  return sv>0?spv/sv:null;
}

function calcATR(bars,period){
  period=period||14;
  if(!bars||bars.length<2)return bars&&bars[0]?bars[0].h-bars[0].l:0;
  var n=Math.min(period,bars.length-1),sum=0;
  for(var i=0;i<n;i++){
    var prev=bars[i+1]?bars[i+1].c:bars[i].c;
    sum+=Math.max(bars[i].h-bars[i].l,Math.abs(bars[i].h-prev),Math.abs(bars[i].l-prev));
  }
  return sum/n||(bars[0].h-bars[0].l)||bars[0].c*0.01;
}

function findPivotHigh(bars,pl){
  pl=pl||5;
  var last=null;
  for(var i=pl;i<bars.length-pl;i++){
    var ok=true;
    for(var j=i-pl;j<=i+pl;j++){if(j!==i&&bars[j].h>=bars[i].h){ok=false;break;}}
    if(ok)last=bars[i].h;
  }
  return last;
}

function findPivotLow(bars,pl){
  pl=pl||5;
  var last=null;
  for(var i=pl;i<bars.length-pl;i++){
    var ok=true;
    for(var j=i-pl;j<=i+pl;j++){if(j!==i&&bars[j].l<=bars[i].l){ok=false;break;}}
    if(ok)last=bars[i].l;
  }
  return last;
}

function findGapUp(bars){
  for(var i=1;i<bars.length;i++){if(bars[i].l>bars[i-1].h)return(bars[i].l+bars[i-1].h)/2;}
  return null;
}

function findGapDown(bars){
  for(var i=1;i<bars.length;i++){if(bars[i].h<bars[i-1].l)return(bars[i].h+bars[i-1].l)/2;}
  return null;
}

function getLevels(bars,pl){
  return{res:findPivotHigh(bars,pl),sup:findPivotLow(bars,pl),gapUp:findGapUp(bars),gapDn:findGapDown(bars)};
}

function nearestAbove(lvls,price){
  var cands=Object.values(lvls).filter(function(v){return v!==null&&v>price;});
  return cands.length>0?Math.min.apply(null,cands):null;
}

function nearestBelow(lvls,price){
  var cands=Object.values(lvls).filter(function(v){return v!==null&&v<price;});
  return cands.length>0?Math.max.apply(null,cands):null;
}

function tfVote(up,dn,price){
  if(up!==null&&dn===null)return 1;
  if(up===null&&dn!==null)return -1;
  if(up!==null&&dn!==null){
    var du=Math.abs(up-price),dd=Math.abs(price-dn);
    if(du<dd)return 1; if(dd<du)return -1; return 0;
  }
  return 0;
}

function clusterLevels(raw,atr,cf){
  cf=cf||0.25;
  var band=atr*cf,clusters=[];
  for(var i=0;i<raw.length;i++){
    var lvl=raw[i],merged=false;
    for(var j=0;j<clusters.length;j++){
      if(Math.abs(lvl-clusters[j])<=band){clusters[j]=(clusters[j]+lvl)/2;merged=true;break;}
    }
    if(!merged)clusters.push(lvl);
  }
  return clusters;
}

function runMMG(stock,bars15,bars60,bars240,barsD,barsNative,snap){
  var EMA_LEN=21,ATR_LEN=14,PIVOT_LEN=5,CLUSTER_F=0.25,SPACING_F=0.25;
  var NEAR_TARGET_ATR=0.40,VWAP_BAL_ATR=0.15,MIN_BREAK_ATR=0.10;
  var RUN_S1=0.50,RUN_S2=1.00,RUN_STA=1.618;

  var day=snap&&snap.day?snap.day:{};
  var prevDay=snap&&snap.prevDay?snap.prevDay:{};
  var close15=day.c||prevDay.c||(bars15.length>0?bars15[bars15.length-1].c:null);
  if(!close15||close15<=0)return null;

  var atr15=calcATR(bars15,ATR_LEN)||close15*0.01;
  var ema15=calcEMA(bars15,EMA_LEN)||close15;
  var vwap15=calcVWAP(bars15)||close15;

  var barsN=barsNative&&barsNative.length>=5?barsNative:bars15;
  var emaN=calcEMA(barsN,EMA_LEN)||close15;
  var vwapN=calcVWAP(barsN)||close15;
  var atrN=calcATR(barsN,ATR_LEN)||atr15;
  var closeN=barsN.length>0?barsN[barsN.length-1].c:close15;

  // Levels per TF
  var l15=getLevels(bars15,PIVOT_LEN);
  var l60=getLevels(bars60.length>=10?bars60:bars15,PIVOT_LEN);
  var l240=getLevels(bars240.length>=5?bars240:bars15,PIVOT_LEN);
  var lD=getLevels(barsD.length>=5?barsD:bars15,PIVOT_LEN);

  var rawLevels=[l15.res,l15.sup,l15.gapUp,l15.gapDn,l60.res,l60.sup,l60.gapUp,l60.gapDn,
                 l240.res,l240.sup,l240.gapUp,l240.gapDn,lD.res,lD.sup,lD.gapUp,lD.gapDn]
                .filter(function(v){return v!==null&&v>0;});

  if(rawLevels.length===0)return null;
  var clusters=clusterLevels(rawLevels,atr15,CLUSTER_F);
  var highestL=Math.max.apply(null,clusters);
  var lowestL=Math.min.apply(null,clusters);

  // Nearest above/below per TF
  var up15=nearestAbove(l15,close15),dn15=nearestBelow(l15,close15);
  var up60=nearestAbove(l60,close15),dn60=nearestBelow(l60,close15);
  var up240=nearestAbove(l240,close15),dn240=nearestBelow(l240,close15);
  var upD=nearestAbove(lD,close15),dnD=nearestBelow(lD,close15);

  // Pressure score
  var cntA=0,cntB=0,sumA=0,sumB=0;
  for(var i=0;i<clusters.length;i++){
    var lvl=clusters[i];
    if(lvl>close15){cntA++;sumA+=lvl-close15;}
    else if(lvl<close15){cntB++;sumB+=close15-lvl;}
  }
  var tot=cntA+cntB;
  var pressureScore=tot>0?(cntA-cntB)/tot:0;

  var avgA=cntA>0?sumA/cntA:null,avgB=cntB>0?sumB/cntB:null;
  var gravityScore=0;
  if(avgA!==null&&avgB===null)gravityScore=1;
  else if(avgA===null&&avgB!==null)gravityScore=-1;
  else if(avgA!==null&&avgB!==null){
    if(avgA<avgB)gravityScore=1; else if(avgB<avgA)gravityScore=-1;
  }

  var v15=tfVote(up15,dn15,close15),v60=tfVote(up60,dn60,close15);
  var v240=tfVote(up240,dn240,close15),vD=tfVote(upD,dnD,close15);
  var voteScore=(v15+v60+v240+vD)/4;

  // Runway
  var bullFlow=closeN>emaN&&closeN>vwapN;
  var bearFlow=closeN<emaN&&closeN<vwapN;
  var bullRunway=close15>highestL&&bullFlow;
  var bearRunway=close15<lowestL&&bearFlow;

  var dirScore=(pressureScore*0.50)+(gravityScore*0.30)+(voteScore*0.20);
  if(bullRunway)dirScore=Math.max(dirScore,0.85);
  if(bearRunway)dirScore=Math.min(dirScore,-0.85);

  var dir=0;
  if(dirScore>0.10)dir=1; else if(dirScore<-0.10)dir=-1;

  // Forward/behind
  var forward=[],behind=[];
  for(var i=0;i<clusters.length;i++){
    var lvl=clusters[i];
    if(dir===1){if(lvl>close15)forward.push(lvl);else if(lvl<close15)behind.push(lvl);}
    else if(dir===-1){if(lvl<close15)forward.push(lvl);else if(lvl>close15)behind.push(lvl);}
  }
  if(dir===1){forward.sort(function(a,b){return a-b;});behind.sort(function(a,b){return b-a;});}
  else if(dir===-1){forward.sort(function(a,b){return b-a;});behind.sort(function(a,b){return a-b;});}

  var minSpacing=atr15*SPACING_F;
  var stop1=null,stop2=null,station=null,behindPrice=null;
  if(behind.length>0)behindPrice=behind[0];
  if(forward.length>0)stop1=forward[0];
  if(forward.length>1&&stop1!==null){
    for(var i=1;i<forward.length;i++){if(Math.abs(forward[i]-stop1)>minSpacing){stop2=forward[i];break;}}
  }
  if(forward.length>2){
    var ref=stop2!==null?stop2:stop1;
    if(ref!==null){
      for(var i=1;i<forward.length;i++){
        if(forward[i]===stop1||forward[i]===stop2)continue;
        if(Math.abs(forward[i]-ref)>minSpacing){station=forward[i];break;}
      }
    }
  }

  if(bullRunway){
    if(behindPrice===null)behindPrice=highestL;
    if(stop1===null)stop1=close15+atr15*RUN_S1;
    if(stop2===null)stop2=close15+atr15*RUN_S2;
    if(station===null)station=close15+atr15*RUN_STA;
  }
  if(bearRunway){
    if(behindPrice===null)behindPrice=lowestL;
    if(stop1===null)stop1=close15-atr15*RUN_S1;
    if(stop2===null)stop2=close15-atr15*RUN_S2;
    if(station===null)station=close15-atr15*RUN_STA;
  }
  if(stop1===null)return null;

  // Arrive Today
  var sesH=Math.max.apply(null,barsN.map(function(b){return b.h;}));
  var sesL=Math.min.apply(null,barsN.map(function(b){return b.l;}));
  var arriveToday=null;
  if(dir===1&&station!==null&&station>sesL)
    arriveToday=Math.max(0,Math.min(100,((closeN-sesL)/(station-sesL))*100));
  else if(dir===-1&&station!==null&&station<sesH)
    arriveToday=Math.max(0,Math.min(100,((sesH-closeN)/(sesH-station))*100));

  // Train modes
  var vwapLongOK=closeN>vwapN,vwapShortOK=closeN<vwapN;
  var nearVWAPBal=Math.abs(closeN-vwapN)<=atrN*VWAP_BAL_ATR;
  var breakBuf=atrN*MIN_BREAK_ATR;
  var prevClose=barsN.length>=2?barsN[barsN.length-2].c:closeN;

  var nS1=stop1!==null&&Math.abs(closeN-stop1)<=atrN*NEAR_TARGET_ATR;
  var nS2=stop2!==null&&Math.abs(closeN-stop2)<=atrN*NEAR_TARGET_ATR;
  var nSta=station!==null&&Math.abs(closeN-station)<=atrN*NEAR_TARGET_ATR;
  var nearTarget=nS1||nS2||nSta;

  var brdLong=dir===1&&stop1!==null&&vwapLongOK&&closeN>stop1+breakBuf&&prevClose<=stop1;
  var brdShort=dir===-1&&stop1!==null&&vwapShortOK&&closeN<stop1-breakBuf&&prevClose>=stop1;
  var boarding=brdLong||brdShort;

  var depLong=dir===1&&!boarding&&stop1!==null&&vwapLongOK&&closeN>stop1&&closeN>prevClose&&prevClose>stop1;
  var depShort=dir===-1&&!boarding&&stop1!==null&&vwapShortOK&&closeN<stop1&&closeN<prevClose&&prevClose<stop1;
  var depart=depLong||depShort;

  var rolLong=dir===1&&!boarding&&!depart&&vwapLongOK&&closeN>emaN&&closeN>prevClose;
  var rolShort=dir===-1&&!boarding&&!depart&&vwapShortOK&&closeN<emaN&&closeN<prevClose;
  var rolling=rolLong||rolShort;

  var slow=dir!==0&&nearTarget;
  var rev33=dir===1?closeN<prevClose:closeN>prevClose;
  var rev67=dir===1?closeN<emaN:closeN>emaN;
  var rev99=behindPrice!==null&&(dir===1?closeN<behindPrice:closeN>behindPrice);

  var mode=1;
  if(rev99)mode=8; else if(rev67)mode=7; else if(rev33&&slow)mode=6;
  else if(slow)mode=5; else if(rolling)mode=4; else if(depart)mode=3;
  else if(boarding)mode=2;

  var action=(mode===2||mode===3||mode===4)?"Get On":(mode>=6?"Get Off":"Wait");
  if(action!=="Get On")return null;

  // Certainty
  var engTemp=Math.min(Math.abs(dirScore)*100,100);
  var flowOK=dir===1?vwapLongOK:vwapShortOK;
  var modeTrust=mode===4?90:mode===3?75:mode===2?55:mode===5?45:mode===6?35:mode===7?20:mode===8?5:25;
  var arrTrust=arriveToday!==null?arriveToday:50;
  var flowTrust=flowOK?80:40;
  var certainty=dir===0?0:Math.max(0,Math.min(100,(engTemp*0.40)+(modeTrust*0.25)+(arrTrust*0.20)+(flowTrust*0.15)));

  if(certainty<30)return null;

  var vol=day.v||0;
  var avgVol=vol;
  if(barsD.length>=5){var n=Math.min(barsD.length,20);var s=0;for(var i=0;i<n;i++)s+=barsD[i].v;avgVol=s/n;}
  var relVol=avgVol>0?vol/avgVol:1.0;

  var modeTexts=["Waiting","Boarding","Depart","Rolling","Slow","Rev 33%","Rev 67%","Rev 99%"];
  var chgPct=prevDay.c>0?(((closeN-prevDay.c)/prevDay.c)*100).toFixed(2):"0.00";

  return{
    t:stock.t,n:stock.n,
    price:closeN.toFixed(2),
    dir:dir,direction:dir===1?"LONG":"SHORT",
    action:action,modeText:modeTexts[mode-1]||"Waiting",mode:mode,
    certainty:certainty.toFixed(1),engTemp:engTemp.toFixed(1),
    arriveToday:arriveToday!==null?arriveToday.toFixed(1):null,
    dirScore:dirScore.toFixed(3),pressureScore:pressureScore.toFixed(3),
    gravityScore:gravityScore.toFixed(3),voteScore:voteScore.toFixed(3),
    stop1:stop1!==null?stop1.toFixed(2):null,
    stop2:stop2!==null?stop2.toFixed(2):null,
    station:station!==null?station.toFixed(2):null,
    vwap:vwapN.toFixed(2),ema:emaN.toFixed(2),atr:atrN.toFixed(2),
    relVol:relVol.toFixed(2),vol:fmtVol(vol),
    bullRunway:bullRunway,bearRunway:bearRunway,
    changePct:chgPct,clusters:clusters.length,
  };
}

function fmtVol(v){
  if(v>=1e9)return(v/1e9).toFixed(1)+"B";
  if(v>=1e6)return(v/1e6).toFixed(1)+"M";
  if(v>=1e3)return(v/1e3).toFixed(0)+"K";
  return String(v);
}

// ============================================================
// STATE
// ============================================================
var apiKey="",universe="SP500",results=[],completed=[],isScanning=false,scanTimer=null,showKeyEdit=false;

function loadKey(){try{return localStorage.getItem("mmg_v98c")||"";}catch(e){return "";}}
function saveKey(k){try{localStorage.setItem("mmg_v98c",k);}catch(e){}}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

// ============================================================
// POLYGON FETCH
// ============================================================
async function fetchSnap(ticker){
  var r=await fetch("https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers/"+ticker+"?apiKey="+apiKey);
  var d=await r.json(); return d.ticker||null;
}

async function fetchBars(ticker,mult,ts,days,limit){
  var to=new Date().toISOString().split("T")[0];
  var from=new Date(Date.now()-days*86400000).toISOString().split("T")[0];
  var r=await fetch("https://api.polygon.io/v2/aggs/ticker/"+ticker+"/range/"+mult+"/"+ts+"/"+from+"/"+to+"?adjusted=true&sort=asc&limit="+(limit||100)+"&apiKey="+apiKey);
  var d=await r.json(); return d.results||[];
}

// ============================================================
// SCAN
// ============================================================
async function doScan(){
  if(isScanning)return;
  isScanning=true;
  results=[];
  setError("");
  document.getElementById("progressSection").style.display="block";
  document.getElementById("results").innerHTML="";
  updateControls();

  var stocks=UNIVS[universe];
  var scored=[];

  for(var i=0;i<stocks.length;i++){
    var stock=stocks[i];
    var pct=Math.round(((i+1)/stocks.length)*100);
    document.getElementById("progressFill").style.width=pct+"%";
    document.getElementById("scanStatus").textContent="MMG V9.8C: "+stock.t+" ("+i+1+"/"+stocks.length+")";
    try{
      var results_arr=await Promise.all([
        fetchSnap(stock.t),
        fetchBars(stock.t,15,"minute",3,200),
        fetchBars(stock.t,60,"minute",10,100),
        fetchBars(stock.t,240,"minute",20,50),
        fetchBars(stock.t,1,"day",60,60),
        fetchBars(stock.t,1,"minute",1,390),
      ]);
      await sleep(250);
      var result=runMMG(stock,results_arr[0],results_arr[1],results_arr[2],results_arr[3],results_arr[4],results_arr[5]);
      if(result)scored.push(result);
    }catch(e){}
  }

  scored.sort(function(a,b){return parseFloat(b.certainty)-parseFloat(a.certainty);});
  results=scored.slice(0,10);
  completed=[];

  document.getElementById("progressSection").style.display="none";
  isScanning=false;
  updateControls();

  if(results.length===0)setError("No GET ON setups found. Market may be in Wait or Reversal mode. Try refreshing.");
  renderResults();
  updateInfoBar();
}

function startAutoScan(){
  clearInterval(scanTimer);
  doScan();
  scanTimer=setInterval(function(){if(!isScanning)doScan();},5*60*1000);
}

// ============================================================
// UI
// ============================================================
function connectApi(){
  var val=(document.getElementById("apiField").value||"").trim();
  if(!val){alert("Please enter your Polygon API key.");return;}
  apiKey=val; saveKey(val);
  document.getElementById("apiSection").style.display="none";
  document.getElementById("controlsRow").style.display="flex";
  startAutoScan();
}

function updateApi(){
  var val=(document.getElementById("apiFieldEdit").value||"").trim();
  if(!val)return;
  apiKey=val; saveKey(val);
  showKeyEdit=false;
  document.getElementById("keyEditSection").style.display="none";
  startAutoScan();
}

function toggleKeyEdit(){
  showKeyEdit=!showKeyEdit;
  document.getElementById("keyEditSection").style.display=showKeyEdit?"block":"none";
}

function triggerScan(){if(!isScanning)doScan();}

function switchUniverse(u){
  universe=u;
  ["SP500","DOW30","RUT2K"].forEach(function(k,i){
    var ids=["uSP","uDW","uRU"];
    var el=document.getElementById(ids[i]);
    if(k===u){el.classList.add("active");}else{el.classList.remove("active");}
  });
  results=[]; completed=[];
  if(apiKey)startAutoScan();
  else renderResults();
}

function markTraded(t){
  completed.push(t);
  renderResults();
}

function setError(msg){
  var el=document.getElementById("errorBar");
  if(msg){el.textContent=msg;el.style.display="block";}
  else el.style.display="none";
}

function updateControls(){
  var btn=document.getElementById("refreshBtn");
  var badge=document.getElementById("statusBadge");
  if(btn){
    btn.style.background=isScanning?"#1a1a3a":"#00ccff";
    btn.style.color=isScanning?"#aaa":"#000";
    btn.textContent=isScanning?"⟳ SCANNING...":"⟳ REFRESH SCAN";
    btn.disabled=isScanning;
  }
  if(badge){badge.textContent=isScanning?"⟳ SCANNING":"● LIVE";badge.style.color=isScanning?"#ffcc00":"#00ccff";}
}

function updateInfoBar(){
  var el=document.getElementById("infoBar");
  var lbl=universe==="SP500"?"S&P 500 TOP 80":universe==="DOW30"?"DOW 30":"RUSSELL 2K";
  var vis=results.filter(function(r){return completed.indexOf(r.t)===-1;});
  el.textContent=lbl+" · "+vis.length+" GET ON SETUPS · "+new Date().toLocaleTimeString();
}

function certColor(v){var n=parseFloat(v);return n>=70?"#00ff88":n>=50?"#ffcc00":"#ff8844";}
function modeColor(m){return m===4?"#00ff88":m===3?"#88ffcc":m===2?"#ffcc00":"#ff8844";}
function volColor(v){var n=parseFloat(v);return n>=1.5?"#00ff88":n>=1.1?"#ffcc00":"#fff";}

function renderResults(){
  var el=document.getElementById("results");
  var vis=results.filter(function(r){return completed.indexOf(r.t)===-1;});
  updateInfoBar();

  if(vis.length===0&&!isScanning){
    el.innerHTML='<div class="empty">NO GET ON SETUPS<br>Market in Wait or Reversal mode.<br>Hit REFRESH to rescan.</div>';
    return;
  }

  var html="";
  vis.forEach(function(item,idx){
    var isLong=item.direction==="LONG";
    var dc=isLong?"#00ff88":"#ff4466";
    var db=isLong?"rgba(0,255,136,0.15)":"rgba(255,68,102,0.15)";
    var chgC=parseFloat(item.changePct)>=0?"#00ff88":"#ff4466";
    var chgS=parseFloat(item.changePct)>=0?"+":"";
    var mc=modeColor(item.mode);

    html+='<div class="card" style="border-left:5px solid '+dc+'">'
      +'<div style="margin-bottom:8px">'
        +'<span class="badge" style="background:#1a0a35;border:1px solid #aa66ff;color:#dd99ff">◈ INSTITUTION ENTRY</span>'
        +'<span class="badge" style="background:#001a0a;border:1px solid #00aa44;color:#00ff88">⚡ MMG V9.8C</span>'
        +(item.bullRunway?'<span class="badge" style="background:rgba(0,255,136,0.15);border:1px solid #00ff88;color:#00ff88">🚀 RUNWAY N</span>':"")
        +(item.bearRunway?'<span class="badge" style="background:rgba(255,68,102,0.15);border:1px solid #ff4466;color:#ff4466">🚀 RUNWAY S</span>':"")
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
        +'<div style="width:28px;height:28px;background:#1a1a3a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#ccccee;font-weight:bold;flex-shrink:0">'+(idx+1)+'</div>'
        +'<div><div style="font-size:22px;font-weight:bold;color:#fff;letter-spacing:1px">'+item.t+'</div><div style="font-size:11px;color:#bbbbdd">'+item.n+'</div></div>'
        +'<div style="margin-left:auto;border:2px solid '+dc+';border-radius:6px;padding:5px 14px;font-size:14px;font-weight:bold;color:'+dc+';letter-spacing:2px;background:'+db+';flex-shrink:0">'+item.direction+'</div>'
      +'</div>'
      +'<div class="train-box" style="border-color:'+mc+'">'
        +'<div><div style="font-size:9px;color:#bbbbdd;margin-bottom:3px">TRAIN MODE</div><div style="font-size:14px;font-weight:bold;color:'+mc+'">'+item.modeText+'</div></div>'
        +'<div style="text-align:right"><div style="font-size:9px;color:#bbbbdd;margin-bottom:3px">ACTION</div><div style="font-size:16px;font-weight:bold;color:#00ff88">GET ON 🚂</div></div>'
      +'</div>'
      +'<div class="metric-row">'
        +'<div class="metric-box"><div style="font-size:9px;color:#ccccdd;margin-bottom:4px">ENTRY</div><div style="font-size:14px;font-weight:bold;color:#fff">$'+item.price+'</div></div>'
        +'<div class="metric-box"><div style="font-size:9px;color:#ccccdd;margin-bottom:4px">STATION</div><div style="font-size:14px;font-weight:bold;color:'+dc+'">'+(item.station?"$"+item.station:"—")+'</div></div>'
        +'<div class="metric-box"><div style="font-size:9px;color:#ccccdd;margin-bottom:4px">STOP 1</div><div style="font-size:14px;font-weight:bold;color:#ffcc88">'+(item.stop1?"$"+item.stop1:"—")+'</div></div>'
      +'</div>'
      +'<div class="sub-row">'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">CERTAINTY</div><div style="font-size:11px;font-weight:bold;color:'+certColor(item.certainty)+'">'+item.certainty+'%</div></div>'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">ENG TEMP</div><div style="font-size:11px;font-weight:bold;color:#ffcc88">'+item.engTemp+'%</div></div>'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">ARRIVE</div><div style="font-size:11px;font-weight:bold;color:#88ddff">'+(item.arriveToday?item.arriveToday+"%":"—")+'</div></div>'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">DIR SCORE</div><div style="font-size:11px;font-weight:bold;color:'+(parseFloat(item.dirScore)>0?"#00ff88":"#ff4466")+'">'+item.dirScore+'</div></div>'
      +'</div>'
      +'<div class="sub-row">'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">VWAP</div><div style="font-size:11px;font-weight:bold;color:#88ddff">$'+item.vwap+'</div></div>'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">EMA21</div><div style="font-size:11px;font-weight:bold;color:#ffcc88">$'+item.ema+'</div></div>'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">REL VOL</div><div style="font-size:11px;font-weight:bold;color:'+volColor(item.relVol)+'">'+item.relVol+'x</div></div>'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">DAY CHG</div><div style="font-size:11px;font-weight:bold;color:'+chgC+'">'+chgS+item.changePct+'%</div></div>'
      +'</div>'
      +'<div class="sub-row">'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">PRESSURE</div><div style="font-size:11px;font-weight:bold;color:#cc88ff">'+item.pressureScore+'</div></div>'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">GRAVITY</div><div style="font-size:11px;font-weight:bold;color:#88ccff">'+item.gravityScore+'</div></div>'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">VOTE</div><div style="font-size:11px;font-weight:bold;color:#ffcc88">'+item.voteScore+'</div></div>'
        +'<div class="sub-box"><div style="font-size:7px;color:#ccccdd;margin-bottom:3px">CLUSTERS</div><div style="font-size:11px;font-weight:bold;color:#aaaacc">'+item.clusters+'</div></div>'
      +'</div>'
      +'<button class="btn-mark" onclick="markTraded(\''+item.t+'\')">✓ MARK TRADED — REMOVE</button>'
    +'</div>';
  });
  el.innerHTML=html;
}

setInterval(function(){
  var el=document.getElementById("clockEl");
  if(el)el.textContent=new Date().toLocaleTimeString();
