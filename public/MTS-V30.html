  const vals = Object.values(answers);
  if (vals.length === 0) return { score: 0, tier: "conservative" };
  const total = vals.reduce((a, b) => a + b, 0);
  const avg = total / vals.length;
  let tier;

function computeOptionsStats(ledger, classKey) {
  const now = Date.now();
  const WEEK_MS = 7 * 24 * 60 * 60 * 1000;
  const MONTH_MS = 30 * 24 * 60 * 60 * 1000;
  const positions = classKey ? ledger.filter(p => p.optClass === classKey) : ledger;
  const open = positions.filter(p => p.status === "open");
  const closed = positions.filter(p => p.status === "closed");
  const weekPnL = closed.filter(p => p.closeDate && (now - p.closeDate) < WEEK_MS).reduce((s, p) => s + (p.realizedPnL || 0), 0);
  const monthPnL = closed.filter(p => p.closeDate && (now - p.closeDate) < MONTH_MS).reduce((s, p) => s + (p.realizedPnL || 0), 0);
  const winners = closed.filter(p => (p.realizedPnL || 0) > 0).length;
  const losers = closed.length - winners;
  const winRate = closed.length > 0 ? winners / closed.length : 0;
  return { open, closed, weekPnL, monthPnL, unrealized: 0, winners, losers, winRate };
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const target = new Date(dateStr + "T16:00:00-04:00").getTime();
  return Math.ceil((target - Date.now()) / 86400000);
}
function expiryLabel(dateStr) {
  const d = daysUntil(dateStr);

  if (d < 0) return "expired";
  if (d === 0) return "exp TODAY";
  if (d === 1) return "exp 1d";
  return "exp " + d + "d";
}

function PaperAccountCard({ sessions }) {

            <div className="text-right">
              <div className="font-mono text-sm">{row.price != null ? "$"+row.price.toFixed(2) : "—"}</div>
              {row.change != null && <div className="text-xs font-mono" style={{color:row.change>=0?C.long:C.short}}>{row.change>=0?"+":""}{row.change.toFixed(2)}</div>}
            </div>
            <div className="text-center min-w-[54px]">
              <div className="text-xs font-mono font-bold px-2 py-1 rounded-lg" style={{background:toneColor(row.top.tone)+"22",color:toneColor(row.top.tone)}}>{row.top.code}</div>
              <div className="text-xs text-[var(--muted)]">{row.top.score||0}</div>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}
function Active({ sessions, livePricesMap, onSelectTicker, onAddTrade }) {
  const activeSessions = sessions.filter(s => s.status==="active");
  if (activeSessions.length === 0) {
    return (
      <div className="flex-1 flex flex-col items-center justify-center text-center p-8">
        <BarChart2 size={32} style={{color:C.muted,marginBottom:12}} />
        <div className="text-sm text-[var(--muted)]">No active sessions</div>
        <div className="text-xs text-[var(--muted)] mt-1">Create a session in Paper Ledger</div>
      </div>
    );
  }
  return (
    <div className="flex-1 overflow-y-auto px-4 py-4 pb-28 space-y-4">
      <div className="font-bold text-base">Active Sessions</div>
      {activeSessions.map(session => {
        const data = livePricesMap[session.ticker] || {};
        const currentPrice = data.price ?? null;
        const atr = data.atr ?? null;
        const mmgState = data.mmgState ?? "—";
        const campaign = data.campaign ?? "—";
        const direction = data.direction ?? "neutral";
        const rvol = data.rvol ?? 1;
        const lastTrade = [...(session.trades||[])].reverse().find(t => !t.exitPrice);
        const position = lastTrade ? { side: lastTrade.side, entryPrice: lastTrade.entryPrice, size: lastTrade.size||1, addFired: false, tpFired: false } : null;
        const scores = computeScores({ mmgState, campaign, direction, rvol, position, atrDistance: 0.3, atr: atr||1, currentPrice: currentPrice||0 });
        const top = topAction(scores);
        return (
          <div key={session.id} className="rounded-2xl border border-[var(--border)] overflow-hidden" style={{background:"var(--surface-1)"}}>
            <div className="flex items-center justify-between p-4 cursor-pointer" onClick={()=>onSelectTicker(session.ticker)}>
              <div className="flex items-center gap-3">
                <div className="font-bold text-lg">{session.ticker}</div>
                <div className="text-xs px-2 py-0.5 rounded" style={{background:toneColor(top.tone)+"22",color:toneColor(top.tone)}}>{top.code}</div>
              </div>
              <div className="text-right">
                <div className="font-mono text-lg">{currentPrice ? "$"+currentPrice.toFixed(2) : "—"}</div>
                <div className="text-xs text-[var(--muted)]">RVOL {rvol.toFixed(1)}x</div>
              </div>
            </div>
            <div className="px-4 pb-3 flex gap-2 overflow-x-auto scrollbar-none">
              <ActionCell code="B2O" score={scores.b2o||0} tone="long" locked={scores.b2o==null} lockMsg="in position" />
              <ActionCell code="S2O" score={scores.s2o||0} tone="short" locked={scores.s2o==null} lockMsg="in position" />
              <ActionCell code="ADD" score={scores.add||0} tone="add" locked={scores.add==null} lockMsg={addLockReason(position,scores.campaignProgress)} />
              <ActionCell code="TP" score={scores.tp||0} tone="tp" locked={scores.tp==null} lockMsg={tpLockReason(position,scores.campaignProgress)} />
              <ActionCell code="S2C" score={scores.s2c||0} tone="close" locked={scores.s2c==null} lockMsg="no long" />
              <ActionCell code="B2C" score={scores.b2c||0} tone="close" locked={scores.b2c==null} lockMsg="no short" />
            </div>
          </div>
        );
      })}
    </div>
  );
}
function LoginPage({ onStart }) {
  const [key, setKey] = React.useState("");
  return (
    <div className="flex-1 flex flex-col items-center justify-center p-8 text-center">
      <div className="mb-8">
        <div className="text-3xl font-black tracking-tight mb-2">MTS</div>
        <div className="text-xs text-[var(--muted)]">v.30 · Options Class Manager</div>
      </div>
      <div className="w-full max-w-xs space-y-4">
        <div>
          <div className="text-xs text-[var(--muted)] mb-2">Massive API Key (optional)</div>
          <input className="w-full bg-[var(--surface-1)] border border-[var(--border)] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-[var(--accent)]" placeholder="Leave blank to use mock data" value={key} onChange={e=>setKey(e.target.value)} />
        </div>
        <button onClick={()=>onStart(key.trim())} className="w-full py-3 rounded-xl font-bold text-white text-sm" style={{background:C.accent}}>Launch MTS</button>
      </div>
    </div>
  );
}
function BottomTabBar({ view, setView, activeCount }) {
  const tabs = [
    { key:"scan",    label:"Scan",    icon:<Zap size={18}/> },
    { key:"active",  label:"Active",  icon:<Activity size={18}/>, badge:activeCount },
    { key:"watch",   label:"Watch",   icon:<Eye size={18}/> },
    { key:"options", label:"Options", icon:<BarChart2 size={18}/> },
    { key:"library", label:"Library", icon:<BookOpen size={18}/> },
    { key:"account", label:"Account", icon:<User size={18}/> },
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 z-40 border-t border-[var(--border)]" style={{background:"var(--surface-1)"}}>
      <div className="grid grid-cols-6 max-w-lg mx-auto">
        {tabs.map(t => {
          const active = view === t.key;
          return (
            <button key={t.key} onClick={()=>setView(t.key)} className="flex flex-col items-center justify-center py-2 relative" style={{color:active?C.accent:C.muted}}>
              {t.badge > 0 && <div className="absolute top-1 right-2 w-4 h-4 rounded-full text-xs flex items-center justify-center font-bold text-white" style={{background:C.long,fontSize:"9px"}}>{t.badge}</div>}
              {t.icon}
              <span className="text-xs mt-0.5" style={{fontSize:"10px"}}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}
function MTSApp() {
  // ── Core state ─────────────────────────────────────────────────────────────
  const [launched, setLaunched] = React.useState(() => !!loadJSON(STORAGE.POLYGON_KEY, null) || loadJSON("mts-v30-launched", false));
  const [view, setView] = React.useState("scan");
  const [polygonKey, setPolygonKeyState] = React.useState(() => loadJSON(STORAGE.POLYGON_KEY, ""));
  const [riskProfile, setRiskProfile] = React.useState(() => loadJSON(STORAGE.RISK_PROFILE, null));
  const [takingRisk, setTakingRisk] = React.useState(false);
  const [sessions, setSessions] = React.useState(() => loadJSON(STORAGE.SESSIONS, []));
  const [watchlist, setWatchlist] = React.useState(() => loadJSON(STORAGE.WATCHLIST, ["SPY","QQQ","AAPL","NVDA","TSLA"]));
  const [livePricesMap, setLivePricesMap] = React.useState({});
  const [lastFetch, setLastFetch] = React.useState(null);
  const [fetchLoading, setFetchLoading] = React.useState(false);
  const [fetchError, setFetchError] = React.useState(null);
  const [scanState, setScanState] = React.useState("idle");
  const [scannedTickers, setScannedTickers] = React.useState([]);
  const [selectedTicker, setSelectedTicker] = React.useState(null);
  const [selectedBars, setSelectedBars] = React.useState(null);
  const [selectedEngineState, setSelectedEngineState] = React.useState(null);
  const [selectedBBCycle, setSelectedBBCycle] = React.useState(null);
  const [selectedGates, setSelectedGates] = React.useState(null);
  // ── V30 Options state ──────────────────────────────────────────────────────
  const [optionsLedger, setOptionsLedger] = React.useState(() => loadJSON(STORAGE_OPTIONS.LEDGER, []));
  const [optionsTargets, setOptionsTargets] = React.useState(() => loadJSON(STORAGE_OPTIONS.TARGETS, DEFAULT_OPTIONS_TARGETS));
  const [optionsOverlay, setOptionsOverlay] = React.useState(null); // null | "add" | "close" | "targets" | "delete"
  const [addingOptClass, setAddingOptClass] = React.useState(null);
  const [closingOptPos, setClosingOptPos] = React.useState(null);
  // ── Persistence ────────────────────────────────────────────────────────────
  React.useEffect(() => { saveJSON(STORAGE.SESSIONS, sessions); }, [sessions]);
  React.useEffect(() => { saveJSON(STORAGE.WATCHLIST, watchlist); }, [watchlist]);
  React.useEffect(() => { if (riskProfile) saveJSON(STORAGE.RISK_PROFILE, riskProfile); }, [riskProfile]);
  React.useEffect(() => { if (polygonKey) saveJSON(STORAGE.POLYGON_KEY, polygonKey); }, [polygonKey]);
  React.useEffect(() => { saveJSON(STORAGE_OPTIONS.LEDGER, optionsLedger); }, [optionsLedger]);
  React.useEffect(() => { saveJSON(STORAGE_OPTIONS.TARGETS, optionsTargets); }, [optionsTargets]);
  // ── Options handlers ───────────────────────────────────────────────────────
  function handleAddOptPosition(pos) {
    setOptionsLedger(l => [...l, pos]);
    setOptionsOverlay(null);
    setAddingOptClass(null);
  }
  function handleCloseOptPosition(id, exitPremium, pnl) {
    setOptionsLedger(l => l.map(p => p.id === id ? { ...p, status:"closed", exitPremium, realizedPnL: pnl, closeDate: Date.now() } : p));
    setOptionsOverlay(null);
    setClosingOptPos(null);
  }
  function handleDeleteOptPosition(id) {
    setOptionsLedger(l => l.filter(p => p.id !== id));
    setOptionsOverlay(null);
    setClosingOptPos(null);
  }
  function handleSaveTargets(newTargets) {
    setOptionsTargets(newTargets);
    setOptionsOverlay(null);
  }
  // ── Paper ledger handlers ──────────────────────────────────────────────────
  function createSession(s) { setSessions(prev => [s, ...prev]); }
  function addTrade(sessionId, trade) {
    setSessions(prev => prev.map(s => s.id===sessionId ? {...s, trades:[...s.trades||[], trade]} : s));
  }
  function closeSession(sessionId) {
    setSessions(prev => prev.map(s => s.id===sessionId ? {...s,status:"closed"} : s));
  }
  function deleteSession(sessionId) {
    setSessions(prev => prev.filter(s => s.id!==sessionId));
  }
  // ── Watchlist handlers ─────────────────────────────────────────────────────
  function addWatch(sym) { setWatchlist(prev => [...new Set([...prev, sym])]); }
  function removeWatch(sym) { setWatchlist(prev => prev.filter(s => s!==sym)); }
  // ── Ticker selection / engine ──────────────────────────────────────────────
  async function selectTicker(sym) {
    setSelectedTicker(sym);
    setView("scan");
    if (!polygonKey) {
      const mock = generateMockTicker(sym);
      setLivePricesMap(m => ({...m,[sym]:mock}));
      return;
    }
    try {
      const bars = await fetchDailyBars(sym, polygonKey, 120);
      if (bars && bars.length > 20) {
        setSelectedBars(bars);
        const bbC = computeBBCycle(bars);
        const gts = computeMMGGates(bars, bbC);
        const eng = computeMMGEngineState(bars);
        setSelectedBBCycle(bbC);
        setSelectedGates(gts);
        setSelectedEngineState(eng);
        if (eng) {
          const lastSig = eng.lastSignal||"None";
          const dir = eng.activeTrainDir;
          setLivePricesMap(m => ({...m,[sym]:{...m[sym],mmgState:lastSig,direction:dir===1?"long":dir===-1?"short":"neutral",campaign:"Rolling",rvol:1.2}}));
        }
      }
    } catch(e) { console.warn("selectTicker bars:", e); }
  }
  // ── Scan ───────────────────────────────────────────────────────────────────
  async function runScan() {
    setScanState("scanning");
    const universe = [...new Set([...OPTIONABLE_LIQUID.slice(0,40), ...watchlist])];
    if (!polygonKey) {
      const mock = {}; universe.forEach(sym => { mock[sym] = generateMockTicker(sym); });
      setLivePricesMap(m => ({...m,...mock}));
      setScannedTickers(universe);
      setScanState("done");
      return;
    }
    try {
      const snaps = await fetchSnapshot(universe, polygonKey);
      const updates = {};
      snaps.forEach(s => {
        const sym = s.ticker;
        updates[sym] = { sym, price: s.day?.c ?? s.lastTrade?.p ?? null, change: s.todaysChangePerc != null ? s.day?.c - s.prevDay?.c : null, changePct: s.todaysChangePerc ?? null, rvol: s.day?.v && s.prevDay?.v ? s.day.v / (s.prevDay.v||1) : 1, atr: s.day?.c ? s.day.c * 0.02 : 1, mmgState: "Scanning", campaign: "—", direction: "neutral" };
      });
      setLivePricesMap(m => ({...m,...updates}));
      setScannedTickers(Object.keys(updates));
    } catch(e) { setFetchError(e.message); }
    setScanState("done");
  }
  // ── Heartbeat price refresh ────────────────────────────────────────────────
  async function refreshHeartbeat() {
    if (!polygonKey) return;
    const syms = Object.values(HEARTBEAT_LIVE).map(s=>s.sym);
    try {
      const snaps = await fetchSnapshot(syms, polygonKey);
      const updates = {};
      snaps.forEach(s => { updates[s.ticker] = { price: s.day?.c ?? s.lastTrade?.p ?? null, change: s.todaysChangePerc != null ? s.day?.c - s.prevDay?.c : null, changePct: s.todaysChangePerc ?? null }; });
      setLivePricesMap(m => ({...m,...updates}));
      setLastFetch(Date.now());
    } catch(e) {}
  }
  React.useEffect(() => { if (launched && polygonKey) { refreshHeartbeat(); const id = setInterval(refreshHeartbeat, 60000); return () => clearInterval(id); } }, [launched, polygonKey]);
  // ── Reset ──────────────────────────────────────────────────────────────────
  function handleReset() {
    Object.values(STORAGE).forEach(k => localStorage.removeItem(k));
    Object.values(STORAGE_OPTIONS).forEach(k => localStorage.removeItem(k));
    localStorage.removeItem("mts-v30-launched");
    window.location.reload();
  }
  // ── Risk ───────────────────────────────────────────────────────────────────
  function handleRiskComplete(profile) { setRiskProfile(profile); setTakingRisk(false); }
  // ── Launch ─────────────────────────────────────────────────────────────────
  function handleStart(key) {
    if (key) { setPolygonKeyState(key); saveJSON(STORAGE.POLYGON_KEY, key); }
    saveJSON("mts-v30-launched", true);
    setLaunched(true);
    if (!riskProfile) setTakingRisk(true);
  }
  const activeSessions = sessions.filter(s => s.status==="active");
  if (!launched) return <LoginPage onStart={handleStart} />;
  if (takingRisk) return (
    <div className="flex-1 flex flex-col">
      <div className="px-4 py-3 flex items-center justify-between border-b border-[var(--border)]">
        <div className="font-semibold text-sm">Risk Assessment</div>
        <button onClick={()=>setTakingRisk(false)} className="text-xs text-[var(--muted)]">Skip</button>
      </div>
      <RiskAssessmentWizard onComplete={handleRiskComplete} />
    </div>
  );
  function renderView() {
    if (view === "options") {
      return <OptionsTab ledger={optionsLedger} targets={optionsTargets} setOverlay={setOptionsOverlay} setAddingOptClass={setAddingOptClass} setClosingOptPos={setClosingOptPos} />;
    }
    if (view === "account") return <AccountSummary riskProfile={riskProfile} sessions={sessions} polygonKey={polygonKey} onSaveKey={k=>{setPolygonKeyState(k);saveJSON(STORAGE.POLYGON_KEY,k);}} onRetakeRisk={()=>setTakingRisk(true)} onReset={handleReset} />;
    if (view === "library") return <Library />;
    if (view === "watch") return <WatchlistView watchlist={watchlist} livePricesMap={livePricesMap} onRemove={removeWatch} onAdd={addWatch} />;
    if (view === "active") return <Active sessions={sessions} livePricesMap={livePricesMap} onSelectTicker={selectTicker} onAddTrade={addTrade} />;
    if (view === "ledger") return <PaperLedger sessions={sessions} onCreateSession={createSession} onAddTrade={addTrade} onCloseSession={closeSession} onDeleteSession={deleteSession} />;
    // scan + deck
    if (selectedTicker && view === "scan") {
      return (
        <div className="flex-1 flex flex-col min-h-0">
          <div className="px-4 py-3 flex items-center justify-between border-b border-[var(--border)]">
            <button onClick={()=>setSelectedTicker(null)} className="flex items-center gap-1 text-xs text-[var(--muted)]"><ChevronDown size={12} style={{transform:"rotate(90deg)"}} />Back</button>
            <div className="font-semibold text-sm">{selectedTicker}</div>
            <div className="w-12" />
          </div>
          <Deck ticker={selectedTicker} bars={selectedBars} engineState={selectedEngineState} bbCycle={selectedBBCycle} gates={selectedGates} livePricesMap={livePricesMap} riskProfile={riskProfile} />
        </div>
      );
    }
    return (
      <div className="flex-1 flex flex-col min-h-0">
        <div className="px-4 py-2 border-b border-[var(--border)]">
          <MarketHeartbeat livePricesMap={livePricesMap} />
        </div>
        <Scanner tickers={scannedTickers} livePricesMap={livePricesMap} scanState={scanState} onScan={runScan} onSelectTicker={selectTicker} riskProfile={riskProfile} />
      </div>
    );
  }
  return (
    <div className="flex flex-col h-screen">
      {renderView()}
      <BottomTabBar view={view} setView={v=>{setView(v);if(v!=="scan")setSelectedTicker(null);}} activeCount={activeSessions.length} />
      {optionsOverlay === "add" && addingOptClass && (
        <AddOptionsPositionModal optClass={addingOptClass} onAdd={handleAddOptPosition} onClose={()=>{setOptionsOverlay(null);setAddingOptClass(null);}} />
      )}
      {optionsOverlay === "close" && closingOptPos && !closingOptPos._delete && (
        <CloseOptionsPositionModal position={closingOptPos} onClose={()=>{setOptionsOverlay(null);setClosingOptPos(null);}} onConfirm={handleCloseOptPosition} />
      )}
      {optionsOverlay === "delete" && closingOptPos && closingOptPos._delete && (
        <ConfirmModal message={"Delete this position? This cannot be undone."} onConfirm={()=>handleDeleteOptPosition(closingOptPos.id)} onCancel={()=>{setOptionsOverlay(null);setClosingOptPos(null);}} />
      )}
      {optionsOverlay === "targets" && (
        <EditTargetsModal targets={optionsTargets} onSave={handleSaveTargets} onClose={()=>setOptionsOverlay(null)} />
      )}
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MTSApp />);
</script>
</body>
</html>
