// Detect ORB break/pullback/rejection pattern on 5m bars
// State machine: looking → broken → pullback → rejected → entry_armed
function detectORBPattern(bars5m, orb, direction /* "call" or "put" */) {
  if (!bars5m || bars5m.length < 4 || !orb) return null;
  const buffer = 0.002;  // 0.2% buffer for pullback proximity
  const N = bars5m.length;
  // Find most recent break + pullback + rejection
  // Walk backwards: find latest pullback rejection candidate, then verify break came before it
  // Simpler: scan forward looking for the pattern in last 24 bars (2 hours)
  const lookback = Math.min(24, N);
  let breakIdx = -1;
  for (let i = N - lookback; i < N; i++) {
    if (direction === "call" && bars5m[i].c > orb.high) { breakIdx = i; break; }
    if (direction === "put"  && bars5m[i].c < orb.low)  { breakIdx = i; break; }
  }
  if (breakIdx < 0 || breakIdx >= N - 2) return null;  // need bars after break for pullback
  // Look for pullback after break
  for (let j = breakIdx + 1; j < N; j++) {
    const b = bars5m[j];
    if (direction === "call") {
      // Pullback: bar touches ORB high zone
      const touched = b.l <= orb.high * (1 + buffer) && b.l >= orb.high * (1 - buffer);
      if (!touched) continue;
      // Rejection on this or next bar: close back above ORB high
      for (let k = j; k < Math.min(N, j + 3); k++) {
        if (bars5m[k].c > orb.high) {
          // Check the trigger bar is recent (within last 3 bars)
          if (k >= N - 3) {
            return { armed: true, breakIdx, pullbackIdx: j, triggerIdx: k, ageBars: N - 1 - k };
          }
        }
      }
    } else {  // put
      const touched = b.h >= orb.low * (1 - buffer) && b.h <= orb.low * (1 + buffer);
      if (!touched) continue;
      for (let k = j; k < Math.min(N, j + 3); k++) {
        if (bars5m[k].c < orb.low) {
          if (k >= N - 3) {
            return { armed: true, breakIdx, pullbackIdx: j, triggerIdx: k, ageBars: N - 1 - k };
          }
        }
      }
    }
  }
  return null;
}

// Multi-timeframe gate for OCM: 5m exec (already at trigger), 15m validation, 1H confirmation, Daily HTF
function computeOCMGate(bars5m, bars1h, barsD, smaPeriod, direction) {
  if (!bars5m || bars5m.length < 22) return { ok: false, reason: "no 5m" };
  if (!bars1h || bars1h.length < 22) return { ok: false, reason: "no 1H" };
  if (!barsD || barsD.length < smaPeriod + 1) return { ok: false, reason: "no daily" };

  // 1H EMA13 confirmation
  const closes1h = bars1h.map(b => b.c);
  const k = 2 / 14;
  let ema13_1h = closes1h.slice(0, 13).reduce((s, c) => s + c, 0) / 13;
  for (let i = 13; i < closes1h.length; i++) ema13_1h = closes1h[i] * k + ema13_1h * (1 - k);
  const last1H = closes1h[closes1h.length - 1];
  const hBull = last1H > ema13_1h;

  // Daily SMA tier
  const closesD = barsD.map(b => b.c);
  const smaD = closesD.slice(-smaPeriod).reduce((s, c) => s + c, 0) / smaPeriod;
  const lastD = closesD[closesD.length - 1];
  const dBull = lastD > smaD;

  // 15m validation: derive 15m bars from 5m (3:1 aggregation, last 7 bars)
  const closes5m = bars5m.map(b => b.c);
  let ema13_5m = closes5m.slice(0, 13).reduce((s, c) => s + c, 0) / 13;
  for (let i = 13; i < closes5m.length; i++) ema13_5m = closes5m[i] * k + ema13_5m * (1 - k);
  const last5 = closes5m[closes5m.length - 1];
  const valid = direction === "call" ? last5 > ema13_5m : last5 < ema13_5m;

  let ok;
  if (direction === "call") ok = hBull && dBull && valid;
  else ok = !hBull && !dBull && valid;
  return { ok, hBull, dBull, valid, ema13_1h, smaD, smaPeriod, ema13_5m };
}

// VWAP/EMA13/BB/SAR for in-trade monitoring (compact: just current value vs price)
function computeOCMIndicators(bars5m) {
  if (!bars5m || bars5m.length < 30) return null;
  const closes = bars5m.map(b => b.c);
  const highs = bars5m.map(b => b.h);
  const lows = bars5m.map(b => b.l);
  const vols = bars5m.map(b => b.v);
  // EMA13
  const k13 = 2 / 14;
  let ema13 = closes.slice(0, 13).reduce((s, c) => s + c, 0) / 13;
  for (let i = 13; i < closes.length; i++) ema13 = closes[i] * k13 + ema13 * (1 - k13);
  // EMA21 (for reversal stack)
  const k21 = 2 / 22;
  let ema21 = closes.slice(0, 21).reduce((s, c) => s + c, 0) / 21;
  for (let i = 21; i < closes.length; i++) ema21 = closes[i] * k21 + ema21 * (1 - k21);
  // VWAP (cumulative over session — approximated over last 78 bars = ~6.5h)
  const N = Math.min(bars5m.length, 78);
  let pv = 0, vv = 0;
  for (let i = bars5m.length - N; i < bars5m.length; i++) {
    const tp = (bars5m[i].h + bars5m[i].l + bars5m[i].c) / 3;
    pv += tp * bars5m[i].v;
    vv += bars5m[i].v;
  }
  const vwap = vv > 0 ? pv / vv : closes[closes.length - 1];
  // BB(20, 2) on 5m
  const bbN = Math.min(20, closes.length);
  const recent = closes.slice(-bbN);
  const bbMean = recent.reduce((s, c) => s + c, 0) / bbN;
  const bbVar = recent.reduce((s, c) => s + (c - bbMean) * (c - bbMean), 0) / bbN;
  const bbStd = Math.sqrt(bbVar);
  const bbUpper = bbMean + 2 * bbStd;
  const bbLower = bbMean - 2 * bbStd;
  // SAR (simple approximation: trend direction based on close vs prior 5-bar swing)
  const last5Highs = highs.slice(-5);
  const last5Lows = lows.slice(-5);
  const sarBull = closes[closes.length - 1] > Math.min(...last5Lows);
  return {
    close: closes[closes.length - 1],
    ema13, ema21, vwap,
    bbMid: bbMean, bbUpper, bbLower,
    sarBull,
  };
}

// Reversal stack scoring (6 signals, count those firing AGAINST position direction)
function computeReversalScore(ind5m, position, orb) {
  if (!ind5m) return { score: 0, max: 6, signals: {} };
  const isLong = position.dir === "call";
  const signals = {};
  // 1. SAR flip against
  signals.sar = isLong ? !ind5m.sarBull : ind5m.sarBull;
  // 2. VWAP flip against
  signals.vwap = isLong ? ind5m.close < ind5m.vwap : ind5m.close > ind5m.vwap;
  // 3. EMA13 cross against
  signals.ema13 = isLong ? ind5m.close < ind5m.ema13 : ind5m.close > ind5m.ema13;
  // 4. BB midline cross against
  signals.bbMid = isLong ? ind5m.close < ind5m.bbMid : ind5m.close > ind5m.bbMid;
  // 5. Doji at structural level (open/close within 10% of high/low range, near ORB extreme)
  signals.doji = false;  // simplified: requires last-bar OHLC inspection, computed at exit check
  // 6. Fib retracement touch (38.2/50/61.8 of ORB range from breakout direction)
  if (orb && orb.high && orb.low) {
    const range = orb.high - orb.low;
    const fib382 = isLong ? orb.high - range * 0.382 : orb.low + range * 0.382;
    const fib50  = isLong ? orb.high - range * 0.50  : orb.low + range * 0.50;
    const fib618 = isLong ? orb.high - range * 0.618 : orb.low + range * 0.618;
    const px = ind5m.close;
    const near = (lvl) => Math.abs(px - lvl) / lvl < 0.003;
    signals.fib = isLong
      ? (px < fib382 && (near(fib382) || near(fib50) || near(fib618)))
      : (px > fib382 && (near(fib382) || near(fib50) || near(fib618)));
  } else {
    signals.fib = false;
  }
  const score = Object.values(signals).filter(Boolean).length;
  return { score, max: 6, signals };
}

// Select OCM contract: ATM 0DTE for ETFs; Δ0.40-0.80 weekly for stocks, max-gamma min-theta
function selectOCMContract(chain, direction, underlying, ticker) {
  if (!chain || chain.length === 0) return null;
  const todayMs = Date.now();
  const isETF = OCM_ETF_SET.has(ticker);
  const wantType = direction === "call" ? "call" : "put";
  const filtered = chain.filter(o =>
    o.details && o.details.contract_type === wantType &&
    o.greeks && typeof o.greeks.delta === "number" &&
    o.day && typeof o.day.close === "number" && o.day.close > 0
  );
  if (filtered.length === 0) return null;
  // Group by expiration
  const byExp = {};
  for (const c of filtered) {
    const e = c.details.expiration_date;
    if (!byExp[e]) byExp[e] = [];
    byExp[e].push(c);
  }
  const exps = Object.keys(byExp).sort();
  let candidateExps = [];
  if (isETF) {
    // Prefer 0DTE (today) for ETFs
    const todayStr = new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());
    if (byExp[todayStr]) candidateExps = [todayStr];
    else {
      // Fallback: nearest expiration > today
      for (const e of exps) {
        const days = (new Date(e + "T16:00:00-04:00").getTime() - todayMs) / 86400000;
        if (days >= 0) { candidateExps = [e]; break; }
      }
    }
  } else {
    // Weekly: nearest expiration ~5-10 days out
    for (const e of exps) {
      const days = (new Date(e + "T16:00:00-04:00").getTime() - todayMs) / 86400000;
      if (days >= 2 && days <= 10) { candidateExps.push(e); break; }
    }
    if (candidateExps.length === 0) {
      // fallback nearest future
      for (const e of exps) {
        const days = (new Date(e + "T16:00:00-04:00").getTime() - todayMs) / 86400000;
        if (days >= 1) { candidateExps = [e]; break; }
      }
    }
  }
  if (candidateExps.length === 0) return null;
  const exp = candidateExps[0];
  const pool = byExp[exp];
  if (isETF) {
    // ATM: smallest |strike - underlying|
    let best = null, bestDiff = Infinity;
    for (const c of pool) {
      const d = Math.abs(c.details.strike_price - underlying);
      if (d < bestDiff) { bestDiff = d; best = c; }
    }
    return best ? formatOCMContract(best, exp) : null;
  }
  // Stocks: Δ in [0.40, 0.80], theta abs ≤ ½ delta, maximize gamma
  const deltaSign = direction === "call" ? 1 : -1;
  const inBand = pool.filter(c => {
    const d = Math.abs(c.greeks.delta);
    if (d < 0.40 || d > 0.80) return false;
    if (Math.sign(c.greeks.delta) !== deltaSign) return false;
    if (typeof c.greeks.theta === "number" && Math.abs(c.greeks.theta) > d * 0.5) return false;
    return true;
  });
  if (inBand.length === 0) return null;
  let best = null, bestGamma = -Infinity;
  for (const c of inBand) {
    const g = typeof c.greeks.gamma === "number" ? c.greeks.gamma : 0;
    if (g > bestGamma) { bestGamma = g; best = c; }
  }
  return best ? formatOCMContract(best, exp) : null;
}

function formatOCMContract(c, exp) {
  // Use last close as proxy for premium; ask/bid not always in snapshot
  const ask = (c.last_quote && c.last_quote.ask) || c.day.close;
  const bid = (c.last_quote && c.last_quote.bid) || c.day.close;
  return {
    contractTicker: c.details.ticker,
    expiration: exp,
    strike: c.details.strike_price,
    type: c.details.contract_type,
    delta: c.greeks.delta,
    gamma: c.greeks.gamma,
    theta: c.greeks.theta,
    vega: c.greeks.vega,
    iv: c.implied_volatility,
    premium: c.day.close,
    bid, ask,
    openInterest: c.open_interest || 0,
  };
}

// ============================================================================
// v.25 — Massive Options Chain + Covered Call Identifier (Delta ~0.25)
// ============================================================================
async function fetchOptionsChainSnapshot(underlying, apiKey) {
  const url = `https://api.massive.com/v3/snapshot/options/${underlying}?limit=250&apiKey=${apiKey}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) return null;
    const j = await resp.json();
    return j.results || [];
  } catch (e) {
    return null;
  }
}

function findDelta25Call(chain, targetDaysOut = 7) {
  if (!chain || chain.length === 0) return null;
  const todayMs = Date.now();
  // Filter to calls with delta and ask quote
  const calls = chain.filter(o =>
    o.details && o.details.contract_type === "call" &&
    o.greeks && typeof o.greeks.delta === "number" &&
    o.day && typeof o.day.close === "number"
  );
  if (calls.length === 0) return null;
  // Group by expiration
  const byExp = {};
  for (const c of calls) {
    const e = c.details.expiration_date;
    if (!byExp[e]) byExp[e] = [];
    byExp[e].push(c);
  }
  // Pick expiration closest to targetDaysOut
  let bestExp = null, bestDiff = Infinity;
  for (const e of Object.keys(byExp)) {
    const days = (new Date(e + "T16:00:00-04:00").getTime() - todayMs) / 86400000;
    if (days < 1) continue;
    const diff = Math.abs(days - targetDaysOut);
    if (diff < bestDiff) { bestDiff = diff; bestExp = e; }
  }
  if (!bestExp) return null;
  // Within that expiration, find call with delta closest to 0.25
  let best = null, bestDeltaDiff = Infinity;
  for (const c of byExp[bestExp]) {
    const dDiff = Math.abs(c.greeks.delta - 0.25);
    if (dDiff < bestDeltaDiff) { bestDeltaDiff = dDiff; best = c; }
  }
  if (!best) return null;
  return {
    expiration: bestExp,
    strike: best.details.strike_price,
    delta: best.greeks.delta,
    premium: best.day.close,
    impliedVol: best.implied_volatility,
    daysOut: Math.round(bestDiff < Infinity ? ((new Date(bestExp + "T16:00:00-04:00").getTime() - todayMs) / 86400000) : 7),
  };
}

// ============================================================================
// v.22c.1 — Full MMG Engine State Walker (Liquidity + Train + ADD/TP)
// Walks every bar maintaining campaign state. Returns latest bar's full state
// plus a signal history for v.22c.2 auto-execution loop.
// ============================================================================
function computeMMGEngineState(bars, opts) {
  opts = opts || {};
  const emaLen = opts.emaLen || 21;
  const bbLen = opts.bbLen || 20, bbMult = opts.bbMult || 2.0;
  const bbWidthLen = opts.bbWidthLen || 20;
  const bbExpansionRateMin = opts.bbExpansionRateMin || 5.0;
  const bbExpansionHoldBars = opts.bbExpansionHoldBars || 8;
  const rsiLen = opts.rsiLen || 14, momLen = opts.momLen || 10;
  const macdFast = opts.macdFast || 12, macdSlow = opts.macdSlow || 26, macdSignal = opts.macdSignal || 9;
  const sarStart = opts.sarStart || 0.02, sarInc = opts.sarInc || 0.02, sarMax = opts.sarMax || 0.20;
  const atrLen = opts.atrLen || 14;
  const liqPivotLen = opts.liqPivotLen || 5;
  const liqNearATR = opts.liqNearATR || 0.50;
  const tangledATR = opts.tangledATR || 0.18;
  const nearMidATR = opts.nearMidATR || 0.18;
  // 15m timeframe defaults
  const minBarsInTrade = opts.minBarsInTrade || 3;
  const dynMinBars = opts.dynMinBars || 5;
  const dynCooldownBars = opts.dynCooldownBars || 4;
  const addWindowCenter = opts.addWindowCenter || 0.50;
  const addWindowHalfWidth = opts.addWindowHalfWidth || 0.05;
  const tpWindowCenter = opts.tpWindowCenter || 0.75;
  const tpWindowHalfWidth = opts.tpWindowHalfWidth || 0.05;

  if (!bars || bars.length < Math.max(emaLen, macdSlow + macdSignal, bbLen + bbWidthLen) + 20) return null;
  const n = bars.length;
  const closes = bars.map(b => b.c);
  const highs = bars.map(b => b.h);
  const lows = bars.map(b => b.l);
  const opens = bars.map(b => b.o);

  // === Compute all series ===
  const emaSer = _emaSeries21(closes, emaLen);
  const vwapSer = _vwapSeriesSessionET(bars);
  const bbBasisSer = _bbBasisSeries(closes, bbLen);
  const sarSer = _sarSeries(bars, sarStart, sarMax);
  const rsiSer = _rsiSeries(closes, rsiLen);
  const rocSer = _rocSeries(closes, momLen);
  const macdHistSer = _macdHistSeries(closes, macdFast, macdSlow, macdSignal);
  const atrSer = _atrWilderSeries(bars, atrLen);

  // BB width series + BB cycle states per bar
  const bbWidthSer = new Array(n).fill(NaN);
  for (let i = bbLen - 1; i < n; i++) {
    const basis = bbBasisSer[i];
    if (isNaN(basis) || basis === 0) continue;
    let sq = 0;
    for (let j = i - bbLen + 1; j <= i; j++) sq += (closes[j] - basis) * (closes[j] - basis);
    const sd = Math.sqrt(sq / bbLen);
    bbWidthSer[i] = (2 * bbMult * sd) / basis;
  }
  const bbWidthAvgSer = new Array(n).fill(NaN);
  for (let i = bbLen + bbWidthLen - 2; i < n; i++) {
    let sum = 0, ok = true;
    for (let j = i - bbWidthLen + 1; j <= i; j++) {
      if (isNaN(bbWidthSer[j])) { ok = false; break; }
      sum += bbWidthSer[j];
    }
    if (ok) bbWidthAvgSer[i] = sum / bbWidthLen;
  }
  const bbSqueezingSer = new Array(n).fill(false);
  const bbTrueExpSer = new Array(n).fill(false);
  for (let i = 0; i < n; i++) {
    if (i >= 1 && !isNaN(bbWidthSer[i]) && !isNaN(bbWidthAvgSer[i]) && !isNaN(bbWidthSer[i-1])) {
      bbSqueezingSer[i] = bbWidthSer[i] < bbWidthAvgSer[i] && bbWidthSer[i] < bbWidthSer[i-1];
    }
    let compressionRecent = false;
    if (i >= bbWidthLen - 1) {
      let minW = Infinity, minA = Infinity, hasW = false, hasA = false;
      for (let j = i - bbWidthLen + 1; j <= i; j++) {
        if (!isNaN(bbWidthSer[j])) { hasW = true; if (bbWidthSer[j] < minW) minW = bbWidthSer[j]; }
        if (!isNaN(bbWidthAvgSer[j])) { hasA = true; if (bbWidthAvgSer[j] < minA) minA = bbWidthAvgSer[j]; }
      }
      compressionRecent = hasW && hasA && minW < minA;
    }
    let rising3 = false;
    if (i >= 2 && !isNaN(bbWidthSer[i]) && !isNaN(bbWidthSer[i-1]) && !isNaN(bbWidthSer[i-2])) {
      rising3 = bbWidthSer[i] > bbWidthSer[i-1] && bbWidthSer[i-1] > bbWidthSer[i-2];
    }
    let expRatePct = 0;
    if (i >= bbWidthLen && !isNaN(bbWidthSer[i - bbWidthLen]) && bbWidthSer[i - bbWidthLen] > 0) {
      expRatePct = ((bbWidthSer[i] - bbWidthSer[i - bbWidthLen]) / bbWidthSer[i - bbWidthLen]) * 100;
    }
    bbTrueExpSer[i] = compressionRecent && !isNaN(bbWidthAvgSer[i])
      && bbWidthSer[i] > bbWidthAvgSer[i] && rising3 && expRatePct >= bbExpansionRateMin;
  }
  // bbOpeningStart: bbTrueExpansion OR (barssince <= 3)
  const bbOpeningStartSer = new Array(n).fill(false);
  let bsTrueExp = null;
  for (let i = 0; i < n; i++) {
    if (bbTrueExpSer[i]) bsTrueExp = 0;
    else if (bsTrueExp !== null) bsTrueExp++;
    bbOpeningStartSer[i] = bbTrueExpSer[i] || (bsTrueExp !== null && bsTrueExp <= 3);
  }

  // === Liquidity zones via pivot highs/lows ===
  // pivothigh: bars[i-L].h is max of [i-2L, i]; same for low
  const liqHighSer = new Array(n).fill(NaN);
  const liqLowSer = new Array(n).fill(NaN);
  let curLiqHigh = NaN, curLiqLow = NaN;
  for (let i = 0; i < n; i++) {
    if (i >= 2 * liqPivotLen) {
      const center = i - liqPivotLen;
      let isHigh = true, isLow = true;
      for (let j = i - 2 * liqPivotLen; j <= i; j++) {
        if (j === center) continue;
        if (highs[j] >= highs[center]) isHigh = false;
        if (lows[j] <= lows[center]) isLow = false;
      }
      if (isHigh) curLiqHigh = highs[center];
      if (isLow) curLiqLow = lows[center];
    }
    liqHighSer[i] = curLiqHigh;
    liqLowSer[i] = curLiqLow;
  }

  // === Per-bar derived gates ===
  const closeAbvEMA = new Array(n).fill(false), closeBlwEMA = new Array(n).fill(false);
  const closeAbvVWAP = new Array(n).fill(false), closeBlwVWAP = new Array(n).fill(false);
  const closeAbvBB = new Array(n).fill(false), closeBlwBB = new Array(n).fill(false);
  const sarBullSer = new Array(n).fill(false), sarBearSer = new Array(n).fill(false);
  const sarFlipBullSer = new Array(n).fill(false), sarFlipBearSer = new Array(n).fill(false);
  const momScoreSer = new Array(n).fill(0);
  const longTurnSer = new Array(n).fill(false), shortTurnSer = new Array(n).fill(false);
  const liqBreakUpSer = new Array(n).fill(false), liqBreakDnSer = new Array(n).fill(false);
  const manipPhaseSer = new Array(n).fill(false);
  const longEntrySer = new Array(n).fill(false), shortEntrySer = new Array(n).fill(false);
  const largeBullSer = new Array(n).fill(false), largeBearSer = new Array(n).fill(false);
  const closeBlwEMA2 = new Array(n).fill(false), closeAbvEMA2 = new Array(n).fill(false);
  const closeBlwVWAP2 = new Array(n).fill(false), closeAbvVWAP2 = new Array(n).fill(false);
  const closeBlwBB2 = new Array(n).fill(false), closeAbvBB2 = new Array(n).fill(false);

  for (let i = 0; i < n; i++) {
    const c = closes[i], h = highs[i], l = lows[i], o = opens[i];
    const ema = emaSer[i], vwap = vwapSer[i], bb = bbBasisSer[i];
    const sar = sarSer[i], atr = atrSer[i];
    const rsi = rsiSer[i], roc = rocSer[i], mh = macdHistSer[i];
    if (isNaN(ema) || isNaN(vwap) || isNaN(bb) || isNaN(sar) || isNaN(atr)) continue;
    closeAbvEMA[i] = c > ema;  closeBlwEMA[i] = c < ema;
    closeAbvVWAP[i] = c > vwap; closeBlwVWAP[i] = c < vwap;
    closeAbvBB[i] = c > bb;    closeBlwBB[i] = c < bb;
    sarBullSer[i] = c > sar;   sarBearSer[i] = c < sar;
    if (i > 0 && !isNaN(sarSer[i-1])) {
      const prevBull = closes[i-1] > sarSer[i-1];
      const prevBear = closes[i-1] < sarSer[i-1];
      sarFlipBullSer[i] = sarBullSer[i] && !prevBull;
      sarFlipBearSer[i] = sarBearSer[i] && !prevBear;
    }
    // Momentum
    if (!isNaN(rsi) && !isNaN(roc) && !isNaN(mh)) {
      const mhPrev = i > 0 ? macdHistSer[i-1] : NaN;
      const momBull = rsi > 50 && roc > 0 && mh > 0;
      const momBear = rsi < 50 && roc < 0 && mh < 0;
      const momBullS = rsi > 60 && roc > 0 && !isNaN(mhPrev) && mh > mhPrev;
      const momBearS = rsi < 40 && roc < 0 && !isNaN(mhPrev) && mh < mhPrev;
      let s = 0;
      s += momBull ? 0.35 : momBear ? -0.35 : 0;
      s += momBullS ? 0.25 : momBearS ? -0.25 : 0;
      momScoreSer[i] = Math.max(-1, Math.min(1, s));
    }
    // 2-bar breaks (need prev bar's ema/vwap/bb)
    if (i > 0) {
      const cPrev = closes[i-1];
      closeBlwEMA2[i] = c < ema && cPrev < emaSer[i-1];
      closeAbvEMA2[i] = c > ema && cPrev > emaSer[i-1];
      closeBlwVWAP2[i] = c < vwap && cPrev < vwapSer[i-1];
      closeAbvVWAP2[i] = c > vwap && cPrev > vwapSer[i-1];
      closeBlwBB2[i] = c < bb && cPrev < bbBasisSer[i-1];
      closeAbvBB2[i] = c > bb && cPrev > bbBasisSer[i-1];
    }
    // Turn detection (crossovers)
    if (i > 0) {
      const cPrev = closes[i-1], emaPrev = emaSer[i-1], bbPrev = bbBasisSer[i-1];
      const xUpEMA = c > ema && cPrev <= emaPrev;
      const xDnEMA = c < ema && cPrev >= emaPrev;
      const xUpBB = c > bb && cPrev <= bbPrev;
      const xDnBB = c < bb && cPrev >= bbPrev;
      longTurnSer[i] = sarFlipBullSer[i] || (xUpEMA && c > bb) || (xUpBB && c > ema);
      shortTurnSer[i] = sarFlipBearSer[i] || (xDnEMA && c < bb) || (xDnBB && c < ema);
    }
    // Liquidity breaks
    const lh = liqHighSer[i], ll = liqLowSer[i];
    if (i > 0) {
      const cPrev = closes[i-1];
      if (!isNaN(lh)) liqBreakUpSer[i] = c > lh && cPrev <= lh;
      if (!isNaN(ll)) liqBreakDnSer[i] = c < ll && cPrev >= ll;
    }
    // Manipulation phase
    const tangled = Math.abs(ema - vwap) <= atr * tangledATR;
    const nearMid = Math.abs(c - bb) <= atr * nearMidATR;
    manipPhaseSer[i] = bbSqueezingSer[i] && tangled && nearMid;
    // Large candle
    const candleRange = h - l;
    const candleBody = Math.abs(c - o);
    largeBullSer[i] = candleRange > 0 && c > o && candleBody >= atr * 0.70 && c >= h - candleRange * 0.35;
    largeBearSer[i] = candleRange > 0 && c < o && candleBody >= atr * 0.70 && c <= l + candleRange * 0.35;
    // Entry triggers
    const cPrev = i > 0 ? closes[i-1] : c;
    longEntrySer[i] = !manipPhaseSer[i] && !bbSqueezingSer[i] && bbOpeningStartSer[i]
      && closeAbvEMA[i] && closeAbvVWAP[i] && closeAbvBB[i] && sarBullSer[i] && momScoreSer[i] > 0
      && (longTurnSer[i] || liqBreakUpSer[i] || (bbTrueExpSer[i] && c > cPrev));
    shortEntrySer[i] = !manipPhaseSer[i] && !bbSqueezingSer[i] && bbOpeningStartSer[i]
      && closeBlwEMA[i] && closeBlwVWAP[i] && closeBlwBB[i] && sarBearSer[i] && momScoreSer[i] < 0
      && (shortTurnSer[i] || liqBreakDnSer[i] || (bbTrueExpSer[i] && c < cPrev));
  }

  // === Train State Machine: walk every bar ===
  let activeTrainDir = 0;
  let entryBar = null, entryPrice = null, entryRisk = null;
  let lastCampaignExitBar = null;
  let addFired = false, tpFired = false;
  let lastAddBar = null, lastTPBar = null;
  let lastSignal = "None";
  const signalHistory = [];

  for (let i = 0; i < n; i++) {
    const c = closes[i], ema = emaSer[i], vwap = vwapSer[i], bb = bbBasisSer[i];
    const sarBull = sarBullSer[i], sarBear = sarBearSer[i];
    if (isNaN(ema) || isNaN(vwap) || isNaN(bb)) continue;
    const canExit = entryBar !== null && (i - entryBar) >= Math.max(minBarsInTrade, dynMinBars);
    const cooldownOK = lastCampaignExitBar === null || (i - lastCampaignExitBar) >= dynCooldownBars;
    const addCooldownOK = lastAddBar === null || (i - lastAddBar) >= dynCooldownBars;
    const tpCooldownOK = lastTPBar === null || (i - lastTPBar) >= dynCooldownBars;

    // Exit conditions
    const longStructureBroken = closeBlwEMA2[i] && closeBlwVWAP2[i] && closeBlwBB2[i] && sarBear;
    const shortStructureBroken = closeAbvEMA2[i] && closeAbvVWAP2[i] && closeAbvBB2[i] && sarBull;
    const longPanicBreak = largeBearSer[i] && c < ema && c < bb && c < vwap;
    const shortPanicBreak = largeBullSer[i] && c > ema && c > bb && c > vwap;
    const longExitPressure = activeTrainDir === 1 && canExit && (longStructureBroken || longPanicBreak);
    const shortExitPressure = activeTrainDir === -1 && canExit && (shortStructureBroken || shortPanicBreak);

    // Campaign progress
    const lh = liqHighSer[i], ll = liqLowSer[i];
    const campaignTarget = activeTrainDir === 1 ? lh : activeTrainDir === -1 ? ll : NaN;
    let campaignProgress = NaN;
    if (activeTrainDir === 1 && entryPrice !== null && !isNaN(campaignTarget) && campaignTarget > entryPrice) {
      campaignProgress = Math.max(0, Math.min(1.5, (c - entryPrice) / (campaignTarget - entryPrice)));
    } else if (activeTrainDir === -1 && entryPrice !== null && !isNaN(campaignTarget) && campaignTarget < entryPrice) {
      campaignProgress = Math.max(0, Math.min(1.5, (entryPrice - c) / (entryPrice - campaignTarget)));
    }
    const addLo = addWindowCenter - addWindowHalfWidth;
    const addHi = addWindowCenter + addWindowHalfWidth;
    const tpLo = tpWindowCenter - tpWindowHalfWidth;
    const tpHi = tpWindowCenter + tpWindowHalfWidth;
    const addInWindow = !isNaN(campaignProgress) && campaignProgress >= addLo && campaignProgress <= addHi;
    const tpInWindow = !isNaN(campaignProgress) && campaignProgress >= tpLo && campaignProgress <= tpHi;

    const longHealthy = activeTrainDir === 1 && c > bb && c > ema && c > vwap && sarBull;
    const shortHealthy = activeTrainDir === -1 && c < bb && c < ema && c < vwap && sarBear;
    const longAddSignal = longHealthy && !addFired && addCooldownOK && momScoreSer[i] >= 0 && addInWindow;
    const shortAddSignal = shortHealthy && !addFired && addCooldownOK && momScoreSer[i] <= 0 && addInWindow;
    const longTPSignal = activeTrainDir === 1 && !tpFired && tpCooldownOK && tpInWindow;
    const shortTPSignal = activeTrainDir === -1 && !tpFired && tpCooldownOK && tpInWindow;

    // State transitions
    if (activeTrainDir === 0) {
      if (cooldownOK && longEntrySer[i]) {
        activeTrainDir = 1; entryBar = i; entryPrice = c;
        addFired = false; tpFired = false; lastAddBar = null; lastTPBar = null;
        lastSignal = "B2O";
        signalHistory.push({ bar: i, time: bars[i].t, type: "B2O", price: c, dir: 1 });
      } else if (cooldownOK && shortEntrySer[i]) {
        activeTrainDir = -1; entryBar = i; entryPrice = c;
        addFired = false; tpFired = false; lastAddBar = null; lastTPBar = null;
        lastSignal = "S2O";
        signalHistory.push({ bar: i, time: bars[i].t, type: "S2O", price: c, dir: -1 });
      }
    } else if (activeTrainDir === 1) {
      if (longExitPressure) {
        lastSignal = "S2C";
        signalHistory.push({ bar: i, time: bars[i].t, type: "S2C", price: c, dir: 0 });
        activeTrainDir = 0; lastCampaignExitBar = i;
        entryBar = null; entryPrice = null;
        addFired = false; tpFired = false;
      } else if (longTPSignal) {
        lastSignal = "TP"; tpFired = true; lastTPBar = i;
        signalHistory.push({ bar: i, time: bars[i].t, type: "TP", price: c, dir: 1 });
      } else if (longAddSignal) {
        lastSignal = "ADD"; addFired = true; lastAddBar = i;
        signalHistory.push({ bar: i, time: bars[i].t, type: "ADD", price: c, dir: 1 });
      }
    } else if (activeTrainDir === -1) {
      if (shortExitPressure) {
        lastSignal = "B2C";
        signalHistory.push({ bar: i, time: bars[i].t, type: "B2C", price: c, dir: 0 });
        activeTrainDir = 0; lastCampaignExitBar = i;
        entryBar = null; entryPrice = null;
        addFired = false; tpFired = false;
      } else if (shortTPSignal) {
        lastSignal = "TP"; tpFired = true; lastTPBar = i;
        signalHistory.push({ bar: i, time: bars[i].t, type: "TP", price: c, dir: -1 });
      } else if (shortAddSignal) {
        lastSignal = "ADD"; addFired = true; lastAddBar = i;
        signalHistory.push({ bar: i, time: bars[i].t, type: "ADD", price: c, dir: -1 });
      }
    }
  }

  // === Output for latest bar ===
  const last = n - 1;
  const barsSinceLastExit = lastCampaignExitBar !== null ? last - lastCampaignExitBar : null;
  const cooldownOK = lastCampaignExitBar === null || (last - lastCampaignExitBar) >= dynCooldownBars;
  const lh = liqHighSer[last], ll = liqLowSer[last];
  const campaignTarget = activeTrainDir === 1 ? lh : activeTrainDir === -1 ? ll : NaN;
  let campaignProgress = NaN;
  if (activeTrainDir === 1 && entryPrice !== null && !isNaN(campaignTarget) && campaignTarget > entryPrice) {
    campaignProgress = Math.max(0, Math.min(1.5, (closes[last] - entryPrice) / (campaignTarget - entryPrice)));
  } else if (activeTrainDir === -1 && entryPrice !== null && !isNaN(campaignTarget) && campaignTarget < entryPrice) {
    campaignProgress = Math.max(0, Math.min(1.5, (entryPrice - closes[last]) / (entryPrice - campaignTarget)));
  }
  return {
    liqHigh: isNaN(lh) ? null : lh,
    liqLow: isNaN(ll) ? null : ll,
    liqBreakUp: liqBreakUpSer[last] ? 1 : 0,
    liqBreakDn: liqBreakDnSer[last] ? 1 : 0,
    largeBullCandle: largeBullSer[last] ? 1 : 0,
    largeBearCandle: largeBearSer[last] ? 1 : 0,
    activeTrainDir: activeTrainDir,
    cooldownOK: cooldownOK ? 1 : 0,
    barsSinceLastExit: barsSinceLastExit,
    entryBar: entryBar, entryPrice: entryPrice,
    addFired: addFired ? 1 : 0,
    tpFired: tpFired ? 1 : 0,
    campaignTarget: isNaN(campaignTarget) ? null : campaignTarget,
    campaignProgress: isNaN(campaignProgress) ? null : campaignProgress,
    lastSignal: lastSignal,
    signalCount: signalHistory.length,
    signalHistory: signalHistory.slice(-20),  // last 20 signals
  };
}

// ============================================================================
// v.22b — MMG Gates + Entry Triggers (port of K-9.2 Pine Modules 2-5)
// Computes per-bar structural / momentum / turn / manipulation / entry gates.
// Skips train state machine + ADD/TP (deferred to v.22c).
// ============================================================================
function _emaSeries21(closes, period) {
  const n = closes.length;
  const out = new Array(n).fill(NaN);
  if (n < period) return out;
  const seed = closes.slice(0, period).reduce((a, b) => a + b, 0) / period;
  out[period - 1] = seed;
  const k = 2 / (period + 1);
  let v = seed;
  for (let i = period; i < n; i++) {
    v = closes[i] * k + v * (1 - k);
    out[i] = v;
  }
  return out;
}

function _vwapSeriesSessionET(bars) {
  const n = bars.length;
  const out = new Array(n).fill(NaN);
  let pv = 0, vv = 0;
  let lastDay = null;
  for (let i = 0; i < n; i++) {
    const day = new Date(bars[i].t).toLocaleDateString("en-US", { timeZone: "America/New_York" });
    if (day !== lastDay) { pv = 0; vv = 0; lastDay = day; }
    const tp = (bars[i].h + bars[i].l + bars[i].c) / 3;
    pv += tp * bars[i].v;
    vv += bars[i].v;
    if (vv > 0) out[i] = pv / vv;
  }
  return out;
}

function _bbBasisSeries(closes, len) {
  const n = closes.length;
  const out = new Array(n).fill(NaN);
  for (let i = len - 1; i < n; i++) {
    let s = 0;
    for (let j = i - len + 1; j <= i; j++) s += closes[j];
    out[i] = s / len;
  }
  return out;
}

function _sarSeries(bars, step, maxAF) {
  if (!bars || bars.length < 2) return [];
  const n = bars.length;
  const sarOut = new Array(n).fill(NaN);
  let isUp = bars[1].c >= bars[0].c;
  let af = step;
  let ep = isUp ? bars[0].h : bars[0].l;
  let sar = isUp ? bars[0].l : bars[0].h;
  sarOut[0] = sar;
  for (let i = 1; i < n; i++) {
    const b = bars[i];
    sar = sar + af * (ep - sar);
    if (isUp) {
      sar = Math.min(sar, bars[i - 1].l, i >= 2 ? bars[i - 2].l : bars[i - 1].l);
      if (b.l < sar) { isUp = false; sar = ep; ep = b.l; af = step; }
      else { if (b.h > ep) { ep = b.h; af = Math.min(af + step, maxAF); } }
    } else {
      sar = Math.max(sar, bars[i - 1].h, i >= 2 ? bars[i - 2].h : bars[i - 1].h);
      if (b.h > sar) { isUp = true; sar = ep; ep = b.h; af = step; }
      else { if (b.l < ep) { ep = b.l; af = Math.min(af + step, maxAF); } }
    }
    sarOut[i] = sar;
  }
  return sarOut;
}

function _rsiSeries(closes, period) {
  const n = closes.length;
  const out = new Array(n).fill(NaN);
  if (n < period + 1) return out;
  const gains = [], losses = [];
  for (let i = 1; i < n; i++) {
    const d = closes[i] - closes[i - 1];
    gains.push(d > 0 ? d : 0);
    losses.push(d < 0 ? -d : 0);
  }
  // Wilder seeded with SMA over first `period` deltas
  let avgG = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
  let avgL = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
  out[period] = avgL === 0 ? 100 : 100 - 100 / (1 + (avgG / avgL));
  for (let i = period; i < gains.length; i++) {
    avgG = (avgG * (period - 1) + gains[i]) / period;
    avgL = (avgL * (period - 1) + losses[i]) / period;
    out[i + 1] = avgL === 0 ? 100 : 100 - 100 / (1 + (avgG / avgL));
  }
  return out;
}

function _rocSeries(closes, period) {
  const n = closes.length;
  const out = new Array(n).fill(NaN);
  for (let i = period; i < n; i++) {
    if (closes[i - period] !== 0) {
      out[i] = ((closes[i] - closes[i - period]) / closes[i - period]) * 100;
    }
  }
  return out;
}

function _macdHistSeries(closes, fast, slow, signal) {
  const n = closes.length;
  const out = new Array(n).fill(NaN);
  if (n < slow + signal) return out;
  const fastS = _emaSeries21(closes, fast);
  const slowS = _emaSeries21(closes, slow);
  const macdLine = new Array(n).fill(NaN);
  for (let i = 0; i < n; i++) {
    if (!isNaN(fastS[i]) && !isNaN(slowS[i])) macdLine[i] = fastS[i] - slowS[i];
  }
  // signal EMA of macdLine — seeded after `signal` valid macd values
  let firstValid = -1;
  for (let i = 0; i < n; i++) { if (!isNaN(macdLine[i])) { firstValid = i; break; } }
  if (firstValid < 0 || firstValid + signal > n) return out;
  let sum = 0;
  for (let i = firstValid; i < firstValid + signal; i++) sum += macdLine[i];
  let sig = sum / signal;
  const sigSer = new Array(n).fill(NaN);
  sigSer[firstValid + signal - 1] = sig;
  const k = 2 / (signal + 1);
  for (let i = firstValid + signal; i < n; i++) {
    sig = macdLine[i] * k + sig * (1 - k);
    sigSer[i] = sig;
  }
  for (let i = 0; i < n; i++) {
    if (!isNaN(macdLine[i]) && !isNaN(sigSer[i])) out[i] = macdLine[i] - sigSer[i];
  }
  return out;
}

function _atrWilderSeries(bars, period) {
  const n = bars.length;
  const out = new Array(n).fill(NaN);
  if (n < period + 1) return out;
  const trs = new Array(n).fill(NaN);
  for (let i = 1; i < n; i++) {
    trs[i] = Math.max(bars[i].h - bars[i].l, Math.abs(bars[i].h - bars[i-1].c), Math.abs(bars[i].l - bars[i-1].c));
  }
  // Seed: SMA of first `period` TRs (indexes 1..period)
  let atr = 0;
  for (let i = 1; i <= period; i++) atr += trs[i];
  atr = atr / period;
  out[period] = atr;
  for (let i = period + 1; i < n; i++) {
    atr = (atr * (period - 1) + trs[i]) / period;
    out[i] = atr;
  }
  return out;
}

function computeMMGGates(bars, bbCycle, opts) {
  opts = opts || {};
  const emaLen = opts.emaLen || 21;
  const rsiLen = opts.rsiLen || 14;
  const momLen = opts.momLen || 10;
  const macdFast = opts.macdFast || 12, macdSlow = opts.macdSlow || 26, macdSignal = opts.macdSignal || 9;
  const sarStart = opts.sarStart || 0.02, sarInc = opts.sarInc || 0.02, sarMax = opts.sarMax || 0.20;
  const atrLen = opts.atrLen || 14;
  const tangledATR = opts.tangledATR || 0.18;
  const nearMidATR = opts.nearMidATR || 0.18;

  if (!bars || bars.length < Math.max(emaLen, macdSlow + macdSignal) + 5) return null;
  const n = bars.length;
  const last = n - 1;
  const closes = bars.map(b => b.c);

  const emaSer = _emaSeries21(closes, emaLen);
  const vwapSer = _vwapSeriesSessionET(bars);
  const bbBasisSer = _bbBasisSeries(closes, 20);
  const sarSer = _sarSeries(bars, sarStart, sarMax);
  const rsiSer = _rsiSeries(closes, rsiLen);
  const rocSer = _rocSeries(closes, momLen);
  const macdHistSer = _macdHistSeries(closes, macdFast, macdSlow, macdSignal);
  const atrSer = _atrWilderSeries(bars, atrLen);

  const close = closes[last];
  const closePrev = closes[last - 1];
  const ema = emaSer[last];
  const emaPrev = emaSer[last - 1];
  const vwap = vwapSer[last];
  const bbBasis = bbBasisSer[last];
  const bbBasisPrev = bbBasisSer[last - 1];
  const sar = sarSer[last];
  const sarPrev = sarSer[last - 1];
  const atr = atrSer[last];
  const rsi = rsiSer[last];
  const roc = rocSer[last];
  const macdH = macdHistSer[last];
  const macdHPrev = macdHistSer[last - 1];

  // Structural gates (debug naming follows Pine)
  const closeAboveEMA = close > ema;
  const closeAboveVWAP = close > vwap;
  const closeAboveBB = close > bbBasis;
  const closeBelowEMA = close < ema;
  const closeBelowVWAP = close < vwap;
  const closeBelowBB = close < bbBasis;

  // SAR gates
  const sarBull = close > sar;
  const sarBear = close < sar;
  const sarBullPrev = closePrev > sarPrev;
  const sarBearPrev = closePrev < sarPrev;
  const sarFlipBull = sarBull && !sarBullPrev;
  const sarFlipBear = sarBear && !sarBearPrev;

  // Momentum
  const momBull = rsi > 50 && roc > 0 && macdH > 0;
  const momBear = rsi < 50 && roc < 0 && macdH < 0;
  const momBullStrong = rsi > 60 && roc > 0 && macdH > macdHPrev;
  const momBearStrong = rsi < 40 && roc < 0 && macdH < macdHPrev;
  let momentumScore = 0;
  momentumScore += momBull ? 0.35 : momBear ? -0.35 : 0;
  momentumScore += momBullStrong ? 0.25 : momBearStrong ? -0.25 : 0;
  momentumScore = Math.max(-1, Math.min(1, momentumScore));

  // Turn detection (Pine ta.crossover/crossunder)
  const crossUpEMA = close > ema && closePrev <= emaPrev;
  const crossDnEMA = close < ema && closePrev >= emaPrev;
  const crossUpBB = close > bbBasis && closePrev <= bbBasisPrev;
  const crossDnBB = close < bbBasis && closePrev >= bbBasisPrev;
  const longTurn = sarFlipBull || (crossUpEMA && close > bbBasis) || (crossUpBB && close > ema);
  const shortTurn = sarFlipBear || (crossDnEMA && close < bbBasis) || (crossDnBB && close < ema);

  // Manipulation phase
  const emaVwapTangled = Math.abs(ema - vwap) <= atr * tangledATR;
  const priceNearMid = Math.abs(close - bbBasis) <= atr * nearMidATR;
  const bbSqueezing = bbCycle && bbCycle.bbSqueezing === 1;
  const bbOpeningStart = bbCycle && bbCycle.bbOpeningStart === 1;
  const bbTrueExpansion = bbCycle && bbCycle.bbTrueExpansion === 1;
  const manipulationPhase = bbSqueezing && emaVwapTangled && priceNearMid;

  // Entry triggers (skip liqBreakUp/Dn — not yet ported, treat as false)
  const liqBreakUp = false, liqBreakDn = false;
  const longEntryTrigger = !manipulationPhase && !bbSqueezing && bbOpeningStart
    && closeAboveEMA && closeAboveVWAP && closeAboveBB && sarBull && momentumScore > 0
    && (longTurn || liqBreakUp || (bbTrueExpansion && close > closePrev));
  const shortEntryTrigger = !manipulationPhase && !bbSqueezing && bbOpeningStart
    && closeBelowEMA && closeBelowVWAP && closeBelowBB && sarBear && momentumScore < 0
    && (shortTurn || liqBreakDn || (bbTrueExpansion && close < closePrev));

  return {
    // raw values
    ema: ema, vwap: vwap, bbBasis: bbBasis, sar: sar, atr: atr,
    rsi: rsi, roc: roc, macdHist: macdH,
    // gates
    long_closeAboveEMA: closeAboveEMA ? 1 : 0,
    long_closeAboveVWAP: closeAboveVWAP ? 1 : 0,
    long_closeAboveBB: closeAboveBB ? 1 : 0,
    long_sarBull: sarBull ? 1 : 0,
    long_longTurn: longTurn ? 1 : 0,
    long_liqBreakUp: liqBreakUp ? 1 : 0,
    short_closeBelowEMA: closeBelowEMA ? 1 : 0,
    short_closeBelowVWAP: closeBelowVWAP ? 1 : 0,
    short_closeBelowBB: closeBelowBB ? 1 : 0,
    short_sarBear: sarBear ? 1 : 0,
    short_shortTurn: shortTurn ? 1 : 0,
    short_liqBreakDn: liqBreakDn ? 1 : 0,
    // composite
    momentumScore: momentumScore,
    emaVwapTangled: emaVwapTangled ? 1 : 0,
    priceNearMid: priceNearMid ? 1 : 0,
    manipulationPhase: manipulationPhase ? 1 : 0,
    longEntryTrigger: longEntryTrigger ? 1 : 0,
    shortEntryTrigger: shortEntryTrigger ? 1 : 0,
  };
}

// ============================================================================
// v.22a — BB Cycle State Machine (port of K-9.2 Pine Module 1, lines 330-348)
// Validates against TradingView Data Window: DBG_bbSqueezing, DBG_bbOpeningStart,
// DBG_bbTrueExpansion, DBG_barsSinceBBExpansion, DBG_bbExpansionRatePct,
// DBG_bbExpansionAlive
// ============================================================================
function computeBBCycle(bars, opts) {
  opts = opts || {};
  const bbLen = opts.bbLen || 20;
  const bbMult = opts.bbMult || 2.0;
  const bbWidthLen = opts.bbWidthLen || 20;
  const bbExpansionRateMin = opts.bbExpansionRateMin || 5.0;
  const bbExpansionHoldBars = opts.bbExpansionHoldBars || 8;

  if (!bars || bars.length < bbLen + bbWidthLen + 5) return null;
  const closes = bars.map(b => b.c);
  const n = closes.length;

  // 1) Per-bar BB basis, width series
  const bbBasisArr = new Array(n).fill(NaN);
  const bbWidthArr = new Array(n).fill(NaN);
  for (let i = bbLen - 1; i < n; i++) {
    let sum = 0;
    for (let j = i - bbLen + 1; j <= i; j++) sum += closes[j];
    const basis = sum / bbLen;
    let sq = 0;
    for (let j = i - bbLen + 1; j <= i; j++) sq += (closes[j] - basis) * (closes[j] - basis);
    const sd = Math.sqrt(sq / bbLen);   // population stdev (matches Pine ta.stdev)
    const upper = basis + bbMult * sd;
    const lower = basis - bbMult * sd;
    bbBasisArr[i] = basis;
    bbWidthArr[i] = basis !== 0 ? (upper - lower) / basis : NaN;
  }

  // 2) bbWidthAvg = SMA(bbWidth, bbWidthLen)
  const bbWidthAvgArr = new Array(n).fill(NaN);
  for (let i = bbLen - 1 + bbWidthLen - 1; i < n; i++) {
    let sum = 0, ok = true;
    for (let j = i - bbWidthLen + 1; j <= i; j++) {
      if (isNaN(bbWidthArr[j])) { ok = false; break; }
      sum += bbWidthArr[j];
    }
    if (ok) bbWidthAvgArr[i] = sum / bbWidthLen;
  }

  // 3) Per-bar cycle state series
  const bbTrueExpansionArr = new Array(n).fill(false);
  const bbSqueezingArr = new Array(n).fill(false);
  const bbExpansionRatePctArr = new Array(n).fill(0);

  for (let i = 0; i < n; i++) {
    // bbCompressionRecent = lowest(bbWidth, len) < lowest(bbWidthAvg, len)
    let compressionRecent = false;
    if (i >= bbWidthLen - 1) {
      let minW = Infinity, minA = Infinity;
      let hasW = false, hasA = false;
      for (let j = i - bbWidthLen + 1; j <= i; j++) {
        if (!isNaN(bbWidthArr[j])) { hasW = true; if (bbWidthArr[j] < minW) minW = bbWidthArr[j]; }
        if (!isNaN(bbWidthAvgArr[j])) { hasA = true; if (bbWidthAvgArr[j] < minA) minA = bbWidthAvgArr[j]; }
      }
      compressionRecent = hasW && hasA && minW < minA;
    }
    // bbWidthRising3
    let rising3 = false;
    if (i >= 2 && !isNaN(bbWidthArr[i]) && !isNaN(bbWidthArr[i-1]) && !isNaN(bbWidthArr[i-2])) {
      rising3 = bbWidthArr[i] > bbWidthArr[i-1] && bbWidthArr[i-1] > bbWidthArr[i-2];
    }
    // bbExpansionRatePct
    if (i >= bbWidthLen && !isNaN(bbWidthArr[i - bbWidthLen]) && bbWidthArr[i - bbWidthLen] > 0) {
      bbExpansionRatePctArr[i] = ((bbWidthArr[i] - bbWidthArr[i - bbWidthLen]) / bbWidthArr[i - bbWidthLen]) * 100;
    }
    // bbTrueExpansion
    bbTrueExpansionArr[i] = compressionRecent && !isNaN(bbWidthAvgArr[i])
      && bbWidthArr[i] > bbWidthAvgArr[i]
      && rising3
      && bbExpansionRatePctArr[i] >= bbExpansionRateMin;
    // bbSqueezing
    if (i >= 1 && !isNaN(bbWidthArr[i]) && !isNaN(bbWidthAvgArr[i]) && !isNaN(bbWidthArr[i-1])) {
      bbSqueezingArr[i] = bbWidthArr[i] < bbWidthAvgArr[i] && bbWidthArr[i] < bbWidthArr[i-1];
    }
  }

  // 4) barssince(bbTrueExpansion) for the latest bar
  const last = n - 1;
  let barsSinceBBExpansion = null;
  for (let i = last; i >= 0; i--) {
    if (bbTrueExpansionArr[i]) { barsSinceBBExpansion = last - i; break; }
  }

  const bbOpeningStart = bbTrueExpansionArr[last] || (barsSinceBBExpansion !== null && barsSinceBBExpansion <= 3);
  const bbExpansionAlive = bbTrueExpansionArr[last] || (
    barsSinceBBExpansion !== null && barsSinceBBExpansion <= bbExpansionHoldBars
    && !isNaN(bbWidthAvgArr[last]) && bbWidthArr[last] >= bbWidthAvgArr[last]
  );

  return {
    bbBasis: bbBasisArr[last],
    bbWidth: bbWidthArr[last],
    bbWidthAvg: bbWidthAvgArr[last],
    bbSqueezing: bbSqueezingArr[last] ? 1 : 0,
    bbTrueExpansion: bbTrueExpansionArr[last] ? 1 : 0,
    bbOpeningStart: bbOpeningStart ? 1 : 0,
    bbExpansionAlive: bbExpansionAlive ? 1 : 0,
    barsSinceBBExpansion: barsSinceBBExpansion,
    bbExpansionRatePct: bbExpansionRatePctArr[last],
  };
}

// v.20 — Massive.com REST Client
// ============================================================================
async function fetchMassiveBars(ticker, multiplier, timespan, fromYMD, toYMD, apiKey) {
  const url = `https://api.massive.com/v2/aggs/ticker/${ticker}/range/${multiplier}/${timespan}/${fromYMD}/${toYMD}?adjusted=true&sort=asc&limit=5000&apiKey=${apiKey}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Massive HTTP ${resp.status}`);
  const j = await resp.json();
  if (j.status && j.status !== "OK" && j.status !== "DELAYED") {
    throw new Error(`Massive status: ${j.status}`);
  }
  return (j.results || []).map(r => ({ o: r.o, h: r.h, l: r.l, c: r.c, v: r.v, t: r.t, vw: r.vw }));
}

function ymdDaysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}

async function fetchSnapshot(tickers, apiKey) {
  // Fetch snapshot for a comma-separated list of tickers
  const url = `https://api.massive.com/v2/snapshot/locale/us/markets/stocks/tickers?tickers=${tickers.join(",")}&apiKey=${apiKey}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Snapshot HTTP ${resp.status}`);
  const j = await resp.json();
  if (j.status && j.status !== "OK" && j.status !== "DELAYED") {
    throw new Error(`Snapshot status: ${j.status}`);
  }
  return j.tickers || [];
}

async function fetchGroupedDaily(dateYMD, apiKey) {
  // Returns all US stocks' daily OHLCV for the given date
  const url = `https://api.massive.com/v2/aggs/grouped/locale/us/market/stocks/${dateYMD}?adjusted=true&apiKey=${apiKey}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Grouped HTTP ${resp.status}`);
  const j = await resp.json();
  if (j.status && j.status !== "OK" && j.status !== "DELAYED") {
    throw new Error(`Grouped status: ${j.status}`);
  }
  return j.results || [];
}

async function buildAvgVolume20d(tickers, apiKey) {
  // Pull last ~30 calendar days of grouped daily, build 20-day avg per ticker
  const days = [];
  for (let i = 1; i <= 30; i++) {
    days.push(ymdDaysAgo(i));
  }
  const tickerSet = new Set(tickers);
  const volMap = {}; // sym -> [vols]
  let pulled = 0;
  for (const day of days) {
    try {
      const results = await fetchGroupedDaily(day, apiKey);
      for (const r of results) {
        if (tickerSet.has(r.T)) {
          if (!volMap[r.T]) volMap[r.T] = [];
          volMap[r.T].push(r.v);
        }
      }
      pulled++;
      if (pulled >= 22) break; // ~22 trading days = 20-day window with weekend slack
    } catch (e) {
      // Skip days that fail (weekends, holidays)
    }
    // Small delay to avoid burst
    await new Promise(r => setTimeout(r, 50));
  }
  const avg = {};
  for (const sym of Object.keys(volMap)) {
    const vols = volMap[sym].slice(0, 20);
    if (vols.length >= 5) {
      avg[sym] = vols.reduce((a, b) => a + b, 0) / vols.length;
    }
  }
  return { avg, builtAt: Date.now(), tickersFound: Object.keys(avg).length };
}

// ---- Helpers ----
function calcPnL(position, currentPrice) {
  if (!position || position.side === "flat") return { pct: 0, dollars: 0 };
  const sign = position.side === "long" ? 1 : -1;
  const diff = (currentPrice - position.entryPrice) * sign;
  return { pct: (diff / position.entryPrice) * 100, dollars: diff * position.size };
}
function pnlR(position, currentPrice, atr) {
  if (!position || position.side === "flat") return 0;
  const sign = position.side === "long" ? 1 : -1;
  return ((currentPrice - position.entryPrice) * sign) / atr;
}
function generateMockTicker(sym) {
  const price = Math.round((20 + Math.random() * 480) * 100) / 100;
  return {
    sym,
    price,
    change: Math.round((Math.random() - 0.5) * 6 * 100) / 100,
    atr: Math.round(price * 0.02 * 100) / 100,
    mmgState: MMG_STATES[Math.floor(Math.random() * MMG_STATES.length)],
    campaign: CAMPAIGN_STATES[Math.floor(Math.random() * CAMPAIGN_STATES.length)],
    direction: ["long", "short", "neutral"][Math.floor(Math.random() * 3)],
    rvol: Math.round((0.7 + Math.random() * 1.5) * 100) / 100,
    custom: true,
  };
}
function computeScores({ mmgState, campaign, direction, rvol, position, atrDistance, atr, currentPrice }) {
  const rvolMult = Math.min(rvol / 1.5, 1.0);
  const stopMult = Math.max(0, 1 - atrDistance);
  const side = (position && position.side) || "flat";

  // Entry scores (only valid when flat)
  const b2o = side !== "flat" ? null : Math.min(95, Math.round(
    (mmgState === "B2O-signal" ? 82 : mmgState === "Expansion" && direction === "long" ? 64 : mmgState === "Midline" && direction === "long" ? 48 : mmgState === "Compression" ? 28 : 14)
    * rvolMult * (campaign === "Boarding" ? 1.18 : campaign === "Rolling" ? 1.05 : 0.85) * stopMult));
  const s2o = side !== "flat" ? null : Math.min(95, Math.round(
    (mmgState === "S2O-signal" ? 82 : mmgState === "Expansion" && direction === "short" ? 64 : mmgState === "Midline" && direction === "short" ? 48 : mmgState === "Compression" ? 28 : 14)
    * rvolMult * (campaign === "Boarding" ? 1.18 : campaign === "Rolling" ? 1.05 : 0.85) * stopMult));

  // Campaign progress (K-9.1 style)
  let campaignProgress = null;
  if (side === "long" && position && position.entryPrice && atr) {
    const target = position.entryPrice + 1.7 * atr;
    campaignProgress = (currentPrice - position.entryPrice) / (target - position.entryPrice);
  } else if (side === "short" && position && position.entryPrice && atr) {
    const target = position.entryPrice - 1.7 * atr;
    campaignProgress = (position.entryPrice - currentPrice) / (position.entryPrice - target);
  }
  const addInWindow = campaignProgress !== null && campaignProgress >= 0.45 && campaignProgress <= 0.55;
  const tpInWindow  = campaignProgress !== null && campaignProgress >= 0.70 && campaignProgress <= 0.80;

  // ADD score — K-9.1 single-shot, 45-55% window
  const inLong = side === "long", inShort = side === "short";
  const directionMatch = (inLong && direction === "long") || (inShort && direction === "short");
  const reconfirm = (inLong && mmgState === "B2O-signal") || (inShort && mmgState === "S2O-signal");
  let add = null;
  if (side !== "flat" && !position.addFired && addInWindow) {
    const base = directionMatch ? (reconfirm ? 82 : mmgState === "Expansion" ? 72 : mmgState === "Midline" ? 58 : 40) : 25;
    const campaignMult = campaign === "Rolling" ? 1.12 : campaign === "Boarding" ? 1.0 : 0.7;
    add = Math.min(95, Math.round(base * rvolMult * campaignMult));
  }

  // TP score — K-9.1 single-shot, 70-80% window
  let tp = null;
  if (side !== "flat" && !position.tpFired && tpInWindow) {
    const base = mmgState === "GetOff" ? 92 : mmgState === "Caution" ? 84 : campaign === "Station" ? 82 : campaign === "Departed" ? 72 : 68;
    tp = Math.min(95, base);
  }

  // Full exits
  const baseExit = mmgState === "GetOff" ? 90 : mmgState === "Caution" ? 68 : campaign === "Station" ? 58 : campaign === "Departed" ? 26 : 16;
  const s2c = inLong ? Math.min(95, baseExit) : null;
  const b2c = inShort ? Math.min(95, baseExit) : null;

  return { b2o, s2o, add, tp, s2c, b2c, campaignProgress };
}
function topAction(scores) {
  const entries = Object.entries(scores).filter(([k, v]) => k !== "campaignProgress" && v != null);
  if (entries.length === 0) return { code: "—", score: 0, tone: "neutral" };
  entries.sort((a, b) => b[1] - a[1]);
  const [code, score] = entries[0];
  const map = { b2o: "long", s2o: "short", add: "add", tp: "tp", s2c: "close", b2c: "close" };
  return { code: code.toUpperCase(), score, tone: map[code] };
}
function addLockReason(position, campaignProgress) {
  if (!position || position.side === "flat") return "no position";
  if (position.addFired) return "already added";
  if (campaignProgress == null) return "no target set";
  const pct = Math.round(campaignProgress * 100);
  if (campaignProgress < 0.45) return "wait · " + pct + "% to station";
  if (campaignProgress > 0.55) return "window missed (" + pct + "%)";
  return "weak setup";
}
function tpLockReason(position, campaignProgress) {
  if (!position || position.side === "flat") return "no position";
  if (position.tpFired) return "already taken";
  if (campaignProgress == null) return "no target set";
  const pct = Math.round(campaignProgress * 100);
  if (campaignProgress < 0.70) return "wait · " + pct + "% to station";
  if (campaignProgress > 0.80) return "window missed (" + pct + "%)";
  return "weak setup";
}

function toneColor(tone) {
  return tone === "long" ? C.long : tone === "short" ? C.short : tone === "close" ? C.close : tone === "add" ? C.add : tone === "tp" ? C.tp : C.neutral;
}
function toneSoft(tone) {
  return tone === "long" ? "var(--long-soft)" : tone === "short" ? "var(--short-soft)" : tone === "close" ? "var(--close-soft)" : tone === "add" ? "var(--add-soft)" : tone === "tp" ? "var(--tp-soft)" : C.track;
}
function formatTime(ms) {
  const mins = Math.floor((Date.now() - ms) / 60000);
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  return `${hrs}h${mins % 60}m`;
}
