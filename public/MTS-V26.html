// Watchlist — with custom ticker input
// ============================================================================
function WatchlistView({ watchlists, setWatchlists, universe, addCustomTicker, positions, onSelect }) {
  const [editing, setEditing] = useState(false);
  const [addingTo, setAddingTo] = useState(null);
  const [inputSym, setInputSym] = useState("");

  const getTickerData = (sym) => {
    const t = universe.find(u => u.sym === sym);
    if (!t) return null;
    const pos = positions[sym] || { side: "flat" };
    const scores = computeScores({ ...t, position: pos, atrDistance: 0.25, atr: t.atr, currentPrice: t.price });
    const top = topAction(scores);
    return { ...t, position: pos, top };
  };

  const moveItem = (listId, sym, dir) => {
    setWatchlists(lists => lists.map(l => {
      if (l.id !== listId) return l;
      const idx = l.symbols.indexOf(sym);
      if (idx < 0) return l;
      const next = idx + dir;
      if (next < 0 || next >= l.symbols.length) return l;
      const arr = [...l.symbols];
      [arr[idx], arr[next]] = [arr[next], arr[idx]];
      return { ...l, symbols: arr };
    }));
  };
  const removeItem = (listId, sym) => setWatchlists(lists => lists.map(l => l.id === listId ? { ...l, symbols: l.symbols.filter(s => s !== sym) } : l));
  const addItemToList = (listId, sym) => {
    sym = sym.toUpperCase().trim();
    if (!sym || !/^[A-Z]{1,5}$/.test(sym)) return false;
    if (!universe.find(t => t.sym === sym)) addCustomTicker(sym);
    setWatchlists(lists => lists.map(l => l.id === listId && !l.symbols.includes(sym) ? { ...l, symbols: [...l.symbols, sym] } : l));
    setInputSym("");
    return true;
  };
  const addList = () => {
    const name = prompt("Watchlist name?");
    if (!name) return;
    setWatchlists(lists => [...lists, { id: `wl-${Date.now()}`, name, symbols: [] }]);
  };

  return (
    <div className="flex flex-col gap-2.5">
      <div className="flex items-center justify-between">
        <div style={{ color: C.muted }} className="text-[12px] tracking-[0.2em]">{watchlists.length} LISTS</div>
        <div className="flex gap-2">
          <button onClick={() => setEditing(!editing)} style={{ color: editing ? C.text : C.muted }} className="text-xs font-mono flex items-center gap-1"><Edit2 size={12} /> {editing ? "DONE" : "EDIT"}</button>
          <button onClick={addList} style={{ color: C.text }} className="text-xs font-mono flex items-center gap-1 font-bold"><Plus size={14} /> LIST</button>
        </div>
      </div>
      {watchlists.map(list => (
        <div key={list.id} style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl overflow-hidden">
          <div style={{ backgroundColor: C.bg, borderBottomColor: C.border }} className="border-b px-3 py-1.5 flex items-center justify-between">
            <div style={{ color: C.text }} className="text-xs font-bold tracking-tight">{list.name}</div>
            <div className="flex items-center gap-2">
              <div style={{ color: C.dim }} className="text-[12px] font-mono">{list.symbols.length}</div>
              <button onClick={() => { setAddingTo(addingTo === list.id ? null : list.id); setInputSym(""); }} style={{ color: C.muted }} className="p-0.5"><Plus size={14} /></button>
            </div>
          </div>
          {addingTo === list.id && (
            <div style={{ backgroundColor: C.bg, borderBottomColor: C.border }} className="border-b p-2 space-y-1.5">
              <div className="flex items-center gap-2">
                <input
                  type="text"
                  value={inputSym}
                  onChange={(e) => setInputSym(e.target.value.toUpperCase())}
                  onKeyDown={(e) => e.key === "Enter" && addItemToList(list.id, inputSym)}
                  placeholder="TYPE SYMBOL (e.g. RIVN)"
                  maxLength={5}
                  style={{ backgroundColor: C.surface, borderColor: C.borderStrong, color: C.text }}
                  className="flex-1 border rounded px-2 py-1 text-xs font-mono tracking-wider focus:outline-none uppercase" />
                <button onClick={() => addItemToList(list.id, inputSym)} style={{ backgroundColor: C.text, color: C.bg }} className="px-3 py-1 rounded text-[12px] font-mono font-bold">ADD</button>
                <button onClick={() => setAddingTo(null)} style={{ color: C.muted }} className="p-1"><X size={14}/></button>
              </div>
              <div style={{ color: C.dim }} className="text-[11px] font-mono">QUICK ADD:</div>
              <div className="flex flex-wrap gap-1">
                {universe.filter(u => !list.symbols.includes(u.sym)).slice(0, 18).map(u => (
                  <button key={u.sym} onClick={() => addItemToList(list.id, u.sym)} style={{ backgroundColor: C.surface, borderColor: C.border, color: C.text }} className="px-1.5 py-0.5 border rounded text-[12px] font-mono">{u.sym}</button>
                ))}
              </div>
            </div>
          )}
          {list.symbols.map((sym, i) => {
            const t = getTickerData(sym);
            if (!t) return null;
            const color = toneColor(t.top.tone);
            const dim = t.top.score < 30;
            return (
              <div key={sym} style={{ borderBottomColor: C.border }} className="border-b last:border-b-0 flex items-center">
                <button onClick={() => !editing && onSelect(sym)} className="flex-1 flex items-center gap-2 px-3 py-2 text-left active:opacity-60">
                  <div style={{ backgroundColor: dim ? C.track : toneSoft(t.top.tone), borderColor: dim ? C.border : color, color: dim ? C.dim : color }} className="w-10 h-10 rounded-md border-2 flex flex-col items-center justify-center shrink-0">
                    <div className="text-xs font-mono font-bold leading-none">{t.top.score}</div>
                    <div className="text-[9px] font-mono tracking-wider mt-0.5">{t.top.code}</div>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-baseline gap-1.5">
                      <div style={{ color: C.text }} className="text-sm font-mono font-bold">{t.sym}</div>
                      {t.custom && <span style={{ color: C.dim }} className="text-[10px] font-mono">custom</span>}
                      {t.position.side !== "flat" && <div style={{ color: t.position.side === "long" ? C.long : C.short }} className="text-[11px] font-mono uppercase">{t.position.side}</div>}
                    </div>
                    <div style={{ color: C.muted }} className="text-[12px] truncate">{t.mmgState}</div>
                  </div>
                  <div className="text-right shrink-0">
                    <div style={{ color: C.text }} className="text-xs font-mono">${t.price.toFixed(2)}</div>
                    <div style={{ color: t.change >= 0 ? C.long : C.short }} className="text-[12px] font-mono">{t.change >= 0 ? "+" : ""}{t.change.toFixed(2)}%</div>
                  </div>
                </button>
                {editing && (
                  <div className="flex items-center gap-0 pr-2">
                    <button onClick={() => moveItem(list.id, sym, -1)} disabled={i === 0} style={{ color: i === 0 ? C.dim : C.muted }} className="p-1"><ChevronUp size={14} /></button>
                    <button onClick={() => moveItem(list.id, sym, 1)} disabled={i === list.symbols.length - 1} style={{ color: i === list.symbols.length - 1 ? C.dim : C.muted }} className="p-1"><ChevronDown size={14} /></button>
                    <button onClick={() => removeItem(list.id, sym)} style={{ color: C.short }} className="p-1"><Trash2 size={14} /></button>
                  </div>
                )}
              </div>
            );
          })}
          {list.symbols.length === 0 && <div style={{ color: C.dim }} className="text-center text-[13px] py-3">no tickers yet</div>}
        </div>
      ))}
    </div>
  );
}

// ============================================================================
// Ring, ActionCell, ConfirmModal
// ============================================================================
function Ring({ score, tone = "long", size = 56 }) {
  const r = (size - 6) / 2;
  const circ = 2 * Math.PI * r;
  const offset = score == null ? circ : circ - (score / 100) * circ;
  const stroke = score == null ? C.locked : toneColor(tone);
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} stroke={C.track} strokeWidth="3" fill="none" />
      <circle cx={size/2} cy={size/2} r={r} stroke={stroke} strokeWidth="3" fill="none"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset 400ms ease, stroke 200ms ease" }} />
    </svg>
  );
}
function ActionCell({ code, label, score, lockedReason, tone, onTap, compact = false }) {
  const locked = score == null;
  const ringSize = compact ? 40 : 56;
  return (
    <button onClick={() => !locked && onTap()} disabled={locked}
      style={{ backgroundColor: locked ? C.surfaceDisabled : C.surface, borderColor: locked ? C.border : C.borderStrong, cursor: locked ? "not-allowed" : "pointer" }}
      className={`relative ${compact ? "p-2" : "p-3"} rounded-2xl border-2 transition-all active:scale-[0.97] disabled:active:scale-100`}>
      <div className={`flex flex-col items-center ${compact ? "gap-1" : "gap-1.5"}`}>
        <div className="relative">
          <Ring score={score} tone={tone} size={ringSize} />
          <div className="absolute inset-0 flex items-center justify-center">
            {locked ? (
              <svg width={compact ? "12" : "16"} height={compact ? "12" : "16"} viewBox="0 0 24 24" fill="none" stroke={C.dim} strokeWidth="2.5">
                <rect x="5" y="11" width="14" height="10" rx="2" /><path d="M8 11V7a4 4 0 0 1 8 0v4" />
              </svg>
            ) : (
              <div style={{ color: C.text }} className={`${compact ? "text-sm" : "text-lg"} font-mono font-bold leading-none`}>{score}</div>
            )}
          </div>
        </div>
        <div style={{ color: locked ? C.dim : C.text }} className={`font-mono font-bold ${compact ? "text-xs" : "text-base"} leading-none`}>{code}</div>
        {!compact && <div style={{ color: locked ? C.dim : C.muted }} className="text-[12px] leading-tight text-center">{locked ? <em>{lockedReason}</em> : label}</div>}
      </div>
    </button>
  );
}
function ConfirmModal({ action, ticker, price, position, onConfirm, onCancel }) {
  const isEntry = action === "B2O" || action === "S2O";
  const isAdd = action === "ADD";
  const isTP = action === "TP";
  const isFullExit = action === "S2C" || action === "B2C";
  const accent = isAdd ? C.add : isTP ? C.tp : (action === "B2O" ? C.long : action === "S2O" ? C.short : C.close);
  let sizeChange, newSize, newAvg, realized;
  if (isEntry) { sizeChange = 100; newSize = 100; newAvg = price; }
  else if (isAdd) {
    sizeChange = 50; newSize = position.size + 50;
    newAvg = ((position.entryPrice * position.size) + (price * 50)) / newSize;
  } else if (isTP) {
    sizeChange = -Math.round(position.size / 2); newSize = position.size + sizeChange;
    newAvg = position.entryPrice;
    const sign = position.side === "long" ? 1 : -1;
    realized = (price - position.entryPrice) * sign * Math.abs(sizeChange);
  } else if (isFullExit) {
    sizeChange = -position.size; newSize = 0;
    const sign = position.side === "long" ? 1 : -1;
    realized = (price - position.entryPrice) * sign * position.size;
  }
  const verb = isEntry ? "Open" : isAdd ? "Add to" : isTP ? "Take profit on" : "Close";
  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 p-4">
      <div style={{ backgroundColor: C.surface, borderColor: C.borderStrong }} className="border-2 rounded-2xl w-full max-w-md p-5">
        <div style={{ color: C.muted }} className="text-[12px] tracking-[0.2em] mb-1">{verb.toUpperCase()} POSITION</div>
        <div className="flex items-baseline gap-3 mb-4">
          <div style={{ color: accent }} className="text-2xl font-mono font-bold">{action}</div>
          <div style={{ color: C.text }} className="text-lg font-mono">{ticker}</div>
          <div style={{ color: C.muted }} className="text-sm font-mono ml-auto">${price.toFixed(2)}</div>
        </div>
        <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-sm font-mono mb-4">
          <div className="flex justify-between"><span style={{ color: C.muted }}>Δ Size</span><span style={{ color: sizeChange > 0 ? C.long : C.short }}>{sizeChange > 0 ? "+" : ""}{sizeChange}sh</span></div>
          <div className="flex justify-between"><span style={{ color: C.muted }}>New Size</span><span style={{ color: C.text }}>{newSize}sh</span></div>
          {newAvg != null && <div className="flex justify-between"><span style={{ color: C.muted }}>{isAdd ? "New Avg" : "Avg"}</span><span style={{ color: C.text }}>${newAvg.toFixed(2)}</span></div>}
          {realized != null && <div className="flex justify-between"><span style={{ color: C.muted }}>Realized</span><span style={{ color: realized >= 0 ? C.long : C.short }}>{realized >= 0 ? "+" : ""}${realized.toFixed(0)}</span></div>}
        </div>
        <div style={{ color: C.muted, borderColor: C.border }} className="text-[12px] leading-relaxed mb-4 border-l-2 pl-3">
          You are the executing trader. MTS is decision support. By confirming, you accept all P&L and the possibility of total loss.
        </div>
        <div className="flex gap-2">
          <button onClick={onCancel} style={{ borderColor: C.borderStrong, color: C.muted }} className="flex-1 py-2.5 rounded-xl border-2 font-mono text-sm">CANCEL</button>
          <button onClick={onConfirm} style={{ backgroundColor: accent, color: "#FFF" }} className="flex-1 py-2.5 rounded-xl font-mono text-sm font-bold">CONFIRM</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// Scanner
// ============================================================================
function Scanner({ universe, positions, onSelect }) {
  const [filter, setFilter] = useState("all");
  const [sort, setSort] = useState("score");
  const enriched = useMemo(() => universe.map(t => {
    const pos = positions[t.sym] || { side: "flat" };
    const scores = computeScores({ ...t, position: pos, atrDistance: 0.25, atr: t.atr, currentPrice: t.price });
    const top = topAction(scores);
    return { ...t, position: pos, scores, top };
  }), [universe, positions]);
  const filtered = useMemo(() => enriched.filter(t => {
    if (filter === "long") return t.top.tone === "long" || (t.top.tone === "add" && t.position.side === "long");
    if (filter === "short") return t.top.tone === "short" || (t.top.tone === "add" && t.position.side === "short");
    if (filter === "high") return t.top.score >= 60;
    if (filter === "open") return t.position.side !== "flat";
    return true;
  }), [enriched, filter]);
  const sorted = useMemo(() => {
    const arr = [...filtered];
    if (sort === "score") arr.sort((a, b) => b.top.score - a.top.score);
    if (sort === "alpha") arr.sort((a, b) => a.sym.localeCompare(b.sym));
    if (sort === "chg") arr.sort((a, b) => b.change - a.change);
    return arr;
  }, [filtered, sort]);
  const chips = [{ key: "all", label: "All" }, { key: "long", label: "Long" }, { key: "short", label: "Short" }, { key: "high", label: "≥60" }, { key: "open", label: "Open" }];
  return (
    <div className="flex flex-col gap-2.5">
      <div className="flex items-baseline gap-2"><div style={{ color: C.muted }} className="text-xs font-mono">{sorted.length}/{universe.length} tickers</div></div>
      <div className="flex items-center gap-1.5 overflow-x-auto pb-0.5">
        {chips.map(c => (
          <button key={c.key} onClick={() => setFilter(c.key)}
            style={{ backgroundColor: filter === c.key ? C.text : C.surface, color: filter === c.key ? C.bg : C.muted, borderColor: filter === c.key ? C.text : C.border }}
            className="px-2.5 py-1 rounded-full border text-[13px] font-mono whitespace-nowrap">{c.label}</button>
        ))}
        <select value={sort} onChange={e => setSort(e.target.value)} style={{ borderColor: C.border, color: C.muted, backgroundColor: C.surface }} className="ml-auto border rounded-full px-2 py-1 text-[13px] font-mono">
          <option value="score">↓ Score</option><option value="alpha">A→Z</option><option value="chg">↓ % Chg</option>
        </select>
      </div>
      <div className="flex flex-col gap-1.5">
        {sorted.map(t => {
          const color = toneColor(t.top.tone), dim = t.top.score < 30;
          return (
            <button key={t.sym} onClick={() => onSelect(t.sym)} style={{ backgroundColor: C.surface, borderColor: C.border }} className="flex items-center gap-3 border rounded-xl p-2.5 text-left active:scale-[0.99] transition-transform">
              <div style={{ backgroundColor: dim ? C.track : toneSoft(t.top.tone), borderColor: dim ? C.border : color }} className="flex flex-col items-center justify-center w-12 h-12 rounded-lg border-2 shrink-0">
                <div style={{ color: dim ? C.dim : color }} className="text-base font-mono font-bold leading-none">{t.top.score}</div>
                <div style={{ color: dim ? C.dim : color }} className="text-[10px] font-mono tracking-wider mt-0.5">{t.top.code}</div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-baseline gap-1.5">
                  <div style={{ color: C.text }} className="text-base font-mono font-bold">{t.sym}</div>
                  {t.position.side !== "flat" && <div style={{ color: t.position.side === "long" ? C.long : C.short }} className="text-[11px] font-mono uppercase tracking-wider">• {t.position.side}</div>}
                </div>
                <div style={{ color: C.muted }} className="text-[13px] truncate">{t.mmgState} · {t.direction} · {t.rvol.toFixed(2)}x</div>
              </div>
              <div className="text-right shrink-0">
                <div style={{ color: C.text }} className="text-sm font-mono">${t.price.toFixed(2)}</div>
                <div style={{ color: t.change >= 0 ? C.long : C.short }} className="text-[13px] font-mono">{t.change >= 0 ? "+" : ""}{t.change.toFixed(2)}%</div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================================
// Active
// ============================================================================
function Active({ universe, positions, onSelect }) {
  const openTickers = useMemo(() => Object.keys(positions).filter(sym => positions[sym].side !== "flat"), [positions]);
  const enriched = useMemo(() => openTickers.map(sym => {
    const t = universe.find(u => u.sym === sym);
    if (!t) return null;
    const pos = positions[sym];
    const pnl = calcPnL(pos, t.price);
    const scores = computeScores({ ...t, position: pos, atrDistance: 0.25, atr: t.atr, currentPrice: t.price });
    const top = topAction(scores);
    const targetOffset = t.atr * 1.7;
    const target = pos.side === "long" ? pos.entryPrice + targetOffset : pos.entryPrice - targetOffset;
    return { ...t, position: pos, pnl, top, target };
  }).filter(Boolean), [openTickers, universe, positions]);
  const totalPnL = enriched.reduce((sum, t) => sum + t.pnl.dollars, 0);
  const winners = enriched.filter(t => t.pnl.dollars > 0).length;
  const losers = enriched.filter(t => t.pnl.dollars < 0).length;
  return (
    <div className="flex flex-col gap-2.5">
      <div className="flex items-baseline gap-2">
        <div style={{ color: C.muted }} className="text-xs font-mono">{enriched.length} open · {winners}W {losers}L</div>
        <div style={{ color: totalPnL >= 0 ? C.long : C.short }} className="text-sm font-mono font-bold">{totalPnL >= 0 ? "+" : ""}${totalPnL.toFixed(0)}</div>
      </div>
      <div className="flex flex-col gap-1.5">
        {enriched.map(t => {
          const color = toneColor(t.top.tone);
          const sideColor = t.position.side === "long" ? C.long : C.short;
          const pnlColor = t.pnl.dollars >= 0 ? C.long : C.short;
          return (
            <button key={t.sym} onClick={() => onSelect(t.sym)} style={{ backgroundColor: C.surface, borderColor: C.border }} className="flex flex-col gap-1.5 border rounded-xl p-2.5 text-left active:scale-[0.99] transition-transform">
              <div className="flex items-center gap-3">
                <div style={{ backgroundColor: toneSoft(t.top.tone), borderColor: color }} className="flex flex-col items-center justify-center w-12 h-12 rounded-lg border-2 shrink-0">
                  <div style={{ color }} className="text-base font-mono font-bold leading-none">{t.top.score}</div>
                  <div style={{ color }} className="text-[10px] font-mono tracking-wider mt-0.5">{t.top.code}</div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-baseline gap-1.5">
                    <div style={{ color: C.text }} className="text-base font-mono font-bold">{t.sym}</div>
                    <div style={{ color: sideColor }} className="text-[12px] font-mono uppercase tracking-wider">{t.position.side}</div>
                    <div style={{ color: C.muted }} className="text-[12px] font-mono ml-auto">{formatTime(t.position.entryTime)}</div>
                  </div>
                  <div style={{ color: pnlColor }} className="text-sm font-mono font-bold">{t.pnl.pct >= 0 ? "+" : ""}{t.pnl.pct.toFixed(2)}% · {t.pnl.dollars >= 0 ? "+" : ""}${t.pnl.dollars.toFixed(0)}</div>
                </div>
                <div className="text-right shrink-0">
                  <div style={{ color: C.text }} className="text-sm font-mono">${t.price.toFixed(2)}</div>
                  <div style={{ color: C.muted }} className="text-[12px] font-mono">{t.position.size}sh</div>
                </div>
              </div>
              <div className="flex items-center gap-2" style={{ paddingLeft: "60px" }}>
                <div style={{ color: C.muted }} className="text-[12px] font-mono">
                  <span style={{ color: C.dim }}>entry</span> ${t.position.entryPrice.toFixed(2)} · <span style={{ color: C.dim }}>tgt</span> ${t.target.toFixed(2)}
                </div>
                <div className="ml-auto flex gap-1">
                  <span style={{ backgroundColor: t.position.addFired ? "var(--add-soft)" : "transparent", borderColor: t.position.addFired ? C.add : C.border, color: t.position.addFired ? C.add : C.dim }} className="text-[11px] font-mono px-1.5 py-0.5 rounded border">ADD{t.position.addFired ? " ✓" : ""}</span>
                  <span style={{ backgroundColor: t.position.tpFired ? "var(--tp-soft)" : "transparent", borderColor: t.position.tpFired ? C.tp : C.border, color: t.position.tpFired ? C.tp : C.dim }} className="text-[11px] font-mono px-1.5 py-0.5 rounded border">TP{t.position.tpFired ? " ✓" : ""}</span>
                </div>
              </div>
            </button>
          );
        })}
        {enriched.length === 0 && <div style={{ color: C.dim }} className="text-center text-xs py-12">No active trades.<br /><span className="text-[12px]">Open a position from the Scanner.</span></div>}
      </div>
    </div>
  );
}

// ============================================================================
// Deck
// ============================================================================
function Deck({ ticker, universe, positions, setPositions, fills, setFills, onBack }) {
  const data = universe.find(t => t.sym === ticker);
  const [mmgState, setMmgState] = useState(data.mmgState);
  const [campaign, setCampaign] = useState(data.campaign);
  const [direction, setDirection] = useState(data.direction);
  const [rvol, setRvol] = useState(data.rvol);
  const [pendingAction, setPendingAction] = useState(null);
  const [showSim, setShowSim] = useState(false);
  const position = positions[ticker] || { side: "flat" };
  const atrDistance = 0.25;
  const pnl = calcPnL(position, data.price);
  const scores = useMemo(() => computeScores({ mmgState, campaign, direction, rvol, position, atrDistance, atr: data.atr, currentPrice: data.price }), [mmgState, campaign, direction, rvol, position, data.atr, data.price]);
  const stopOffset = data.atr * 1.0, targetOffset = data.atr * 1.7;
  const refPrice = position.side === "flat" ? data.price : position.entryPrice;
  const stop = position.side === "short" ? refPrice + stopOffset : refPrice - stopOffset;
  const target = position.side === "short" ? refPrice - targetOffset : refPrice + targetOffset;
  const handleConfirm = () => {
    const a = pendingAction, price = data.price;
    setPositions(p => {
      const cur = p[ticker] || { side: "flat" };
      let next = { ...cur };
      if (a === "B2O") next = { side: "long", entryPrice: price, size: 100, addFired: false, tpFired: false, entryTime: Date.now() };
      else if (a === "S2O") next = { side: "short", entryPrice: price, size: 100, addFired: false, tpFired: false, entryTime: Date.now() };
      else if (a === "ADD") {
        const newSize = cur.size + 50;
        const newAvg = ((cur.entryPrice * cur.size) + (price * 50)) / newSize;
        next = { ...cur, size: newSize, entryPrice: newAvg, addFired: true };
      } else if (a === "TP") {
        const sold = Math.round(cur.size / 2);
        next = { ...cur, size: cur.size - sold, tpFired: true };
      } else if (a === "S2C" || a === "B2C") next = { side: "flat" };
      return { ...p, [ticker]: next };
    });
    setFills(f => ({ ...f, [ticker]: { action: a, price, at: Date.now() } }));
    setPendingAction(null);
  };
  const posColor = position.side === "long" ? C.long : position.side === "short" ? C.short : C.muted;
  const pnlColor = pnl.dollars >= 0 ? C.long : C.short;
  return (
    <div className="flex flex-col gap-2">
      <div className="flex items-center gap-2">
        <button onClick={onBack} style={{ color: C.muted }} className="p-1 -ml-1"><ChevronLeft size={20} /></button>
        <div style={{ color: C.text }} className="text-xl font-mono font-bold">{ticker}</div>
        <div style={{ color: C.text }} className="text-xl font-mono">${data.price.toFixed(2)}</div>
        <div style={{ color: data.change >= 0 ? C.long : C.short }} className="text-sm font-mono">{data.change >= 0 ? "+" : ""}{data.change.toFixed(2)}%</div>
        <button onClick={() => setShowSim(!showSim)} style={{ color: C.dim }} className="p-1 ml-auto"><Settings size={14} /></button>
      </div>
      <div className="grid grid-cols-3 gap-2">
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-2.5 py-1.5">
          <div style={{ color: C.muted }} className="text-[11px] tracking-[0.15em]">WHERE</div>
          <div style={{ color: C.text }} className="text-sm font-medium leading-tight">{mmgState}</div>
          <div style={{ color: C.muted }} className="text-[12px]">{direction} bias</div>
        </div>
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-2.5 py-1.5">
          <div style={{ color: C.muted }} className="text-[11px] tracking-[0.15em]">WHEN</div>
          <div style={{ color: C.text }} className="text-sm font-medium leading-tight">{campaign}</div>
          <div style={{ color: C.muted }} className="text-[12px] font-mono">{rvol.toFixed(2)}x RVOL</div>
        </div>
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-2.5 py-1.5">
          <div style={{ color: C.muted }} className="text-[11px] tracking-[0.15em]">POSITION</div>
          <div style={{ color: posColor }} className="text-sm font-mono font-bold leading-tight uppercase">{position.side}</div>
          {position.side !== "flat" ? <div style={{ color: pnlColor }} className="text-[12px] font-mono">{pnl.pct >= 0 ? "+" : ""}{pnl.pct.toFixed(2)}% · {position.addFired ? "A✓" : "a"}·{position.tpFired ? "T✓" : "t"}</div> : <div style={{ color: C.dim }} className="text-[12px]">no fills</div>}
        </div>
      </div>
      <div className="grid grid-cols-2 gap-2">
        <ActionCell code="B2O" label="enter long" score={scores.b2o} lockedReason="in position" tone="long" onTap={() => setPendingAction("B2O")} />
        <ActionCell code="S2O" label="enter short" score={scores.s2o} lockedReason="in position" tone="short" onTap={() => setPendingAction("S2O")} />
      </div>
      <div className="grid grid-cols-2 gap-2">
        <ActionCell code="ADD" label="scale in · 50% mark" score={scores.add} lockedReason={addLockReason(position, scores.campaignProgress)} tone="add" onTap={() => setPendingAction("ADD")} />
        <ActionCell code="TP"  label="take profit · 75% mark" score={scores.tp} lockedReason={tpLockReason(position, scores.campaignProgress)} tone="tp" onTap={() => setPendingAction("TP")} />
      </div>
      <div className="grid grid-cols-2 gap-2">
        <ActionCell code="S2C" label="close long" score={scores.s2c} lockedReason="no long position" tone="close" onTap={() => setPendingAction("S2C")} />
        <ActionCell code="B2C" label="cover short" score={scores.b2c} lockedReason="no short position" tone="close" onTap={() => setPendingAction("B2C")} />
      </div>
      <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-3 py-2">
        <div className="grid grid-cols-6 gap-1 font-mono text-[12px]">
          <div><div style={{ color: C.muted }} className="text-[10px] tracking-wider">STOP</div><div style={{ color: C.short }}>${stop.toFixed(2)}</div></div>
          <div><div style={{ color: C.muted }} className="text-[10px] tracking-wider">TGT</div><div style={{ color: C.long }}>${target.toFixed(2)}</div></div>
          <div><div style={{ color: C.muted }} className="text-[10px] tracking-wider">R:R</div><div style={{ color: C.text }}>1:{(targetOffset / stopOffset).toFixed(1)}</div></div>
          <div><div style={{ color: C.muted }} className="text-[10px] tracking-wider">SIZE</div><div style={{ color: C.text }}>{position.side !== "flat" ? position.size : 100}sh</div></div>
          <div><div style={{ color: C.muted }} className="text-[10px] tracking-wider">{position.side !== "flat" ? "PnL" : "RISK"}</div><div style={{ color: position.side !== "flat" ? pnlColor : C.close }}>{position.side !== "flat" ? `${pnl.dollars >= 0 ? "+" : ""}$${pnl.dollars.toFixed(0)}` : `$${(stopOffset*100).toFixed(0)}`}</div></div>
          <div><div style={{ color: C.muted }} className="text-[10px] tracking-wider">ATR</div><div style={{ color: C.text }}>${data.atr.toFixed(2)}</div></div>
        </div>
      </div>
      {showSim && (
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl p-3 space-y-2 text-xs">
          <div>
            <div style={{ color: C.muted }} className="text-[11px] tracking-[0.15em] mb-1">MMG STATE</div>
            <div className="flex flex-wrap gap-1">{MMG_STATES.map(s => (
              <button key={s} onClick={() => setMmgState(s)} style={{ backgroundColor: mmgState === s ? C.text : C.bg, color: mmgState === s ? C.bg : C.muted }} className="px-1.5 py-0.5 rounded font-mono text-[11px]">{s}</button>
            ))}</div>
          </div>
          <div>
            <div style={{ color: C.muted }} className="text-[11px] tracking-[0.15em] mb-1">CAMPAIGN</div>
            <div className="flex flex-wrap gap-1">{CAMPAIGN_STATES.map(s => (
              <button key={s} onClick={() => setCampaign(s)} style={{ backgroundColor: campaign === s ? C.text : C.bg, color: campaign === s ? C.bg : C.muted }} className="px-1.5 py-0.5 rounded font-mono text-[11px]">{s}</button>
            ))}</div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <div style={{ color: C.muted }} className="text-[11px] tracking-[0.15em] mb-1">BIAS</div>
              <div className="flex gap-1">{["long", "short", "neutral"].map(d => (
                <button key={d} onClick={() => setDirection(d)} style={{ backgroundColor: direction === d ? C.text : C.bg, color: direction === d ? C.bg : C.muted }} className="px-1.5 py-0.5 rounded font-mono text-[11px]">{d}</button>
              ))}</div>
            </div>
            <div>
              <div style={{ color: C.muted }} className="text-[11px] tracking-[0.15em] mb-1">RVOL · {rvol.toFixed(2)}x</div>
              <input type="range" min="0.3" max="3" step="0.1" value={rvol} onChange={(e) => setRvol(parseFloat(e.target.value))} className="w-full" />
            </div>
          </div>
        </div>
      )}
      {pendingAction && <ConfirmModal action={pendingAction} ticker={ticker} price={data.price} position={position.side !== "flat" ? position : null} onConfirm={handleConfirm} onCancel={() => setPendingAction(null)} />}
    </div>
  );
}

// v.26 — Capital Allocation Widget (ECM 70% / OCM 30%)
// ============================================================================
function CapitalAllocationCard({ ecmAccount, ocmAccount, ecmLedger, ocmLedger, livePrices }) {
  const ecmStart = ecmAccount.startingBalance || 70000;
  const ocmStart = ocmAccount.startingBalance || 30000;
  // ECM equity = balance + unrealized on equity opens
  let ecmUnreal = 0;
  for (const t of ecmLedger) {
    if (t.status !== "open") continue;
    const px = livePrices && livePrices[t.ticker];
    if (!px) continue;
    ecmUnreal += t.dir === 1 ? (px - t.entryPrice) * t.currentShares : (t.entryPrice - px) * t.currentShares;
  }
  const ecmEquity = ecmAccount.balance + ecmUnreal;
  // OCM equity = balance + sum of current option positions value (mark-to-market via highWaterPremium proxy)
  let ocmUnreal = 0;
  for (const t of ocmLedger) {
    if (t.status !== "open") continue;
    const mark = t.highWaterPremium || t.entryPremium;
    ocmUnreal += (mark - t.entryPremium) * t.currentContracts * 100;
  }
  const ocmEquity = ocmAccount.balance + ocmUnreal;
  const total = ecmEquity + ocmEquity;
  const ecmPct = total > 0 ? (ecmEquity / total) * 100 : 70;
  const ocmPct = total > 0 ? (ocmEquity / total) * 100 : 30;

  return (
    <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl p-3">
      <div style={{ color: C.muted }} className="text-[11px] tracking-[0.2em] font-mono font-bold mb-2">CAPITAL ALLOCATION</div>
      <div className="grid grid-cols-2 gap-3">
        <div style={{ backgroundColor: C.track, borderColor: C.border }} className="border rounded-lg p-2">
          <div style={{ color: C.muted }} className="text-[10px] font-mono">ECM (Equity)</div>
          <div style={{ color: C.text }} className="text-[15px] font-bold font-mono">${ecmEquity.toFixed(0)}</div>
          <div style={{ color: ecmEquity >= ecmStart ? C.long : C.short }} className="text-[11px] font-mono">
            {ecmEquity >= ecmStart ? "+" : ""}${(ecmEquity - ecmStart).toFixed(0)} ({ecmPct.toFixed(0)}%)
          </div>
        </div>
        <div style={{ backgroundColor: C.track, borderColor: C.border }} className="border rounded-lg p-2">
          <div style={{ color: C.muted }} className="text-[10px] font-mono">OCM (Options)</div>
          <div style={{ color: C.text }} className="text-[15px] font-bold font-mono">${ocmEquity.toFixed(0)}</div>
          <div style={{ color: ocmEquity >= ocmStart ? C.long : C.short }} className="text-[11px] font-mono">

// ============================================================================
// v.22c.2 — PaperLedger card (executed trades from auto-loop)
// ============================================================================
function PaperLedger({ ledger, onReset, livePrices, coveredCalls, multiTickerEngine }) {
  const open = ledger.filter(t => t.status === "open");
  const closed = ledger.filter(t => t.status === "closed");
  const totalRealized = closed.reduce((s, t) => s + (t.realizedPnL || 0), 0);
  const winners = closed.filter(t => (t.realizedPnL || 0) > 0).length;
  const losers = closed.filter(t => (t.realizedPnL || 0) < 0).length;
  const winRate = closed.length > 0 ? (winners / closed.length * 100) : 0;

  // Format helpers
  const fmtTime = (t) => new Date(t).toLocaleString("en-US", {
    month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
  });
  const fmtDuration = (start, end) => {
    const mins = Math.round((end - start) / 60000);
    if (mins < 60) return mins + "m";
    const h = Math.floor(mins / 60), m = mins % 60;
    return h + "h" + (m > 0 ? " " + m + "m" : "");
  };
  const pnlPct = (t) => {
    if (!t.entryPrice || !t.exitPrice) return 0;
    return t.dir === 1
      ? ((t.exitPrice - t.entryPrice) / t.entryPrice) * 100
      : ((t.entryPrice - t.exitPrice) / t.entryPrice) * 100;
  };

  // CSV export
  const exportCSV = () => {
    const rows = [
      ["id","ticker","dir","status","entryType","exitType","entryTime","exitTime","durationMin","entryPrice","exitPrice","entryShares","exitShares","pnl","pnlPct","stopPrice","atrAtEntry"]
    ];
    for (const t of ledger) {
      const durMin = t.closedAt ? Math.round((t.closedAt - t.entryTime) / 60000) : "";
      rows.push([
        t.id, t.ticker, t.dir === 1 ? "LONG" : "SHORT", t.status,
        t.entryType, t.exitType || "",
        new Date(t.entryTime).toISOString(),
        t.closedAt ? new Date(t.closedAt).toISOString() : "",
        durMin,
        t.entryPrice.toFixed(4), t.exitPrice ? t.exitPrice.toFixed(4) : "",
        t.entryShares, t.currentShares,
        (t.realizedPnL || 0).toFixed(2),
        t.status === "closed" ? pnlPct(t).toFixed(3) : "",
        t.stopPrice ? t.stopPrice.toFixed(4) : "",
        t.atrAtEntry ? t.atrAtEntry.toFixed(4) : "",
      ].join(","));
    }
    const blob = new Blob([rows.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "mts-ledger-" + new Date().toISOString().slice(0, 10) + ".csv";
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl p-3">
      <div className="flex items-center gap-2 mb-2">
        <div style={{ color: C.muted }} className="text-[11px] tracking-[0.2em] font-mono font-bold flex-1">AUTO PAPER LEDGER</div>
        <div style={{ color: C.dim }} className="text-[12px] font-mono">{ledger.length} trades</div>
      </div>

      {/* Summary stats */}
      <div className="grid grid-cols-2 gap-x-3 gap-y-1 text-[12px] font-mono mb-2">
        <div style={{ color: C.muted }}>Open</div>
        <div style={{ color: C.text }} className="text-right font-bold">{open.length}</div>
        <div style={{ color: C.muted }}>Closed</div>
        <div style={{ color: C.text }} className="text-right font-bold">{closed.length}</div>
        <div style={{ color: C.muted }}>Win / Loss</div>
        <div style={{ color: C.text }} className="text-right font-bold">
          <span style={{ color: C.long }}>{winners}</span> / <span style={{ color: C.short }}>{losers}</span>
          <span style={{ color: C.dim }}> ({winRate.toFixed(0)}%)</span>
        </div>
        <div style={{ color: C.muted }}>Realized P/L</div>
        <div style={{ color: totalRealized >= 0 ? C.long : C.short }} className="text-right font-bold">
          {totalRealized >= 0 ? "+" : ""}${totalRealized.toFixed(2)}
        </div>
      </div>

      {/* Open positions with live unrealized */}
      {open.length > 0 && (
        <div className="mt-3 pt-2" style={{ borderTopColor: C.border, borderTopWidth: 1, borderTopStyle: "solid" }}>
          <div style={{ color: C.muted }} className="text-[11px] tracking-[0.15em] font-mono mb-1">OPEN POSITIONS</div>
          {open.map(t => {
            const liveP = livePrices && livePrices[t.ticker];
            const unreal = liveP ? (t.dir === 1
              ? (liveP - t.entryPrice) * t.currentShares
              : (t.entryPrice - liveP) * t.currentShares) : null;
            const unrealPct = liveP ? (t.dir === 1
              ? ((liveP - t.entryPrice) / t.entryPrice) * 100
              : ((t.entryPrice - liveP) / t.entryPrice) * 100) : null;
            return (
              <div key={t.id} className="py-1.5 border-b last:border-b-0" style={{ borderBottomColor: C.border }}>
                <div className="flex items-center gap-2 mb-0.5">
                  <span style={{ color: t.dir === 1 ? C.long : C.short }} className="text-[13px] font-mono font-bold">{t.dir === 1 ? "L" : "S"} {t.ticker}</span>
                  <span style={{ color: C.dim }} className="text-[11px] font-mono">{t.entryType}</span>
                  {(() => {
                    const tg = multiTickerEngine && multiTickerEngine[t.ticker] && multiTickerEngine[t.ticker].trendGate;
                    if (!tg || tg.state === "unknown") return null;
                    const icon = tg.state === "bullish" ? "↑" : tg.state === "bearish" ? "↓" : "→";
                    const color = tg.state === "bullish" ? C.long : tg.state === "bearish" ? C.short : C.dim;
                    return <span style={{ color }} className="text-[11px] font-mono" title={"1H " + (tg.hBullish?"up":"dn") + " · D " + (tg.dBullish?"up":"dn")}>{icon}{tg.state[0].toUpperCase()}</span>;
                  })()}
                  <span style={{ color: C.text }} className="text-[12px] font-mono ml-auto">{t.currentShares}sh @{t.entryPrice.toFixed(2)}</span>
                </div>
                <div className="flex items-center gap-2 text-[11px] font-mono">
                  <span style={{ color: C.dim }}>in {fmtTime(t.entryTime)}</span>
                  {liveP != null && unreal != null && (
                    <span style={{ color: unreal >= 0 ? C.long : C.short }} className="ml-auto font-bold">
                      now {liveP.toFixed(2)} ({unreal >= 0 ? "+" : ""}${unreal.toFixed(2)}, {unreal >= 0 ? "+" : ""}{unrealPct.toFixed(2)}%)
                    </span>
                  )}
                </div>
                {/* v.25 — covered call candidate for underwater longs */}
                {t.dir === 1 && coveredCalls && coveredCalls[t.ticker] && (
                  <div className="mt-1 px-2 py-1 rounded" style={{ backgroundColor: C.track }}>
                    <div style={{ color: C.tp }} className="text-[10px] font-mono font-bold">COVERED CALL</div>
                    <div style={{ color: C.text }} className="text-[10px] font-mono">
                      {coveredCalls[t.ticker].daysOut}d · ${coveredCalls[t.ticker].strike.toFixed(0)} call · Δ {coveredCalls[t.ticker].delta.toFixed(2)} · premium ${coveredCalls[t.ticker].premium.toFixed(2)}
                    </div>
                    <div style={{ color: C.dim }} className="text-[9px] font-mono">exp {coveredCalls[t.ticker].expiration}</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Closed trades — detailed */}
      {closed.length > 0 && (
        <div className="mt-3 pt-2" style={{ borderTopColor: C.border, borderTopWidth: 1, borderTopStyle: "solid" }}>
          <div className="flex items-center gap-2 mb-1">
            <div style={{ color: C.muted }} className="text-[11px] tracking-[0.15em] font-mono flex-1">CLOSED (last 20)</div>
          </div>
          {closed.slice(-20).reverse().map(t => {
            const pnl = t.realizedPnL || 0;
            const pct = pnlPct(t);
            const dur = t.closedAt ? fmtDuration(t.entryTime, t.closedAt) : "";
            return (
              <div key={t.id} className="py-1.5 border-b last:border-b-0" style={{ borderBottomColor: C.border }}>
                <div className="flex items-center gap-2 mb-0.5">
                  <span style={{ color: t.dir === 1 ? C.long : C.short }} className="text-[13px] font-mono font-bold">{t.dir === 1 ? "L" : "S"} {t.ticker}</span>
                  <span style={{ color: C.dim }} className="text-[11px] font-mono">{t.entryType}&rarr;{t.exitType}</span>
                  <span style={{ color: pnl >= 0 ? C.long : C.short }} className="ml-auto text-[13px] font-mono font-bold">
                    {pnl >= 0 ? "+" : ""}${pnl.toFixed(2)}
                  </span>
                  <span style={{ color: pnl >= 0 ? C.long : C.short }} className="text-[12px] font-mono font-bold w-14 text-right">
                    {pct >= 0 ? "+" : ""}{pct.toFixed(2)}%
                  </span>
                </div>
                <div className="flex items-center gap-1 text-[11px] font-mono" style={{ color: C.dim }}>
                  <span>{fmtTime(t.entryTime)} @{t.entryPrice.toFixed(2)}</span>
                  <span>&rarr;</span>
                  <span>{fmtTime(t.closedAt)} @{t.exitPrice ? t.exitPrice.toFixed(2) : "—"}</span>
                  <span className="ml-auto">({dur})</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Actions */}
      <div className="mt-3 pt-2 flex gap-2" style={{ borderTopColor: C.border, borderTopWidth: 1, borderTopStyle: "solid" }}>
        {ledger.length > 0 && (
          <button onClick={exportCSV}
            style={{ borderColor: C.border, color: C.text }}
            className="flex-1 py-1.5 rounded border text-[12px] font-mono uppercase tracking-wider">
            Export CSV
          </button>
        )}
        {ledger.length > 0 && (
          <button onClick={() => { if (confirm("Reset paper ledger and execution tracker? This clears all trades.")) onReset(); }}
            style={{ borderColor: C.short, color: C.short }}
            className="flex-1 py-1.5 rounded border text-[12px] font-mono uppercase tracking-wider">
            Reset Ledger
          </button>
        )}
      </div>

      {ledger.length === 0 && (
        <div style={{ color: C.dim }} className="text-[12px] mt-2">No auto-trades yet. Engine fires trades on B2O/S2O signals during an active session.</div>
      )}
    </div>
  );
}

function RiskAssessmentWizard({ onComplete, onCancel, existingProfile, allowCancel }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState(existingProfile ? existingProfile.answers : {});
  const totalSteps = RISK_QUESTIONS.length + 1;
  const isResult = step === RISK_QUESTIONS.length;
  const currentQ = !isResult ? RISK_QUESTIONS[step] : null;
  const currentAnswer = currentQ ? answers[currentQ.id] : null;
  const { score, tier } = scoreRiskAnswers(answers);
  const tierData = RISK_TIERS[tier];

  const choose = (idx) => {
    setAnswers({ ...answers, [currentQ.id]: idx });
    setTimeout(() => setStep(step + 1), 180);
  };
  const finish = () => {
    const profile = { tier, score, answers, completedAt: Date.now() };
    saveJSON(STORAGE.RISK, profile);
    onComplete(profile);
  };

  return (
    <div style={{ backgroundColor: C.bg, color: C.text }} className="fixed inset-0 z-50 flex flex-col">
      <div style={{ backgroundColor: C.surface, borderBottomColor: C.border }} className="border-b px-4 py-3">
        <div className="max-w-md mx-auto">
          <div className="flex items-center justify-between mb-2">
            {allowCancel ? <button onClick={onCancel} style={{ color: C.dim }} className="text-xs font-mono uppercase tracking-wider">Cancel</button> : <div className="w-12" />}
            <div style={{ color: C.dim }} className="text-xs font-mono">{isResult ? "Done" : `${step + 1} / ${RISK_QUESTIONS.length}`}</div>
          </div>
          <div style={{ backgroundColor: C.track }} className="h-1 rounded-full overflow-hidden">
            <div style={{ backgroundColor: C.long, width: `${((step + (isResult ? 1 : 0)) / totalSteps) * 100}%`, transition: "width 0.3s ease" }} className="h-full" />
          </div>
          <div style={{ color: C.muted }} className="text-[12px] tracking-[0.2em] mt-2 font-mono font-bold">RISK ASSESSMENT</div>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto px-4 py-6">
        <div className="max-w-md mx-auto">
          {!isResult && currentQ && (
            <div>
              <div style={{ color: C.dim }} className="text-[12px] tracking-[0.2em] mb-3 font-mono">QUESTION {step + 1}</div>
              <h2 style={{ color: C.text }} className="text-xl font-bold leading-snug mb-6">{currentQ.question}</h2>
              <div className="space-y-2">
                {currentQ.options.map((opt, idx) => {
                  const selected = currentAnswer === idx;
                  return (
                    <button key={idx} onClick={() => choose(idx)}
                      style={{ backgroundColor: selected ? "var(--long-soft)" : C.surface, borderColor: selected ? C.long : C.border, color: C.text }}
                      className="w-full text-left px-4 py-3.5 rounded-lg border-2 text-sm active:opacity-70">
                      <div className="flex items-center gap-3">
                        <div style={{ backgroundColor: selected ? C.long : "transparent", borderColor: selected ? C.long : C.border }} className="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0">
                          {selected && <Check size={12} color="#fff" />}
                        </div>
                        <span>{opt}</span>
                      </div>
                    </button>
                  );
                })}
              </div>
              {step > 0 && (
                <button onClick={() => setStep(step - 1)} style={{ color: C.dim }} className="mt-6 text-xs font-mono uppercase tracking-wider">
                  &larr; Back
                </button>
              )}
            </div>
          )}

          {isResult && (
            <div>
              <div style={{ color: C.dim }} className="text-[12px] tracking-[0.2em] mb-3 font-mono">YOUR PROFILE</div>
              <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl p-6 text-center mb-6">
                <div className="text-5xl mb-3">{tierData.icon}</div>
                <h2 style={{ color: C.text }} className="text-2xl font-bold mb-2">{tierData.name}</h2>
                <div style={{ color: C.dim }} className="text-xs font-mono mb-4">Score: {score.toFixed(2)} / 3.00</div>
                <p style={{ color: C.muted }} className="text-sm">{tierData.description}</p>
              </div>
              <div style={{ color: C.dim }} className="text-[12px] tracking-[0.2em] mb-2 font-mono">YOUR PARAMETERS</div>
              <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-lg overflow-hidden mb-6">
                <div style={{ borderColor: C.border }} className="flex justify-between px-4 py-3 border-b">
                  <span style={{ color: C.muted }} className="text-sm">Per-trade risk</span>
                  <span style={{ color: C.text }} className="text-sm font-mono font-bold">{tierData.risk.toFixed(2)}%</span>
                </div>
                <div style={{ borderColor: C.border }} className="flex justify-between px-4 py-3 border-b">
                  <span style={{ color: C.muted }} className="text-sm">R:R minimum</span>
                  <span style={{ color: C.text }} className="text-sm font-mono font-bold">{tierData.rrMin.toFixed(1)}R</span>
                </div>
                <div style={{ borderColor: C.border }} className="flex justify-between px-4 py-3 border-b">
                  <span style={{ color: C.muted }} className="text-sm">Max concurrent positions</span>
                  <span style={{ color: C.text }} className="text-sm font-mono font-bold">{tierData.maxPos}</span>
                </div>
                <div className="flex justify-between px-4 py-3">
                  <span style={{ color: C.muted }} className="text-sm">Daily stop loss</span>
                  <span style={{ color: C.short }} className="text-sm font-mono font-bold">{tierData.dailyStop.toFixed(1)}%</span>
                </div>
              </div>
              <p style={{ color: C.dim }} className="text-xs text-center mb-6">
                You can retake this assessment any time from Account &rarr; Risk Profile.
              </p>
              <button onClick={finish} style={{ backgroundColor: C.long, color: "#fff" }} className="w-full py-3.5 rounded-lg font-bold text-sm tracking-wide active:opacity-80">
                Continue to App
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function todayStr() { return new Date().toISOString().slice(0, 10); }
function plusDaysStr(d) { const x = new Date(); x.setDate(x.getDate() + d); return x.toISOString().slice(0, 10); }

function SessionCreateForm({ riskProfile, onCancel, onCreate }) {
  const [name, setName] = useState("");
  const [start, setStart] = useState(todayStr());
  const [end, setEnd] = useState(plusDaysStr(14));
  const tier = riskProfile ? RISK_TIERS[riskProfile.tier] : null;
  const valid = start && end && new Date(end) >= new Date(start) && riskProfile;

  const create = () => {
    if (!valid) return;
    const session = {
      id: "sess_" + Date.now(),
      name: name || `Session ${new Date(start).toLocaleDateString()}`,
      startDate: start, endDate: end,
      status: "planned", universe: "SP500",
      riskProfile: riskProfile.tier, initialBalance: 100000,

function SessionListCard({ sessions, onCreate, onDelete }) {
  const today = new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());
  const computeStatus = (s) => {
    if (s.status === "cancelled") return "cancelled";
    if (s.endDate < today) return "ended";
    if (s.startDate > today) return "planned";
    return "active";
  };
  const statusColor = (st) => {
    if (st === "active") return C.long;
    if (st === "ended") return C.dim;
    if (st === "cancelled") return C.short;
    return C.muted;
  };
  return (
    <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl overflow-hidden">
      <div style={{ borderColor: C.border }} className="px-3 py-2.5 border-b flex items-center gap-2">
        <Calendar size={12} color={C.muted} />
        <div style={{ color: C.muted }} className="text-[11px] tracking-[0.2em] font-mono font-bold flex-1">TRADING SESSIONS</div>
        <div style={{ color: C.dim }} className="text-[12px] font-mono">{sessions.length}</div>
      </div>
      {sessions.length === 0 ? (
        <div className="px-3 py-2.5">
          <div style={{ color: C.dim }} className="text-[13px] mb-2">No sessions yet.</div>
          <button onClick={onCreate} style={{ backgroundColor: C.long, color: "#fff" }} className="w-full py-2 rounded font-bold text-xs">+ Create Session</button>
        </div>
      ) : (
        <div>
          {sessions.map((s) => {
            const tier = RISK_TIERS[s.riskProfile];
            const displayStatus = computeStatus(s);
            return (
              <div key={s.id} style={{ borderColor: C.border }} className="px-3 py-2 border-b last:border-b-0">
                <div className="flex items-center gap-2 mb-0.5">
                  <div style={{ color: C.text }} className="text-xs font-bold flex-1">{s.name}</div>
                  <span style={{ backgroundColor: C.track, color: statusColor(displayStatus) }} className="text-[10px] font-mono px-1.5 py-0.5 rounded uppercase font-bold">{displayStatus}</span>
                  <button
                    onClick={() => { if (window.confirm("Delete session \"" + s.name + "\"? Existing trades in the ledger are not affected.")) onDelete(s.id); }}
                    style={{ color: C.dim }}
                    className="p-1 -mr-1 active:opacity-60"
                    title="Delete session">
                    <X size={14} />
                  </button>
                </div>
                <div style={{ color: C.dim }} className="text-[12px] font-mono">{s.startDate} &rarr; {s.endDate}</div>
                {tier && <div style={{ color: C.muted }} className="text-[12px] mt-0.5">{tier.icon} {tier.name} &middot; ${s.initialBalance.toLocaleString()}</div>}
              </div>
            );
          })}
          <div className="px-3 py-2">
            <button onClick={onCreate} style={{ backgroundColor: C.long, color: "#fff" }} className="w-full py-2 rounded font-bold text-xs">+ Create Session</button>
          </div>
        </div>
      )}
    </div>
  );
}

      setScannerStatus(s => ({ ...s, avgVolDate: new Date(built.builtAt).toLocaleDateString(), tickersFound: built.tickersFound }));

    const pullScanner = async () => {

        if (cancelled) return;
        const ranked = [];
        for (const s of snaps) {
          // v.fix — accept prevDay.v as fallback when day.v is null
          // (15-min delay leaves first 15min of session with no today's volume yet)
          const todayV = (s.day && s.day.v) ? s.day.v : 0;
          const prevV = (s.prevDay && s.prevDay.v) ? s.prevDay.v : 0;
          const useV = todayV > 0 ? todayV : prevV;
          if (useV <= 0) continue;
          const avgV = avg[s.ticker];
          if (!avgV || avgV < 100000) continue; // skip illiquid
          const rvol = useV / avgV;
          const closePx = (s.day && s.day.c) || (s.prevDay && s.prevDay.c) || (s.lastQuote && s.lastQuote.P) || 0;
          ranked.push({
            sym: s.ticker,
            price: closePx,
            change: s.todaysChange || 0,
            changePct: s.todaysChangePerc || 0,
            volume: useV,
            avgVol: avgV,
            rvol: rvol,
            high: (s.day && s.day.h) || closePx,
            low: (s.day && s.day.l) || closePx,
            open: (s.day && s.day.o) || closePx,
            stalePrev: todayV === 0,  // flag: using prevDay fallback
          });
        }
        ranked.sort((a, b) => b.rvol - a.rvol);
        setTopRVOL(ranked.slice(0, 20));
        setScannerStatus(s => ({ ...s, status: "ok", lastFetch: Date.now() }));
      } catch (e) {
        if (cancelled) return;
        console.error("[v.21] Scanner error:", e.message);

    pullScanner();

    return () => { cancelled = true; clearInterval(iv); };
  }, [polygonKey, loggedIn]);

  // v.23 — Multi-ticker engine + execution for top-20 RVOL tickers
  useEffect(() => {
    if (!polygonKey || !loggedIn || !riskProfile || !topRVOL || topRVOL.length === 0) return;
    let cancelled = false;
    const TICKERS = topRVOL.slice(0, 20).map(t => t.sym).filter(s => s !== "TSLA");  // TSLA handled by its own poller
    if (TICKERS.length === 0) return;

    const pullAll = async () => {
      // Throttle: 4 parallel max, 250ms between batches
      const BATCH = 4;
      let curLedger = ledger, curExec = execState, curAccount = paperAccount;
      const allUpdates = {};
      for (let i = 0; i < TICKERS.length; i += BATCH) {
        if (cancelled) return;
        const batch = TICKERS.slice(i, i + BATCH);
        const results = await Promise.allSettled(batch.map(async (sym) => {
          const to = ymdDaysAgo(0);
          const from = ymdDaysAgo(10);
          const bars = await fetchMassiveBars(sym, 15, "minute", from, to, polygonKey);
          if (cancelled || bars.length < 100) return null;
          const ind = computeIndicators(bars);
          const engine = computeMMGEngineState(bars);
          // v.25 — trend gate: fetch 1H + daily, cache 1h/4h respectively
          let trendGate = null;
          try {
            const cache = trendCacheRef.current[sym];
            const now = Date.now();
            const HOURLY_TTL = 60 * 60 * 1000;       // 1h
            const DAILY_TTL = 4 * 60 * 60 * 1000;    // 4h
            const needHourly = !cache || !cache.hourlyAt || (now - cache.hourlyAt) > HOURLY_TTL;
            const needDaily = !cache || !cache.dailyAt || (now - cache.dailyAt) > DAILY_TTL;
            if (needHourly || needDaily) {
              const [h1, d1] = await Promise.all([
                needHourly ? fetchHourlyBars(sym, polygonKey) : Promise.resolve(cache && cache.hourly),
                needDaily ? fetchDailyBars(sym, polygonKey) : Promise.resolve(cache && cache.daily),
              ]);
              trendCacheRef.current[sym] = {
                hourly: h1, daily: d1,
                hourlyAt: needHourly ? now : (cache && cache.hourlyAt),
                dailyAt: needDaily ? now : (cache && cache.dailyAt),
              };
            }
            const cc = trendCacheRef.current[sym];
            trendGate = computeTrendGate(cc.hourly, cc.daily);
          } catch (e) { /* trend gate unavailable, allow trade */ }
          return { sym, ind, engine, bars, trendGate };
        }));
        for (const r of results) {
          if (r.status === "fulfilled" && r.value) {
            const { sym, ind, engine, bars, trendGate } = r.value;
            allUpdates[sym] = { indicators: ind, engine, bars, trendGate, lastFetch: Date.now() };
            if (engine && ind && ind.atr14) {
              const cp = { [sym]: ind.close };
              if (liveData && liveData.TSLA && liveData.TSLA.indicators) cp.TSLA = liveData.TSLA.indicators.close;
              Object.keys(allUpdates).forEach(s => { if (allUpdates[s].indicators) cp[s] = allUpdates[s].indicators.close; });
              const result = processEngineSignals({
                ticker: sym, engine, bars, atr: ind.atr14,
                ledger: curLedger, execState: curExec, account: curAccount, riskProfile, sessions, currentPrices: cp,
                trendGate: r.value.trendGate,
              });
              if (result.fills.length > 0) {
                curLedger = result.newLedger;
                curExec = result.newExecState;
                curAccount = result.newAccount;
              }
            }
          }
        }
        if (i + BATCH < TICKERS.length) await new Promise(r => setTimeout(r, 250));
      }
      if (cancelled) return;
      setMultiTickerEngine(prev => ({ ...prev, ...allUpdates }));
      // Commit ledger/account/exec updates if anything changed
      if (curLedger !== ledger) { setLedger(curLedger); saveJSON(STORAGE.LEDGER, curLedger); }
      if (curExec !== execState) { setExecState(curExec); saveJSON(STORAGE.EXEC_STATE, curExec); }
      if (curAccount !== paperAccount) { setPaperAccount(curAccount); saveJSON(STORAGE.ACCT, curAccount); }
    };

    pullAll();
    const iv2 = setInterval(pullAll, 60000);
    return () => { cancelled = true; clearInterval(iv2); };
  }, [polygonKey, loggedIn, riskProfile, topRVOL.map(t => t.sym).join(",")]);

  // v.26 — OCM POLLING LOOP: scan OCM_UNIVERSE every 60s
  // Computes ORB once daily, then runs entry/management on each ticker
  useEffect(() => {
    if (!polygonKey || !loggedIn || !riskProfile) return;
    let cancelled = false;
    const pullOCM = async () => {
      const today = todayCST();
      const minCST = nowMinuteCST();
      // Refresh ORB cache if new day
      let cache = orbCache;
      if (cache.date !== today) {
        cache = { date: today, perTicker: {} };
        setOrbCache(cache);
        saveJSON(STORAGE.ORB_CACHE, cache);
        console.log("[v.26 OCM] New trading day, ORB cache reset");
      }

      let curLedger = ocmLedger, curExec = ocmExecState, curAccount = ocmAccount;
      const BATCH = 3;
      for (let i = 0; i < OCM_UNIVERSE.length; i += BATCH) {
        if (cancelled) return;
        const batch = OCM_UNIVERSE.slice(i, i + BATCH);
        await Promise.allSettled(batch.map(async (sym) => {
          try {
            const bars5m = await fetchOCM5mBars(sym, polygonKey);
            if (cancelled || !bars5m || bars5m.length < 30) return;
            // Compute or use cached ORB
            let orb = cache.perTicker[sym];
            if (!orb && minCST >= CST_ORB_LOCK) {
              const computed = computeORBFromBars(bars5m, today);
              if (computed) {
                orb = computed;
                cache.perTicker[sym] = orb;
              }
            }
            if (!orb) return;  // ORB not yet locked
            // Fetch 1H, daily, options chain (1H/daily cached via separate trendCache)
            const tc = trendCacheRef.current[sym] || {};
            const now = Date.now();
            const needH = !tc.hourlyAt || (now - tc.hourlyAt) > 60*60*1000;
            const needD = !tc.dailyAt || (now - tc.dailyAt) > 4*60*60*1000;
            if (needH || needD) {
              const [h1, d1] = await Promise.all([
                needH ? fetchHourlyBars(sym, polygonKey) : Promise.resolve(tc.hourly),
                needD ? fetchDailyBars(sym, polygonKey) : Promise.resolve(tc.daily),
              ]);
              trendCacheRef.current[sym] = {
                hourly: h1, daily: d1,
                hourlyAt: needH ? now : tc.hourlyAt,
                dailyAt: needD ? now : tc.dailyAt,
              };
            }
            const cc = trendCacheRef.current[sym];
            const chain = await fetchOptionsChainSnapshot(sym, polygonKey);
            if (cancelled || !chain) return;
            // Run OCM engine
            const result = processOCMSignals({
              ticker: sym, bars5m, bars1h: cc.hourly, barsD: cc.daily,
              orb, chain, ledger: curLedger, execState: curExec, account: curAccount,
              riskProfile, ecmLedger: ledger, currentMinCST: minCST,
            });
            if (result.fills.length > 0) {
              curLedger = result.newLedger;
              curExec = result.newExecState;
              curAccount = result.newAccount;
            }
          } catch (e) { console.log("[v.26 OCM] " + sym + " error:", e.message); }
        }));
        if (i + BATCH < OCM_UNIVERSE.length) await new Promise(r => setTimeout(r, 300));
      }
      if (cancelled) return;
      // Persist ORB cache (now has all tickers ORB'd)
      saveJSON(STORAGE.ORB_CACHE, cache);
      if (curLedger !== ocmLedger) { setOcmLedger(curLedger); saveJSON(STORAGE.OCM_LEDGER, curLedger); }
      if (curExec !== ocmExecState) { setOcmExecState(curExec); saveJSON(STORAGE.OCM_EXEC, curExec); }
      if (curAccount !== ocmAccount) { setOcmAccount(curAccount); saveJSON(STORAGE.OCM_ACCT, curAccount); }
    };
    pullOCM();
    const iv = setInterval(pullOCM, 60 * 1000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [polygonKey, loggedIn, riskProfile, ocmLedger.length, ledger.length]);

  // v.25 — Covered call identifier: for LONG positions underwater past threshold,
  // fetch option chain + find Delta ~0.25 call. Refresh every 10 minutes per ticker.
  useEffect(() => {
    if (!polygonKey || !loggedIn) return;
    let cancelled = false;
    const CC_THRESHOLD_PCT = -2.0;  // start looking at -2% unrealized
    const CC_REFRESH_MS = 10 * 60 * 1000;
    const checkCoveredCalls = async () => {
      const opens = ledger.filter(t => t.status === "open" && t.dir === 1);
      const liveP = (livePricesMapRef.current || {});
      const updates = {};
      for (const t of opens) {
        const px = liveP[t.ticker];
        if (!px) continue;
        const unrealPct = ((px - t.entryPrice) / t.entryPrice) * 100;
        if (unrealPct > CC_THRESHOLD_PCT) continue;  // not underwater enough yet
        const cached = coveredCalls[t.ticker];
        if (cached && (Date.now() - cached.fetchedAt) < CC_REFRESH_MS) continue;
        try {
          const chain = await fetchOptionsChainSnapshot(t.ticker, polygonKey);
          if (cancelled || !chain) continue;
          const cc = findDelta25Call(chain, 7);
          if (cc) {
            updates[t.ticker] = { ...cc, fetchedAt: Date.now(), underlyingPx: px, unrealPct };
            console.log("[v.25] " + t.ticker + " covered call candidate: " + cc.daysOut + "d $" + cc.strike + " delta " + cc.delta.toFixed(2) + " premium $" + cc.premium.toFixed(2));
          }
        } catch (e) { /* skip */ }
      }
      if (!cancelled && Object.keys(updates).length > 0) {
        setCoveredCalls(prev => ({ ...prev, ...updates }));
      }
    };
    checkCoveredCalls();
    const iv = setInterval(checkCoveredCalls, 5 * 60 * 1000);  // poll every 5 min
    return () => { cancelled = true; clearInterval(iv); };
  }, [polygonKey, loggedIn, ledger]);

  // v.24.3: merged live macro tiles map: heartbeat ETFs + treasury yields
  const liveMacroMap = useMemo(() => {
    const m = { ...(liveHeartbeat || {}) };
    if (treasuryYields) {
      const tileFromYield = (val) => val != null ? { label: "", type: "price", value: val.toFixed(2) + "%", change: 0, live: true } : null;
      if (treasuryYields.T2) m.T2 = { ...tileFromYield(treasuryYields.T2), label: "2Y" };
      if (treasuryYields.T5) m.T5 = { ...tileFromYield(treasuryYields.T5), label: "5Y" };
      if (treasuryYields.T20) m.T20 = { ...tileFromYield(treasuryYields.T20), label: "20Y" };
      // T15 has no direct data; interpolate between 10Y and 20Y if both present
      if (treasuryYields.T10 && treasuryYields.T20) {
        const interp = (treasuryYields.T10 + treasuryYields.T20) / 2;
        m.T15 = { label: "15Y*", type: "price", value: interp.toFixed(2) + "%", change: 0, live: true };
      }
    }
    return m;
  }, [liveHeartbeat, treasuryYields]);

  // v.25 — ref to expose latest livePricesMap to covered call effect without re-running it
  const livePricesMapRef = useRef({});

  // v.24.1: live prices map for unrealized P/L on open positions
  const livePricesMap = useMemo(() => {
    const m = {};
    if (liveData && liveData.TSLA && liveData.TSLA.indicators) m.TSLA = liveData.TSLA.indicators.close;
    Object.keys(multiTickerEngine || {}).forEach(s => {
      const mt = multiTickerEngine[s];
      if (mt && mt.indicators) m[s] = mt.indicators.close;
    });
    return m;
  }, [liveData, multiTickerEngine]);

  // v.25 — keep ref in sync
  useEffect(() => { livePricesMapRef.current = livePricesMap; }, [livePricesMap]);

  // v.24.3 — Live account stats computed from paper ledger
  const accountStats = useMemo(
    () => computeAccountStats(paperAccount, ledger, livePricesMap),
    [paperAccount, ledger, livePricesMap]
  );

  // Build the Scanner's universe from top-20 RVOL, enriching with mock MMG fields
  // until v.22 ports the engine. Heartbeat tickers get the same treatment for the
  // <Deck/> path. Falls back to existing enrichedUniverse if no live scanner data.
  const liveScanner = useMemo(() => {
    if (!topRVOL || topRVOL.length === 0) return null;
    return topRVOL.map(r => ({
      sym: r.sym,
      name: r.sym,
      sector: "—",
      price: r.price,
      change: r.change,
      changePct: r.changePct,
      volume: r.volume,
      avgVol: r.avgVol,
      rvol: r.rvol,
      atr: 0,
      atrDistance: 0,
      mmgState: "Departed",      // placeholder until v.22 engine ports
      campaign: "—",
      direction: "Neutral",
      _liveRow: true,
    }));
  }, [topRVOL]);

  // Final universe presented to Scanner/Active/etc: top-20 RVOL if available, else mock.
  const universeForUI = liveScanner || enrichedUniverse;

  useEffect(() => {
    document.body.classList.toggle("dark", darkMode);
  }, [darkMode]);

  const activeCount = ledger.filter(t => t.status === "open").length + ocmLedger.filter(t => t.status === "open").length;  // v.26: ECM + OCM
  const addCustomTicker = (sym) => {
    setUniverse(u => {
      if (u.find(t => t.sym === sym)) return u;
      return [...u, generateMockTicker(sym)];
    });
  };
  const handleSelect = (sym, from) => { setSelected(sym); setReturnTo(from); setView("deck"); };
  const handleSelectArticle = (id) => { setSelectedArticle(id); setView("library-article"); };

  if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)} />;
  const showMacro = view !== "library-article";
  const showTabs = view !== "deck" && view !== "library-article";
  const article = LIBRARY_ARTICLES.find(a => a.id === selectedArticle);

  return (
    <div style={{ backgroundColor: C.bg, color: C.text }} className="min-h-screen font-sans">
      {false && <MarketHeartbeat account={accountStats} liveHeartbeat={liveMacroMap} />}
      <div className={`max-w-md mx-auto px-3 py-3 ${showTabs ? "pb-20" : "pb-4"}`}>
        {view === "scanner" && <Scanner universe={universeForUI} positions={positions} onSelect={(sym) => handleSelect(sym, "scanner")} />}
        {view === "active" && <Active universe={enrichedUniverse} positions={positions} onSelect={(sym) => handleSelect(sym, "active")} />}
        {view === "watchlist" && <WatchlistView watchlists={watchlists} setWatchlists={setWatchlists} universe={enrichedUniverse} addCustomTicker={addCustomTicker} positions={positions} onSelect={(sym) => handleSelect(sym, "watchlist")} />}
        {view === "library" && <Library articles={LIBRARY_ARTICLES} onSelect={handleSelectArticle} />}
        {view === "library-article" && article && <LibraryArticleDetail article={article} onBack={() => setView("library")} />}
        {view === "account" && <AccountSummary 
          account={accountStats} positions={positions} universe={enrichedUniverse}
          darkMode={darkMode} setDarkMode={setDarkMode}
          onLogout={() => setLoggedIn(false)} onSelect={(sym) => handleSelect(sym, "account")}
          riskProfile={riskProfile} onRetakeRisk={() => setOverlay("risk-assessment")}
          polygonKey={polygonKey} onSetPolygonKey={updatePolygonKey}
          paperAccount={paperAccount} onResetAccount={resetPaperAccount}
          sessions={sessions} onNewSession={() => setOverlay("session-create")}
          onHardReset={() => {
            try { Object.keys(STORAGE).forEach(k => localStorage.removeItem(STORAGE[k])); } catch (e) {}
            try { localStorage.removeItem("mts-v21-avgvol-cache"); } catch (e) {}
            window.location.reload();
          }}
          onDeleteSession={(id) => {
            const next = sessions.filter(s => s.id !== id);
            setSessions(next);
            saveJSON(STORAGE.SESS, next);
            console.log("[v.24.4] Session deleted:", id);
          }}
          liveData={liveData}
          scannerStatus={scannerStatus} topRVOL={topRVOL}
          ledger={ledger} onResetLedger={() => { setLedger([]); setExecState({}); saveJSON(STORAGE.LEDGER, []); saveJSON(STORAGE.EXEC_STATE, {}); }}
          showDiagnostics={showDiagnostics} onToggleDiagnostics={toggleDiagnostics}
          livePrices={livePricesMap}
          coveredCalls={coveredCalls}
          multiTickerEngine={multiTickerEngine}
          ecmAccount={ecmAccount} ocmAccount={ocmAccount} ocmLedger={ocmLedger} orbCache={orbCache}
        />}
        {view === "deck" && <Deck ticker={selected} universe={enrichedUniverse} positions={positions} setPositions={setPositions} fills={fills} setFills={setFills} onBack={() => setView(returnTo)} />}
      </div>
      {showTabs && <BottomTabBar view={view} setView={setView} activeCount={activeCount} />}
      {overlay === "risk-assessment" && (
        <RiskAssessmentWizard
          onComplete={completeRiskAssessment}
          onCancel={cancelRiskAssessment}
          existingProfile={riskProfile}
          allowCancel={!!riskProfile}
        />
      )}
      {overlay === "session-create" && (
        <SessionCreateForm
          riskProfile={riskProfile}
          onCancel={() => setOverlay(null)}
          onCreate={createSession}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MTSApp />);
</script>
</body>
</html>
