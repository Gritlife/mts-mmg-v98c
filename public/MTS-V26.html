function scoreRiskAnswers(answers) {
  const vals = Object.values(answers);
  if (vals.length === 0) return { score: 0, tier: "conservative" };
  const total = vals.reduce((a, b) => a + b, 0);
  const avg = total / vals.length;
  let tier;
  if (avg < 0.75) tier = "conservative";
  else if (avg < 1.5) tier = "moderate";
  else if (avg < 2.25) tier = "aggressive";
  else tier = "vAggressive";
  return { score: avg, tier };
}

// v.20 — Atomic Indicators (validated against MMG V9.9K-9.2 Pine reference)
// All values match TradingView Data Window exactly (popStdev, Wilder RMA, etc.)
// ============================================================================
function _last(a) { return a[a.length - 1]; }
function _slice(a, n) { return a.slice(Math.max(0, a.length - n)); }

function sma(values, period) {
  if (!values || values.length < period) return null;
  const w = _slice(values, period);
  return w.reduce((a, b) => a + b, 0) / period;
}

// Population stdev — TradingView ta.stdev() divides by n, not n-1
function popStdev(values, period) {
  if (!values || values.length < period) return null;
  const w = _slice(values, period);
  const mean = w.reduce((a, b) => a + b, 0) / period;
  const sq = w.reduce((acc, v) => acc + (v - mean) * (v - mean), 0);
  return Math.sqrt(sq / period);
}

// EMA with SMA seed (Pine convention)
function emaSeries(values, period) {
  if (!values || values.length < period) return [];
  const out = [];
  const seed = values.slice(0, period).reduce((a, b) => a + b, 0) / period;
  out.push(seed);
  const k = 2 / (period + 1);
  let v = seed;
  for (let i = period; i < values.length; i++) {
    v = values[i] * k + v * (1 - k);
    out.push(v);
  }
  return out;
}
function ema(values, period) {
  const s = emaSeries(values, period);
  return s.length ? _last(s) : null;
}

// Wilder's RMA
function wilderRMA(values, period) {
  if (!values || values.length < period) return null;
  let rma = values.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < values.length; i++) {
    rma = (rma * (period - 1) + values[i]) / period;
  }
  return rma;
}

function rsi(closes, period = 14) {
  if (!closes || closes.length < period + 1) return null;
  const gains = [], losses = [];
  for (let i = 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    gains.push(d > 0 ? d : 0);
    losses.push(d < 0 ? -d : 0);
  }
  const ag = wilderRMA(gains, period);
  const al = wilderRMA(losses, period);
  if (ag === null || al === null) return null;
  if (al === 0) return 100;
  const rs = ag / al;
  return 100 - 100 / (1 + rs);
}

function roc(closes, period) {
  if (!closes || closes.length < period + 1) return null;
  const cur = _last(closes);
  const past = closes[closes.length - 1 - period];
  return (cur - past) / past * 100;
}

function macd(closes, fast = 12, slow = 26, signal = 9) {
  if (!closes || closes.length < slow + signal) return null;
  const fastS = emaSeries(closes, fast);
  const slowS = emaSeries(closes, slow);
  if (!slowS.length) return null;
  const offset = slow - fast;
  const macdLine = [];
  for (let i = 0; i < slowS.length; i++) {
    macdLine.push(fastS[i + offset] - slowS[i]);
  }
  if (macdLine.length < signal) return null;
  const sigS = emaSeries(macdLine, signal);
  if (!sigS.length) return null;
  const m = _last(macdLine);
  const s = _last(sigS);
  return { macd: m, signal: s, hist: m - s };
}

function bollingerBands(closes, period = 20, mult = 2) {
  const basis = sma(closes, period);
  const sd = popStdev(closes, period);
  if (basis === null || sd === null) return null;
  const upper = basis + mult * sd;
  const lower = basis - mult * sd;
  return { basis, upper, lower, width: (upper - lower) / basis };
}

// Parabolic SAR (step=0.02, max=0.20) — full bar-walk
function parabolicSAR(bars, step = 0.02, maxAF = 0.20) {
  if (!bars || bars.length < 2) return null;
  let isUp = bars[1].c >= bars[0].c;
  let af = step;
  let ep = isUp ? bars[0].h : bars[0].l;
  let sar = isUp ? bars[0].l : bars[0].h;
  for (let i = 1; i < bars.length; i++) {
    const b = bars[i];
    const prevSar = sar;
    sar = prevSar + af * (ep - prevSar);
    if (isUp) {
      // Clamp SAR to be below prior two lows
      sar = Math.min(sar, bars[i - 1].l, i >= 2 ? bars[i - 2].l : bars[i - 1].l);
      if (b.l < sar) {
        // Flip to down
        isUp = false;
        sar = ep;
        ep = b.l;
        af = step;
      } else {
        if (b.h > ep) { ep = b.h; af = Math.min(af + step, maxAF); }
      }
    } else {
      // Clamp SAR to be above prior two highs
      sar = Math.max(sar, bars[i - 1].h, i >= 2 ? bars[i - 2].h : bars[i - 1].h);
      if (b.h > sar) {
        // Flip to up
        isUp = true;
        sar = ep;
        ep = b.h;
        af = step;
      } else {
        if (b.l < ep) { ep = b.l; af = Math.min(af + step, maxAF); }
      }
    }
  }
  return sar;
}

// Wilder's ATR
function atrWilder(bars, period = 14) {
  if (!bars || bars.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < bars.length; i++) {
    const b = bars[i], p = bars[i - 1];
    trs.push(Math.max(b.h - b.l, Math.abs(b.h - p.c), Math.abs(b.l - p.c)));
  }
  return wilderRMA(trs, period);
}

// Session-anchored VWAP (resets each ET day at midnight; close enough for 15m bars)
function sessionVWAP(bars) {
  if (!bars || !bars.length) return null;
  // Group by ET date; VWAP of the latest session only
  const latest = _last(bars);
  const latestDay = new Date(latest.t).toLocaleDateString("en-US", { timeZone: "America/New_York" });
  let pv = 0, vv = 0;
  for (const b of bars) {
    const day = new Date(b.t).toLocaleDateString("en-US", { timeZone: "America/New_York" });
    if (day === latestDay) {
      const tp = (b.h + b.l + b.c) / 3;
      pv += tp * b.v;
      vv += b.v;
    }
  }
  return vv > 0 ? pv / vv : null;
}

// Master indicator computation — runs all atoms on a bars array
function computeIndicators(bars) {
  if (!bars || bars.length < 70) return null;
  const closes = bars.map(b => b.c);
  const vols = bars.map(b => b.v);
  const bb = bollingerBands(closes, 20, 2);
  if (!bb) return null;
  // bbWidth series: compute BB rolling, take width at each step (need 50 widths for bbWidthAvg)
  const widthSeries = [];
  for (let i = 20; i <= closes.length; i++) {
    const bbi = bollingerBands(closes.slice(0, i), 20, 2);
    if (bbi) widthSeries.push(bbi.width);
  }
  const bbWidthAvg = sma(widthSeries, 50);
  const mac = macd(closes, 12, 26, 9);
  const last = _last(bars);
  const volAvg = sma(vols, 20);
  return {
    timestamp: last.t,
    open: last.o, high: last.h, low: last.l, close: last.c, volume: last.v,
    ema15: ema(closes, 21),  // v.22b fix: Pine emaLen=21
    vwap: sessionVWAP(bars),
    bbBasis: bb.basis,
    bbUpper: bb.upper,
    bbLower: bb.lower,
    bbWidth: bb.width,
    bbWidthAvg: bbWidthAvg,
    sar: parabolicSAR(bars),
    atr14: atrWilder(bars, 14),
    rsi14: rsi(closes, 14),
    roc9: roc(closes, 10),  // v.22b fix: Pine momLen=10
    macdHist: mac ? mac.hist : null,
    rvol: volAvg ? last.v / volAvg : null,
    barsLoaded: bars.length,
  };
}

// v.22c.2 — Auto-Execution Paper Loop
// Subscribes to engine signals, sizes trades, writes to paper account ledger
// ============================================================================

// Signal uniqueness key: ticker + bar timestamp + type
function signalKey(ticker, sig) {
  return ticker + ":" + sig.time + ":" + sig.type;
}

// Today's YYYY-MM-DD in ET
function todayET() {
  return new Date().toLocaleDateString("en-US", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" })
    .split("/").map((p,i) => i < 2 ? p : p).join("-"); // mm-dd-yyyy actually; use ISO
}
function todayETISO() {
  const fmt = new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" });
  return fmt.format(new Date()); // YYYY-MM-DD
}

// Is today within an active session range?
function activeSessionForToday(sessions) {
  const today = todayETISO();
  for (const s of sessions) {
    if (s.status === "cancelled") continue;
    if (s.startDate <= today && today <= s.endDate) return s;
  }
  return null;
}

// Compute next-bar-open price for the bar immediately AFTER a signal bar.
// Returns NaN if signal bar is the very latest (next bar not yet available).
function nextBarOpen(bars, signalBarTimestamp) {
  for (let i = 0; i < bars.length - 1; i++) {
    if (bars[i].t === signalBarTimestamp) return bars[i + 1].o;
  }
  return NaN;
}

// Find an open ledger position for a ticker
function findOpenPosition(ledger, ticker) {
  for (let i = ledger.length - 1; i >= 0; i--) {
    const e = ledger[i];
    if (e.ticker === ticker && e.status === "open") return { idx: i, pos: e };
  }
  return null;
}

// Sum realized PnL for today (ET)
function realizedPnLToday(ledger) {
  const today = todayETISO();
  let sum = 0;
  for (const e of ledger) {
    if (e.status !== "closed" || !e.closedAt) continue;
    const closedDay = new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" }).format(new Date(e.closedAt));
    if (closedDay === today) sum += e.realizedPnL || 0;
  }
  return sum;
}

/**
 * Process a single ticker's engine signals against the ledger.
 * v.24: Hardened with global maxPos, equity-based daily stop, per-ticker cooldown,
 * total notional cap, and tighter signal quality requirements.
 */
// ============================================================================
// v.26 — OCM EXECUTION ENGINE
// Process OCM signals: entry (break-pullback-rejection), in-trade management, exits
// ============================================================================
function processOCMSignals({
  ticker, bars5m, bars1h, barsD, orb, chain, ledger, execState, account, riskProfile,
  ecmLedger, currentMinCST,
}) {
  if (!bars5m || bars5m.length < 30 || !orb || !chain) {
    return { newLedger: ledger, newExecState: execState, newAccount: account, fills: [] };
  }
  const tier = RISK_TIERS[riskProfile.tier];
  const RISK_PCT = tier.risk / 100;
  const MAX_OCM_POS = 10;
  const MAX_PER_TICKER_PER_DAY = 2;
  const COOLDOWN_MIN = 30;

  let newLedger = ledger.slice();
  let newExecState = Object.assign({}, execState);
  let newAccount = Object.assign({}, account);
  const fills = [];
  const today = todayCST();
  const ind = computeOCMIndicators(bars5m);
  if (!ind) return { newLedger, newExecState, newAccount, fills };

  const tState = newExecState[ticker] || { todayEntries: 0, todayDate: today, lastExitMinCST: -999, lastBreakIdx: -1 };
  if (tState.todayDate !== today) {
    Object.assign(tState, { todayEntries: 0, todayDate: today, lastExitMinCST: -999, lastBreakIdx: -1 });
  }

  // Find ANY open OCM position on this ticker
  const openIdx = newLedger.findIndex(t => t.manager === "OCM" && t.ticker === ticker && t.status === "open");
  const openPos = openIdx >= 0 ? newLedger[openIdx] : null;

  // === IN-TRADE MANAGEMENT (if position open) ===
  if (openPos) {
    const result = manageOCMPosition({ pos: openPos, ind, orb, bars5m, chain, currentMinCST });
    if (result.action !== "hold") {
      const exitContract = chain.find(c => c.contractTicker === openPos.contractTicker);
      const exitPremium = exitContract ? exitContract.bid : openPos.premium;  // sell at bid
      const contractsToClose = result.action === "close" ? openPos.currentContracts : Math.floor(openPos.currentContracts * result.fraction);
      if (contractsToClose >= 1) {
        const pnl = (exitPremium - openPos.entryPremium) * contractsToClose * 100;
        openPos.realizedPnL += pnl;
        openPos.currentContracts -= contractsToClose;
        newAccount.balance += pnl;
        const fill = { ticker, type: result.label, contracts: contractsToClose, premium: exitPremium, pnl, time: bars5m[bars5m.length-1].t, manager: "OCM" };
        fills.push(fill);
        if (openPos.currentContracts <= 0) {
          openPos.status = "closed";
          openPos.closedAt = bars5m[bars5m.length-1].t;
          openPos.exitType = result.label;
          openPos.exitPremium = exitPremium;
          tState.lastExitMinCST = currentMinCST;
          console.log("[v.26 OCM] " + ticker + " CLOSE " + result.label + " contracts=" + contractsToClose + " pnl=" + pnl.toFixed(2));
        } else {
          // partial: track high-water for trailing stop on remaining
          if (!openPos.highWaterPremium || exitPremium > openPos.highWaterPremium) openPos.highWaterPremium = exitPremium;
          if (result.label === "PROFIT_LOCK_50") openPos.profitLockTaken = true;
          console.log("[v.26 OCM] " + ticker + " PARTIAL " + result.label + " contracts=" + contractsToClose + " pnl=" + pnl.toFixed(2) + " rem=" + openPos.currentContracts);
        }
        newLedger[openIdx] = openPos;
      }
    } else {
      // Track high-water for trailing stop
      const cur = chain.find(c => c.contractTicker === openPos.contractTicker);
      if (cur && cur.bid && (!openPos.highWaterPremium || cur.bid > openPos.highWaterPremium)) {
        openPos.highWaterPremium = cur.bid;
        newLedger[openIdx] = openPos;
      }
    }
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }

  // === ENTRY CHECK (no open position) ===
  // Kill zone: inside ORB range, no entry
  const curPx = ind.close;
  if (curPx >= orb.low && curPx <= orb.high) {
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }
  // Regular hours only (8:45–14:55)
  if (currentMinCST < CST_ORB_LOCK || currentMinCST >= CST_HARD_CLOSE) {
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }
  // Per-ticker daily limit + cooldown
  if (tState.todayEntries >= MAX_PER_TICKER_PER_DAY) {
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }
  if (currentMinCST - tState.lastExitMinCST < COOLDOWN_MIN) {
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }
  // Global OCM cap
  const totalOpen = newLedger.filter(t => t.manager === "OCM" && t.status === "open").length;
  if (totalOpen >= MAX_OCM_POS) {
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }

  // Try call setup, then put setup
  const direction = curPx > orb.high ? "call" : "put";
  // Hedge block vs ECM
  const ecmConflict = ecmLedger.find(t =>
    t.ticker === ticker && t.status === "open" &&
    ((direction === "call" && t.dir === -1) || (direction === "put" && t.dir === 1))
  );
  if (ecmConflict) {
    console.log("[v.26 OCM] " + ticker + " " + direction + " skip: ECM hedge conflict");
    tState.lastExecutedKey = today + ":" + direction;
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }
  // Pattern detection
  const pattern = detectORBPattern(bars5m, orb, direction);
  if (!pattern || !pattern.armed) {
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }
  // HTF gate
  const gate = computeOCMGate(bars5m, bars1h, barsD, ocmSmaPeriodFor(ticker), direction);
  if (!gate.ok) {
    console.log("[v.26 OCM] " + ticker + " " + direction + " skip: HTF gate (1H " + (gate.hBull?"up":"dn") + ", D " + (gate.dBull?"up":"dn") + ")");
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }
  // Contract selection
  const contract = selectOCMContract(chain, direction, curPx, ticker);
  if (!contract) {
    console.log("[v.26 OCM] " + ticker + " " + direction + " skip: no qualifying contract");
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }
  // Sizing — risk per trade = ocm_capital × risk_pct, fill at ask
  const riskDollars = newAccount.balance * RISK_PCT;
  const contracts = Math.floor(riskDollars / (contract.ask * 100));
  if (contracts < 1) {
    console.log("[v.26 OCM] " + ticker + " " + direction + " skip: undersized (risk " + riskDollars.toFixed(0) + " ask " + contract.ask.toFixed(2) + ")");
    newExecState[ticker] = tState;
    return { newLedger, newExecState, newAccount, fills };
  }
  // FILL: buy at ask
  const cost = contract.ask * contracts * 100;
  newAccount.balance -= cost;
  const trade = {
    id: "ocm_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
    manager: "OCM",
    ticker, dir: direction, status: "open",
    contractTicker: contract.contractTicker,
    expiration: contract.expiration,
    strike: contract.strike,
    type: contract.type,
    entryType: "ORB_BPR",
    entryPremium: contract.ask,
    entryDelta: contract.delta,
    entryGamma: contract.gamma,
    entryTheta: contract.theta,
    entryIV: contract.iv,
    entryContracts: contracts,
    currentContracts: contracts,
    entryUnderlyingPx: curPx,
    orbHighAtEntry: orb.high,
    orbLowAtEntry: orb.low,
    entryTime: bars5m[bars5m.length-1].t,
    highWaterPremium: contract.ask,
    profitLockTaken: false,
    realizedPnL: 0,
    closedAt: null, exitType: null, exitPremium: null,
  };
  newLedger.push(trade);
  fills.push({ ticker, type: "ENTRY", contracts, premium: contract.ask, manager: "OCM" });
  tState.todayEntries += 1;
  console.log("[v.26 OCM] " + ticker + " ENTRY " + direction.toUpperCase() + " " + contracts + "x " + contract.contractTicker + " @" + contract.ask.toFixed(2) + " Δ" + contract.delta.toFixed(2) + " γ" + (contract.gamma||0).toFixed(3));
  newExecState[ticker] = tState;
  return { newLedger, newExecState, newAccount, fills };
}

// Decide what to do with an open OCM position. Returns { action: "hold" | "close" | "partial", label, fraction }
function manageOCMPosition({ pos, ind, orb, bars5m, chain, currentMinCST }) {
  const cur = chain && chain.find(c => c.contractTicker === pos.contractTicker);
  const curPremium = cur ? cur.bid : pos.entryPremium;
  const px = ind.close;
  const isLong = pos.dir === "call";

  // 1. EOD hard close at 2:55 PM CST
  if (currentMinCST >= CST_HARD_CLOSE) return { action: "close", label: "EOD_HARD_CLOSE" };

  // 2. ETF 11AM CST time stop
  const isETF = OCM_ETF_SET.has(pos.ticker);
  if (isETF && currentMinCST >= CST_ETF_TIME_STOP) {
    if (curPremium > pos.entryPremium) {
      // profitable: exit in green
      return { action: "close", label: "ETF_TIME_STOP_GREEN" };
    } else if (curPremium <= pos.entryPremium * 0.50) {
      // already at -50%, close
      return { action: "close", label: "ETF_TIME_STOP_RED" };
    } else {
      // close anyway at this hour
      return { action: "close", label: "ETF_TIME_STOP" };
    }
  }

  // 3. Premium hard stop: -50%
  if (curPremium <= pos.entryPremium * 0.50) return { action: "close", label: "STOP_LOSS_50" };

  // 4. Profit lock at +50% premium (once per trade)
  if (!pos.profitLockTaken && curPremium >= pos.entryPremium * 1.50) {
    return { action: "partial", label: "PROFIT_LOCK_50", fraction: 0.5 };
  }

  // 5. Internal trailing stop at 20% below high-water (after profit lock taken)
  if (pos.profitLockTaken && pos.highWaterPremium && curPremium <= pos.highWaterPremium * 0.80) {
    return { action: "close", label: "TRAIL_STOP_20" };
  }

  // 6. Tech violation: VWAP / EMA13 / BB midline flip against position
  const vwapFlip = isLong ? px < ind.vwap : px > ind.vwap;
  const emaFlip  = isLong ? px < ind.ema13 : px > ind.ema13;
  const bbFlip   = isLong ? px < ind.bbMid : px > ind.bbMid;
  // Only fire tech violation if at least 1 fires AND we're not already in profit-lock-armed state
  // Hybrid with profit-lock: if profit-lock taken, any tech violation closes remainder
  if (pos.profitLockTaken && (vwapFlip || emaFlip || bbFlip)) {
    return { action: "close", label: "TECH_VIOLATION_POST_LOCK" };
  }
  // Pre-lock: require 2 of 3 tech flips
  const techCount = (vwapFlip?1:0) + (emaFlip?1:0) + (bbFlip?1:0);
  if (techCount >= 2) return { action: "close", label: "TECH_VIOLATION_2OF3" };

  // 7. Reversal stack (≥3 of 6 against position)
  const rev = computeReversalScore(ind, pos, orb);
  if (rev.score >= 3) return { action: "close", label: "REV_STACK_" + rev.score };

  // 8. Structural target: price approaches opposite ORB extreme
  if (orb) {
    const oppositeExtreme = isLong ? orb.low : orb.high;
    const range = orb.high - orb.low;
    const proximity = Math.abs(px - oppositeExtreme) / range;
    if (proximity < 0.10 && !pos.profitLockTaken) {  // within 10% of opposite extreme
      return { action: "partial", label: "STRUCTURAL_TARGET_50", fraction: 0.5 };
    }
  }

  return { action: "hold", label: "HOLD" };
}

function processEngineSignals({ ticker, engine, bars, atr, ledger, execState, account, riskProfile, sessions, currentPrices, trendGate }) {
  if (!engine || !engine.signalHistory || engine.signalHistory.length === 0) {
    return { newLedger: ledger, newExecState: execState, newAccount: account, fills: [] };
  }
  const tier = RISK_TIERS[riskProfile.tier];
  const RISK_PCT = tier.risk / 100;
  const DAILY_STOP_PCT = tier.dailyStop / 100;
  const MAX_POS = tier.maxPos;
  const ATR_STOP_MULT = 1.5;
  const RE_ENTRY_COOLDOWN_BARS = 4;
  const RE_ENTRY_COOLDOWN_MS = RE_ENTRY_COOLDOWN_BARS * 15 * 60 * 1000;
  const BB_EXPANSION_MIN_PCT = 10.0;

  let newLedger = ledger.slice();
  let newExecState = Object.assign({}, execState);
  let newAccount = Object.assign({}, account);
  const fills = [];

  // v.24 FIX 1: Global maxPos enforcement
  const countOpen = (lg) => lg.filter(t => t.status === "open").length;

  // v.24 FIX 2: Account-level daily stop using equity (balance + unrealized)
  const computeUnrealized = (lg) => {
    let u = 0;
    for (const t of lg) {
      if (t.status !== "open") continue;
      const px = currentPrices && currentPrices[t.ticker];
      if (!px) continue;
      u += t.dir === 1
        ? (px - t.entryPrice) * t.currentShares
        : (t.entryPrice - px) * t.currentShares;
    }
    return u;
  };

  const today = todayETISO();
  if (!newExecState._daily) newExecState._daily = {};
  if (newExecState._daily.date !== today) {
    newExecState._daily = { date: today, startEquity: newAccount.balance + computeUnrealized(newLedger) };
  }
  const currentEquity = newAccount.balance + computeUnrealized(newLedger);
  const equityDrawdownPct = (currentEquity - newExecState._daily.startEquity) / newExecState._daily.startEquity;
  const dailyHalted = equityDrawdownPct <= DAILY_STOP_PCT;
  if (dailyHalted && newExecState._daily.lastLogged !== today) {
    newExecState._daily.lastLogged = today;
    console.log("[v.24] DAILY STOP HIT: equity drawdown " + (equityDrawdownPct * 100).toFixed(2) + "% <= " + (DAILY_STOP_PCT * 100).toFixed(2) + "%. All new entries halted.");
  }

  // v.24 FIX 4: Total notional cap = equity * 1.5
  const computeTotalNotional = (lg) => {
    let n = 0;
    for (const t of lg) {
      if (t.status !== "open") continue;
      const px = currentPrices && currentPrices[t.ticker] ? currentPrices[t.ticker] : t.entryPrice;
      n += px * t.currentShares;
    }
    return n;
  };
  const MAX_TOTAL_NOTIONAL = currentEquity * 1.5;

  const activeSession = activeSessionForToday(sessions);
  const tickerState = newExecState[ticker] || { lastExecutedKey: null, lastExitTime: null };

  // v.fix — if no lastExecutedKey, prime with the most recent signal so we don't replay history
  if (!tickerState.lastExecutedKey && engine.signalHistory.length > 0) {
    const last = engine.signalHistory[engine.signalHistory.length - 1];
    tickerState.lastExecutedKey = signalKey(ticker, last);
    newExecState[ticker] = tickerState;
    return { newLedger, newExecState, newAccount, fills };
  }
  for (const sig of engine.signalHistory) {
    const key = signalKey(ticker, sig);
    const lastKey = tickerState.lastExecutedKey;
    if (lastKey) {
      if (key === lastKey) { tickerState._foundLast = true; continue; }
      if (!tickerState._foundLast) continue;
    }
    const fillPrice = nextBarOpen(bars, sig.time);
    if (isNaN(fillPrice)) break;
    const open = findOpenPosition(newLedger, ticker);
    const sigType = sig.type;

    if (sigType === "B2O" || sigType === "S2O") {
      if (!activeSession) { tickerState.lastExecutedKey = key; continue; }
      if (dailyHalted) { tickerState.lastExecutedKey = key; continue; }
      if (open) { tickerState.lastExecutedKey = key; continue; }
      if (countOpen(newLedger) >= MAX_POS) {
        console.log("[v.24] " + ticker + " " + sigType + " skip: maxPos " + countOpen(newLedger) + "/" + MAX_POS);
        tickerState.lastExecutedKey = key; continue;
      }
      if (tickerState.lastExitTime && (sig.time - tickerState.lastExitTime) < RE_ENTRY_COOLDOWN_MS) {
        console.log("[v.24] " + ticker + " " + sigType + " skip: re-entry cooldown");
        tickerState.lastExecutedKey = key; continue;
      }
      // v.fix — Trend gate REMOVED. MMG V9.9K-9.2 own logic (BB cycle, gates,
      // momentum, sarBull, c>EMA21, c>VWAP, longTurn/shortTurn) does the filtering.
      // trendGate still computed and cached for OCM use, but no longer blocks ECM entries.

      const stopDist = ATR_STOP_MULT * atr;
      const riskDollars = currentEquity * RISK_PCT;
      let shares = stopDist > 0 ? Math.floor(riskDollars / stopDist) : 0;
      const notionalCapPerTrade = (currentEquity / MAX_POS) * 1.5;
      const sharesByCap = Math.floor(notionalCapPerTrade / fillPrice);
      shares = Math.min(shares, sharesByCap);

      const proposedNotional = shares * fillPrice;
      const currentTotal = computeTotalNotional(newLedger);
      if (currentTotal + proposedNotional > MAX_TOTAL_NOTIONAL) {
        const available = Math.max(0, MAX_TOTAL_NOTIONAL - currentTotal);
        shares = Math.floor(available / fillPrice);
      }
      if (shares < 1) {
        console.log("[v.24] " + ticker + " " + sigType + " skip: total notional cap");
        tickerState.lastExecutedKey = key; continue;
      }

      const dir = sigType === "B2O" ? 1 : -1;
      const stopPrice = dir === 1 ? fillPrice - ATR_STOP_MULT * atr : fillPrice + ATR_STOP_MULT * atr;
      const trade = {
        id: "trade_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
        ticker, dir, status: "open",
        entryType: sigType, entryPrice: fillPrice, entryShares: shares, currentShares: shares,
        entryTime: sig.time, sessionId: activeSession.id, stopPrice, atrAtEntry: atr,
        adds: [], tps: [], realizedPnL: 0,
        closedAt: null, exitType: null, exitPrice: null,
      };
      newLedger.push(trade);
      fills.push({ ticker, type: sigType, shares, price: fillPrice, time: sig.time });
      console.log("[v.24] " + ticker + " " + sigType + " " + shares + "@" + fillPrice.toFixed(2) + " stop=" + stopPrice.toFixed(2) + " opens=" + countOpen(newLedger) + "/" + MAX_POS);

    } else if (sigType === "ADD" && open && open.pos.dir === sig.dir) {
      const addShares = Math.floor(open.pos.entryShares * 0.50);
      if (addShares < 1) { tickerState.lastExecutedKey = key; continue; }
      const totalShares = open.pos.currentShares + addShares;
      const newAvg = (open.pos.entryPrice * open.pos.currentShares + fillPrice * addShares) / totalShares;
      open.pos.adds.push({ price: fillPrice, shares: addShares, time: sig.time });
      open.pos.currentShares = totalShares;
      open.pos.entryPrice = newAvg;
      newLedger[open.idx] = open.pos;
      fills.push({ ticker, type: "ADD", shares: addShares, price: fillPrice, time: sig.time });
      console.log("[v.24] " + ticker + " ADD +" + addShares + "@" + fillPrice.toFixed(2));

    } else if (sigType === "TP" && open && open.pos.dir === sig.dir) {
      const closeShares = Math.floor(open.pos.currentShares * 0.50);
      if (closeShares < 1) { tickerState.lastExecutedKey = key; continue; }
      const pnl = open.pos.dir === 1
        ? (fillPrice - open.pos.entryPrice) * closeShares
        : (open.pos.entryPrice - fillPrice) * closeShares;
      open.pos.tps.push({ price: fillPrice, shares: closeShares, time: sig.time, pnl });
      open.pos.currentShares -= closeShares;
      open.pos.realizedPnL += pnl;
      newAccount.balance += pnl;
      newLedger[open.idx] = open.pos;
      fills.push({ ticker, type: "TP", shares: closeShares, price: fillPrice, pnl, time: sig.time });
      console.log("[v.24] " + ticker + " TP -" + closeShares + "@" + fillPrice.toFixed(2) + " pnl=" + pnl.toFixed(2));

    } else if ((sigType === "B2C" || sigType === "S2C") && open) {
      const closeShares = open.pos.currentShares;
      const pnl = open.pos.dir === 1
        ? (fillPrice - open.pos.entryPrice) * closeShares
        : (open.pos.entryPrice - fillPrice) * closeShares;
      open.pos.realizedPnL += pnl;
      open.pos.status = "closed";
      open.pos.closedAt = sig.time;
      open.pos.exitType = sigType;
      open.pos.exitPrice = fillPrice;
      open.pos.currentShares = 0;
      newAccount.balance += pnl;
      newLedger[open.idx] = open.pos;
      tickerState.lastExitTime = sig.time;
      fills.push({ ticker, type: sigType, shares: closeShares, price: fillPrice, pnl, time: sig.time });
      console.log("[v.24] " + ticker + " " + sigType + " -" + closeShares + "@" + fillPrice.toFixed(2) + " pnl=" + pnl.toFixed(2));
    }

    tickerState.lastExecutedKey = key;
  }

  delete tickerState._foundLast;
  newExecState[ticker] = tickerState;
  return { newLedger, newExecState, newAccount, fills };
}

// Compute equity = balance + unrealized PnL across open positions
function computeEquity(account, ledger, livePrices) {
  let unreal = 0;
  for (const e of ledger) {
    if (e.status !== "open") continue;
    const px = livePrices[e.ticker];
    if (!px) continue;
    unreal += e.dir === 1
      ? (px - e.entryPrice) * e.currentShares
      : (e.entryPrice - px) * e.currentShares;
  }
  return account.balance + unreal;
}

// ============================================================================
// v.24.3 — Comprehensive account stats from paper ledger
// ============================================================================
function computeAccountStats(paperAccount, ledger, livePrices) {
  const start = paperAccount.startingBalance || 100000;
  livePrices = livePrices || {};

  let unrealized = 0;
  let openNotional = 0;
  const openPositions = [];
  for (const t of ledger) {
    if (t.status !== "open") continue;
    const px = livePrices[t.ticker] || t.entryPrice;
    const pnl = t.dir === 1
      ? (px - t.entryPrice) * t.currentShares
      : (t.entryPrice - px) * t.currentShares;
    const pnlPct = t.dir === 1
      ? ((px - t.entryPrice) / t.entryPrice) * 100
      : ((t.entryPrice - px) / t.entryPrice) * 100;
    unrealized += pnl;
    openNotional += px * t.currentShares;
    openPositions.push({
      sym: t.ticker, side: t.dir === 1 ? "long" : "short",
      shares: t.currentShares, entryPrice: t.entryPrice, currentPrice: px,
      pnl: { dollars: pnl, pct: pnlPct },
      entryTime: t.entryTime,
    });
  }

  const equity = paperAccount.balance + unrealized;
  // Buying power = balance - sum of long notional + short proceeds. Paper simplification: balance.
  const buyingPower = paperAccount.balance;

  const closed = ledger.filter(t => t.status === "closed");
  const totalRealized = closed.reduce((s, t) => s + (t.realizedPnL || 0), 0);

  // Today P/L
  const todayKey = new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());
  const isToday = (ts) => new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date(ts)) === todayKey;
  const todayClosed = closed.filter(t => t.closedAt && isToday(t.closedAt));
  const dayPnL = todayClosed.reduce((s, t) => s + (t.realizedPnL || 0), 0) + unrealized;
  const dayPnLPct = (dayPnL / start) * 100;
  const tradesToday = todayClosed.length + openPositions.filter(p => isToday(p.entryTime)).length;

  // Win rate / avg R (lifetime)
  const winners = closed.filter(t => (t.realizedPnL || 0) > 0).length;
  const winRate = closed.length > 0 ? winners / closed.length : 0;

  let totalR = 0, rCount = 0;
  for (const t of closed) {
    if (t.stopPrice && t.entryPrice && t.entryShares) {
      const risk = Math.abs(t.entryPrice - t.stopPrice) * t.entryShares;
      if (risk > 0) { totalR += (t.realizedPnL || 0) / risk; rCount++; }
    }
  }
  const avgR = rCount > 0 ? totalR / rCount : 0;

  // Max DD — walk closed trades chronologically, track peak-to-trough on running equity
  const sortedClosed = closed.slice().sort((a, b) => (a.closedAt || 0) - (b.closedAt || 0));
  let running = start, peak = start, maxDD = 0;
  for (const t of sortedClosed) {
    running += t.realizedPnL || 0;
    if (running > peak) peak = running;
    const dd = ((running - peak) / peak) * 100;
    if (dd < maxDD) maxDD = dd;
  }
  // Also include current unrealized drawdown
  const liveDD = ((equity - Math.max(peak, equity)) / Math.max(peak, equity)) * 100;
  if (liveDD < maxDD) maxDD = liveDD;

  // Week / Month rollups
  const now = Date.now();
  const WEEK_MS = 7 * 24 * 60 * 60 * 1000;
  const MONTH_MS = 30 * 24 * 60 * 60 * 1000;
  const weekPnL = closed.filter(t => t.closedAt && (now - t.closedAt) < WEEK_MS).reduce((s, t) => s + (t.realizedPnL || 0), 0);
  const monthPnL = closed.filter(t => t.closedAt && (now - t.closedAt) < MONTH_MS).reduce((s, t) => s + (t.realizedPnL || 0), 0);

  return {
    name: "Khanh", role: "Trader", accountId: "Paper",
    equity, buyingPower,
    dayPnL, dayPnLPct, tradesToday,
    winRate, avgR, maxDD,
    weekPnL, weekPnLPct: (weekPnL / start) * 100,
    monthPnL, monthPnLPct: (monthPnL / start) * 100,
    unrealized, openNotional,
    openPositions,
    totalRealized,
  };
}

function computeTrendGate(hourlyBars, dailyBars) {
  if (!hourlyBars || hourlyBars.length < 22) return { state: "unknown", reason: "no 1H data" };
  if (!dailyBars || dailyBars.length < 201) return { state: "unknown", reason: "no daily data" };
  // 1H: price > EMA21
  const closes1h = hourlyBars.map(b => b.c);
  // simple EMA21
  const k1 = 2 / (21 + 1);
  let ema21 = closes1h.slice(0, 21).reduce((s, c) => s + c, 0) / 21;
  for (let i = 21; i < closes1h.length; i++) ema21 = closes1h[i] * k1 + ema21 * (1 - k1);
  const last1H = closes1h[closes1h.length - 1];
  const hBullish = last1H > ema21;
  // Daily: price > SMA200
  const closesD = dailyBars.map(b => b.c);
  const sma200 = closesD.slice(-200).reduce((s, c) => s + c, 0) / 200;
  const lastD = closesD[closesD.length - 1];
  const dBullish = lastD > sma200;
  let state;
  if (hBullish && dBullish) state = "bullish";
  else if (!hBullish && !dBullish) state = "bearish";
  else state = "neutral";
  return { state, hBullish, dBullish, ema21h: ema21, sma200d: sma200, last1H, lastD };
}

// Today's date in CST (America/Chicago) for ORB session keying
function todayCST() {
  return new Intl.DateTimeFormat("en-CA", { timeZone: "America/Chicago" }).format(new Date());
}

// Current minute-of-day in CST (0-1439). Used for kill zone + EOD logic.
function nowMinuteCST() {
  const d = new Date();
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/Chicago", hour: "2-digit", minute: "2-digit", hour12: false,
  }).formatToParts(d);
  let h = 0, m = 0;
  for (const p of parts) { if (p.type === "hour") h = parseInt(p.value, 10); if (p.type === "minute") m = parseInt(p.value, 10); }
  if (h === 24) h = 0;
  return h * 60 + m;
}
const CST_MARKET_OPEN = 8 * 60 + 30;   // 8:30 AM CST
const CST_ORB_LOCK    = 8 * 60 + 45;   // 8:45 AM CST (ORB locked here)
const CST_ETF_TIME_STOP = 11 * 60;     // 11:00 AM CST (ETF 0DTE rule)
const CST_HARD_CLOSE  = 14 * 60 + 55;  // 2:55 PM CST (auto-close all OCM)
const CST_MARKET_CLOSE = 15 * 60;       // 3:00 PM CST (regular hours end)

// Compute ORB high/low from 5m bars: first 3 bars (15min) of CST session day
function computeORBFromBars(bars, sessionDateCST) {
  if (!bars || bars.length === 0) return null;
  const todayBars = [];
  for (let i = bars.length - 1; i >= 0 && todayBars.length < 5; i--) {
    const bDate = new Intl.DateTimeFormat("en-CA", { timeZone: "America/Chicago" }).format(new Date(bars[i].t));
    if (bDate === sessionDateCST) {
      // Check if this bar's CST minute is in the ORB window (8:30-8:45)
      const d = new Date(bars[i].t);
      const parts = new Intl.DateTimeFormat("en-US", { timeZone: "America/Chicago", hour: "2-digit", minute: "2-digit", hour12: false }).formatToParts(d);
      let bh = 0, bm = 0;
      for (const p of parts) { if (p.type === "hour") bh = parseInt(p.value, 10); if (p.type === "minute") bm = parseInt(p.value, 10); }
      if (bh === 24) bh = 0;
      const minOfDay = bh * 60 + bm;
      if (minOfDay >= CST_MARKET_OPEN && minOfDay < CST_ORB_LOCK) {
        todayBars.push(bars[i]);
      }
    }
  }
  if (todayBars.length < 3) return null;  // need 3 × 5m bars
  let hi = -Infinity, lo = Infinity;
  for (const b of todayBars) { if (b.h > hi) hi = b.h; if (b.l < lo) lo = b.l; }
  return { high: hi, low: lo, barsUsed: todayBars.length, sessionDateCST };
}
