function calcPnL(position, currentPrice) {
  if (!position || position.side === "flat") return { pct: 0, dollars: 0 };
  const sign = position.side === "long" ? 1 : -1;
  const diff = (currentPrice - position.entryPrice) * sign;
  return { pct: (diff / position.entryPrice) * 100, dollars: diff * position.size };
}
function pnlR(position, currentPrice, atr) {
  if (!position || position.side === "flat") return 0;
  const sign = position.side === "long" ? 1 : -1;
  return ((currentPrice - position.entryPrice) * sign) / atr;
}
function computeScores({ mmgState, campaign, direction, rvol, position, atrDistance, pnlInR }) {
  const rvolMult = Math.min(rvol / 1.5, 1.0);
  const stopMult = Math.max(0, 1 - atrDistance);
  const side = (position && position.side) || "flat";
  const b2o = side !== "flat" ? null : Math.min(95, Math.round(
    (mmgState === "B2O-signal" ? 82 : mmgState === "Expansion" && direction === "long" ? 64 : mmgState === "Midline" && direction === "long" ? 48 : mmgState === "Compression" ? 28 : 14)
    * rvolMult * (campaign === "Boarding" ? 1.18 : campaign === "Rolling" ? 1.05 : 0.85) * stopMult));
  const s2o = side !== "flat" ? null : Math.min(95, Math.round(
    (mmgState === "S2O-signal" ? 82 : mmgState === "Expansion" && direction === "short" ? 64 : mmgState === "Midline" && direction === "short" ? 48 : mmgState === "Compression" ? 28 : 14)
    * rvolMult * (campaign === "Boarding" ? 1.18 : campaign === "Rolling" ? 1.05 : 0.85) * stopMult));
  const inLong = side === "long", inShort = side === "short";
  const directionMatch = (inLong && direction === "long") || (inShort && direction === "short");
  const reconfirm = (inLong && mmgState === "B2O-signal") || (inShort && mmgState === "S2O-signal");
  const baseAdd = directionMatch ? (reconfirm ? 78 : mmgState === "Expansion" ? 62 : mmgState === "Midline" ? 38 : 15) : 8;
  const pnlAddMult = pnlInR > 0.5 ? 1.15 : pnlInR > 0 ? 1.0 : pnlInR > -0.3 ? 0.55 : 0.25;
  const campaignAddMult = campaign === "Rolling" ? 1.15 : campaign === "Boarding" ? 0.95 : 0.6;
  const addRaw = Math.round(baseAdd * rvolMult * pnlAddMult * campaignAddMult);
  const add1 = (side !== "flat" && position.adds === 0) ? Math.min(95, addRaw) : null;
  const add2 = (side !== "flat" && position.adds === 1) ? Math.min(95, Math.round(addRaw * 0.82)) : null;
  const baseTP = mmgState === "GetOff" ? 88 : mmgState === "Caution" ? 70 : campaign === "Station" ? 75 : campaign === "Departed" ? 42 : 18;
  const tp1RR = pnlInR >= 1.0 ? 1.25 : pnlInR >= 0.5 ? 1.1 : pnlInR >= 0 ? 0.75 : 0.35;
  const tp2RR = pnlInR >= 1.7 ? 1.3 : pnlInR >= 1.0 ? 1.05 : pnlInR >= 0.5 ? 0.7 : 0.3;
  const tp1 = (side !== "flat" && position.tpsTaken === 0) ? Math.min(95, Math.round(baseTP * tp1RR)) : null;
  const tp2 = (side !== "flat" && position.tpsTaken === 1) ? Math.min(95, Math.round(baseTP * tp2RR)) : null;
  const baseExit = mmgState === "GetOff" ? 90 : mmgState === "Caution" ? 68 : campaign === "Station" ? 58 : campaign === "Departed" ? 26 : 16;
  const s2c = inLong ? Math.min(95, baseExit) : null;
  const b2c = inShort ? Math.min(95, baseExit) : null;
  return { b2o, s2o, add1, add2, tp1, tp2, s2c, b2c };
}
function topAction(scores) {
  const entries = Object.entries(scores).filter(([_, v]) => v != null);
  if (entries.length === 0) return { code: "—", score: 0, tone: "neutral" };
  entries.sort((a, b) => b[1] - a[1]);
  const [code, score] = entries[0];
  const map = { b2o: "long", s2o: "short", add1: "add", add2: "add", tp1: "tp", tp2: "tp", s2c: "close", b2c: "close" };
  return { code: code.toUpperCase(), score, tone: map[code] };
}
function toneColor(tone) {
  return tone === "long" ? C.long : tone === "short" ? C.short : tone === "close" ? C.close : tone === "add" ? C.add : tone === "tp" ? C.tp : C.neutral;
}
function formatTime(ms) {
  const mins = Math.floor((Date.now() - ms) / 60000);
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  return `${hrs}h${mins % 60}m`;
}

function WatchlistView({ watchlists, setWatchlists, universe, positions, onSelect }) {
  const [editing, setEditing] = useState(false);
  const [addingTo, setAddingTo] = useState(null);
  const getTickerData = (sym) => {
    const t = universe.find(u => u.sym === sym);
    if (!t) return null;
    const pos = positions[sym] || { side: "flat" };
    const pnlInR = pnlR(pos, t.price, t.atr);
    const scores = computeScores({ ...t, position: pos, atrDistance: 0.25, pnlInR });
    const top = topAction(scores);
    return { ...t, position: pos, top };
  };
  const moveItem = (listId, sym, dir) => {
    setWatchlists(lists => lists.map(l => {
      if (l.id !== listId) return l;
      const idx = l.symbols.indexOf(sym);
      if (idx < 0) return l;
      const next = idx + dir;
      if (next < 0 || next >= l.symbols.length) return l;
      const arr = [...l.symbols];
      [arr[idx], arr[next]] = [arr[next], arr[idx]];
      return { ...l, symbols: arr };
    }));
  };
  const removeItem = (listId, sym) => setWatchlists(lists => lists.map(l => l.id === listId ? { ...l, symbols: l.symbols.filter(s => s !== sym) } : l));
  const addItem = (listId, sym) => {
    setWatchlists(lists => lists.map(l => l.id === listId && !l.symbols.includes(sym) ? { ...l, symbols: [...l.symbols, sym] } : l));
    setAddingTo(null);
  };
  const addList = () => {
    const name = prompt("Watchlist name?");
    if (!name) return;
    setWatchlists(lists => [...lists, { id: `wl-${Date.now()}`, name, symbols: [] }]);
  };
  return (
    <div className="flex flex-col gap-2.5">
      <div className="flex items-center justify-between">
        <div style={{ color: C.muted }} className="text-[10px] tracking-[0.2em]">{watchlists.length} LISTS</div>
        <div className="flex gap-2">
          <button onClick={() => setEditing(!editing)} style={{ color: editing ? C.text : C.muted }} className="text-xs font-mono flex items-center gap-1"><Edit2 size={12} /> {editing ? "DONE" : "EDIT"}</button>
          <button onClick={addList} style={{ color: C.text }} className="text-xs font-mono flex items-center gap-1 font-bold"><Plus size={14} /> LIST</button>
        </div>
      </div>
      {watchlists.map(list => (
        <div key={list.id} style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl overflow-hidden">
          <div style={{ backgroundColor: C.bg, borderBottomColor: C.border }} className="border-b px-3 py-1.5 flex items-center justify-between">
            <div style={{ color: C.text }} className="text-xs font-bold tracking-tight">{list.name}</div>
            <div className="flex items-center gap-2">
              <div style={{ color: C.dim }} className="text-[10px] font-mono">{list.symbols.length}</div>
              <button onClick={() => setAddingTo(list.id)} style={{ color: C.muted }} className="p-0.5"><Plus size={14} /></button>
            </div>
          </div>
          {addingTo === list.id && (
            <div style={{ backgroundColor: C.bg, borderBottomColor: C.border }} className="border-b p-2">
              <div className="flex items-center justify-between mb-1.5">
                <div style={{ color: C.muted }} className="text-[10px] font-mono">Add ticker:</div>
                <button onClick={() => setAddingTo(null)} style={{ color: C.muted }}><X size={12}/></button>
              </div>
              <div className="flex flex-wrap gap-1">
                {universe.filter(u => !list.symbols.includes(u.sym)).map(u => (
                  <button key={u.sym} onClick={() => addItem(list.id, u.sym)} style={{ backgroundColor: C.surface, borderColor: C.border, color: C.text }} className="px-2 py-0.5 border rounded text-[10px] font-mono">{u.sym}</button>
                ))}
              </div>
            </div>
          )}
          {list.symbols.map((sym, i) => {
            const t = getTickerData(sym);
            if (!t) return null;
            const color = toneColor(t.top.tone);
            const dim = t.top.score < 30;
            return (
              <div key={sym} style={{ borderBottomColor: C.border }} className="border-b last:border-b-0 flex items-center">
                <button onClick={() => !editing && onSelect(sym)} className="flex-1 flex items-center gap-2 px-3 py-2 text-left active:opacity-60">
                  <div style={{ backgroundColor: dim ? C.track : color + "15", borderColor: dim ? C.border : color, color: dim ? C.dim : color }} className="w-10 h-10 rounded-md border-2 flex flex-col items-center justify-center shrink-0">
                    <div className="text-xs font-mono font-bold leading-none">{t.top.score}</div>
                    <div className="text-[7px] font-mono tracking-wider mt-0.5">{t.top.code}</div>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-baseline gap-1.5">
                      <div style={{ color: C.text }} className="text-sm font-mono font-bold">{t.sym}</div>
                      {t.position.side !== "flat" && <div style={{ color: t.position.side === "long" ? C.long : C.short }} className="text-[9px] font-mono uppercase">{t.position.side}</div>}
                    </div>
                    <div style={{ color: C.muted }} className="text-[10px] truncate">{t.mmgState}</div>
                  </div>
                  <div className="text-right shrink-0">
                    <div style={{ color: C.text }} className="text-xs font-mono">${t.price.toFixed(2)}</div>
                    <div style={{ color: t.change >= 0 ? C.long : C.short }} className="text-[10px] font-mono">{t.change >= 0 ? "+" : ""}{t.change.toFixed(2)}%</div>
                  </div>
                </button>
                {editing && (
                  <div className="flex items-center gap-0 pr-2">
                    <button onClick={() => moveItem(list.id, sym, -1)} disabled={i === 0} style={{ color: i === 0 ? C.dim : C.muted }} className="p-1"><ChevronUp size={14} /></button>
                    <button onClick={() => moveItem(list.id, sym, 1)} disabled={i === list.symbols.length - 1} style={{ color: i === list.symbols.length - 1 ? C.dim : C.muted }} className="p-1"><ChevronDown size={14} /></button>
                    <button onClick={() => removeItem(list.id, sym)} style={{ color: C.short }} className="p-1"><Trash2 size={14} /></button>
                  </div>
                )}
              </div>
            );
          })}
          {list.symbols.length === 0 && <div style={{ color: C.dim }} className="text-center text-[11px] py-3">no tickers yet</div>}
        </div>
      ))}
    </div>
  );
}

// ============================================================================
function Ring({ score, tone = "long", size = 56 }) {
  const r = (size - 6) / 2;
  const circ = 2 * Math.PI * r;
  const offset = score == null ? circ : circ - (score / 100) * circ;
  const stroke = score == null ? C.locked : toneColor(tone);
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} stroke={C.track} strokeWidth="3" fill="none" />
      <circle cx={size/2} cy={size/2} r={r} stroke={stroke} strokeWidth="3" fill="none"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset 400ms ease, stroke 200ms ease" }} />
    </svg>
  );
}

function ActionCell({ code, label, score, lockedReason, tone, onTap, compact = false }) {
  const locked = score == null;
  const ringSize = compact ? 40 : 56;
  return (
    <button onClick={() => !locked && onTap()} disabled={locked}
      style={{ backgroundColor: locked ? "#FAFAF7" : C.surface, borderColor: locked ? C.border : C.borderStrong, cursor: locked ? "not-allowed" : "pointer" }}
      className={`relative ${compact ? "p-2" : "p-3"} rounded-2xl border-2 transition-all active:scale-[0.97] disabled:active:scale-100`}>
      <div className={`flex flex-col items-center ${compact ? "gap-1" : "gap-1.5"}`}>
        <div className="relative">
          <Ring score={score} tone={tone} size={ringSize} />
          <div className="absolute inset-0 flex items-center justify-center">
            {locked ? (
              <svg width={compact ? "12" : "16"} height={compact ? "12" : "16"} viewBox="0 0 24 24" fill="none" stroke={C.dim} strokeWidth="2.5">
                <rect x="5" y="11" width="14" height="10" rx="2" /><path d="M8 11V7a4 4 0 0 1 8 0v4" />
              </svg>
            ) : (
              <div style={{ color: C.text }} className={`${compact ? "text-sm" : "text-lg"} font-mono font-bold leading-none`}>{score}</div>
            )}
          </div>
        </div>
        <div style={{ color: locked ? C.dim : C.text }} className={`font-mono font-bold ${compact ? "text-xs" : "text-base"} leading-none`}>{code}</div>
        {!compact && <div style={{ color: locked ? C.dim : C.muted }} className="text-[10px] leading-tight text-center">{locked ? <em>{lockedReason}</em> : label}</div>}
      </div>
    </button>
  );
}

function ConfirmModal({ action, ticker, price, position, onConfirm, onCancel }) {
  const isEntry = action === "B2O" || action === "S2O";
  const isAdd = action === "ADD1" || action === "ADD2";
  const isTP = action === "TP1" || action === "TP2";
  const isFullExit = action === "S2C" || action === "B2C";
  const accent = isAdd ? C.add : isTP ? C.tp : (action === "B2O" ? C.long : action === "S2O" ? C.short : C.close);
  let sizeChange, newSize, newAvg, realized;
  if (isEntry) { sizeChange = 100; newSize = 100; newAvg = price; }
  else if (isAdd) {
    sizeChange = 50; newSize = position.size + 50;
    newAvg = ((position.entryPrice * position.size) + (price * 50)) / newSize;
  }
  else if (isTP) {
    sizeChange = -Math.round(position.size / 2); newSize = position.size + sizeChange;
    newAvg = position.entryPrice;
    const sign = position.side === "long" ? 1 : -1;
    realized = (price - position.entryPrice) * sign * Math.abs(sizeChange);
  }
  else if (isFullExit) {
    sizeChange = -position.size; newSize = 0;
    const sign = position.side === "long" ? 1 : -1;
    realized = (price - position.entryPrice) * sign * position.size;
  }
  const verb = isEntry ? "Open" : isAdd ? "Add to" : isTP ? "Take profit on" : "Close";
  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 p-4">
      <div style={{ backgroundColor: C.surface, borderColor: C.borderStrong }} className="border-2 rounded-2xl w-full max-w-md p-5">
        <div style={{ color: C.muted }} className="text-[10px] tracking-[0.2em] mb-1">{verb.toUpperCase()} POSITION</div>
        <div className="flex items-baseline gap-3 mb-4">
          <div style={{ color: accent }} className="text-2xl font-mono font-bold">{action}</div>
          <div style={{ color: C.text }} className="text-lg font-mono">{ticker}</div>
          <div style={{ color: C.muted }} className="text-sm font-mono ml-auto">${price.toFixed(2)}</div>
        </div>
        <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-sm font-mono mb-4">
          <div className="flex justify-between"><span style={{ color: C.muted }}>Δ Size</span><span style={{ color: sizeChange > 0 ? C.long : C.short }}>{sizeChange > 0 ? "+" : ""}{sizeChange}sh</span></div>
          <div className="flex justify-between"><span style={{ color: C.muted }}>New Size</span><span style={{ color: C.text }}>{newSize}sh</span></div>
          {newAvg != null && <div className="flex justify-between"><span style={{ color: C.muted }}>{isAdd ? "New Avg" : "Avg"}</span><span style={{ color: C.text }}>${newAvg.toFixed(2)}</span></div>}
          {realized != null && <div className="flex justify-between"><span style={{ color: C.muted }}>Realized</span><span style={{ color: realized >= 0 ? C.long : C.short }}>{realized >= 0 ? "+" : ""}${realized.toFixed(0)}</span></div>}
        </div>
        <div style={{ color: C.muted, borderColor: C.border }} className="text-[10px] leading-relaxed mb-4 border-l-2 pl-3">
          You are the executing trader. MTS is decision support. By confirming, you accept all P&L and the possibility of total loss.
        </div>
        <div className="flex gap-2">
          <button onClick={onCancel} style={{ borderColor: C.borderStrong, color: C.muted }} className="flex-1 py-2.5 rounded-xl border-2 font-mono text-sm">CANCEL</button>
          <button onClick={onConfirm} style={{ backgroundColor: accent, color: "#FFF" }} className="flex-1 py-2.5 rounded-xl font-mono text-sm font-bold">CONFIRM</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// Scanner
// ============================================================================
function Scanner({ universe, positions, onSelect }) {
  const [filter, setFilter] = useState("all");
  const [sort, setSort] = useState("score");
  const enriched = useMemo(() => universe.map(t => {
    const pos = positions[t.sym] || { side: "flat" };
    const pnlInR = pnlR(pos, t.price, t.atr);
    const scores = computeScores({ ...t, position: pos, atrDistance: 0.25, pnlInR });
    const top = topAction(scores);
    return { ...t, position: pos, scores, top };
  }), [universe, positions]);
  const filtered = useMemo(() => enriched.filter(t => {
    if (filter === "long") return t.top.tone === "long" || (t.top.tone === "add" && t.position.side === "long");
    if (filter === "short") return t.top.tone === "short" || (t.top.tone === "add" && t.position.side === "short");
    if (filter === "high") return t.top.score >= 60;
    if (filter === "open") return t.position.side !== "flat";
    return true;
  }), [enriched, filter]);
  const sorted = useMemo(() => {
    const arr = [...filtered];
    if (sort === "score") arr.sort((a, b) => b.top.score - a.top.score);
    if (sort === "alpha") arr.sort((a, b) => a.sym.localeCompare(b.sym));
    if (sort === "chg") arr.sort((a, b) => b.change - a.change);
    return arr;
  }, [filtered, sort]);
  const chips = [{ key: "all", label: "All" }, { key: "long", label: "Long" }, { key: "short", label: "Short" }, { key: "high", label: "≥60" }, { key: "open", label: "Open" }];
  return (
    <div className="flex flex-col gap-2.5">
      <div className="flex items-baseline gap-2"><div style={{ color: C.muted }} className="text-xs font-mono">{sorted.length}/{universe.length} tickers</div></div>
      <div className="flex items-center gap-1.5 overflow-x-auto pb-0.5">
        {chips.map(c => (
          <button key={c.key} onClick={() => setFilter(c.key)}
            style={{ backgroundColor: filter === c.key ? C.text : C.surface, color: filter === c.key ? "#FFF" : C.muted, borderColor: filter === c.key ? C.text : C.border }}
            className="px-2.5 py-1 rounded-full border text-[11px] font-mono whitespace-nowrap">{c.label}</button>
        ))}
        <select value={sort} onChange={e => setSort(e.target.value)} style={{ borderColor: C.border, color: C.muted, backgroundColor: C.surface }} className="ml-auto border rounded-full px-2 py-1 text-[11px] font-mono">
          <option value="score">↓ Score</option><option value="alpha">A→Z</option><option value="chg">↓ % Chg</option>
        </select>
      </div>
      <div className="flex flex-col gap-1.5">
        {sorted.map(t => {
          const color = toneColor(t.top.tone), dim = t.top.score < 30;
          return (
            <button key={t.sym} onClick={() => onSelect(t.sym)} style={{ backgroundColor: C.surface, borderColor: C.border }} className="flex items-center gap-3 border rounded-xl p-2.5 text-left active:scale-[0.99] transition-transform">
              <div style={{ backgroundColor: dim ? C.track : color + "15", borderColor: dim ? C.border : color }} className="flex flex-col items-center justify-center w-12 h-12 rounded-lg border-2 shrink-0">
                <div style={{ color: dim ? C.dim : color }} className="text-base font-mono font-bold leading-none">{t.top.score}</div>
                <div style={{ color: dim ? C.dim : color }} className="text-[8px] font-mono tracking-wider mt-0.5">{t.top.code}</div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-baseline gap-1.5">
                  <div style={{ color: C.text }} className="text-base font-mono font-bold">{t.sym}</div>
                  {t.position.side !== "flat" && <div style={{ color: t.position.side === "long" ? C.long : C.short }} className="text-[9px] font-mono uppercase tracking-wider">• {t.position.side}</div>}
                </div>
                <div style={{ color: C.muted }} className="text-[11px] truncate">{t.mmgState} · {t.direction} · {t.rvol.toFixed(2)}x</div>
              </div>
              <div className="text-right shrink-0">
                <div style={{ color: C.text }} className="text-sm font-mono">${t.price.toFixed(2)}</div>
                <div style={{ color: t.change >= 0 ? C.long : C.short }} className="text-[11px] font-mono">{t.change >= 0 ? "+" : ""}{t.change.toFixed(2)}%</div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================================
// Active
// ============================================================================
function Active({ universe, positions, onSelect }) {
  const openTickers = useMemo(() => Object.keys(positions).filter(sym => positions[sym].side !== "flat"), [positions]);
  const enriched = useMemo(() => openTickers.map(sym => {
    const t = universe.find(u => u.sym === sym);
    if (!t) return null;
    const pos = positions[sym];
    const pnl = calcPnL(pos, t.price);
    const pnlInR = pnlR(pos, t.price, t.atr);
    const scores = computeScores({ ...t, position: pos, atrDistance: 0.25, pnlInR });
    const top = topAction(scores);
    const targetOffset = t.atr * 1.7;
    const target = pos.side === "long" ? pos.entryPrice + targetOffset : pos.entryPrice - targetOffset;
    return { ...t, position: pos, pnl, top, target };
  }).filter(Boolean), [openTickers, universe, positions]);
  const totalPnL = enriched.reduce((sum, t) => sum + t.pnl.dollars, 0);
  const winners = enriched.filter(t => t.pnl.dollars > 0).length;
  const losers = enriched.filter(t => t.pnl.dollars < 0).length;
  return (
    <div className="flex flex-col gap-2.5">
      <div className="flex items-baseline gap-2">
        <div style={{ color: C.muted }} className="text-xs font-mono">{enriched.length} open · {winners}W {losers}L</div>
        <div style={{ color: totalPnL >= 0 ? C.long : C.short }} className="text-sm font-mono font-bold">{totalPnL >= 0 ? "+" : ""}${totalPnL.toFixed(0)}</div>
      </div>
      <div className="flex flex-col gap-1.5">
        {enriched.map(t => {
          const color = toneColor(t.top.tone);
          const sideColor = t.position.side === "long" ? C.long : C.short;
          const pnlColor = t.pnl.dollars >= 0 ? C.long : C.short;
          return (
            <button key={t.sym} onClick={() => onSelect(t.sym)} style={{ backgroundColor: C.surface, borderColor: C.border }} className="flex flex-col gap-1.5 border rounded-xl p-2.5 text-left active:scale-[0.99] transition-transform">
              <div className="flex items-center gap-3">
                <div style={{ backgroundColor: color + "15", borderColor: color }} className="flex flex-col items-center justify-center w-12 h-12 rounded-lg border-2 shrink-0">
                  <div style={{ color }} className="text-base font-mono font-bold leading-none">{t.top.score}</div>
                  <div style={{ color }} className="text-[8px] font-mono tracking-wider mt-0.5">{t.top.code}</div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-baseline gap-1.5">
                    <div style={{ color: C.text }} className="text-base font-mono font-bold">{t.sym}</div>
                    <div style={{ color: sideColor }} className="text-[10px] font-mono uppercase tracking-wider">{t.position.side}</div>
                    <div style={{ color: C.muted }} className="text-[10px] font-mono ml-auto">{formatTime(t.position.entryTime)}</div>
                  </div>
                  <div style={{ color: pnlColor }} className="text-sm font-mono font-bold">{t.pnl.pct >= 0 ? "+" : ""}{t.pnl.pct.toFixed(2)}% · {t.pnl.dollars >= 0 ? "+" : ""}${t.pnl.dollars.toFixed(0)}</div>
                </div>
                <div className="text-right shrink-0">
                  <div style={{ color: C.text }} className="text-sm font-mono">${t.price.toFixed(2)}</div>
                  <div style={{ color: C.muted }} className="text-[10px] font-mono">{t.position.size}sh</div>
                </div>
              </div>
              <div className="flex items-center gap-2" style={{ paddingLeft: "60px" }}>
                <div style={{ color: C.muted }} className="text-[10px] font-mono">
                  <span style={{ color: C.dim }}>entry</span> ${t.position.entryPrice.toFixed(2)} · <span style={{ color: C.dim }}>tgt</span> ${t.target.toFixed(2)}
                </div>
                <div className="ml-auto flex gap-1">
                  <span style={{ backgroundColor: t.position.adds > 0 ? C.add + "20" : C.track, color: t.position.adds > 0 ? C.add : C.dim }} className="text-[9px] font-mono px-1.5 py-0.5 rounded">{t.position.adds}A</span>
                  <span style={{ backgroundColor: t.position.tpsTaken > 0 ? C.tp + "20" : C.track, color: t.position.tpsTaken > 0 ? C.tp : C.dim }} className="text-[9px] font-mono px-1.5 py-0.5 rounded">{t.position.tpsTaken}T</span>
                </div>
              </div>
            </button>
          );
        })}
        {enriched.length === 0 && <div style={{ color: C.dim }} className="text-center text-xs py-12">No active trades.<br /><span className="text-[10px]">Open a position from the Scanner.</span></div>}
      </div>
    </div>
  );
}

// ============================================================================
// Deck
// ============================================================================
function Deck({ ticker, positions, setPositions, fills, setFills, onBack }) {
  const data = UNIVERSE_SEED.find(t => t.sym === ticker);
  const [mmgState, setMmgState] = useState(data.mmgState);
  const [campaign, setCampaign] = useState(data.campaign);
  const [direction, setDirection] = useState(data.direction);
  const [rvol, setRvol] = useState(data.rvol);
  const [pendingAction, setPendingAction] = useState(null);
  const [showSim, setShowSim] = useState(false);
  const position = positions[ticker] || { side: "flat" };
  const atrDistance = 0.25;
  const pnlInR = pnlR(position, data.price, data.atr);
  const pnl = calcPnL(position, data.price);
  const scores = useMemo(() => computeScores({ mmgState, campaign, direction, rvol, position, atrDistance, pnlInR }), [mmgState, campaign, direction, rvol, position, pnlInR]);
  const stopOffset = data.atr * 1.0, targetOffset = data.atr * 1.7;
  const refPrice = position.side === "flat" ? data.price : position.entryPrice;
  const stop = position.side === "short" ? refPrice + stopOffset : refPrice - stopOffset;
  const target = position.side === "short" ? refPrice - targetOffset : refPrice + targetOffset;
  const handleConfirm = () => {
    const a = pendingAction, price = data.price;
    setPositions(p => {
      const cur = p[ticker] || { side: "flat" };
      let next = { ...cur };
      if (a === "B2O") next = { side: "long", entryPrice: price, size: 100, adds: 0, tpsTaken: 0, entryTime: Date.now() };
      else if (a === "S2O") next = { side: "short", entryPrice: price, size: 100, adds: 0, tpsTaken: 0, entryTime: Date.now() };
      else if (a === "ADD1" || a === "ADD2") {
        const newSize = cur.size + 50;
        const newAvg = ((cur.entryPrice * cur.size) + (price * 50)) / newSize;
        next = { ...cur, size: newSize, entryPrice: newAvg, adds: cur.adds + 1 };
      } else if (a === "TP1" || a === "TP2") {
        const sold = Math.round(cur.size / 2);
        next = { ...cur, size: cur.size - sold, tpsTaken: cur.tpsTaken + 1 };
      } else if (a === "S2C" || a === "B2C") next = { side: "flat" };
      return { ...p, [ticker]: next };
    });
    setFills(f => ({ ...f, [ticker]: { action: a, price, at: Date.now() } }));
    setPendingAction(null);
  };
  const posColor = position.side === "long" ? C.long : position.side === "short" ? C.short : C.muted;
  const pnlColor = pnl.dollars >= 0 ? C.long : C.short;
  return (
    <div className="flex flex-col gap-2">
      <div className="flex items-center gap-2">
        <button onClick={onBack} style={{ color: C.muted }} className="p-1 -ml-1"><ChevronLeft size={20} /></button>
        <div style={{ color: C.text }} className="text-xl font-mono font-bold">{ticker}</div>
        <div style={{ color: C.text }} className="text-xl font-mono">${data.price.toFixed(2)}</div>
        <div style={{ color: data.change >= 0 ? C.long : C.short }} className="text-sm font-mono">{data.change >= 0 ? "+" : ""}{data.change.toFixed(2)}%</div>
        <button onClick={() => setShowSim(!showSim)} style={{ color: C.dim }} className="p-1 ml-auto"><Settings size={14} /></button>
      </div>
      <div className="grid grid-cols-3 gap-2">
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-2.5 py-1.5">
          <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em]">WHERE</div>
          <div style={{ color: C.text }} className="text-sm font-medium leading-tight">{mmgState}</div>
          <div style={{ color: C.muted }} className="text-[10px]">{direction} bias</div>
        </div>
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-2.5 py-1.5">
          <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em]">WHEN</div>
          <div style={{ color: C.text }} className="text-sm font-medium leading-tight">{campaign}</div>
          <div style={{ color: C.muted }} className="text-[10px] font-mono">{rvol.toFixed(2)}x RVOL</div>
        </div>
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-2.5 py-1.5">
          <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em]">POSITION</div>
          <div style={{ color: posColor }} className="text-sm font-mono font-bold leading-tight uppercase">{position.side}</div>
          {position.side !== "flat" ? <div style={{ color: pnlColor }} className="text-[10px] font-mono">{pnl.pct >= 0 ? "+" : ""}{pnl.pct.toFixed(2)}% · {position.adds}A·{position.tpsTaken}T</div> : <div style={{ color: C.dim }} className="text-[10px]">no fills</div>}
        </div>
      </div>
      <div className="grid grid-cols-2 gap-2">
        <ActionCell code="B2O" label="enter long" score={scores.b2o} lockedReason="in position" tone="long" onTap={() => setPendingAction("B2O")} />
        <ActionCell code="S2O" label="enter short" score={scores.s2o} lockedReason="in position" tone="short" onTap={() => setPendingAction("S2O")} />
      </div>
      <div className="grid grid-cols-4 gap-1.5">
        <ActionCell code="ADD1" score={scores.add1} tone="add" onTap={() => setPendingAction("ADD1")} compact />
        <ActionCell code="ADD2" score={scores.add2} tone="add" onTap={() => setPendingAction("ADD2")} compact />
        <ActionCell code="TP1" score={scores.tp1} tone="tp" onTap={() => setPendingAction("TP1")} compact />
        <ActionCell code="TP2" score={scores.tp2} tone="tp" onTap={() => setPendingAction("TP2")} compact />
      </div>
      <div className="grid grid-cols-2 gap-2">
        <ActionCell code="S2C" label="close long" score={scores.s2c} lockedReason="no long position" tone="close" onTap={() => setPendingAction("S2C")} />
        <ActionCell code="B2C" label="cover short" score={scores.b2c} lockedReason="no short position" tone="close" onTap={() => setPendingAction("B2C")} />
      </div>
      <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl px-3 py-2">
        <div className="grid grid-cols-6 gap-1 font-mono text-[10px]">
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">STOP</div><div style={{ color: C.short }}>${stop.toFixed(2)}</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">TGT</div><div style={{ color: C.long }}>${target.toFixed(2)}</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">R:R</div><div style={{ color: C.text }}>1:{(targetOffset / stopOffset).toFixed(1)}</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">SIZE</div><div style={{ color: C.text }}>{position.side !== "flat" ? position.size : 100}sh</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">{position.side !== "flat" ? "PnL" : "RISK"}</div><div style={{ color: position.side !== "flat" ? pnlColor : C.close }}>{position.side !== "flat" ? `${pnl.dollars >= 0 ? "+" : ""}$${pnl.dollars.toFixed(0)}` : `$${(stopOffset*100).toFixed(0)}`}</div></div>
          <div><div style={{ color: C.muted }} className="text-[8px] tracking-wider">ATR</div><div style={{ color: C.text }}>${data.atr.toFixed(2)}</div></div>
        </div>
      </div>
      {showSim && (
        <div style={{ backgroundColor: C.surface, borderColor: C.border }} className="border rounded-xl p-3 space-y-2 text-xs">
          <div>
            <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em] mb-1">MMG STATE</div>
            <div className="flex flex-wrap gap-1">{MMG_STATES.map(s => (
              <button key={s} onClick={() => setMmgState(s)} style={{ backgroundColor: mmgState === s ? C.text : C.bg, color: mmgState === s ? "#FFF" : C.muted }} className="px-1.5 py-0.5 rounded font-mono text-[9px]">{s}</button>
            ))}</div>
          </div>
          <div>
            <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em] mb-1">CAMPAIGN</div>
            <div className="flex flex-wrap gap-1">{CAMPAIGN_STATES.map(s => (
              <button key={s} onClick={() => setCampaign(s)} style={{ backgroundColor: campaign === s ? C.text : C.bg, color: campaign === s ? "#FFF" : C.muted }} className="px-1.5 py-0.5 rounded font-mono text-[9px]">{s}</button>
            ))}</div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em] mb-1">BIAS</div>
              <div className="flex gap-1">{["long", "short", "neutral"].map(d => (
                <button key={d} onClick={() => setDirection(d)} style={{ backgroundColor: direction === d ? C.text : C.bg, color: direction === d ? "#FFF" : C.muted }} className="px-1.5 py-0.5 rounded font-mono text-[9px]">{d}</button>
              ))}</div>
            </div>
            <div>
              <div style={{ color: C.muted }} className="text-[9px] tracking-[0.15em] mb-1">RVOL · {rvol.toFixed(2)}x</div>
              <input type="range" min="0.3" max="3" step="0.1" value={rvol} onChange={(e) => setRvol(parseFloat(e.target.value))} className="w-full" />
            </div>
          </div>
        </div>
      )}
      {pendingAction && <ConfirmModal action={pendingAction} ticker={ticker} price={data.price} position={position.side !== "flat" ? position : null} onConfirm={handleConfirm} onCancel={() => setPendingAction(null)} />}
    </div>
  );
}

    { key: "scanner", icon: Search, label: "Scan" },
    { key: "active", icon: Zap, label: "Active", badge: activeCount > 0 ? activeCount : null },
    { key: "watchlist", icon: Eye, label: "Watch" },
    { key: "library", icon: BookOpen, label: "Library" },
    { key: "account", icon: User, label: "Account" },
  ];
  return (
    <div style={{ backgroundColor: C.surface, borderTopColor: C.border }} className="fixed bottom-0 left-0 right-0 border-t z-40">
      <div className="max-w-md mx-auto grid grid-cols-5">
        {tabs.map(t => {
          const Icon = t.icon, active = view === t.key;
          return (
            <button key={t.key} onClick={() => setView(t.key)} className="flex flex-col items-center gap-0.5 py-2 active:opacity-60">
              <div className="relative">
                <Icon size={18} color={active ? C.text : C.muted} strokeWidth={active ? 2.5 : 2} />
                {t.badge != null && <div style={{ backgroundColor: C.long, color: "#FFF" }} className="absolute -top-1 -right-2 min-w-[14px] h-[14px] rounded-full text-[8px] font-mono font-bold flex items-center justify-center px-1">{t.badge}</div>}
              </div>
              <div style={{ color: active ? C.text : C.muted }} className="text-[9px] font-mono tracking-wider">{t.label.toUpperCase()}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================================
// Main App
// ============================================================================
function MTSApp() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [view, setView] = useState("scanner");
  const [returnTo, setReturnTo] = useState("scanner");
  const [selected, setSelected] = useState(null);
  const [selectedArticle, setSelectedArticle] = useState(null);
  const [positions, setPositions] = useState(initialPositions);
  const [fills, setFills] = useState({});
  const [watchlists, setWatchlists] = useState(initialWatchlists);
  const activeCount = Object.values(positions).filter(p => p.side !== "flat").length;
  const handleSelect = (sym, from) => { setSelected(sym); setReturnTo(from); setView("deck"); };
  const handleSelectArticle = (id) => { setSelectedArticle(id); setView("library-article"); };
  if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)} />;
  const showMacro = view !== "library-article";
  const showTabs = view !== "deck" && view !== "library-article";
  const article = LIBRARY_ARTICLES.find(a => a.id === selectedArticle);
  return (
    <div style={{ backgroundColor: C.bg, color: C.text }} className="min-h-screen font-sans">
      {showMacro && <MacroBar account={ACCOUNT_DATA} />}
      <div className={`max-w-md mx-auto px-3 py-3 ${showTabs ? "pb-20" : "pb-4"}`}>
        {view === "scanner" && <Scanner universe={UNIVERSE_SEED} positions={positions} onSelect={(sym) => handleSelect(sym, "scanner")} />}
        {view === "active" && <Active universe={UNIVERSE_SEED} positions={positions} onSelect={(sym) => handleSelect(sym, "active")} />}
        {view === "watchlist" && <WatchlistView watchlists={watchlists} setWatchlists={setWatchlists} universe={UNIVERSE_SEED} positions={positions} onSelect={(sym) => handleSelect(sym, "watchlist")} />}
        {view === "library" && <Library articles={LIBRARY_ARTICLES} onSelect={handleSelectArticle} />}
        {view === "library-article" && article && <LibraryArticleDetail article={article} onBack={() => setView("library")} />}
        {view === "account" && <AccountSummary account={ACCOUNT_DATA} positions={positions} universe={UNIVERSE_SEED} onLogout={() => setLoggedIn(false)} onSelect={(sym) => handleSelect(sym, "account")} />}
        {view === "deck" && <Deck ticker={selected} positions={positions} setPositions={setPositions} fills={fills} setFills={setFills} onBack={() => setView(returnTo)} />}
      </div>
      {showTabs && <BottomTabBar view={view} setView={setView} activeCount={activeCount} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MTSApp />);
</script>
</body>
</html>
