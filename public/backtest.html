<script>
var API="HjLVXQHGFcYFnJFQf2oq1ODPMVvwLuJ9";
var allTrades=[];
var curFilter="ALL";

// ── MMG ENGINE ──────────────────────────────────────────────
function calcEMA(bars,p){
  if(!bars||!bars.length)return 0;
  var n=Math.min(p,bars.length),k=2/(n+1),e=0;
  for(var i=0;i<n;i++)e+=bars[i].c;e/=n;
  for(var i=n;i<bars.length;i++)e=bars[i].c*k+e*(1-k);
  return e;
}
function calcVWAP(bars){
  if(!bars||!bars.length)return 0;
  var sv=0,spv=0;
  for(var i=0;i<bars.length;i++){var h=(bars[i].h+bars[i].l+bars[i].c)/3;spv+=h*bars[i].v;sv+=bars[i].v;}
  return sv>0?spv/sv:bars[bars.length-1].c;
}
function calcATR(bars,p){
  if(!bars||bars.length<2)return bars&&bars[0]?bars[0].h-bars[0].l:1;
  var n=Math.min(p||14,bars.length-1),s=0;
  for(var i=0;i<n;i++){var pc=bars[i+1].c;s+=Math.max(bars[i].h-bars[i].l,Math.abs(bars[i].h-pc),Math.abs(bars[i].l-pc));}
  return s/n||1;
}
function pivH(bars,pl){pl=pl||5;var last=null;for(var i=pl;i<bars.length-pl;i++){var ok=true;for(var j=i-pl;j<=i+pl;j++){if(j!==i&&bars[j].h>=bars[i].h){ok=false;break;}}if(ok)last=bars[i].h;}return last;}
function pivL(bars,pl){pl=pl||5;var last=null;for(var i=pl;i<bars.length-pl;i++){var ok=true;for(var j=i-pl;j<=i+pl;j++){if(j!==i&&bars[j].l<=bars[i].l){ok=false;break;}}if(ok)last=bars[i].l;}return last;}
function gU(bars){for(var i=1;i<bars.length;i++){if(bars[i].l>bars[i-1].h)return(bars[i].l+bars[i-1].h)/2;}return null;}
function gD(bars){for(var i=1;i<bars.length;i++){if(bars[i].h<bars[i-1].l)return(bars[i].h+bars[i-1].l)/2;}return null;}
function getLvls(bars,pl){return{res:pivH(bars,pl),sup:pivL(bars,pl),gu:gU(bars),gd:gD(bars)};}
function nAbove(lv,p){var c=[];for(var k in lv){if(lv[k]!==null&&lv[k]>p)c.push(lv[k]);}return c.length?Math.min.apply(null,c):null;}
function nBelow(lv,p){var c=[];for(var k in lv){if(lv[k]!==null&&lv[k]<p)c.push(lv[k]);}return c.length?Math.max.apply(null,c):null;}
function tfVote(u,d,p){if(u!==null&&d===null)return 1;if(u===null&&d!==null)return -1;if(u!==null&&d!==null){if(Math.abs(u-p)<Math.abs(p-d))return 1;if(Math.abs(p-d)<Math.abs(u-p))return -1;}return 0;}
function cluster(raw,atr){
  var band=atr*0.25,cl=[];
  for(var i=0;i<raw.length;i++){var v=raw[i],m=false;for(var j=0;j<cl.length;j++){if(Math.abs(v-cl[j])<=band){cl[j]=(cl[j]+v)/2;m=true;break;}}if(!m)cl.push(v);}
  return cl;
}

function runMMG(b15,b60,b240,bD){
  try{
    if(!b15||!b15.length)return null;
    var closeN=b15[b15.length-1].c;
    if(!closeN||closeN<=0)return null;
    var atr=calcATR(b15,14)||closeN*0.01;
    var emaN=calcEMA(b15,21)||closeN;
    var vwapN=calcVWAP(b15)||closeN;
    var atrN=atr;

    var l15=getLvls(b15,5);
    var l60=getLvls(b60&&b60.length>=10?b60:b15,5);
    var l240=getLvls(b240&&b240.length>=5?b240:b15,5);
    var lD=getLvls(bD&&bD.length>=5?bD:b15,5);

    var raw=[];
    var allL=[l15,l60,l240,lD];
    for(var i=0;i<allL.length;i++){
      var lv=allL[i];
      if(lv.res)raw.push(lv.res);if(lv.sup)raw.push(lv.sup);
      if(lv.gu)raw.push(lv.gu);if(lv.gd)raw.push(lv.gd);
    }
    if(!raw.length)return null;

    var cl=cluster(raw,atr);
    var hiL=Math.max.apply(null,cl),loL=Math.min.apply(null,cl);

    var v15=tfVote(nAbove(l15,closeN),nBelow(l15,closeN),closeN);
    var v60=tfVote(nAbove(l60,closeN),nBelow(l60,closeN),closeN);
    var v240=tfVote(nAbove(l240,closeN),nBelow(l240,closeN),closeN);
    var vD=tfVote(nAbove(lD,closeN),nBelow(lD,closeN),closeN);

    var cntA=0,cntB=0,sumA=0,sumB=0;
    for(var i=0;i<cl.length;i++){if(cl[i]>closeN){cntA++;sumA+=cl[i]-closeN;}else if(cl[i]<closeN){cntB++;sumB+=closeN-cl[i];}}
    var tot=cntA+cntB;
    var pScore=tot>0?(cntA-cntB)/tot:0;
    var avgA=cntA>0?sumA/cntA:null,avgB=cntB>0?sumB/cntB:null;
    var gScore=0;
    if(avgA!==null&&avgB===null)gScore=1;else if(avgA===null&&avgB!==null)gScore=-1;
    else if(avgA!==null&&avgB!==null){if(avgA<avgB)gScore=1;else if(avgB<avgA)gScore=-1;}
    var vScore=(v15+v60+v240+vD)/4;

    var bullFlow=closeN>emaN&&closeN>vwapN;
    var bearFlow=closeN<emaN&&closeN<vwapN;
    var bullRun=closeN>hiL&&bullFlow;
    var bearRun=closeN<loL&&bearFlow;

    var dir=(pScore*0.50)+(gScore*0.30)+(vScore*0.20);
    if(bullRun)dir=Math.max(dir,0.85);
    if(bearRun)dir=Math.min(dir,-0.85);
    var bias=dir>0.10?1:dir<-0.10?-1:0;

    var fwd=[],beh=[];
    for(var i=0;i<cl.length;i++){
      if(bias===1){if(cl[i]>closeN)fwd.push(cl[i]);else if(cl[i]<closeN)beh.push(cl[i]);}
      else if(bias===-1){if(cl[i]<closeN)fwd.push(cl[i]);else if(cl[i]>closeN)beh.push(cl[i]);}
    }
    if(bias===1){fwd.sort(function(a,b){return a-b;});beh.sort(function(a,b){return b-a;});}
    else{fwd.sort(function(a,b){return b-a;});beh.sort(function(a,b){return a-b;});}

    var sp2=atr*0.25,s1=null,s2=null,sta=null,bPrice=null;
    if(beh.length)bPrice=beh[0];
    if(fwd.length)s1=fwd[0];
    if(fwd.length>1&&s1!==null){for(var i=1;i<fwd.length;i++){if(Math.abs(fwd[i]-s1)>sp2){s2=fwd[i];break;}}}
    if(fwd.length>2){var ref=s2!==null?s2:s1;if(ref){for(var i=1;i<fwd.length;i++){if(fwd[i]===s1||fwd[i]===s2)continue;if(Math.abs(fwd[i]-ref)>sp2){sta=fwd[i];break;}}}}
    if(bias===1){if(!bPrice)bPrice=hiL;if(!s1)s1=closeN+atr*0.5;if(!s2)s2=closeN+atr*1.0;if(!sta)sta=closeN+atr*1.618;}
    if(bias===-1){if(!bPrice)bPrice=loL;if(!s1)s1=closeN-atr*0.5;if(!s2)s2=closeN-atr*1.0;if(!sta)sta=closeN-atr*1.618;}
    if(!s1)return null;

    var prevC=b15.length>=2?b15[b15.length-2].c:closeN;
    var nTgt=(s1&&Math.abs(closeN-s1)<=atrN*0.4)||(s2&&Math.abs(closeN-s2)<=atrN*0.4)||(sta&&Math.abs(closeN-sta)<=atrN*0.4);
    var vwapOK=bias===1?closeN>vwapN:closeN<vwapN;

    var brdL=bias===1&&s1&&vwapOK&&closeN>s1+atrN*0.1&&prevC<=s1;
    var brdS=bias===-1&&s1&&vwapOK&&closeN<s1-atrN*0.1&&prevC>=s1;
    var boarding=brdL||brdS;
    var depL=bias===1&&!boarding&&s1&&vwapOK&&closeN>s1&&closeN>prevC&&prevC>s1;
    var depS=bias===-1&&!boarding&&s1&&vwapOK&&closeN<s1&&closeN<prevC&&prevC<s1;
    var depart=depL||depS;
    var rolL=bias===1&&!boarding&&!depart&&vwapOK&&closeN>emaN&&closeN>prevC;
    var rolS=bias===-1&&!boarding&&!depart&&vwapOK&&closeN<emaN&&closeN<prevC;
    var rolling=rolL||rolS;
    var slow=bias!==0&&nTgt;
    var rev33=bias===1?closeN<prevC:closeN>prevC;
    var rev67=bias===1?closeN<emaN:closeN>emaN;
    var rev99=bPrice&&(bias===1?closeN<bPrice:closeN>bPrice);

    var mode=1;
    if(rev99)mode=8;else if(rev67)mode=7;else if(rev33&&slow)mode=6;
    else if(slow)mode=5;else if(rolling)mode=4;else if(depart)mode=3;else if(boarding)mode=2;

    var action=mode>=2&&mode<=4?"GET ON":mode>=6?"GET OFF":"WAIT";
    var modeNames=["WAITING","BOARDING","DEPART","ROLLING","SLOW","REV 33%","REV 67%","REV 99%"];

    return{bias:bias,close:closeN,s1:s1,s2:s2,sta:sta,bPrice:bPrice,mName:modeNames[mode-1],action:action,mode:mode,atr:atr};
  }catch(e){return null;}
}

// ── FETCH ───────────────────────────────────────────────────
function fetchBars(ticker,mult,ts,from,to,limit){
  var url="https://api.polygon.io/v2/aggs/ticker/"+ticker+"/range/"+mult+"/"+ts+"/"+from+"/"+to+"?adjusted=true&sort=asc&limit="+(limit||500)+"&apiKey="+API;
  return fetch(url).then(function(r){return r.json();}).then(function(d){return d.results||[];});
}

function dateStr(d){return d.toISOString().split("T")[0];}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}

function setProgress(msg,pct){
  document.getElementById("progressTxt").textContent=msg;
  document.getElementById("progressBar").style.width=pct+"%";
}

function showError(msg){
  var el=document.getElementById("errorBox");
  el.textContent=msg;el.style.display="block";
}

// ── BACKTEST ────────────────────────────────────────────────
function runBacktest(){
  var ticker=(document.getElementById("ticker").value||"").trim().toUpperCase();
  var startDate=document.getElementById("startDate").value;
  var endDate=document.getElementById("endDate").value;
  if(!ticker||!startDate||!endDate){showError("Please fill in all fields.");return;}

  var btn=document.getElementById("runBtn");
  btn.disabled=true;btn.style.background="#1a1a3a";btn.style.color="#aaa";btn.textContent="RUNNING...";
  document.getElementById("errorBox").style.display="none";
  document.getElementById("statsWrap").style.display="none";
  document.getElementById("progressWrap").style.display="block";
  allTrades=[];
  setProgress("Fetching historical data...",5);

  var from60=dateStr(addDays(new Date(startDate),-60));
  var to=endDate;

  Promise.all([
    fetchBars(ticker,1,"day",from60,to,300),
    fetchBars(ticker,60,"minute",from60,to,2000),
    fetchBars(ticker,240,"minute",from60,to,1000),
    fetchBars(ticker,15,"minute",startDate,to,5000)
  ]).then(function(all){
    var bD=all[0],b60=all[1],b240=all[2],b15all=all[3];

    if(!b15all||!b15all.length){
      showError("No 15M data found for this period. Try a shorter range or different ticker.");
      resetBtn();return;
    }

    setProgress("Processing "+b15all.length+" bars...",25);

    // Group by trading day
    var dayMap={};
    for(var i=0;i<b15all.length;i++){
      var b=b15all[i];
      var d=new Date(b.t);
      var key=dateStr(d);
      if(!dayMap[key])dayMap[key]=[];
      dayMap[key].push(b);
    }

    var tradingDays=Object.keys(dayMap).sort();
    var total=tradingDays.length;
    setProgress("Found "+b15all.length+" bars across "+total+" trading days. Running MMG...",28);
    var trades=[];

    function processDay(di){
      if(di>=tradingDays.length){
        allTrades=trades;
        setProgress("Complete! "+trades.length+" GET ON signals found across "+tradingDays.length+" trading days ("+(Math.round(trades.length/tradingDays.length*100))+"% signal rate).",100);
        setTimeout(function(){
          document.getElementById("progressWrap").style.display="none";
          resetBtn();
          renderResults();
        },500);
        return;
      }

      var day=tradingDays[di];
      var dayBars=dayMap[day];
      var pct=25+Math.round((di/total)*70);
      setProgress("Backtesting "+day+" ("+di+1+"/"+total+")",pct);

      var entryDone=false;

      for(var bi=5;bi<dayBars.length;bi++){
        var barTs=dayBars[bi].t;
        var barDate=new Date(barTs);
        // Only scan 9:30AM - 3:30PM Eastern (14:30-20:30 UTC)
        var utcH=barDate.getUTCHours();
        var utcM=barDate.getUTCMinutes();
        var utcMins=utcH*60+utcM;
        if(utcMins<870||utcMins>=1230)continue; // 9:30ET=870UTC, 3:30PM ET=1230UTC

        if(entryDone)break;

        var b15slice=dayBars.slice(0,bi+1);
        var b60slice=b60.filter(function(b){return b.t<=barTs;}).slice(-100);
        var b240slice=b240.filter(function(b){return b.t<=barTs;}).slice(-50);
        var bDslice=bD.filter(function(b){return b.t<=barTs;}).slice(-60);

        var result=runMMG(b15slice,b60slice,b240slice,bDslice);
        if(!result)continue;
        if(result.bias===0)continue; // Skip BALANCE
        if(result.action!=="GET ON")continue; // Only trade GET ON signals

        // Got a signal - simulate forward
        entryDone=true;
        var entry=result.close;
        // Stop: use bPrice if available and makes sense, otherwise ATR-based
        var atrStop=result.bias===1?entry-result.atr*1.0:entry+result.atr*1.0;
        var stopLvl=result.bPrice?result.bPrice:atrStop;
        // Make sure stop isn't too close (min 0.5 ATR away)
        if(result.bias===1&&stopLvl>entry-result.atr*0.3)stopLvl=entry-result.atr*0.3;
        if(result.bias===-1&&stopLvl<entry+result.atr*0.3)stopLvl=entry+result.atr*0.3;
        var target=result.sta;
        var outcome="EOD";
        var exitPrice=dayBars[dayBars.length-1].c;

        for(var fi=bi+1;fi<dayBars.length;fi++){
          var fb=dayBars[fi];
          if(result.bias===1){
            if(fb.l<=stopLvl){outcome="LOSS";exitPrice=stopLvl;break;}
            if(target&&fb.h>=target){outcome="WIN";exitPrice=target;break;}
          } else {
            if(fb.h>=stopLvl){outcome="LOSS";exitPrice=stopLvl;break;}
            if(target&&fb.l<=target){outcome="WIN";exitPrice=target;break;}
          }
        }

        // EOD - determine win/loss by price vs entry
        if(outcome==="EOD"){
          var eodPnl=result.bias===1?exitPrice-entry:entry-exitPrice;
          outcome=eodPnl>=0?"WIN":"LOSS";
        }

        var pnl=result.bias===1?exitPrice-entry:entry-exitPrice;
        var pnlPct=(pnl/entry)*100;
        var rr=target?Math.abs((target-entry)/(entry-stopLvl)).toFixed(2):"—";

        trades.push({
          date:day,
          bias:result.bias,
          mode:result.mName,
          entry:entry,
          stop:parseFloat(stopLvl.toFixed(2)),
          target:target?parseFloat(target.toFixed(2)):null,
          exitPrice:parseFloat(exitPrice.toFixed(2)),
          outcome:outcome,
          pnl:pnl.toFixed(2),
          pnlPct:pnlPct.toFixed(2),
          rr:rr
        });
        break; // One trade per day
      }

      setTimeout(function(){processDay(di+1);},10);
    }

    processDay(0);
  }).catch(function(e){
    showError("Error fetching data: "+e.message);
    resetBtn();
  });
}

function resetBtn(){
  var btn=document.getElementById("runBtn");
  btn.disabled=false;btn.style.background="#00ccff";btn.style.color="#000";btn.textContent="RUN BACKTEST";
}

// ── RENDER RESULTS ──────────────────────────────────────────
function renderResults(){
  var wins=allTrades.filter(function(t){return t.outcome==="WIN";});
  var losses=allTrades.filter(function(t){return t.outcome==="LOSS";});
  var total=allTrades.length;
  var winRate=total>0?((wins.length/total)*100).toFixed(1):0;
  var avgWin=wins.length>0?(wins.reduce(function(s,t){return s+parseFloat(t.pnlPct);},0)/wins.length).toFixed(2):0;
  var avgLoss=losses.length>0?(losses.reduce(function(s,t){return s+parseFloat(t.pnlPct);},0)/losses.length).toFixed(2):0;
  var totalPnl=allTrades.reduce(function(s,t){return s+parseFloat(t.pnlPct);},0).toFixed(2);
  var profitFactor=Math.abs(avgLoss)>0?(Math.abs(avgWin)*wins.length/(Math.abs(avgLoss)*losses.length)).toFixed(2):"—";

  var statsRow=document.getElementById("statsRow");
  statsRow.innerHTML=[
    {label:"WIN RATE",value:winRate+"%",color:parseFloat(winRate)>=50?"#00ff88":"#ff4466"},
    {label:"TOTAL P&L",value:(parseFloat(totalPnl)>=0?"+":"")+totalPnl+"%",color:parseFloat(totalPnl)>=0?"#00ff88":"#ff4466"},
    {label:"WINS",value:wins.length,color:"#00ff88"},
    {label:"LOSSES",value:losses.length,color:"#ff4466"},
    {label:"AVG WIN",value:"+"+avgWin+"%",color:"#00ff88"},
    {label:"AVG LOSS",value:avgLoss+"%",color:"#ff4466"},
    {label:"PROFIT FACTOR",value:profitFactor,color:"#ffcc00"},
    {label:"TRADES",value:total,color:"#fff"},
  ].map(function(s){
    return '<div class="stat"><div style="font-size:9px;color:#aaa;margin-bottom:4px">'+s.label+'</div>'
      +'<div style="font-size:16px;font-weight:bold;color:'+s.color+'">'+s.value+'</div></div>';
  }).join("");

  // Draw equity curve
  drawEquity();

  document.getElementById("statsWrap").style.display="block";
  setFilter("ALL");
}

function drawEquity(){
  var canvas=document.getElementById("equityChart");
  canvas.width=canvas.offsetWidth||460;
  canvas.height=80;
  var ctx=canvas.getContext("2d");
  var W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(!allTrades.length)return;

  var cumPnl=[0];
  for(var i=0;i<allTrades.length;i++){cumPnl.push(cumPnl[i]+parseFloat(allTrades[i].pnlPct));}
  var minP=Math.min.apply(null,cumPnl),maxP=Math.max.apply(null,cumPnl);
  var pad=(maxP-minP)*0.1||1;minP-=pad;maxP+=pad;
  var toX=function(i){return(i/(cumPnl.length-1))*(W-4)+2;};
  var toY=function(p){return H-((p-minP)/(maxP-minP))*(H-4)-2;};

  // Zero line
  var zeroY=toY(0);
  ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,zeroY);ctx.lineTo(W,zeroY);ctx.stroke();

  // Line
  var finalPnl=cumPnl[cumPnl.length-1];
  var lineColor=finalPnl>=0?"#00ff88":"#ff4466";
  ctx.strokeStyle=lineColor;ctx.lineWidth=2;ctx.beginPath();
  for(var i=0;i<cumPnl.length;i++){i===0?ctx.moveTo(toX(i),toY(cumPnl[i])):ctx.lineTo(toX(i),toY(cumPnl[i]));}
  ctx.stroke();

  // Fill
  ctx.lineTo(toX(cumPnl.length-1),H);ctx.lineTo(toX(0),H);ctx.closePath();
  var gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,finalPnl>=0?"rgba(0,255,136,0.3)":"rgba(255,68,102,0.3)");
  gr.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=gr;ctx.fill();

  // End dot
  var endY=toY(cumPnl[cumPnl.length-1]);
  ctx.beginPath();ctx.arc(toX(cumPnl.length-1),endY,4,0,Math.PI*2);
  ctx.fillStyle=lineColor;ctx.fill();
}

function setFilter(f){
  curFilter=f;
  var ids={ALL:"fAll",WIN:"fWin",LOSS:"fLoss"};
  for(var k in ids){
    var el=document.getElementById(ids[k]);
    if(k===f){el.style.background="#00ccff";el.style.color="#000";}
    else{el.style.background="#1a1a3a";el.style.color="#ccc";}
  }
  renderTrades();
}

function renderTrades(){
  var filtered=allTrades.filter(function(t){return curFilter==="ALL"||t.outcome===curFilter;});
  var wins=allTrades.filter(function(t){return t.outcome==="WIN";}).length;
  var losses=allTrades.filter(function(t){return t.outcome==="LOSS";}).length;
  document.getElementById("fAll").textContent="ALL ("+allTrades.length+")";
  document.getElementById("fWin").textContent="WIN ("+wins+")";
  document.getElementById("fLoss").textContent="LOSS ("+losses+")";

  if(!filtered.length){
    document.getElementById("tradeList").innerHTML='<div style="padding:24px;text-align:center;color:#aaa;font-size:13px">No trades to show.</div>';
    return;
  }

  var html="";
  filtered.forEach(function(t,idx){
    var dc=t.bias===1?"#00ff88":"#ff4466";
    var oc=t.outcome==="WIN"?"#00ff88":"#ff4466";
    var bg=idx%2===0?"#0e0e22":"#0b0b1e";
    html+='<div class="trade-row" style="background:'+bg+';border-left:3px solid '+oc+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
        +'<div style="display:flex;gap:8px;align-items:center">'
          +'<span style="font-size:13px;font-weight:bold;color:#fff">'+t.date+'</span>'
          +'<span style="font-size:11px;color:'+dc+'">'+(t.bias===1?"▲":"▼")+'</span>'
          +'<span style="font-size:10px;color:#aaa">'+t.mode+'</span>'
        +'</div>'
        +'<span style="font-size:15px;font-weight:bold;color:'+oc+'">'+(parseFloat(t.pnlPct)>=0?"+":"")+t.pnlPct+'%</span>'
      +'</div>'
      +'<div style="display:flex;gap:12px;font-size:11px;color:#aaa;flex-wrap:wrap">'
        +'<span>Entry: <span style="color:#fff">$'+parseFloat(t.entry).toFixed(2)+'</span></span>'
        +'<span>Exit: <span style="color:#fff">$'+parseFloat(t.exitPrice).toFixed(2)+'</span></span>'
        +'<span>P&L: <span style="color:'+oc+'">$'+t.pnl+'</span></span>'
        +'<span>R:R <span style="color:#ffcc00">'+t.rr+'</span></span>'
      +'</div>'
    +'</div>';
  });
  document.getElementById("tradeList").innerHTML=html;
}
</script>
